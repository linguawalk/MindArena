<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>트롤리 문제 — MindArena 인문사회</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f0f12;
      --bg2:#1a1a20;
      --bg3:#24242c;
      --border:rgba(255,255,255,0.08);
      --border2:rgba(255,255,255,0.15);
      --t:#f0eee8;
      --t2:#a09e98;
      --t3:#6a6860;
      --accent:#c8a96e;
      --accent-l:#e8d4a8;
      --red:#e05252;
      --blue:#5b9bd5;
      --green:#5bb87a;
      --purple:#9b7fd4;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);
         font-size:14px;line-height:1.6;min-height:100vh}

    /* ── 헤더 ── */
    header{padding:1rem 2rem;border-bottom:1px solid var(--border);
           display:flex;align-items:center;justify-content:space-between}
    .back-link{color:var(--t2);text-decoration:none;font-size:13px;
               display:flex;align-items:center;gap:5px;transition:color .15s}
    .back-link:hover{color:var(--t)}
    .hd-tag{font-size:11px;padding:2px 10px;border-radius:20px;
            background:rgba(184,142,93,0.15);color:var(--accent);border:1px solid rgba(184,142,93,0.25)}

    /* ── 메인 레이아웃 ── */
    .wrap{max-width:860px;margin:0 auto;padding:2rem 1.5rem}

    /* ── 인트로 ── */
    .intro{text-align:center;padding:2.5rem 0 2rem}
    .intro-eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;
                   color:var(--accent);margin-bottom:.75rem}
    .intro-title{font-size:28px;font-weight:600;line-height:1.25;margin-bottom:.75rem;
                 color:var(--t)}
    .intro-sub{font-size:15px;color:var(--t2);line-height:1.7;max-width:520px;margin:0 auto}

    /* ── 시나리오 카드 ── */
    .scenario-card{background:var(--bg2);border:1px solid var(--border);
                   border-radius:14px;padding:1.75rem;margin:1.5rem 0;position:relative;overflow:hidden}
    .scenario-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
                           background:linear-gradient(90deg,var(--accent),transparent)}
    .scenario-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
                    color:var(--accent);margin-bottom:.75rem}
    .scenario-text{font-size:16px;line-height:1.8;color:var(--t);font-weight:400}
    .scenario-detail{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);
                     display:flex;gap:2rem;flex-wrap:wrap}
    .detail-item{font-size:12px;color:var(--t3)}
    .detail-item strong{color:var(--t2);display:block;font-size:11px;
                        letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}

    /* ── 선택 버튼 ── */
    .choice-section{margin:1.5rem 0}
    .choice-label{font-size:12px;color:var(--t3);margin-bottom:.75rem;
                  letter-spacing:.06em;text-transform:uppercase}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .choice-btn{padding:1rem 1.25rem;border-radius:10px;border:1px solid var(--border);
                background:var(--bg3);color:var(--t);font-family:inherit;font-size:14px;
                cursor:pointer;text-align:left;transition:all .2s;line-height:1.5}
    .choice-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(200,169,110,0.08);
                                      color:var(--accent-l)}
    .choice-btn:disabled{opacity:.5;cursor:not-allowed}
    .choice-btn.selected{border-color:var(--accent);background:rgba(200,169,110,0.12);
                          color:var(--accent-l)}
    .choice-btn .choice-icon{font-size:18px;margin-bottom:.4rem;display:block}
    .choice-btn .choice-title{font-weight:600;font-size:14px;display:block;margin-bottom:.2rem}
    .choice-btn .choice-desc{font-size:12px;color:var(--t2)}
    .choice-btn.selected .choice-desc{color:rgba(232,212,168,0.7)}

    /* ── 대화 영역 ── */
    .conversation{margin:1.5rem 0}
    .msg{margin-bottom:1rem;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .msg-ai{display:flex;gap:10px;align-items:flex-start}
    .msg-ai-avatar{width:32px;height:32px;border-radius:50%;background:rgba(155,127,212,0.2);
                   border:1px solid rgba(155,127,212,0.3);display:flex;align-items:center;
                   justify-content:center;font-size:14px;flex-shrink:0}
    .msg-ai-name{font-size:10px;color:var(--purple);letter-spacing:.06em;
                 text-transform:uppercase;margin-bottom:.3rem;font-weight:600}
    .msg-ai-bubble{background:var(--bg2);border:1px solid var(--border);
                   border-radius:12px 12px 12px 2px;padding:1rem 1.1rem;
                   font-size:14px;line-height:1.75;color:var(--t);flex:1}

    .msg-user{display:flex;gap:10px;align-items:flex-start;flex-direction:row-reverse}
    .msg-user-avatar{width:32px;height:32px;border-radius:50%;background:rgba(200,169,110,0.15);
                     border:1px solid rgba(200,169,110,0.25);display:flex;align-items:center;
                     justify-content:center;font-size:14px;flex-shrink:0}
    .msg-user-bubble{background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.2);
                     border-radius:12px 12px 2px 12px;padding:.75rem 1rem;
                     font-size:14px;line-height:1.7;color:var(--accent-l);flex:1;text-align:right}

    /* ── 입력창 ── */
    .input-area{margin-top:1.25rem;display:flex;gap:8px;align-items:flex-end}
    .input-box{flex:1;background:var(--bg2);border:1px solid var(--border);
               border-radius:10px;padding:.75rem 1rem;color:var(--t);
               font-family:inherit;font-size:14px;resize:none;
               line-height:1.6;min-height:50px;max-height:150px;
               transition:border-color .15s}
    .input-box:focus{outline:none;border-color:var(--border2)}
    .input-box::placeholder{color:var(--t3)}
    .send-btn{padding:.7rem 1.1rem;border-radius:10px;border:none;
              background:var(--accent);color:#1a1400;font-family:inherit;
              font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
              flex-shrink:0;height:50px}
    .send-btn:hover:not(:disabled){background:var(--accent-l)}
    .send-btn:disabled{opacity:.5;cursor:not-allowed}

    /* ── 빠른 응답 버튼 ── */
    .quick-replies{display:flex;gap:7px;flex-wrap:wrap;margin-top:.75rem}
    .qr-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);
            background:transparent;color:var(--t2);font-family:inherit;font-size:12px;
            cursor:pointer;transition:all .15s}
    .qr-btn:hover{border-color:var(--border2);color:var(--t)}

    /* ── 로딩 ── */
    .loading{display:flex;gap:5px;padding:.5rem 0;align-items:center}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--t3);
         animation:bounce .8s infinite}
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
    @keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:.5}40%{transform:scale(1);opacity:1}}

    /* ── 라운드 표시 ── */
    .round-bar{display:flex;align-items:center;justify-content:space-between;
               margin-bottom:1rem;padding:.6rem .8rem;background:var(--bg3);
               border-radius:8px;font-size:12px}
    .round-num{color:var(--accent)}
    .round-dots{display:flex;gap:4px}
    .round-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
    .round-dot.done{background:var(--accent)}
    .round-dot.current{background:var(--purple)}

    /* ── 결론 카드 ── */
    .conclusion{background:var(--bg2);border:1px solid var(--border);
                border-radius:14px;padding:1.5rem;margin-top:1.5rem;
                border-left:3px solid var(--accent)}
    .conclusion-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;
                      color:var(--accent);margin-bottom:.75rem}
    .conclusion-text{font-size:14px;line-height:1.8;color:var(--t)}

    /* ── 다음 시나리오 버튼 ── */
    .next-btn{display:block;width:100%;margin-top:1.25rem;padding:.9rem;
              border-radius:10px;border:1px solid var(--accent);
              background:transparent;color:var(--accent);font-family:inherit;
              font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
    .next-btn:hover{background:rgba(200,169,110,0.1)}

    /* ── 시나리오 선택 목록 ── */
    .scenario-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:1rem}
    .sc-item{padding:1rem;border-radius:10px;border:1px solid var(--border);
             background:var(--bg3);cursor:pointer;transition:all .2s}
    .sc-item:hover{border-color:var(--border2);background:var(--bg2)}
    .sc-item.active{border-color:var(--accent);background:rgba(200,169,110,0.07)}
    .sc-num{font-size:10px;color:var(--accent);margin-bottom:.3rem;
            letter-spacing:.08em;text-transform:uppercase}
    .sc-title{font-size:13px;font-weight:600;color:var(--t);margin-bottom:.2rem}
    .sc-sub{font-size:11.5px;color:var(--t3);line-height:1.5}

    @media(max-width:600px){
      .choices{grid-template-columns:1fr}
      .scenario-list{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    MindArena
  </a>
  <span class="hd-tag">인문사회 · AI 보드게임</span>
</header>

<div class="wrap">
  <div class="intro">
    <div class="intro-eyebrow">Ethics Lab · 윤리 탐구</div>
    <h1 class="intro-title">트롤리 문제</h1>
    <p class="intro-sub">당신의 선택에 AI 철학자가 반응합니다. 정답은 없습니다. 더 나은 논거가 있을 뿐입니다.</p>
  </div>

  <!-- 시나리오 선택 -->
  <div id="stage-select">
    <div style="font-size:12px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:.75rem">시나리오 선택</div>
    <div class="scenario-list">
      <div class="sc-item active" onclick="selectScenario(0)">
        <div class="sc-num">시나리오 01</div>
        <div class="sc-title">레버와 5명</div>
        <div class="sc-sub">레버를 당기면 1명이 죽고 5명이 산다</div>
      </div>
      <div class="sc-item" onclick="selectScenario(1)">
        <div class="sc-num">시나리오 02</div>
        <div class="sc-title">육교 위의 선택</div>
        <div class="sc-sub">밀어야만 트롤리가 멈춘다</div>
      </div>
      <div class="sc-item" onclick="selectScenario(2)">
        <div class="sc-num">시나리오 03</div>
        <div class="sc-title">의사의 딜레마</div>
        <div class="sc-sub">장기 적출로 5명을 살릴 수 있다</div>
      </div>
      <div class="sc-item" onclick="selectScenario(3)">
        <div class="sc-num">시나리오 04</div>
        <div class="sc-title">자율주행 AI</div>
        <div class="sc-sub">사고 시 누구를 보호하도록 설계할 것인가</div>
      </div>
    </div>
    <button class="next-btn" onclick="startGame()" style="margin-top:1.25rem">선택한 시나리오로 시작 →</button>
  </div>

  <!-- 게임 영역 -->
  <div id="stage-game" style="display:none">
    <div class="round-bar">
      <span style="color:var(--t2)">라운드 <span class="round-num" id="round-display">1</span> / 5</span>
      <div class="round-dots" id="round-dots"></div>
    </div>

    <div class="scenario-card" id="scenario-display">
      <div class="scenario-label">상황</div>
      <div class="scenario-text" id="scenario-text"></div>
      <div class="scenario-detail" id="scenario-detail"></div>
    </div>

    <div class="choice-section" id="choice-section">
      <div class="choice-label">당신의 선택</div>
      <div class="choices" id="choices-container"></div>
    </div>

    <div class="conversation" id="conversation"></div>

    <div id="input-section" style="display:none">
      <div class="input-area">
        <textarea class="input-box" id="user-input" placeholder="당신의 생각을 말해주세요..." rows="2"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">전송</button>
      </div>
      <div class="quick-replies" id="quick-replies"></div>
    </div>

    <div id="conclusion-section" style="display:none">
      <div class="conclusion">
        <div class="conclusion-title">오늘의 탐구 결론</div>
        <div class="conclusion-text" id="conclusion-text"></div>
      </div>
      <button class="next-btn" onclick="backToSelect()">다른 시나리오 탐구하기 →</button>
    </div>
  </div>
</div>

<script>
// ── 시나리오 데이터 ──
const SCENARIOS = [
  {
    id: 0,
    title: '레버와 5명',
    situation: '통제 불능의 트롤리가 철로를 달리고 있습니다. 앞에는 묶여 있는 5명이 있습니다. 당신 옆에 레버가 있고, 당기면 트롤리가 다른 선로로 방향을 바꿉니다. 하지만 그 선로에는 묶인 1명이 있습니다.',
    detail: [
      { label: '행동하지 않으면', value: '5명 사망' },
      { label: '레버를 당기면', value: '1명 사망, 5명 생존' },
      { label: '당신의 역할', value: '유일한 목격자이자 행위자' }
    ],
    choices: [
      { icon: '🔧', title: '레버를 당긴다', desc: '5명을 살리기 위해 적극적으로 행동한다', value: 'pull' },
      { icon: '🚫', title: '당기지 않는다', desc: '내 손으로 누군가를 죽이는 행위를 거부한다', value: 'no_pull' }
    ]
  },
  {
    id: 1,
    title: '육교 위의 선택',
    situation: '당신은 육교 위에서 내려오는 트롤리를 바라보고 있습니다. 선로에는 5명이 묶여 있습니다. 당신 옆에는 체구가 큰 낯선 사람이 있습니다. 그를 밀면 트롤리가 멈추고 5명이 살 수 있습니다. 하지만 그는 사망합니다.',
    detail: [
      { label: '밀지 않으면', value: '5명 사망' },
      { label: '밀면', value: '1명 사망, 5명 생존' },
      { label: '결과', value: '레버 문제와 동일' }
    ],
    choices: [
      { icon: '👋', title: '밀어버린다', desc: '5명의 생명을 위해 그를 도구로 사용한다', value: 'push' },
      { icon: '🚫', title: '밀지 않는다', desc: '내 손으로 타인을 직접 죽이는 행위를 거부한다', value: 'no_push' }
    ]
  },
  {
    id: 2,
    title: '의사의 딜레마',
    situation: '당신은 의사입니다. 병원에 장기 이식이 필요한 환자 5명이 있고 모두 죽어가고 있습니다. 마침 건강 검진을 받으러 온 1명의 건강한 환자가 있습니다. 이 사람의 장기를 적출하면 5명을 모두 살릴 수 있습니다.',
    detail: [
      { label: '적출하지 않으면', value: '5명 사망' },
      { label: '적출하면', value: '1명 사망, 5명 생존' },
      { label: '환자 신뢰', value: '의사-환자 관계 근본 붕괴 가능' }
    ],
    choices: [
      { icon: '🔪', title: '장기를 적출한다', desc: '5명의 생명이 1명의 희생보다 중요하다', value: 'extract' },
      { icon: '🏥', title: '적출하지 않는다', desc: '의사는 절대로 환자를 해칠 수 없다', value: 'no_extract' }
    ]
  },
  {
    id: 3,
    title: '자율주행 AI 설계',
    situation: '당신은 자율주행 자동차 회사의 설계자입니다. 피할 수 없는 사고 상황에서 AI가 어떻게 결정하도록 프로그래밍할지 정해야 합니다. 탑승자 1명과 보행자 5명 사이에서 선택해야 합니다.',
    detail: [
      { label: '설계 방향 A', value: '탑승자 보호 우선' },
      { label: '설계 방향 B', value: '다수 보호 (보행자 5명)' },
      { label: '사회적 영향', value: '모든 차량에 적용될 원칙' }
    ],
    choices: [
      { icon: '🚗', title: '탑승자를 보호한다', desc: '제품은 소비자를 보호해야 하며, 그래야 판매도 된다', value: 'passenger' },
      { icon: '🚶', title: '보행자 다수를 보호한다', desc: '사회 전체의 피해를 최소화하는 원칙이 맞다', value: 'pedestrian' }
    ]
  }
];

// ── 상태 ──
let currentScenario = SCENARIOS[0];
let selectedChoice = null;
let round = 1;
let maxRounds = 5;
let messages = [];
let isLoading = false;
let roundDots = [];

// ── 시나리오 선택 ──
function selectScenario(idx) {
  document.querySelectorAll('.sc-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  currentScenario = SCENARIOS[idx];
}

function startGame() {
  document.getElementById('stage-select').style.display = 'none';
  document.getElementById('stage-game').style.display = 'block';
  round = 1;
  messages = [];
  selectedChoice = null;
  renderScenario();
  renderRoundDots();
}

function renderScenario() {
  const sc = currentScenario;
  document.getElementById('scenario-text').textContent = sc.situation;
  const detail = sc.detail.map(d =>
    `<div class="detail-item"><strong>${d.label}</strong>${d.value}</div>`
  ).join('');
  document.getElementById('scenario-detail').innerHTML = detail;

  const choices = sc.choices.map(c => `
    <button class="choice-btn" onclick="chooseOption('${c.value}', this)">
      <span class="choice-icon">${c.icon}</span>
      <span class="choice-title">${c.title}</span>
      <span class="choice-desc">${c.desc}</span>
    </button>
  `).join('');
  document.getElementById('choices-container').innerHTML = choices;
  document.getElementById('conversation').innerHTML = '';
  document.getElementById('input-section').style.display = 'none';
  document.getElementById('conclusion-section').style.display = 'none';
}

function renderRoundDots() {
  const container = document.getElementById('round-dots');
  container.innerHTML = '';
  for (let i = 1; i <= maxRounds; i++) {
    const dot = document.createElement('div');
    dot.className = 'round-dot' + (i < round ? ' done' : i === round ? ' current' : '');
    container.appendChild(dot);
  }
}

// ── 선택 처리 ──
async function chooseOption(value, btn) {
  if (isLoading) return;
  selectedChoice = value;
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.classList.remove('selected');
    b.disabled = true;
  });
  btn.classList.add('selected');

  const choiceData = currentScenario.choices.find(c => c.value === value);
  addUserMessage(`"${choiceData.title}" — ${choiceData.desc}`);

  messages.push({ role: 'user', content: `나의 선택: ${choiceData.title}\n이유: ${choiceData.desc}` });

  await getAIResponse(false);
}

// ── 메시지 전송 ──
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  addUserMessage(text);
  messages.push({ role: 'user', content: text });
  document.getElementById('quick-replies').innerHTML = '';

  await getAIResponse(round >= maxRounds);
}

// ── UI 헬퍼 ──
function addUserMessage(text) {
  const conv = document.getElementById('conversation');
  conv.innerHTML += `
    <div class="msg msg-user">
      <div class="msg-user-avatar">🧑</div>
      <div class="msg-user-bubble">${text}</div>
    </div>`;
  conv.scrollTop = conv.scrollHeight;
}

function addAIMessage(text, name = 'AI 철학자') {
  const conv = document.getElementById('conversation');
  conv.innerHTML += `
    <div class="msg msg-ai">
      <div class="msg-ai-avatar">🦉</div>
      <div>
        <div class="msg-ai-name">${name}</div>
        <div class="msg-ai-bubble">${text.replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;
  conv.scrollTop = conv.scrollHeight;
}

function showLoading() {
  const conv = document.getElementById('conversation');
  const div = document.createElement('div');
  div.id = 'loading-msg';
  div.className = 'msg msg-ai';
  div.innerHTML = `
    <div class="msg-ai-avatar">🦉</div>
    <div>
      <div class="msg-ai-name">AI 철학자</div>
      <div class="msg-ai-bubble">
        <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>`;
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loading-msg');
  if (el) el.remove();
}

// ── AI 응답 ──
async function getAIResponse(isFinal) {
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('user-input').disabled = true;
  showLoading();

  const sc = currentScenario;
  const systemPrompt = `당신은 MindArena의 AI 철학자입니다. 사용자와 트롤리 문제 윤리 토론을 진행합니다.

시나리오: ${sc.title}
상황: ${sc.situation}

역할 지침:
- 소크라테스식으로 질문하며 사용자의 사고를 깊게 이끌어냅니다
- 공리주의(벤담/밀), 의무론(칸트), 덕 윤리학(아리스토텔레스) 관점을 자연스럽게 활용합니다
- 사용자 선택을 존중하되 반드시 날카로운 반론이나 새로운 관점을 제시합니다
- 현재 라운드: ${round}/${maxRounds}
- ${isFinal ? '이번이 마지막 라운드입니다. 대화를 마무리하고 사용자의 윤리적 성장을 격려하세요.' : '짧고 날카롭게 반응하고 다음 사고를 유도하는 질문으로 마무리하세요.'}
- 응답은 200자 내외로 간결하게 (마지막 라운드 제외)
- 한국어로 답변`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: messages
      })
    });

    const data = await response.json();
    hideLoading();

    const aiText = data.content?.[0]?.text || '응답을 불러오지 못했습니다.';
    addAIMessage(aiText);
    messages.push({ role: 'assistant', content: aiText });

    round++;
    document.getElementById('round-display').textContent = Math.min(round, maxRounds);
    renderRoundDots();

    if (isFinal) {
      await showConclusion();
    } else {
      showInputSection();
    }
  } catch (err) {
    hideLoading();
    addAIMessage('잠시 오류가 발생했습니다. 다시 시도해 주세요.');
    showInputSection();
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').disabled = false;
}

// ── 입력창 표시 ──
function showInputSection() {
  document.getElementById('input-section').style.display = 'block';
  document.getElementById('user-input').focus();

  // 빠른 응답 버튼
  const quickReplies = [
    '그 논리에 동의하기 어렵습니다',
    '결과론적 관점에서 보면...',
    '하지만 의무론적으로는...',
    '더 설명해 주시겠습니까?'
  ];
  const qrContainer = document.getElementById('quick-replies');
  qrContainer.innerHTML = quickReplies.map(q =>
    `<button class="qr-btn" onclick="quickReply('${q}')">${q}</button>`
  ).join('');
}

function quickReply(text) {
  document.getElementById('user-input').value = text;
  document.getElementById('user-input').focus();
}

// ── 결론 ──
async function showConclusion() {
  isLoading = true;
  showLoading();

  const conclusionPrompt = `지금까지의 대화를 바탕으로 사용자의 윤리적 입장을 3-4문장으로 요약해주세요.
어떤 윤리 이론에 가까운지, 어떤 성장이 있었는지, 앞으로 생각해볼 질문을 포함해주세요.
따뜻하고 격려하는 톤으로, 한국어로 작성해주세요.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [...messages, { role: 'user', content: conclusionPrompt }]
      })
    });

    const data = await response.json();
    hideLoading();

    const text = data.content?.[0]?.text || '';
    document.getElementById('conclusion-text').innerHTML = text.replace(/\n/g, '<br>');
    document.getElementById('conclusion-section').style.display = 'block';
    document.getElementById('input-section').style.display = 'none';
    document.getElementById('conclusion-section').scrollIntoView({ behavior: 'smooth' });
  } catch (err) {
    hideLoading();
  }

  isLoading = false;
}

// ── 초기화 ──
function backToSelect() {
  document.getElementById('stage-game').style.display = 'none';
  document.getElementById('stage-select').style.display = 'block';
  round = 1;
  messages = [];
  selectedChoice = null;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
