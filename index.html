<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindArena — 게임으로 배우는 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f6f4;--bg3:#eeedeb;
  --t:#1a1814;--t2:#4a4640;--t3:#9a9690;--bd:rgba(0,0,0,.07);
  --lang:#16a34a;--lang-l:#f0fdf4;
  --stem:#2563eb;--stem-l:#eff6ff;
  --soc:#b45309;--soc-l:#fef3c7;
  --arts:#0f766e;--arts-l:#f0fdfa;
  --r:14px;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.6;min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
    border-bottom:.5px solid var(--bd);padding:0 1.5rem;height:52px;
    display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:700;color:var(--t);display:flex;align-items:center;gap:8px;border:none;background:none;cursor:pointer;font-family:inherit}
.logo-m{width:26px;height:26px;background:linear-gradient(135deg,#7c3aed,#2563eb);border-radius:8px;
        color:white;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.nav-r{display:flex;gap:.25rem}
.nav-btn{padding:5px 12px;border-radius:8px;font-size:13px;color:var(--t2);background:none;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:var(--bg2)}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--bd);overflow-x:auto;padding:0 1.5rem;
      background:white;position:sticky;top:52px;z-index:100}
.tabs::-webkit-scrollbar{display:none}
.tab{height:50px;padding:0 1.25rem;border:none;background:transparent;cursor:pointer;font-family:inherit;
     font-size:14px;font-weight:500;color:var(--t3);border-bottom:2.5px solid transparent;
     margin-bottom:-2px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--t2)}
.tab[data-t="lang"].on{color:var(--lang);border-color:var(--lang);font-weight:700}
.tab[data-t="stem"].on{color:var(--stem);border-color:var(--stem);font-weight:700}
.tab[data-t="soc"].on{color:var(--soc);border-color:var(--soc);font-weight:700}
.tab[data-t="arts"].on{color:var(--arts);border-color:var(--arts);font-weight:700}
.tct{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.tab[data-t="lang"].on .tct{background:var(--lang-l);color:var(--lang)}
.tab[data-t="stem"].on .tct{background:var(--stem-l);color:var(--stem)}
.tab[data-t="soc"].on .tct{background:var(--soc-l);color:var(--soc)}
.tab[data-t="arts"].on .tct{background:var(--arts-l);color:var(--arts)}

/* SUBJECT BAR */
.sbar{padding:.7rem 1.5rem;border-bottom:.5px solid var(--bd);display:flex;gap:6px;flex-wrap:wrap;
      background:var(--bg2);position:sticky;top:102px;z-index:90}
.sbtn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--bd);background:white;
      font-family:inherit;font-size:13px;cursor:pointer;color:var(--t2);transition:all .15s;white-space:nowrap}
.sbtn:hover{border-color:var(--t2);color:var(--t)}
.sbtn.sl{background:var(--lang-l);border-color:var(--lang);color:var(--lang);font-weight:600}
.sbtn.ss{background:var(--stem-l);border-color:var(--stem);color:var(--stem);font-weight:600}
.sbtn.sc{background:var(--soc-l);border-color:var(--soc);color:var(--soc);font-weight:600}
.sbtn.sa{background:var(--arts-l);border-color:var(--arts);color:var(--arts);font-weight:600}

/* CONTENT */
.content{max-width:1040px;margin:0 auto;padding:2rem 1.5rem}

/* SUBJECT HEADER */
.sh{margin-bottom:1.75rem}
.sh-title{font-size:22px;font-weight:700;margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem}
.sh-desc{font-size:13.5px;color:var(--t2);line-height:1.65;max-width:580px}
.sh-tags{display:flex;gap:6px;margin-top:.6rem;flex-wrap:wrap}
.sh-tag{padding:3px 10px;border-radius:10px;font-size:12px;font-weight:500;background:var(--bg2);color:var(--t2)}

/* GAME GRID */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.gc{border-radius:var(--r);border:.5px solid var(--bd);padding:1.25rem;background:white;
    cursor:pointer;transition:all .2s;position:relative}
.gc.ready:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.09)}
.gc.coming{opacity:.6;cursor:default}
.gc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.gc-icon{font-size:28px}
.gc-badge{font-size:10px;padding:3px 9px;border-radius:8px;font-weight:600}
.gc-badge.r{background:#f0fdf4;color:#16a34a}
.gc-badge.c{background:var(--bg2);color:var(--t3)}
.gc-title{font-size:15px;font-weight:700;color:var(--t);margin-bottom:.35rem}
.gc-desc{font-size:12.5px;color:var(--t2);line-height:1.55;margin-bottom:.85rem}
.gc-foot{display:flex;align-items:center;justify-content:space-between}
.gc-type{font-size:11.5px;color:var(--t3)}
.gc-cta{font-size:12.5px;font-weight:700}

/* GAME OVERLAY */
.gov{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.gov.open{display:flex}
.gov-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.gov-box{position:relative;background:white;border-radius:20px;width:100%;max-width:680px;
         max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.gov-hd{padding:1.25rem 1.5rem;border-bottom:.5px solid var(--bd);display:flex;align-items:center;
        justify-content:space-between;position:sticky;top:0;background:white;z-index:1;border-radius:20px 20px 0 0}
.gov-title{font-size:16px;font-weight:700}
.gov-x{background:none;border:none;cursor:pointer;font-size:22px;color:var(--t3);padding:2px 7px;border-radius:8px;line-height:1}
.gov-x:hover{background:var(--bg2)}
.gov-body{padding:1.5rem}

/* CARD FLIP */
.cg{display:grid;gap:10px}
.cg4{grid-template-columns:repeat(4,1fr)}
.cg3{grid-template-columns:repeat(3,1fr)}
.fc{perspective:600px;cursor:pointer;height:90px}
.fc-i{position:relative;width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d}
.fc.flipped .fc-i,.fc.matched .fc-i{transform:rotateY(180deg)}
.fc-f,.fc-b{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;
             backface-visibility:hidden;font-weight:600;border:2px solid var(--bd);text-align:center;padding:.5rem}
.fc-f{background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-size:20px}
.fc-b{background:white;transform:rotateY(180deg);font-size:13px;color:var(--t)}
.fc.matched .fc-b{background:#f0fdf4;color:#15803d;border-color:#16a34a}
.fc.wrong .fc-b{background:#fef2f2;border-color:#dc2626;animation:shake .3s}
@keyframes shake{0%,100%{transform:rotateY(180deg) translateX(0)}50%{transform:rotateY(180deg) translateX(-6px)}}

/* TIMELINE */
.tl{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.tli{padding:.85rem 1.1rem;border-radius:12px;border:1.5px solid var(--bd);background:white;
     cursor:grab;display:flex;align-items:center;gap:.75rem;transition:all .15s;user-select:none}
.tli:hover{border-color:var(--t2);background:var(--bg2)}
.tli.dragging{opacity:.4;border-style:dashed}
.tli.over{border-color:#7c3aed;background:#faf5ff}
.tli.ok{border-color:#16a34a;background:#f0fdf4}
.tli.ng{border-color:#dc2626;background:#fef2f2}
.tli-handle{color:var(--t3);font-size:18px}
.tli-year{font-size:12px;font-weight:700;color:#7c3aed;min-width:52px}
.tli-text{font-size:13.5px;color:var(--t)}

/* FLAG GAME */
.fq{font-size:15px;font-weight:600;margin-bottom:.75rem;padding:.75rem;background:var(--bg2);border-radius:10px;text-align:center}
.fopts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem}
.fopt{padding:1rem;border-radius:12px;border:2px solid var(--bd);cursor:pointer;transition:all .15s;
      background:white;font-size:13px;font-weight:600;text-align:center}
.fopt:hover{border-color:var(--t2);background:var(--bg2)}
.fopt.ok{border-color:#16a34a;background:#f0fdf4;color:#15803d}
.fopt.ng{border-color:#dc2626;background:#fef2f2;color:#991b1b;animation:shake .3s}

/* CALC GAME */
.cq{font-size:36px;font-weight:700;color:var(--t);margin:.75rem 0;padding:1.25rem;
    background:var(--bg2);border-radius:14px;text-align:center;letter-spacing:.05em}
.copts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:.75rem}
.copt{width:72px;height:56px;border-radius:10px;border:2px solid var(--bd);background:white;
      font-size:22px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.copt:hover{border-color:var(--stem);background:var(--stem-l)}
.copt.ok{border-color:#16a34a;background:#f0fdf4;color:#15803d}
.copt.ng{border-color:#dc2626;background:#fef2f2;color:#991b1b;animation:shake .3s}
.tbar{height:6px;background:var(--bg3);border-radius:3px;margin:.5rem 0;overflow:hidden}
.tfill{height:100%;border-radius:3px;transition:width .1s linear;background:var(--stem)}

/* COMMON GAME UI */
.gscore{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.gsi{padding:5px 14px;border-radius:14px;font-size:13px;background:var(--bg2);border:.5px solid var(--bd)}
.gsv{font-weight:700}
.gfb{padding:.9rem 1.1rem;border-radius:12px;font-size:14px;font-weight:500;margin:1rem 0;text-align:center;display:none}
.gfb.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;display:block}
.gfb.ng{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;display:block}
.gbtns{display:flex;gap:8px;flex-wrap:wrap}
.gbp{padding:.75rem 1.25rem;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:white;transition:all .15s}
.gbp:hover{opacity:.85}
.gbs{padding:.75rem 1.1rem;border-radius:10px;border:1.5px solid var(--bd);background:var(--bg2);color:var(--t2);cursor:pointer;font-family:inherit;font-size:14px}
.gbs:hover{background:var(--bg3)}
.pbar{height:5px;background:var(--bg3);border-radius:3px;margin-bottom:1.25rem}
.pfill{height:100%;border-radius:3px;transition:width .3s}

/* DARK OVERLAY (음악·미술) */
.dov{position:fixed;inset:0;background:#0f0f14;z-index:400;display:none;flex-direction:column;overflow-y:auto}
.dov.open{display:flex}
.dov-nav{height:52px;padding:0 1.25rem;border-bottom:1px solid rgba(255,255,255,.08);
         display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dov-title{font-size:15px;font-weight:600;color:#f0eee8}
.dov-close{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:8px;
           padding:5px 14px;color:#a09e98;cursor:pointer;font-family:inherit;font-size:12px}

/* ABOUT */
.aov{position:fixed;inset:0;background:white;z-index:500;display:none;flex-direction:column;overflow-y:auto}
.aov.open{display:flex}

/* COMING */
.coming{text-align:center;padding:4rem 2rem;background:var(--bg2);border-radius:var(--r);border:2px dashed var(--bd)}
.coming h3{font-size:19px;font-weight:700;margin:.75rem 0 .5rem}
.coming p{font-size:13.5px;color:var(--t2);line-height:1.7;max-width:400px;margin:0 auto}
.ctags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:.9rem}
.ctag{padding:4px 12px;border-radius:14px;font-size:12px;background:var(--bg3);color:var(--t2)}

footer{border-top:.5px solid var(--bd);padding:1.25rem 1.5rem;display:flex;align-items:center;
       justify-content:space-between;font-size:12px;color:var(--t3);flex-wrap:wrap;gap:.5rem;margin-top:2rem}
footer a{color:var(--t3);text-decoration:none}
footer a:hover{color:var(--t)}

@media(max-width:640px){
  .tab{padding:0 .85rem;font-size:13px}.tct{display:none}
  .sbtn{font-size:12px;padding:5px 11px}
  .gg{grid-template-columns:1fr}
  .cg4{grid-template-columns:repeat(3,1fr)}
  .fopts{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <button class="logo" onclick="openAbout()">
    <div class="logo-m">M</div>MindArena
  </button>
  <div class="nav-r">
    <button class="nav-btn" onclick="openAbout()">소개</button>
    <button class="nav-btn" onclick="openAbout()">문의</button>
  </div>
</nav>

<div class="tabs">
  <button class="tab on" data-t="lang" onclick="showTab('lang',this)">🔤 언어 <span class="tct">3과목</span></button>
  <button class="tab" data-t="stem" onclick="showTab('stem',this)">🔬 수학과학기술 <span class="tct">6과목</span></button>
  <button class="tab" data-t="soc" onclick="showTab('soc',this)">🌍 사회 <span class="tct">4과목</span></button>
  <button class="tab" data-t="arts" onclick="showTab('arts',this)">🎶 음악·미술 <span class="tct">2과목</span></button>
</div>

<div class="sbar" id="sbar"></div>
<div class="content" id="content"></div>

<footer>
  <span>© 2025-2026 MindArena — 게임으로 배우는 무료 플랫폼</span>
  <div style="display:flex;gap:1rem"><a href="#" onclick="openAbout();return false">소개</a><a href="mailto:hello@mind-arena.org">문의</a></div>
</footer>

<!-- 게임 오버레이 -->
<div class="gov" id="gov">
  <div class="gov-bg" onclick="closeGame()"></div>
  <div class="gov-box">
    <div class="gov-hd">
      <div class="gov-title" id="gov-title">게임</div>
      <button class="gov-x" onclick="closeGame()">✕</button>
    </div>
    <div class="gov-body" id="gov-body"></div>
  </div>
</div>

<!-- 음악 오버레이 -->
<div class="dov" id="music-ov">
  <div class="dov-nav">
    <span class="dov-title">🎵 음악 청각 게임</span>
    <button class="dov-close" onclick="closeDov('music-ov')">✕ 닫기</button>
  </div>
  <div id="music-body" style="flex:1;padding:1.25rem;max-width:680px;margin:0 auto;width:100%;color:#f0eee8"></div>
</div>

<!-- 미술 오버레이 -->
<div class="dov" id="art-ov">
  <div class="dov-nav">
    <span class="dov-title">🎨 미술 시각 게임</span>
    <button class="dov-close" onclick="closeDov('art-ov')">✕ 닫기</button>
  </div>
  <div id="art-body" style="flex:1;padding:1.25rem;max-width:680px;margin:0 auto;width:100%;color:#f0eee8"></div>
</div>

<!-- 소개 오버레이 -->
<div class="aov" id="aov">
  <div style="position:sticky;top:0;background:white;padding:.9rem 1.5rem;border-bottom:.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;z-index:1">
    <span style="font-size:15px;font-weight:700">MindArena 소개</span>
    <button onclick="closeAbout()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--t3)">✕</button>
  </div>
  <div style="max-width:760px;margin:0 auto;padding:2.5rem 1.5rem">
    <div style="text-align:center;margin-bottom:2.5rem">
      <div style="font-size:48px;margin-bottom:1rem">🎮</div>
      <h1 style="font-size:28px;font-weight:700;margin-bottom:.75rem">게임으로 배우는 플랫폼</h1>
      <p style="font-size:15px;color:var(--t2);line-height:1.75;max-width:460px;margin:0 auto">15개 과목을 퍼즐·게임으로 배웁니다.<br>카드 매칭·타임라인·지도 클릭·계산 게임 등<br>모든 콘텐츠는 무료입니다.</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2.5rem">
      <div style="padding:1rem;background:var(--bg2);border-radius:12px;text-align:center"><div style="font-size:24px;font-weight:700">15</div><div style="font-size:11px;color:var(--t3);margin-top:.2rem">과목</div></div>
      <div style="padding:1rem;background:var(--bg2);border-radius:12px;text-align:center"><div style="font-size:24px;font-weight:700">8+</div><div style="font-size:11px;color:var(--t3);margin-top:.2rem">게임 유형</div></div>
      <div style="padding:1rem;background:var(--bg2);border-radius:12px;text-align:center"><div style="font-size:24px;font-weight:700">AI없이</div><div style="font-size:11px;color:var(--t3);margin-top:.2rem">작동</div></div>
      <div style="padding:1rem;background:var(--bg2);border-radius:12px;text-align:center"><div style="font-size:24px;font-weight:700">무료</div><div style="font-size:11px;color:var(--t3);margin-top:.2rem">모든 콘텐츠</div></div>
    </div>
    <div style="background:var(--bg2);border-radius:14px;padding:2rem">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:1.25rem">문의하기</h2>
      <div id="aov-ok" style="display:none;text-align:center;padding:1.5rem;background:#f0fdf4;border-radius:10px;border:1px solid #bbf7d0"><div style="font-size:28px;margin-bottom:.5rem">✅</div><div style="font-weight:600;color:#166534">접수되었습니다</div></div>
      <form id="aov-form" onsubmit="submitForm(event)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div><div style="font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px">이름 *</div><input required type="text" placeholder="홍길동" style="width:100%;padding:.65rem .9rem;border-radius:8px;border:1.5px solid var(--bd);font-family:inherit;font-size:14px;outline:none"></div>
          <div><div style="font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px">이메일 *</div><input required type="email" placeholder="hello@example.com" style="width:100%;padding:.65rem .9rem;border-radius:8px;border:1.5px solid var(--bd);font-family:inherit;font-size:14px;outline:none"></div>
        </div>
        <div style="margin-bottom:12px"><div style="font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px">내용 *</div><textarea required placeholder="문의 내용을 작성해 주세요." style="width:100%;padding:.65rem .9rem;border-radius:8px;border:1.5px solid var(--bd);font-family:inherit;font-size:14px;outline:none;resize:vertical;min-height:90px;line-height:1.6"></textarea></div>
        <button type="submit" style="width:100%;padding:.8rem;border-radius:9px;border:none;background:var(--t);color:white;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer">문의 보내기</button>
      </form>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// 구조 데이터
// ═══════════════════════════════════
const TABS = {
  lang:{label:'언어',color:'var(--lang)',sc:'sl',subjects:[
    {id:'hanja',icon:'漢',label:'한자',desc:'카드 매칭·획순 그리기·사자성어 조합으로 한자를 게임으로 익힙니다.',
     games:[
      {id:'hanja-flip',icon:'🀄',title:'한자 카드 매칭',type:'기억력 게임',desc:'한자와 뜻 카드를 뒤집어 같은 쌍을 찾으세요. 레벨이 올라갈수록 카드가 늘어납니다.',ready:true},

function genCalcQ(lv){
  const ops=lv>2?['+','-','×','÷']:['+','-'];
  const op=ops[Math.floor(Math.random()*ops.length)];
  let q,ans;
  if(op==='+'){const a=rnd(10*lv),b=rnd(10*lv);q=`${a} + ${b}`;ans=a+b;}
  else if(op==='-'){const a=rnd(10*lv)+5,b=rnd(a)+1;q=`${a} - ${b}`;ans=a-b;}
  else if(op==='×'){const a=rnd(9)+2,b=rnd(9)+2;q=`${a} × ${b}`;ans=a*b;}
  else{const b=rnd(9)+2,a=b*(rnd(9)+1);q=`${a} ÷ ${b}`;ans=a/b;}
  const ws=new Set();
  while(ws.size<3){const w=ans+rnd(10)-5;if(w!==ans&&w>0)ws.add(w);}
  return{q,ans,choices:[ans,...ws].sort(()=>Math.random()-.5)};
}
const rnd=n=>Math.floor(Math.random()*n)+1;

function hfClick(card){
  if(GS.flipped.length>=2||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');GS.flipped.push(card);
  if(GS.flipped.length===2){
    GS.moves++;
    const mv=document.getElementById('hf-mv');if(mv)mv.textContent=GS.moves;
    const[a,b]=GS.flipped;
    if(a.dataset.pid===b.dataset.pid&&a.dataset.id!==b.dataset.id){
      setTimeout(()=>{
        a.classList.add('matched');b.classList.add('matched');
        GS.matched.add(a.dataset.pid);GS.flipped=[];
        const mc=GS.matched.size,tot=GS.cards.length/2;
        const mel=document.getElementById('hf-m');if(mel)mel.textContent=mc;
        if(mc===tot){
          const s=Math.round((Date.now()-GS.start)/1000);
          const fb=document.getElementById('hf-fb');
          if(fb){fb.className='gfb ok';fb.textContent=`🎉 완성! ${GS.moves}번 시도 · ${s}초`;}
          const btns=document.querySelector('.gbtns');
          if(btns)btns.innerHTML=`<button class="gbp" style="background:var(--lang)" onclick="startHanjaFlip(${GS.lv+1})">다음 레벨 →</button><button class="gbs" onclick="closeGame()">나가기</button>`;
        }
      },300);
    } else {
      setTimeout(()=>{
        a.classList.remove('flipped');b.classList.remove('flipped');
        a.classList.add('wrong');b.classList.add('wrong');
        setTimeout(()=>{a.classList.remove('wrong');b.classList.remove('wrong');},400);
        GS.flipped=[];
      },800);
    }
  }
}

let tlDragSrc=-1;
function startTimeline(li=0){
  const lvl=TL_DATA[li%TL_DATA.length];
  const items=[...lvl.items].sort(()=>Math.random()-.5);
  GS={items,li,dragSrc:-1};
  openGame('⏳ 역사 타임라인',`
    <div style="font-size:13px;color:var(--t2);margin-bottom:.75rem">📋 <strong>${lvl.title}</strong> — 사건을 오래된 순서로 드래그하세요.</div>
    <div class="tl" id="tl-list">
      ${items.map((it,i)=>`
      <div class="tli" draggable="true" data-i="${i}" data-id="${it.id}"
           ondragstart="tlDs(${i})" ondragover="tlDo(event,${i})" ondrop="tlDr(${i})" ondragend="tlDe()">
        <span class="tli-handle">⠿</span>
        <span class="tli-text">${it.t}</span>
      </div>`).join('')}
    </div>
    <div class="gfb" id="tl-fb"></div>
    <div class="gbtns">
      <button class="gbp" style="background:var(--soc)" onclick="checkTl()">✓ 확인</button>
      <button class="gbs" onclick="startTimeline(${li})">🔄 섞기</button>
      <button class="gbs" onclick="closeGame()">나가기</button>
    </div>`);
}
function tlDs(i){tlDragSrc=i;document.querySelectorAll('.tli')[i].classList.add('dragging');}
function tlDo(e,i){e.preventDefault();document.querySelectorAll('.tli').forEach((el,j)=>el.classList.toggle('over',j===i&&j!==tlDragSrc));}
function tlDr(i){
  if(tlDragSrc<0||tlDragSrc===i)return;
  const list=document.getElementById('tl-list');
  const els=[...list.querySelectorAll('.tli')];
  const src=els[tlDragSrc],tgt=els[i],tmp=document.createElement('div');
  list.insertBefore(tmp,src);list.insertBefore(src,tgt);list.insertBefore(tgt,tmp);list.removeChild(tmp);
  tlDragSrc=-1;
}
function tlDe(){document.querySelectorAll('.tli').forEach(el=>el.classList.remove('dragging','over'));tlDragSrc=-1;}
function checkTl(){
  const lvl=TL_DATA[GS.li%TL_DATA.length];
  const els=[...document.querySelectorAll('.tli')];
  const user=els.map(el=>+el.dataset.id);
  const correct=lvl.items.map(it=>it.id);
  const allOk=JSON.stringify(user)===JSON.stringify(correct);
  let cnt=0;
  els.forEach((el,i)=>{if(user[i]===correct[i]){el.classList.add('ok');cnt++;}else el.classList.add('ng');});
  const fb=document.getElementById('tl-fb');
  fb.className=`gfb ${allOk?'ok':'ng'}`;
  if(allOk){
    fb.textContent='🎉 완벽한 순서입니다!';
    els.forEach((el,i)=>{
      const y=document.createElement('span');y.className='tli-year';y.textContent=lvl.items[i].y;
      el.insertBefore(y,el.querySelector('.tli-text'));
    });
    document.querySelector('.gbtns').innerHTML=`<button class="gbp" style="background:var(--soc)" onclick="startTimeline(${GS.li+1})">다음 시대 →</button><button class="gbs" onclick="closeGame()">나가기</button>`;
  } else {
    fb.textContent=`${cnt}/${correct.length}개 정답. 다시 도전!`;
    setTimeout(()=>{els.forEach(el=>el.classList.remove('ok','ng'));fb.className='gfb';},1500);
  }
}

function ansCalc(val,btn){

let _ac=null;
const ac=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;};
function pNote(m,d=.8,v=.4,t=null){const c=ac(),ts=t||c.currentTime,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=440*Math.pow(2,(m-69)/12);o.type='triangle';g.gain.setValueAtTime(0,ts);g.gain.linearRampToValueAtTime(v,ts+.02);g.gain.exponentialRampToValueAtTime(.001,ts+d);o.start(ts);o.stop(ts+d+.1);}
function pChord(ms,d=1.5){ms.forEach(m=>pNote(m,d,.3));}
function pMelody(ms,t=.3){const c=ac();ms.forEach((m,i)=>pNote(m,t*.9,.4,c.currentTime+i*t));}

const IV=[{n:'단2도',s:1},{n:'장2도',s:2},{n:'단3도',s:3},{n:'장3도',s:4},{n:'완전4도',s:5},{n:'완전5도',s:7},{n:'장6도',s:9},{n:'완전8도',s:12}];

function buildPiano(){

function buildHsl(c){

function updHsl(){const h=+document.getElementById('sl-h')?.value||0,s=+document.getElementById('sl-s')?.value||100,l=+document.getElementById('sl-l')?.value||50;const d=document.getElementById('ag-hd');if(d)d.style.background=`hsl(${h},${s}%,${l}%)`;[['sl-h',h,'°'],['sl-s',s,'%'],['sl-l',l,'%']].forEach(([id,v,u])=>{const el=document.getElementById(id+'-v');if(el)el.textContent=v+u;});const feels=['빨강','주황','노랑','황록','초록','청록','파랑','남보라','보라','분홍','빨강'];const hf=document.getElementById('ag-hf');if(hf)hf.textContent=(s<20?'회색':'선명한')+' '+feels[Math.floor(h/36)];const sv=s/100,lv=l/100,a=sv*Math.min(lv,1-lv);const f=n=>{const k=(n+h/30)%12;const cv=lv-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*cv).toString(16).padStart(2,'0')};const hx=document.getElementById('ag-hx');if(hx)hx.textContent=`#${f(0)}${f(8)}${f(4)}`;}

  const dd=e=>{if(!isDrawing)return;const ctx=cv.getContext('2d');const pos=gp(e,cv);ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(pos.x,pos.y);ctx.strokeStyle=drawTool==='eraser'?'#fff':drawColor;ctx.lineWidth=drawTool==='brush'?drawSize*2:drawSize;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=drawTool==='brush'?.5:1;ctx.stroke();ctx.globalAlpha=1;lastX=pos.x;lastY=pos.y;};

  if(e.key!=='Escape')return;
  if(document.getElementById('gov').classList.contains('open'))closeGame();
  else if(document.getElementById('music-ov').classList.contains('open'))closeDov('music-ov');
  else if(document.getElementById('art-ov').classList.contains('open'))closeDov('art-ov');
  else if(document.getElementById('aov').classList.contains('open'))closeAbout();
});

window.addEventListener('DOMContentLoaded',()=>{renderSbar();renderContent();});
</script>
</body>
