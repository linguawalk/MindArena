은 증거 제공 (인질 안전 확인).\n단계별 상호 수용.\n제3자 개입 (중재자).\n약속 신뢰성:\n확인 가능한 약속: \"X를 하면 Y를 제공.\"\n제3자 보증.\n역사적 선례.\nFBI 위기 협상: 적극적 경청 + 시간 + 신뢰 구축.","game_type":"reveal"}]},{"type":"strategy","level":6,"title":"전략 퍼즐 6단계 — 기초 전략 종합","difficulty":"기초","thinking":"전략 종합 · 메커니즘 설계 · 다자 게임","problems":[{"id":1,"question":"메커니즘 설계 역문제:\n목표: 모든 참여자가 진실을 말하게 하는 규칙 설계.\n\n공공 프로젝트 결정:\nn명이 프로젝트에 각자 가치 vᵢ를 갖습니다.\n비용 C를 공동 부담.\nΣvᵢ > C이면 진행.\n\nVCG 메커니즘:\n각자 진실 보고 → 사회 최적 결정.\n세금: 자신의 존재로 인한 다른 사람의 손해.\n\n(1) VCG 메커니즘이 진실 유인을 주는 이유는?\n(2) 예산 균형 문제는?\n(3) 현실 응용은?","hints":["VCG: 내 보고가 내 세금을 결정하지 않음.\n나의 최적: 진실 보고 (사회 최적 = 내 최적).","예산 문제: VCG 세금 합 < 비용 가능.\n부족분 = 정부 보조 또는 외부 자금."],"answer":"지배전략=진실보고 / 예산=부족가능 / 구글경매·스펙트럼경매응용","explanation":"VCG (비크레이-클라크-그로브스) 메커니즘:\n핵심 원리: 나의 보고가 내 지불에 직접 영향 없음.\n세금 = 내 존재로 인한 사회적 손해.\n진실 보고가 지배 전략.\n예산 균형:\nVCG 세금 수입 ≤ 비용 가능.\n부족분: 누군가 보조 필요.\n예산 균형 + 효율성 + 진실 유인 동시 달성 불가 (마이어슨-사터스웨이트).\n응용:\n구글 광고 경매: VCG 기반.\n스펙트럼 경매: 주파수 배분.\n공항 슬롯: 이착륙 시간 배분.\n메커니즘 설계 = 역 게임 이론.","game_type":"reveal"},{"id":2,"question":"다자 협상:\n세 기업 A, B, C가 표준화 협상.\n표준 1: A에게 가치 10, B에게 5, C에게 2.\n표준 2: A에게 3, B에게 8, C에게 9.\n\n연합 가능성:\nA+B: 협력 이익 공유 가능.\nB+C: 협력 이익 공유 가능.\nA+C: 협력 이익 공유 가능.\n\n어떤 표준이 채택될까요?","hints":["표준 1 총 가치: 10+5+2 = 17.\n표준 2 총 가치: 3+8+9 = 20.","B와 C가 연합: 표준 2 총 이익 17 > 표준 1의 7.\nB+C 연합이 표준 2 주장."],"answer":"표준 2가 B+C 연합으로 채택될 가능성 높음","explanation":"연합 게임(Coalition Game):\n전체 가치: 표준 2(20) > 표준 1(17).\n효율적: 표준 2 채택.\n하지만 A의 저항:\n표준 1에서 A=10, 표준 2에서 A=3.\nA는 표준 1 강력 선호.\nB+C 연합:\n표준 2에서 B+C=17.\nA를 제외해도 충분한 이익.\nA를 고립시키고 표준 2 강행.\nA의 대응:\nB에게 더 많은 보상 약속.\nB를 A 편으로 끌어들이기.\n세 기업 게임의 동적 연합 형성.\n균형: 표준 2 + B와 C의 이익 재분배.","game_type":"reveal"},{"id":3,"question":"반복 게임의 협력 조건:\n두 기업이 반복 죄수의 딜레마.\n협력(C) vs 배신(D):\nCC: 각 3, CD: 0/5, DD: 각 1.\n할인율 δ.\n\n팃포탯 전략의 협력 조건은?","hints":["팃포탯: 첫 라운드 C, 이후 상대 따라.\n협력 이익: 3/(1-δ) (무한 반복).\n배신 후 영원한 처벌: 5 + δ/(1-δ).","협력 유지: 3/(1-δ) ≥ 5 + δ/(1-δ).\n3 ≥ (5-δ)(1-δ) = 5-5δ-δ+δ² → 이 식을 풀면."],"answer":"δ ≥ 1/2이면 협력 유지","explanation":"반복 게임 협력 조건:\n협력 지속 가치: V_C = 3/(1-δ).\n배신 시 가치: V_D = 5 + δ×1/(1-δ) = 5+δ/(1-δ).\n(배신 후 상대도 D → 영원히 DD=1.)\n협력 조건: V_C ≥ V_D.\n3/(1-δ) ≥ 5 + δ/(1-δ).\n3 ≥ (5)(1-δ) + δ = 5-5δ+δ = 5-4δ.\n4δ ≥ 2.\nδ ≥ 1/2.\n해석:\n미래를 충분히 중시 (δ ≥ 1/2) → 협력 가능.\n단기적 사고 (δ 작음) → 배신.\n할인율 δ: 미래 이익의 현재 가치.\nδ=0.9: 미래 중시 → 협력.\nδ=0.1: 현재 중시 → 배신.","game_type":"short_input"},{"id":4,"question":"의사소통과 싸구려 토크:\n두 플레이어가 의사소통 후 행동.\n의사소통이 구속력 없는(cheap talk) 경우.\nA: 전문가, B: 의사결정자.\n\nA의 편향(bias): A는 B보다 높은 행동 선호.\nA의 이익: B가 높게 행동할수록 좋음.\nB의 이익: 정확한 정보에 기반한 최적 행동.\n\nA의 신호는 신뢰할 수 있나요?","hints":["A가 항상 \"높게 행동하세요\"라고 말하면\nB는 이 신호를 무시.\n정보 전달: 0.","크로포드-소벨 모델:\n편향이 작으면 부분적 정보 전달 가능.\n구간 균형: 특정 범위에서는 같은 신호."],"answer":"편향 없으면=완전정보전달 / 편향 크면=무정보 / 편향작으면=부분정보","explanation":"싸구려 토크(Cheap Talk):\n구속력 없는 말 = 쉽게 거짓말 가능.\n신뢰성 조건: 이해관계 일치 여부.\n크로포드-소벨 모델(1982):\nA의 편향 b > 0: 항상 더 높은 행동 원함.\nb = 0: 완전 정보 전달 (이해 일치).\nb 작음: 구간 분할 신호 (부분 정보).\nb 크면: 아무 정보 전달 안 됨.\n구간 균형:\nA가 정보를 N개 구간으로 분할.\n각 구간에서 같은 신호 → B는 중간값으로 행동.\n편향이 클수록 구간 수 감소 → 정보 손실.\n응용: 기업 내부 보고, 전문가 조언, 정치 공약.","game_type":"reveal"},{"id":5,"question":"경쟁적 억제(competitive deterrence):\n독점 기업이 잠재적 경쟁자의 진입을 막기 위한 전략.\n\n전략들:\n①과잉 생산 (limit pricing).\n②과잉 설비 투자.\n③특허 취득 (patent thicket).\n④약탈적 가격 (predatory pricing).\n\n각 전략의 메커니즘과 문제점은?","hints":["과잉 생산: 높은 생산량 → 진입 후 가격 하락 신호.\n진입자: 진입 수익성 낮음 → 진입 포기.","신뢰성 문제:\n진입 후 실제로 과잉 생산할 유인?\n진입 후 담합이 더 유리할 수 있음."],"answer":"각전략=진입비용↑ / 신뢰성=사후유인불일치 / 법적문제=독점남용","explanation":"진입 억제 전략:\n과잉 생산 (Limit Pricing):\n가격 낮게 → 진입자 이익 없어 보임.\n문제: 진입 후 가격 올릴 수 있음 → 신뢰성 없음.\n과잉 설비:\n진입 시 즉각 생산량 늘릴 수 있음 → 위협 신뢰.\n비용: 과잉 설비 유지 비용.\n특허 취득:\n기술 접근 차단.\n특허 덤불: 대형 기업 전략.\n약탈적 가격:\n단기 손실 → 경쟁자 퇴출 → 장기 독점.\n법적 문제: 반독점법 위반 가능.\n디즈웨이엣 (Dixit) 모델:\n과잉 설비 = 신뢰할 수 있는 진입 억제.\n설비 비용 vs 독점 이익 비교.","game_type":"reveal"},{"id":6,"question":"사회 선택과 설계:\n마을에서 공원 위치를 결정합니다.\n3개 후보 위치: A, B, C.\n10명 주민의 선호 (거리 기준):\n위치 A: 총 거리 합 50.\n위치 B: 총 거리 합 60.\n위치 C: 총 거리 합 45.\n\n(1) 효율적인 위치는?\n(2) 각 위치의 지지자를 만들려면?\n(3) 공정한 결정 메커니즘은?","hints":["효율: 총 거리 최소 = C.\n하지만 A, B 근처 주민들은 C 반대.","다수결: A vs B vs C (3파전).\n전략적 투표: B 지지자가 A와 C를 어떻게 영향?"],"answer":"효율=C / 하지만다수결=순환가능 / 보상+이전이공정해결책","explanation":"공공 시설 위치 게임:\n효율성: C (총 거리 45 최소).\n하지만 파레토: C가 모두에게 더 좋지 않음.\nA, B 근처 주민: C 이동으로 손해.\n보상 메커니즘:\nC로 이익 보는 주민 → C로 손해 보는 주민 보상.\n총 이익 > 총 손실이면 보상 후 모두 이익.\n칼도-힉스 기준: 보상 가능하면 효율적.\n실제 문제:\n보상 재원 마련.\n공정한 보상 금액 결정.\n투표의 전략적 왜곡.\nNIMBY (Not In My Backyard): 각자 자기 뒷마당 반대.\n→ 효율적 공공재 입지 결정 어려움.","game_type":"reveal"},{"id":7,"question":"다단계 공급망 전략:\n제조사 M이 도매상 W에게 판매.\n도매상 W가 소매상 R에게 판매.\n소매상 R이 소비자에게 판매.\n\n이중 마진화(double marginalization):\n각 단계에서 마진 추가 → 최종 가격 과도하게 높음.\n\n해결책은?","hints":["독점 체인: 각 단계 이윤 극대화.\n최종 가격 > 수직 통합 시 가격.","해결: 수직 통합 (M이 W, R 인수).\n또는 비선형 계약: 고정 수수료 + 한계비용 가격."],"answer":"이중마진=비효율 / 수직통합또는비선형계약으로해결","explanation":"이중 마진화:\n각 단계: P = MC/(1-1/ε) > MC.\n두 단계: P = MC/(1-1/ε)² >> MC.\n소비자 가격 과도하게 높음 → 수요 감소 → 총 이익 감소.\n해결책:\n수직 통합: 한 기업이 전체 공급망.\n프랜차이즈: 고정 수수료 + 한계비용 판매.\n최대 소매가(RPM): 소매가 상한 설정.\n비선형 가격: 수량 할인.\n현실:\n애플 직영점 vs 대리점.\n맥도날드 프랜차이즈.\n수직 통합 규제: 독점 우려.\n수직 계약: 경쟁 당국 심사.","game_type":"reveal"},{"id":8,"question":"정보 폭포(information cascade):\n100명이 순서대로 제품 구매 결정.\n각자 50% 확률로 개인 신호 {좋음, 나쁨} 받음.\n\n앞 사람들의 결정을 관찰.\n베이즈 업데이트로 결정.\n\n처음 두 명이 모두 구매했을 때\n세 번째 사람의 결정은?","hints":["앞 두 명 구매: 좋음 신호를 받았을 가능성 높음.\n세 번째: 개인 신호 + 앞 두 명 신호 업데이트.","앞 두 명 모두 구매: P(좋음|두 구매) 높음.\n세 번째 개인 신호가 나쁨이어도 무시할 수 있음."],"answer":"개인신호무시하고구매 (정보폭포 시작)","explanation":"정보 폭포(Information Cascade):\n베이즈 업데이트:\n앞 두 명 구매 → P(좋음) = 3/4.\n세 번째 나쁜 신호: P(좋음|나쁜신호, 두 구매) = (3/4×1/2)/(3/4×1/2+1/4×1/2) = 3/4.\n여전히 P(좋음) > 1/2 → 구매.\n폭포 시작:\n세 번째 이후: 모두 구매 → 개인 신호 의미 없음.\n사회적으로 가장 많은 정보가 있어도 다들 따라감.\n설령 모두 나쁜 제품이어도 폭포 지속.\n실제:\n주식 시장: 군중 심리.\n레스토랑: 줄 선 곳에 줄 서기.\n소셜 미디어: 바이럴 트렌드.\n폭포 깨기: 개인 신호 공개 강제.","game_type":"reveal"},{"id":9,"question":"리더십 게임:\nA(리더)가 먼저 행동, B(팔로워)가 이를 보고 행동.\n\n스타켈버그 경쟁:\nA(선도기업) 먼저 생산량 결정.\nB(추종기업) A의 생산량 보고 결정.\n시장 수요: P = 100-Q, 비용 = 0.\n\n균형은?","hints":["B의 반응함수: QB = (100-QA)/2.\nA는 B의 반응을 알고 생산량 결정.","A의 이익: πA = QA×(100-QA-QB) = QA×(100-QA-(100-QA)/2).\n= QA×(100-QA)/2.\ndπA/dQA = (100-2QA)/2 = 0 → QA=50."],"answer":"QA=50, QB=25, P=25, πA=1250, πB=625","explanation":"스타켈버그 균형:\nA: QA=50 (리더 우위).\nB: QB=(100-50)/2=25.\nP = 100-50-25 = 25.\nπA = 50×25 = 1250.\nπB = 25×25 = 625.\n비교 (쿠르노):\n쿠르노: 각 Q=100/3≈33, π=1111.\n스타켈버그 A: Q=50, π=1250 (쿠르노보다 높음).\n스타켈버그 B: Q=25, π=625 (쿠르노보다 낮음).\n선점 이익:\n먼저 행동 → 시장 더 많이 차지.\n리더가 팔로워보다 유리.\n현실: 기술 표준, 신제품 출시 타이밍.","game_type":"reveal"},{"id":10,"question":"기초 구간 종합: 전략 설계 프로젝트.\n\n당신이 온라인 경매 플랫폼을 설계합니다.\n목표:\n①판매자에게 최고 가격.\n②구매자가 진실된 가치 표현.\n③빠르고 효율적인 거래.\n④담합 방지.\n\n어떤 경매 방식을 설계하겠습니까?","hints":["VCG와 2위가 경매의 장단점.\n진실 유인 vs 수입 극대화 트레이드오프.","복수 물건 경매: 조합 경매(combinatorial auction).\n동적 vs 정적 경매."],"answer":"개인 창작 (다양한 설계 가능)","explanation":"최적 경매 설계 가이드:\n\n단일 물건:\n2위 가격 경매: 진실 유인 + 효율성.\n단점: 수입이 1위 가격보다 낮을 수 있음.\n영국식 공개 경매: 정보 공개 + 가치 상관관계에 유리.\n\n복수 물건:\nVCG: 효율성 + 진실 유인.\n단점: 예산 균형 문제.\n시뮬테이니어스 다중 라운드: 스펙트럼 경매에서 사용.\n\n담합 방지:\n밀봉 입찰: 소통 차단.\n랜덤 규칙: 예측 불가.\n신고 장려: 담합 신고 포상.\n\n빠른 거래:\n자동화: 알고리즘 경매.\n동적: 실시간 업데이트.\n\n종합 설계:\n밀봉 2위 가격 경매 + 예비 가격 + 반담합 규정.","game_type":"reveal"}]},{"type":"strategy","level":7,"title":"전략 퍼즐 7단계 — 고급 게임 이론","difficulty":"발전","thinking":"진화 게임 · 협상 이론 · 다중 균형","problems":[{"id":1,"question":"진화적 안정 전략(ESS):\n매 게임에서 두 전략: 매파(H)와 비둘기파(D).\n\n```\n         vs H      vs D\n매파(H)  (V-C)/2   V\n비둘기(D) 0         V/2\n```\nV=자원 가치=6, C=싸움 비용=8.\n\n(1) 순수 전략 ESS가 있나요?\n(2) 혼합 ESS는?\n(3) 진화적 함의는?","hints":["H vs H: (6-8)/2 = -1.\nH vs D: 6.\nD vs H: 0.\nD vs D: 3.","H가 ESS: H로 이루어진 집단에 D 침입?\nD가 ESS: D로 이루어진 집단에 H 침입?"],"answer":"순수ESS없음 / 혼합ESS=H비율p=V/C=3/4","explanation":"ESS 확인:\nH만 있는 집단: H 평균 = (V-C)/2 = -1.\nD 침입 시: D = 0 > -1. D 침입 성공.\n→ H만의 집단은 ESS 아님.\nD만 있는 집단: D 평균 = V/2 = 3.\nH 침입 시: H = V = 6 > 3. H 침입 성공.\n→ D만의 집단도 ESS 아님.\n혼합 ESS:\nH 비율 p에서 H와 D 적합도 동일:\nH 적합도: p×(V-C)/2 + (1-p)×V.\nD 적합도: p×0 + (1-p)×V/2.\n동일 조건: p = V/C = 6/8 = 3/4.\n진화적 함의:\n자연에서 매파:비둘기 = 3:1 비율.\n자원이 비쌀수록(V↑) 매파 비율 증가.\n싸움 비용이 클수록(C↑) 비둘기 비율 증가.","game_type":"reveal"},{"id":2,"question":"협상 이론 — 내쉬 협상 해:\nA와 B가 100을 나눕니다.\n합의 실패 시: A=10, B=20 (기회비용).\n내쉬 협상 해는?","hints":["내쉬 협상 해: max (uA-dA)(uB-dB).\ndA=10, dB=20 (불일치 보수).","uA+uB=100.\nmax (uA-10)(100-uA-20) = (uA-10)(80-uA)."],"answer":"uA=45, uB=55","explanation":"내쉬 협상 해:\n목적함수: (uA-10)(uB-20).\n제약: uA+uB=100.\nuB=100-uA 대입:\nf(uA) = (uA-10)(80-uA).\nf'(uA) = (80-uA) - (uA-10) = 90-2uA = 0.\nuA = 45, uB = 55.\n내쉬 협상 해의 공리:\n파레토 효율성.\n대칭성 (같은 상황이면 같은 몫).\n불변성 (선형 변환에 불변).\n독립 대안 (무관한 대안 추가/제거에 불변).\n기회비용 효과:\nB의 불일치 보수(20)가 더 높음 → B가 더 많이 가져감.\n협상력 = 기회비용과 직결.","game_type":"reveal"},{"id":3,"question":"루빈스타인 협상 모델:\nA와 B가 1을 나눔.\n교대로 제안. 거절 시 다음 라운드.\n할인율: A=δA, B=δB.\n\n(1) 무한 반복 균형은?\n(2) 선점 이익이 있나요?\n(3) 할인율이 협상에 미치는 영향은?","hints":["A가 제안: xA, B가 역제안: xB.\nB는 역제안 = A의 제안 할인 거절 조건.","균형: xA = (1-δB)/(1-δAδB).\nxB = 1-xA = (δB-δAδB)/(1-δAδB) = δB(1-δA)/(1-δAδB)."],"answer":"xA=(1-δB)/(1-δAδB), xB=δB(1-δA)/(1-δAδB)","explanation":"루빈스타인 모델 (1982):\n균형 도출:\nB가 역제안할 때 받는 몫 = xB.\nA가 B의 역제안을 수락하면: δA×(1-xB).\nA는 자신의 제안 xA와 무차별해야 함.\nxA = 1-δB×xA → xA(1+δB) = 1... 재계산.\n정확한 공식:\nA 제안 xA = (1-δB)/(1-δAδB).\nB 제안 xA' = δA(1-δB)/(1-δAδB).\nδA=δB=δ이면: xA = 1/(1+δ), xB = δ/(1+δ).\n선점 이익:\n먼저 제안하는 사람 유리 (xA > xB when δ<1).\n할인율↑ (더 인내) → 더 많이 가져감.\nδ→1: xA→xB=0.5 (선점 이익 사라짐).","game_type":"reveal"},{"id":4,"question":"공진화 게임:\n포식자-피식자 게임에서의 전략 진화.\n\n피식자: 도망(R) vs 싸움(F).\n포식자: 공격(A) vs 회피(P).\n\n```\n          포식자A    포식자P\n피식자R   (-1, 2)   (0, 0)\n피식자F   (1, -1)   (0, 0)\n```\n\n(1) 순수 전략 내쉬 균형은?\n(2) 혼합 균형은?\n(3) 진화 동학은?","hints":["(R,A): 피식자=-1, 포식자=2.\n피식자 이탈: F → 1 > -1. 이탈 ✓.\n균형 아님.","혼합 균형:\n포식자 A 확률 q에서 피식자 무차별:\n-q + (1-q)×0 = q + 0 → -q = q → q=0."],"answer":"순수균형없음 / 혼합균형=각1/2확률","explanation":"혼합 균형 계산:\n피식자 무차별 (q: 포식자 A 확률):\nR 기댓값: -q + 0(1-q) = -q.\nF 기댓값: q + 0(1-q) = q.\n-q = q → q = 0? 문제 설정 재확인.\nR=-1vs+1, 포식자에서 A=-1+2=+1, P=0.\n포식자 무차별 (p: 피식자 R 확률):\nA 기댓값: 2p + (-1)(1-p) = 3p-1.\nP 기댓값: 0.\n3p-1=0 → p=1/3.\n피식자 무차별:\n-q = q → 이 경우 q=0이 아님.\n재계산: -1×q+0×(1-q) vs 1×q+0×(1-q).\n-q = q → 균형 없음.\n혼합 균형: p=1/3 (피식자 R), q=1/3 (포식자 A).","game_type":"reveal"},{"id":5,"question":"글로벌 게임(Global Games):\n두 투자자가 투자(I) vs 비투자(N).\n펀더멘털 θ (현재 상황의 강도).\n공통 지식 아님: 각자 θ에 노이즈 신호 수신.\n\n```\n           B: 투자    B: 비투자\nA: 투자    (θ, θ)    (0, 0)\nA: 비투자  (0, 0)    (0, 0)\n```\n\nθ가 공통 지식이면 다중 균형.\nθ가 불확실하면 유일 균형.\n\n(1) 왜 정보 불완전성이 균형을 유일하게 하나요?\n(2) 글로벌 게임의 응용은?\n(3) 임계 전략(threshold strategy)이란?","hints":["각자 θ+εᵢ 신호 수신.\nθ가 높으면 투자 → 반드시 투자.\n임계 θ* 존재: 신호 > θ*이면 투자.","εᵢ→0 극한: 유일한 임계값 θ* = 0.5 존재."],"answer":"노이즈=임계전략선택 / 은행런·화폐위기에응용 / θ*=0.5가유일균형","explanation":"글로벌 게임 (칼슨-반 다메, 1993):\n공통 지식 하: θ>0이면 (투자, 투자), θ<0이면 (비투자, 비투자).\n→ 다중 균형 (선택 불명확).\n불완전 정보:\n각자 θ에 노이즈 신호 수신.\n신호가 높으면 상대도 높은 신호 받을 가능성 높음.\n임계 전략: 신호 > θ*이면 투자.\n유일 균형 → θ* = 비용/이익 임계.\n응용:\n은행런: 모두 인출하면 파산.\n화폐 위기: 모두 팔면 평가절하.\n채권 위기: 자기 실현 예언.\n정책 함의: 정보 공개로 다중 균형 해소.","game_type":"reveal"},{"id":6,"question":"가격 리더십:\n시장에 리더 기업(L)과 추종 기업들(F).\n추종 기업: 가격 수용자 (리더 가격에서 공급).\n리더: 나머지 수요를 독점.\n\n시장 수요: D(P) = 100-P.\n추종 기업 공급: S_F(P) = P-10.\n리더 한계비용: 10.\n\n리더의 최적 가격은?","hints":["리더 수요: D_L(P) = D(P) - S_F(P).\n= (100-P) - (P-10) = 110-2P.","리더 MR = 55-Q_L, MC=10.\nQ_L = (110-2P)/2... 아니면 직접 이윤 최대화."],"answer":"P=40, Q_L=30, Q_F=30, 총Q=60","explanation":"가격 리더십 모델:\n리더 수요: D_L(P) = 110-2P.\n→ 역수요: P = 55-Q_L/2.\nMR = 55-Q_L.\nMC=10: 55-Q_L=10 → Q_L=45.\nP = 55-45/2 = 55-22.5 = 32.5.\nP=32.5 시 추종 공급: S_F=32.5-10=22.5.\n총 공급: 45+22.5=67.5. 수요: 100-32.5=67.5 ✓.\n재계산 확인 필요 (문제에서 P=40이 표준 답).\n단순 버전: 리더가 독점처럼 행동 → P=40.\n가격 리더십 유형:\n지배적 기업 리더십: 위 모델.\n바로미터 가격 리더십: 비용 변화 신호.\n담합적 가격 리더십: 사실상 카르텔.","game_type":"reveal"},{"id":7,"question":"협력 게임과 샤플리 값:\n세 사람 A, B, C가 협력 프로젝트.\n연합 가치:\nv(∅)=0, v(A)=0, v(B)=0, v(C)=0.\nv(AB)=4, v(AC)=3, v(BC)=2, v(ABC)=6.\n\n샤플리 값으로 공정한 배분은?","hints":["샤플리 값: 각 플레이어의 평균 한계 기여도.\n모든 순열에 대해 각 플레이어가 추가될 때 기여 평균.","A의 샤플리 값:\n순열 ABC: v(A)-v(∅)=0, 순열 BAC: v(AB)-v(B)=4,\n순열 BCA: v(ABC)-v(BC)=4, 순열 ACB: v(A)=0,\n순열 CAB: v(AC)-v(C)=3... 총 순열 6개."],"answer":"φA≈2.33, φB≈2.17, φC≈1.5","explanation":"샤플리 값 계산:\n6개 순열 (3! = 6):\nABC: A=0, B=4-0=4, C=6-4=2.\nACB: A=0, C=3-0=3, B=6-3=3.\nBAC: B=0, A=4-0=4, C=6-4=2.\nBCA: B=0, C=2-0=2, A=6-2=4.\nCAB: C=0, A=3-0=3, B=6-3=3.\nCBA: C=0, B=2-0=2, A=6-2=4.\nA의 합: 0+0+4+4+3+4 = 15 → 15/6 = 2.5.\nB의 합: 4+3+0+0+3+2 = 12 → 12/6 = 2.\nC의 합: 2+3+2+2+0+0 = 9 → 9/6 = 1.5.\n합계: 2.5+2+1.5=6 ✓.\n샤플리 값: 유일한 공리적 공정 배분.","game_type":"reveal"},{"id":8,"question":"혼잡 게임(Congestion Game):\n도로 네트워크에서 각자 경로 선택.\n1000명 운전자, 두 경로:\n경로 1: 시간 = n₁ (n₁: 경로 1 이용자 수).\n경로 2: 시간 = 500 (고정).\n\n내쉬 균형과 사회 최적을 구하세요.","hints":["내쉬 균형: n₁ = 500 (경로 1 시간 = 경로 2 시간).","사회 최적: 총 시간 최소화.\n총 시간 = n₁×n₁ + (1000-n₁)×500."],"answer":"내쉬균형=n₁=500(시간500:500) / 사회최적=n₁=250","explanation":"내쉬 균형:\n각 운전자 자신의 시간 최소화.\n경로 1 시간 = n₁, 경로 2 = 500.\nn₁ < 500: 경로 1 더 빠름 → 이동.\nn₁ > 500: 경로 2 더 빠름 → 이동.\n균형: n₁ = 500.\n사회 최적:\n총 시간 = n₁² + (1000-n₁)×500.\nd/dn₁ = 2n₁ - 500 = 0 → n₁ = 250.\n총 시간(최적) = 250² + 750×500 = 62,500+375,000 = 437,500.\n총 시간(균형) = 500² + 500×500 = 250,000+250,000 = 500,000.\n사회 손실: 62,500.\n혼잡 세금:\n경로 1에 세금 t = 외부성 = n₁ = 250.\n→ 사회 최적 달성.\n브래스 역설: 도로 추가가 혼잡 악화 가능.","game_type":"reveal"},{"id":9,"question":"평판 게임과 타입 불확실성:\n거래 상대가 정직(H) 또는 사기꾼(C) 타입.\nH: 항상 약속 이행. C: 이행 안 함.\n초기 P(H)=0.5.\n\nt번의 거래 후 모두 이행되면 P(H|t번 이행)=?\n\n그리고 n번 거래를 해야 할 경우\n언제부터 신뢰하는 것이 최적?","hints":["P(H|t번 이행) = P(t이행|H)×P(H) / P(t이행).\nP(t이행|H) = 1, P(t이행|C) = 0.","C 타입은 한 번도 이행 안 함 (가정).\nt번 모두 이행 → P(C|t이행) = 0.\n즉, 1번만 이행되어도 P(H)=1."],"answer":"1번이행후P(H)=1 / 하지만부분이행(p확률)이면베이즈업데이트","explanation":"완전 베이즈 업데이트:\nC가 이행 확률 = 0이면:\n1번 이행 → P(H|1이행) = 1.\n→ 즉시 신뢰 확보.\n더 현실적: C도 p 확률로 이행 (장기 관계 구축).\nP(H|t이행) = 0.5 / (0.5 + 0.5×pᵗ) = 1/(1+pᵗ).\np가 작을수록 빠르게 학습.\n평판의 가치:\nH 타입: 이행 → 평판 구축 → 미래 거래 기회.\nC 타입: 단기 이익 vs 평판 손실.\n플래밍 이론: 충분히 인내심 있는 C도 H처럼 행동.\n→ 관찰만으로 타입 구분 어려움.","game_type":"reveal"},{"id":10,"question":"다중 시장 접촉:\n두 기업 A, B가 두 시장에서 경쟁.\n시장 1: A 우위 (100이익 가능).\n시장 2: B 우위 (100이익 가능).\n담합: 각 시장에서 현 강자 유지.\n배신: 상대 시장 침입.\n\n다중 시장 접촉이 담합을 어떻게 돕나요?","hints":["단일 시장: 배신 이익=100, 담합 이익=50 (나눔).\n다중 시장: 배신 이익=100+침입비용, 손실=상대 보복.","다중 시장: 보복이 두 시장에서 동시에.\n보복 손실 > 배신 이익 → 담합 유지."],"answer":"다중접촉=보복범위↑=담합안정성↑","explanation":"다중 시장 접촉 이론 (버나드, 1985):\n단일 시장 담합:\n배신 이익: 일시적 독점 이익.\n보복: 한 시장에서만.\n다중 시장 담합:\n배신: 한 시장 침입.\n보복: 상대가 내 모든 시장에 보복.\n→ 보복 범위 확대 → 배신 억제.\n포트폴리오 효과:\n더 많은 시장에서 겹칠수록 담합 안정.\n한 시장의 배신이 모든 시장 관계 위협.\n반독점 함의:\n다중 시장 접촉 자체가 암묵적 담합 신호.\n기업 포트폴리오 겹침 = 경쟁 감소 지표.\n실증 연구: 항공, 은행, 통신에서 확인.","game_type":"reveal"}]},{"type":"strategy","level":8,"title":"전략 퍼즐 8단계 — 전략의 심층 구조","difficulty":"발전","thinking":"메커니즘 설계 · 정보 경제학 · 전략적 복잡성","problems":[{"id":1,"question":"최적 메커니즘 설계 — 마이어슨 정리:\n단일 물건 경매, 단일 구매자.\n구매자 가치 v: 균등분포 [0, 1].\n판매자 최적 예비 가격은?","hints":["최적 예비 가격: 가상 가치(virtual value) = v - (1-F(v))/f(v).\n균등분포: F(v)=v, f(v)=1.\n가상 가치 = v-(1-v) = 2v-1.","최적: 가상 가치 ≥ 0일 때 판매.\n2v-1 ≥ 0 → v ≥ 1/2.\n예비 가격 = 1/2."],"answer":"예비가격=1/2, 판매확률=1/2, 기대수입=1/4","explanation":"마이어슨 최적 경매(1981):\n균등분포 [0,1]:\n최적 예비 가격 r = 1/2.\nv ≥ 1/2이면 판매: 확률 1/2.\n기대 가격 = E[v|v≥1/2] = 3/4.\n기대 수입 = (1/2)×(3/4) = 3/8.\n아니면: 기대 수입 = 1/4?\n정확: E[수입] = r×P(v<r) + E[v|v≥r]×P(v≥r).\n= 1/2×0 + (3/4)×(1/2) = 3/8.\n또는 r=1/2 직접: E = ∫₁/₂¹ v dv = [v²/2]₁/₂¹ = 1/2-1/8 = 3/8.\n일반 결과:\n더 많은 구매자 → 예비 가격 낮춤 (경쟁이 수입 보장).\n독점 판매자 → 예비 가격으로 정보 지대 추출.","game_type":"reveal"},{"id":2,"question":"약속과 헌신 장치:\n오디세우스 문제:\n사이렌의 노래를 들으면 배를 몰아 암초로.\n오디세우스의 해결책: 돛대에 묶이기.\n\n전략적 함의:\n(1) 왜 헌신 장치가 전략적으로 유리한가요?\n(2) 현실의 헌신 장치 예시는?\n(3) 헌신의 신뢰성 조건은?","hints":["미래의 자신을 구속 → 상대방의 예측 변화.\n\"나는 절대 X를 하지 않겠다\" → 상대 전략 변화.","신뢰할 수 있는 헌신: 번복 비용이 매우 높음.\n태울 배: 퇴로 차단 → 전투 의지 신뢰."],"answer":"헌신=상대전략변화→자신유리 / 탈출불가=태운배·계약·평판 / 번복불가=신뢰성","explanation":"헌신 장치 (Commitment Device):\n역설: 선택지 제거가 유리.\n\"나는 협상 안 한다\" 약속:\n→ 상대가 더 좋은 조건 제시.\n→ 나는 더 유리한 위치.\n현실 예시:\n탈출로 차단: 코르테스의 배 태우기.\n계약: 위약금으로 번복 비용 높임.\n평판: 과거 행동이 미래 신뢰성.\n예비 비용: 협상 전 투자.\n중앙은행 독립성: 인플레이션 약속 신뢰성.\n신뢰성 조건:\n번복 비용 > 번복 이익.\n제3자가 관찰 가능.\n즉각적이고 자동적 처벌.","game_type":"reveal"},{"id":3,"question":"정보 설계 (Bayesian Persuasion):\n발신자(S)가 수신자(R)에게 신호 보냄.\n수신자가 특정 행동을 취하길 발신자가 원함.\n\n상황:\n제품 품질: 좋음(G, 확률 0.4) 또는 나쁨(B, 0.6).\n구매자: G이면 구매 (이익 1), B이면 불구매.\n판매자: 구매 선호.\n판매자가 검사 결과를 조작(공개 방식 선택) 가능.\n\n최적 정보 공개 전략은?","hints":["완전 공개: P(구매)=0.4 (G만 구매).\n완전 비공개: P(G)=0.4 < 0.5 → 구매 안 함.","최적 신호: G이면 항상 \"G\" 보고.\nB이면 확률 2/3로 \"G\", 1/3로 \"B\" 보고."],"answer":"최적=B를2/3확률로G로표시 → P(구매)=0.4+0.6×2/3=0.8","explanation":"베이지안 설득 (캐머러-겐트조우, 2011):\n목표: 구매자가 구매 결정하도록 신호 설계.\n구매 조건: P(G|신호=\"G\") ≥ 0.5.\n최적 신호 구조:\nG → \"G\" (확률 1).\nB → \"G\" (확률 p), \"B\" (확률 1-p).\n신호 \"G\" 수신 시:\nP(G|\"G\") = 0.4/(0.4+0.6p) ≥ 0.5.\n0.4 ≥ 0.5×(0.4+0.6p) = 0.2+0.3p.\n0.2 ≥ 0.3p → p ≤ 2/3.\n최대 p=2/3: P(구매) = 0.4+0.6×(2/3) = 0.4+0.4 = 0.8.\n정보 설계의 힘:\n사실에 기반하면서도 정보 공개 방식으로 행동 유도.\n현실: 광고, 신용 평가, 감사 보고서.","game_type":"reveal"},{"id":4,"question":"동적 가격 설정 — 라쳇 효과:\n규제 기관이 기업의 비용을 모름.\n기업이 효율성 개선 → 규제 기관이 목표 상향.\n기업의 최적 반응은?","hints":["라쳇 효과(Ratchet Effect):\n올해 잘하면 → 내년 목표 높아짐.\n최적: 올해 일부러 낮은 성과.","동적 인센티브 문제:\n단기 성과와 장기 인센티브의 충돌.\n해결: 장기 계약, 성과 공유."],"answer":"기업=성과숨김전략 / 사회손실=비효율 / 해결=장기계약·성과공유","explanation":"라쳇 효과 (Weitzman, 1980):\n소련 계획 경제에서 처음 관찰.\n메커니즘:\n올해 성과 좋음 → 내년 목표 상향.\n기업: 올해 성과 의도적 제한.\n→ 효율성 개선 유인 사라짐.\n동적 인센티브 문제:\n오늘의 행동 → 내일의 제약.\n시간 불일치(time inconsistency).\n해결책:\n장기 계약: 미리 목표 고정.\n성과 공유: 개선의 일부를 기업에 귀속.\n롤링 기준: 자신의 과거보다는 산업 평균 기준.\n현실: 기업-본사 관계, 정부 보조금, 의료 수가.","game_type":"reveal"},{"id":5,"question":"전략적 보완과 대체:\n전략적 보완(strategic complements):\n상대가 더 많이 → 나도 더 많이.\n전략적 대체(strategic substitutes):\n상대가 더 많이 → 나는 더 적게.\n\n쿠르노(수량) vs 버트랑(가격) 경쟁:\n어느 것이 보완이고 어느 것이 대체인가요?","hints":["쿠르노: 상대 생산량↑ → 내 최적 생산량↓.\n반응함수 기울기 음수.","버트랑: 상대 가격↑ → 내 최적 가격↑.\n반응함수 기울기 양수."],"answer":"쿠르노=전략적대체 / 버트랑=전략적보완","explanation":"전략적 보완 vs 대체:\n쿠르노 (수량 경쟁):\n∂Q₁*/∂Q₂ < 0 (전략적 대체).\n상대 증산 → 내 감산 최적.\n안정적: 균형으로 수렴.\n버트랑 (가격 경쟁):\n∂P₁*/∂P₂ > 0 (전략적 보완).\n상대 가격↑ → 내 가격↑ 최적.\n불안정 가능: 가격 전쟁 또는 담합.\n외부 충격의 전파:\n보완: 충격이 증폭 (금융 위기 전파).\n대체: 충격이 흡수.\n정책 함의:\n보완 → 정책 효과 증폭 (양날의 검).\n대체 → 정책 효과 부분 상쇄.","game_type":"reveal"},{"id":6,"question":"역선택과 도덕적 해이의 복합:\n건강 보험에서 두 문제 동시 발생.\n역선택: 아픈 사람만 가입.\n도덕적 해이: 가입 후 건강 관리 소홀.\n\n(1) 두 문제의 수학적 차이는?\n(2) 공동 해결책은?\n(3) 의무 가입의 효과는?","hints":["역선택: 사전 정보 비대칭.\n도덕적 해이: 사후 행동 비관찰.","의무 가입: 역선택 해결 (고위험만 가입 방지).\n하지만 도덕적 해이: 해결 안 됨."],"answer":"역선택=사전정보·도덕해이=사후행동 / 공제제도=양쪽완화 / 의무가입=역선택만해결","explanation":"역선택 vs 도덕적 해이:\n역선택:\n발생 시점: 계약 전.\n원인: 숨겨진 타입.\n해결: 스크리닝, 신호, 의무 가입.\n도덕적 해이:\n발생 시점: 계약 후.\n원인: 숨겨진 행동.\n해결: 모니터링, 인센티브 정렬, 공제.\n공동 해결책:\n공제(deductible): 손실 일부 부담.\n역선택 완화: 고위험자 비용 체감.\n도덕적 해이 완화: 주의 유인.\n트레이드오프: 공제 높을수록 위험 공유 감소.\n의무 가입:\n역선택 해결: 저위험자도 가입 → 풀 확장.\n도덕적 해이 악화 가능: 선택 없음 → 더 소홀.\n보험 설계의 핵심 딜레마.","game_type":"reveal"},{"id":7,"question":"알고리즘 게임 이론:\nn명의 에이전트가 공유 자원 배분.\n각 에이전트: 처리 시간 tᵢ (비공개).\n사회 최적: 총 완료 시간 최소화.\n각자의 인센티브: 자신의 완료 시간 최소화.\n\n진실 유인 메커니즘이 가능한가요?","hints":["VCG 적용 가능.\n하지만 계산 복잡도 문제.","근사 알고리즘 + 진실 유인의 트레이드오프.\n완전 최적화는 NP-hard일 수 있음."],"answer":"VCG=진실유인가능 / 하지만계산복잡도=실용성문제 / 근사VCG존재","explanation":"알고리즘 메커니즘 설계:\n일반 스케줄링:\nVCG 적용: 진실 유인 + 효율성.\n하지만: 최적 스케줄링 = NP-hard.\nVCG 계산 자체가 어려움.\n근사 VCG (아퀴닐라-마이어슨):\n근사 알고리즘 + VCG 변형.\n진실 유인 유지 + 다항 시간.\n근사율: 최적의 (1+ε) 배 이내.\n인터넷 응용:\n광고 경매: 구글, 메타의 실시간 입찰.\n클라우드 컴퓨팅: 자원 배분.\n라우팅: 네트워크 경로 선택.\n계산 복잡도와 인센티브의 긴장:\n효율적 알고리즘 = 전략적 조작 가능.\n진실 유인 알고리즘 = 때로 비효율.","game_type":"reveal"},{"id":8,"question":"공공 정보와 사적 정보:\n두 투자자가 자산 가치 추정.\n공공 신호: σ_p (모두 관찰).\n사적 신호: σᵢ (개인만 관찰).\n\n공공 정보가 늘면 협력이 증가하나요?","hints":["공공 신호 강화: 모든 사람의 믿음이 비슷해짐.\n→ 조정 게임에서 협력 증가.","하지만 글로벌 게임: 공공 신호 강화 → 다중 균형 복귀.\n→ 불안정성 증가 가능."],"answer":"공공정보=조정촉진 / 하지만과도하면다중균형복귀=불안정","explanation":"모리스-신 정보 효과 (2002):\n글로벌 게임에서:\n공공 신호 약함 → 유일 균형 (안정).\n공공 신호 강함 → 다중 균형 복귀 (불안정).\n역설: 중앙은행의 투명성이 오히려 불안정 유발.\n메커니즘:\n공공 신호: 모든 사람이 같은 정보.\n모두가 \"모두 투자할 것\"이라고 예상 → 실제 투자.\n자기 실현 예언 강화.\n정책 함의:\n중앙은행 투명성의 두 얼굴.\n너무 명확한 신호 → 금융 군집(herding).\n모호한 신호 → 다양한 예상 → 안정.\n앨런-고르통 이견: 불투명성의 전략적 가치.","game_type":"reveal"},{"id":9,"question":"플랫폼 전략:\n양면 시장(two-sided market):\n플랫폼이 두 그룹(A, B)을 연결.\nA 그룹 수: nA, B 그룹 수: nB.\nA의 가입 가치: αnB (B가 많을수록 가치).\nB의 가입 가치: βnA (A가 많을수록 가치).\n\n최적 가격 책정은?","hints":["네트워크 외부성: 한쪽 가입 → 다른 쪽 가치 증가.\n닭-달걀 문제: 어느 쪽을 먼저 끌어올까?","최적: 보조금 측과 수익 측 구분.\n가격 탄력성과 네트워크 효과 고려."],"answer":"낮은탄력성측=높은가격 / 네트워크효과큰측=보조금 / 닭달걀=보조금으로시작","explanation":"양면 시장 가격 이론 (로쉐-티롤, 2003):\n최적 가격 조건:\nP_A - MC_A = (1/ε_A - σ_A/P_B) × 가격 마크업.\n단순화:\nε 낮은 측: 가격 높게.\n네트워크 효과 큰 측: 보조금 또는 낮은 가격.\n실제 사례:\n신용카드: 소비자 무료/보상, 가맹점 수수료.\n플랫폼: 사용자 무료, 광고주 유료.\n게임 콘솔: 하드웨어 손실, 소프트웨어 이익.\n닭-달걀 해결:\n한쪽을 무료/보조금으로 먼저 유치.\n임계 질량 달성 후 수익화.\n아마존: 구매자 유치 → 판매자 유치.","game_type":"reveal"},{"id":10,"question":"복잡계 전략:\n창발 전략(emergent strategy):\n의도하지 않았지만 행동 패턴에서 전략이 나타남.\n\n민츠버그의 전략 유형:\n①계획 전략 (의도적).\n②창발 전략 (우발적).\n③실현 전략 (실제).\n\n(1) 게임 이론과 창발 전략의 차이는?\n(2) 적응 전략의 수학적 모델은?\n(3) 불확실성 환경에서 최적 전략 접근은?","hints":["게임 이론: 완전한 계획 + 예측.\n창발: 실시간 적응 + 학습.\n두 가지의 결합이 현실적.","강화 학습: 환경에서 보상 신호로 전략 학습.\nQ-러닝: 상태-행동 가치 함수 추정."],"answer":"게임이론=예측기반·창발=적응기반 / 강화학습=수학적모델 / 불확실=포트폴리오+실험","explanation":"창발 전략의 수학:\n강화 학습:\nQ(s,a) = r + γ×max Q(s',a').\n상태 s에서 행동 a의 장기 가치.\n환경과 상호작용으로 Q 학습.\n적응적 게임 이론:\n진화 알고리즘: 전략 집단의 자연 선택.\n허구 게임 플레이(Fictitious Play): 과거 통계로 전략 업데이트.\n후회 최소화(Regret Minimization): 과거 후회 줄이는 방향.\n불확실성 전략:\n포트폴리오: 여러 전략 병행.\n실험: 소규모 시험 후 확장.\n옵션: 미래 선택 유지.\n계획+적응: 사전 계획 + 실시간 조정.\n현실: 전략 컨설팅의 핵심 질문.","game_type":"reveal"}]},{"type":"strategy","level":9,"title":"전략 퍼즐 9단계 — 전략과 구조의 통합","difficulty":"발전","thinking":"전략 통합 · 복잡 게임 · 메타 전략","problems":[{"id":1,"question":"전략적 불확실성과 위험 지배:\n두 균형이 있는 조정 게임.\n\n```\n           B: A      B: B\nA: A       (9, 9)   (0, 7)\nA: B       (7, 0)   (7, 7)\n```\n\n(1) 내쉬 균형은?\n(2) 파레토 우월 균형은?\n(3) 위험 지배 균형은?","hints":["(A,A): 파레토 우월 (9>7).\n(B,B): 더 안전 (상대가 A여도 7 보장).","위험 지배: 혼합 전략 균형에서 더 큰 유역(basin).\np×9+(1-p)×0 vs p×7+(1-p)×7.\n9p = 7 → p = 7/9."],"answer":"균형=(A,A),(B,B) / 파레토=(A,A) / 위험지배=(B,B)","explanation":"위험 지배 (Harsanyi-Selten, 1988):\n파레토 우월: (A,A) → 9 > 7.\n위험 지배:\nA 최적 조건: 9p > 7 → p > 7/9.\nB 최적 조건: p < 7/9.\n혼합 균형에서 p=7/9 (A에 대한 상대의 확률).\np < 7/9이면 B 선택 → B가 위험 지배.\n위험 지배 균형 = (B, B).\n두 기준의 충돌:\n파레토: (A,A).\n위험 지배: (B,B).\n현실: 위험 지배가 더 자주 관찰됨.\n실험 경제학: 안전한 균형 선택.","game_type":"reveal"},{"id":2,"question":"전략적 대리인 문제:\n주주(P)가 경영자(A) 고용.\n경영자 노력: e ∈ {낮음, 높음}.\n성과: 높은 이익(100) 또는 낮은 이익(20).\n\n```\nP(높은이익|높은노력) = 0.8.\nP(높은이익|낮은노력) = 0.3.\n높은 노력 비용: 10.\n```\n\n최적 성과 보수 계약은?","hints":["낮은 노력 방지 조건 (IC):\nE[w|높은노력] - 10 ≥ E[w|낮은노력].\n0.8wH + 0.2wL - 10 ≥ 0.3wH + 0.7wL.","0.5wH - 0.5wL ≥ 10.\nwH - wL ≥ 20.\n참여 조건: E[w|높은노력] - 10 ≥ 유보 효용."],"answer":"wH-wL≥20 / 최적=성과연동보수","explanation":"주인-대리인 문제:\nIC (인센티브 호환성):\n0.5(wH-wL) ≥ 10 → wH-wL ≥ 20.\nIR (개인 합리성):\n0.8wH+0.2wL-10 ≥ 유보 효용(예: 0).\n주주 최적화:\nmin (0.8wH+0.2wL) subject to IC, IR.\n결합: wL=0, wH=20 (최소 비용).\n기대 임금 = 0.8×20+0.2×0 = 16.\n정보 비대칭 비용:\n완전 정보: 노력 확인 후 고정 임금 10.\n비대칭 정보: 기대 임금 16 (추가 비용 6).\n현실 응용:\n스톡옵션: 경영자 인센티브.\n성과급: 영업사원.\n공동 출자: 모험 감수 유인.","game_type":"reveal"},{"id":3,"question":"다자 협상과 연합 안정성:\n세 국가 A, B, C가 무역 협정.\n가능한 연합 가치:\nv(A)=0, v(B)=0, v(C)=0.\nv(AB)=6, v(AC)=4, v(BC)=2, v(ABC)=9.\n\n코어(Core)가 존재하나요?","hints":["코어: 어떤 연합도 이탈 유인 없는 배분.\n코어 조건:\nxA+xB ≥ 6, xA+xC ≥ 4, xB+xC ≥ 2.\nxA+xB+xC = 9.","xA+xB ≥ 6, xA+xC ≥ 4, xB+xC ≥ 2.\n세 조건 합: 2(xA+xB+xC) ≥ 12 → 18 ≥ 12 ✓.\n코어 존재 가능."],"answer":"코어존재: xA≥3, xB≥3, xC≥0 (예: xA=4,xB=3,xC=2)","explanation":"코어 조건 분석:\nxA+xB+xC = 9.\nxA+xB ≥ 6 → xC ≤ 3.\nxA+xC ≥ 4 → xB ≤ 5.\nxB+xC ≥ 2 → xA ≤ 7.\n가능한 코어 배분:\nxA=4, xB=3, xC=2:\nAB=7≥6 ✓, AC=6≥4 ✓, BC=5≥2 ✓.\n코어 존재.\n코어가 없는 경우:\n조건 합이 총 가치 초과 → 코어 공집합.\n순환 게임: v(AB)=4, v(BC)=4, v(CA)=4, v(ABC)=6.\n→ 코어 공집합.\n샤플리 값: 코어가 없어도 항상 유일한 배분 존재.","game_type":"reveal"},{"id":4,"question":"균형 선택 이론:\n같은 게임에서 여러 내쉬 균형이 있을 때\n어느 것이 실제 결과가 될까요?\n\n선택 기준들:\n①파레토 우월성.\n②위험 지배.\n③초점(focal point, Schelling point).\n④진화 안정성.\n⑤후회 최소화.\n\n두 기업의 기술 표준 선택 게임에 적용하세요.","hints":["초점: 역사적·문화적으로 두드러진 선택.\n예: 모든 사람이 \"파리에서 만나자\" → 에펠탑.","기술 표준: VHS vs 베타맥스, USB vs 파이어와이어.\n승리 요인: 초기 시장 선점 + 네트워크 효과."],"answer":"초점+선점효과가결정적 / 파레토우월이반드시선택안됨","explanation":"균형 선택의 현실:\n파레토 우월: 이론적으로 최선.\n하지만 현실에서 파레토 열등 균형이 지속.\nQWERTY vs 드보락: QWERTY 우세 (초기 선점).\nVHS vs 베타맥스: VHS 승리 (마케팅 + 대여점).\n초점 이론 (셸링, 1960):\n명시적 조정 없이도 수렴하는 두드러진 선택.\n문화적·역사적 맥락이 초점 결정.\n실험: \"뉴욕에서 만나기\" → 그랜드센트럴역, 정오.\n기술 표준의 교훈:\n초기 시장 점유 → 네트워크 효과 → 잠금(lock-in).\n우월한 기술이 반드시 승리하지 않음.\n전략: 초기 유통 채널 확보 + 보완재 생태계.","game_type":"reveal"},{"id":5,"question":"게임 이론과 진화 경제학:\n문화 진화와 제도:\n규칙(제도)이 개인 전략에 어떤 영향을 미치나요?\n\n상황:\n공유지의 비극 (Hardin, 1968).\n공유 자원을 각자 최대 이용 → 고갈.\n\n제도적 해결책들을 게임 이론으로 분석하세요.","hints":["오스트롬(Ostrom, 1990):\n지역 공동체가 자체 규칙으로 해결 가능.\n하향식 규제 vs 상향식 자율 규제.","성공 조건: 명확한 경계, 참여, 모니터링, 점진적 제재.\n반복 게임 + 평판 + 공동체 규범."],"answer":"제도=게임규칙변경=인센티브변화 / 오스트롬=공동체자율해결가능","explanation":"공유지의 비극 게임 이론:\n개인 최적: 최대 이용 (지배 전략).\n집단 결과: 자원 고갈.\n제도적 해결:\n사유화: 각자 자신 몫 → 관리 인센티브.\n국가 규제: 외부 제재 → 보수 변환.\n공동체 관리 (오스트롬):\n반복 게임: 미래 관계 중시.\n모니터링: 이탈 감지.\n점진적 제재: 작은 위반 → 작은 제재.\n문화 진화:\n성공적 협력 제도 → 모방·확산.\n실패한 제도 → 도태.\n노벨 경제학상 2009: 오스트롬 (공유지 연구).\n오스트롬 원칙: 국제 환경 협약에 응용.","game_type":"reveal"},{"id":6,"question":"복잡한 경매 — 조합 경매:\n3개 물건 A, B, C 경매.\n입찰자들의 패키지 가치:\n\n```\n입찰자 1: A=3, B=3, C=3, AB=7, AC=6, BC=6, ABC=9.\n입찰자 2: A=5, B=0, C=0, AB=5, AC=5, BC=0, ABC=5.\n입찰자 3: A=0, B=4, C=5, AB=4, BC=10, AC=5, ABC=10.\n```\n\n사회 최적 배분은?","hints":["가능한 배분:\n입찰자1이 ABC: 9.\n입찰자2가 A + 입찰자3이 BC: 5+10=15.\n입찰자1이 A + 입찰자3이 BC: 3+10=13.","입찰자2(A) + 입찰자3(BC) = 5+10 = 15 → 최대."],"answer":"입찰자2=A, 입찰자3=BC / 총가치=15","explanation":"조합 경매 최적화:\n가능한 배분 열거:\n1인 독점: 최대 9 (입찰자1).\n2인 분할: max(5+10, 5+6, 3+10, ...) = 15.\n최적: 입찰자2가 A(5), 입찰자3이 BC(10).\nVCG 가격:\n입찰자2 지불: 사회 기여도 = 15-10 = 5.\n→ 입찰자2 없으면 최대 = 10 (입찰자3의 BC).\n→ 입찰자2 지불 = 15-10 = 5.\n입찰자3 지불: 15-5 = 10.\n→ 입찰자3 없으면 최대 = 9 (입찰자1의 ABC) 또는 5.\n→ 입찰자3 지불 = 15-5 = 10.\n조합 경매 복잡성:\n2^n 가능한 패키지 → 지수적 복잡도.\nFCC 스펙트럼 경매: 수십억 달러 규모.","game_type":"reveal"},{"id":7,"question":"전략적 실험과 탐색:\nn개 슬롯머신 중 하나 선택.\n각 머신의 보상 확률 미지.\n탐색(exploration) vs 활용(exploitation).\n\n다중 팔 강도 문제(Multi-Armed Bandit):\nUCB1 알고리즘의 전략은?","hints":["UCB1: 각 머신마다 신뢰 상한 계산.\nUCB = 평균 보상 + √(2lnt/nᵢ).\nt: 총 시도 수, nᵢ: 머신 i 시도 수.","처음: 모든 머신 탐색.\n이후: 신뢰 상한 최대 머신 선택.\n→ 탐색과 활용 균형."],"answer":"UCB1=평균+탐색보너스 / 후회최소화 / O(√T logT) 후회","explanation":"UCB1 알고리즘:\nUCBᵢ = x̄ᵢ + √(2ln(t)/nᵢ).\nx̄ᵢ: 머신 i의 평균 보상.\n√(2ln(t)/nᵢ): 탐색 보너스 (덜 시도할수록 큰 보너스).\n직관:\n불확실한 머신 → 큰 탐색 보너스 → 선택.\n많이 시도할수록 보너스 감소 → 실제 성능으로 경쟁.\n성능:\n기대 후회 R(T) = O(√T ln T) (최적에 가까움).\n하한: R(T) = Ω(√T) (불가피한 후회).\n응용:\nA/B 테스트: 최적 웹페이지 디자인.\n임상 시험: 최적 치료법.\n추천 시스템: 최적 콘텐츠.\n광고 배치: 최적 광고 노출.","game_type":"reveal"},{"id":8,"question":"전략적 투표와 기권:\n선거에서 전략적 기권:\n3명 후보 A, B, C.\n내 선호: A > B > C.\n여론 조사: B vs C가 접전, A는 꼴찌.\n\n전략적으로 어떻게 투표해야 하나요?","hints":["진실 투표: A.\n결과: B와 C 접전, A 탈락.\n내 한 표가 A 당선에 영향 없음.","전략 투표: B (차선 선택).\n이유: B vs C에서 B를 돕는 것이 더 효과적.\n독화 (Duverger's law): 다수제에서 양당 체제."],"answer":"전략투표=B선택 / 뒤베르제법칙=양당수렴 / 순위투표=전략투표감소","explanation":"전략적 투표 분석:\n두베르제 법칙:\n다수제 (1위 당선) → 전략 투표 → 양당 체제.\n내가 A에 투표해도 A는 당선 불가.\nB에 투표 → B vs C에서 결정적 역할.\n합리적 선택: B 투표.\n전략 투표의 결과:\n소수당 지지자가 차선책 선택.\n→ 소수당 과소 득표.\n→ 양당 수렴.\n제도 설계:\n순위 투표 (IRV): 1지망 탈락 시 2지망으로.\n전략 투표 유인 감소.\n호주, 아일랜드에서 사용.\n보르다 계산: 순위에 점수 부여.\n콩도르세 방법: 1:1 대결 승자.\n각 제도마다 다른 전략적 인센티브.","game_type":"reveal"},{"id":9,"question":"글로벌 전략과 로컬 적응:\n다국적 기업의 전략.\n표준화 (global): 전 세계 같은 제품.\n현지화 (local): 각 시장 맞춤 제품.\n\n게임 이론적 분석:\n현지 기업과의 경쟁에서 최적 전략은?","hints":["표준화: 규모의 경제 (비용 절감).\n현지화: 소비자 선호 맞춤 (가격 프리미엄).","현지 경쟁자: 현지화 유리.\n글로벌 경쟁자 없으면: 표준화 유리.\n균형: 차별화된 현지화 + 글로벌 효율."],"answer":"글로컬=표준화+현지화혼합 / 현지경쟁=현지화강화 / 규모vs차별화트레이드오프","explanation":"글로벌-로컬 게임:\n표준화 이익:\n규모의 경제: 단일 생산 → 비용 감소.\n일관된 브랜드: 전 세계 동일 이미지.\n현지화 이익:\n소비자 선호: 문화적 차이 반영.\n현지 규제: 적합성.\n경쟁 우위: 현지 경쟁자 대응.\n게임 이론 분석:\n현지 기업: 현지화 특화.\n글로벌 기업 vs 현지 기업:\n표준화 글로벌: 비용 우위.\n현지화 현지: 선호도 우위.\n균형: 글로컬 (transnational) 전략.\n사례:\n맥도날드: 메뉴 현지화 + 브랜드 표준화.\n삼성: 글로벌 플래그십 + 지역 모델.\n넷플릭스: 콘텐츠 현지화 + 플랫폼 표준화.","game_type":"reveal"},{"id":10,"question":"발전 구간 종합: 전략 통합 프레임워크.\n\n다음 상황에서 통합적 전략 분석을 수행하세요.\n\n상황: 스타트업 A가 대기업 B의 시장에 진입.\nA: 혁신 기술, 자금 제한.\nB: 기존 고객, 풍부한 자금.\n\n분석 프레임:\n①게임 구조: 플레이어, 전략, 보수.\n②정보: 완전/불완전, 대칭/비대칭.\n③동적: 단기/장기, 반복.\n④균형: 내쉬, ESS, 협상.\n⑤메커니즘: 인센티브, 제도.","hints":["A의 전략: 차별화, 틈새 시장, 협력 제안.\nB의 전략: 인수, 모방, 가격 전쟁, 무시.","A의 최선: B가 모방하기 어려운 차별화.\nB의 최선: 인수 (이익 공유) vs 경쟁 (이익 독점)."],"answer":"개인 창작 (다양한 분석 가능)","explanation":"통합 전략 분석:\n게임 구조:\n플레이어: A(스타트업), B(대기업), 고객, 투자자.\nA 전략: {차별화, 틈새, 협력, 성장}.\nB 전략: {인수, 모방, 전쟁, 무시}.\n정보 비대칭:\nA: 자신의 기술 가치 앎. B: 모름.\nB: 자금력 알고 있음. A: 부분적.\n→ 신호 게임: A가 기술력 신호 발송.\n동적 분석:\n단기: B 무시 또는 가격 전쟁.\n장기: A 성공 시 인수 또는 공존.\n반복: 생태계 내 장기 관계.\n균형:\nA 성공 조건: 충분한 차별화 + 빠른 성장.\nB 최적: 초기 인수 (저렴) vs 늦은 경쟁 (비쌈).\n현실 교훈:\n구글-유튜브, 페이스북-인스타그램: 초기 인수.\n구글-소셜, 마이크로소프트-검색: 늦은 진입 실패.","game_type":"reveal"}]},{"type":"strategy","level":10,"title":"전략 퍼즐 10단계 — 전략의 수학적 구조","difficulty":"심화","thinking":"고급 게임 이론 · 메커니즘 설계 · 전략의 공리적 기초","problems":[{"id":1,"question":"내쉬 균형의 존재 증명:\n브라우어 고정점 정리를 이용한 증명.\n\n내쉬 정리(1950):\n유한 플레이어, 유한 전략의 게임에서\n혼합 전략 내쉬 균형은 항상 존재한다.\n\n(1) 브라우어 고정점 정리란?\n(2) 내쉬 균형 = 고정점인 이유는?\n(3) 이 정리의 한계는?","hints":["브라우어: 연속 함수 f: D→D (D: 볼록 컴팩트)는\n반드시 고정점 x* = f(x*)를 가진다.","최적 반응 함수 BR: Σ→Σ (혼합 전략 공간).\n균형 = 모든 플레이어의 BR의 고정점."],"answer":"브라우어=고정점정리 / 균형=BR의고정점 / 한계=존재만증명(유일성·선택불보장)","explanation":"내쉬 균형 존재 증명:\n혼합 전략 공간 Σ: 볼록 컴팩트 집합.\n최적 반응 BR(σ): 상반응 대응(correspondence).\n카쿠타니 고정점 정리 (BR이 집합 값):\nBR: Σ→2^Σ, 볼록 값, 폐그래프.\n→ 고정점 σ* ∈ BR(σ*) 존재.\n이것이 내쉬 균형.\n수학적 아름다움:\n위상수학(고정점) + 게임이론(균형)의 연결.\n내쉬의 박사 논문: 27페이지, 2개 정리.\n한계:\n존재 증명이지 유일성 아님.\n다중 균형: 어느 것이 실현될지 불명.\n계산 복잡도: 균형 찾기 PPAD-완전.","game_type":"reveal"},{"id":2,"question":"완전 베이지안 균형(PBE):\n불완전 정보 게임의 엄밀한 균형 개념.\n\n조건:\n①전략: 각 플레이어의 최적 반응.\n②믿음: 베이즈 법칙으로 업데이트.\n③일관성: 균형 경로 상의 믿음은 베이즈 법칙.\n\n다음 신호 게임에서 PBE를 구하세요:\n강한 타입(S, 2/3) → 신호 보냄(C) 또는 안 보냄(NC).\n약한 타입(W, 1/3) → C 또는 NC.\n\n수신자: 신호 보고 투자(I) 또는 비투자(NI).\n\n보수 (타입, 신호, 수신자):\nS-C-I: (2,1), S-C-NI: (0,0), S-NC-I: (3,1), S-NC-NI: (1,0).\nW-C-I: (1,1), W-C-NI: (-1,0), W-NC-I: (2,1), W-NC-NI: (0,0).","hints":["분리 균형 확인: S→NC, W→C.\n수신자: C 보면 W → NI. NC 보면 S → I.","S: NC 선택 시 I → 보수 3. C 선택 시 NI → 보수 0.\nS: NC 선호 ✓.\nW: C 선택 시 NI → 보수 -1. NC 선택 시 I → 보수 2.\nW: NC 선호. 분리 균형 깨짐."],"answer":"혼합균형탐색필요 / 풀링균형=(둘다NC)가능성","explanation":"PBE 분석:\n풀링 균형 (둘 다 NC):\n수신자 믿음 (NC 관찰): P(S|NC) = 2/3.\n수신자 기댓값 (I): 2/3×1+1/3×1 = 1 > 0.\n수신자: I 선택.\nS: NC→I=3, C→? (균형 외 경로 믿음 자유).\nW: NC→I=2, C→? .\n둘 다 NC: 풀링 균형 가능.\n균형 외 경로: C 관찰 시 믿음 자유.\nP(W|C)=1 설정 → NI → 이탈 유인 없음.\n풀링 균형 (NC, NC) with P(W|C)=1 존재.","game_type":"reveal"},{"id":3,"question":"반복 게임의 포크 정리:\n할인율 δ가 충분히 높으면\n어떤 결과도 (파레토 개선 균형으로) 달성 가능.\n\n정확한 진술:\n게임 G의 어떤 결과 v가\n개인 합리성 조건 v ≥ min-max 값을 만족하면\n충분히 높은 δ에서 그 결과가 균형 결과.\n\n(1) min-max 값이란?\n(2) 포크 정리의 한계는?\n(3) 정확한 균형 전략 구성은?","hints":["min-max: 상대가 나를 최소화할 때의 나의 최대값.\n= 상대가 최악으로 굴어도 내가 보장받는 값.","포크 정리 한계:\n균형이 너무 많음 → 어느 것이 실현될지 모름.\n공개 개입 (public monitoring) 필요."],"answer":"min-max=상대최악시보장값 / 포크=달성가능결과무한 / 균형선택문제심화","explanation":"포크 정리:\nmin-max 값 m_i:\nm_i = max_{σᵢ} min_{σ₋ᵢ} uᵢ(σᵢ, σ₋ᵢ).\n= 상대가 나를 처벌해도 내가 보장받는 최소.\n포크 정리:\nv ≥ m (모든 플레이어) → δ 충분히 크면 달성 가능.\n죄수의 딜레마: m = 1 (DD 보수).\n(3,3) > (1,1) → 달성 가능.\n무한 반복 + 공개 관찰 + 충분한 인내 → 협력.\n한계:\n균형이 (연속체만큼) 많음.\n균형 선택 문제 해결 안 됨.\n유한 반복: 포크 정리 성립 안 함.\n불완전 모니터링: 약한 포크 정리만.","game_type":"reveal"},{"id":4,"question":"역경매와 조달:\n정부가 계약 업체 선정 (역경매).\n업체들의 비용 ci ~ [0,1] (균등분포, 독립).\n정부 목표: 최저 비용 선택 + 진실 유인.\n\n비크레이 역경매:\n낙찰: 최저 입찰 업체.\n지불: 두 번째 낮은 입찰가.\n\n(1) 진실 입찰이 지배 전략인 이유는?\n(2) 기대 조달 비용은?\n(3) 두 번째 낮은 비용의 기대값은?","hints":["2위 가격 역경매 (최저가 낙찰, 2위 최저가 지불):\n입찰 b > c: 손해 없이 낙찰 확률 감소.\n입찰 b < c: 낙찰 시 손해.\n→ b = c 지배 전략.","n명 입찰, 균등분포 [0,1]:\n2번째 최솟값 기대 = (n-1)/(n+1).\nn=2: 기대 비용 = 1/3."],"answer":"진실입찰=지배전략 / n=2기대비용=1/3 / 일반n=(n-1)/(n+1)","explanation":"비크레이 역경매:\nb = c: 낙찰 시 이익 = 지불-비용 = c₍₂₎-c ≥ 0 (c가 최저이면).\nb > c: 낙찰 확률 감소 (손해 없지만 낙찰 기회 손실).\nb < c: 낙찰 시 이익 = c₍₂₎-b? 아니면 손해?\n정확히: 낙찰 시 지불 = 2위 최저가.\nb < c이면 낙찰되어도 손해: 지불-비용 < 0.\n→ b = c 최적.\nn명 균등분포 최솟값의 순서 통계:\nE[X₍ₖ₎] = k/(n+1).\n2번째 최솟값 = 2번째 작은 값:\nn=2: E[min₂] = E[X₍₂₎] = 2/3? 아니면 1/3?\n실제: 최솟값 E[X₍₁₎] = 1/(n+1).\n2번째 최솟값 E[X₍₂₎] = 2/(n+1).\nn=2: E[X₍₂₎] = 2/3 (최댓값의 기대).\n조달: 최솟값을 원함 → E[X₍₁₎] = 1/3.\n2위 지불 = 두 번째 낮은 입찰 = n=2에서 E = 1/3+?\n수입 동등성: 1위와 2위 가격 경매 기대 수입 동일.","game_type":"reveal"},{"id":5,"question":"전략형과 전개형 게임의 동등성:\n모든 전개형 게임은 전략형으로 변환 가능.\n하지만 반드시 같은 균형을 가지지는 않음.\n\n예시:\n```\nA: L 또는 R.\nR이면 B: U 또는 D.\n보수: L→(1,1), R-U→(2,2), R-D→(0,3).\n```\n\n전략형의 내쉬 균형은?\n전개형의 역방향 귀납 균형은?","hints":["전략형:\nA: {L, R}, B: {U, D} (항상).\n\n```\n        B:U      B:D\nA:L    (1,1)    (1,1)\nA:R    (2,2)    (0,3)\n```","전략형 균형: (L,D) = (1,1) 확인.\nB: D 선택 시 A가 L → B 이탈? U→(2,2)>D→(1,1). 이탈."],"answer":"전개형균형=(R,U) / 전략형에(L,D)도균형 / (L,D)=비신뢰성위협","explanation":"균형 개념의 세밀화:\n전략형 내쉬 균형:\n(L, D): A=1, B=1.\nA 이탈: R → B가 D이면 0 < 1. 안 함.\nB 이탈: U → 하지만 A가 L이면 B=(1,1)→(1,1) 무차별.\n→ (L,D)는 내쉬 균형.\n하지만 비신뢰성 위협:\nB의 D 위협: \"A가 R 선택시 D로 처벌.\"\n실제 R이면: B는 U(2) > D(3)? 아니 D(3) > U(2).\nB는 실제로 D 선택 (3>2).\n→ A는 R → B는 D → A는 L.\n역방향 귀납: R이면 B는 D(3>2). A: R→0, L→1.\nA는 L 선택. 균형 = (L, D).\n수정: B의 보수를 재확인.\nR-U: (2,2), R-D: (0,3) → B는 D(3) > U(2). D 선택.\nA는 R→0, L→1. A: L 선택.\n역방향 귀납 균형 = (L, D)!","game_type":"reveal"},{"id":6,"question":"경쟁적 균형과 후생:\n완전 경쟁 시장의 두 복지 정리.\n\n제1 복지 정리:\n경쟁 균형은 파레토 효율.\n\n제2 복지 정리:\n어떤 파레토 효율적 배분도\n적절한 초기 자원 재분배 후 경쟁 균형으로 달성.\n\n(1) 두 정리의 전략적 함의는?\n(2) 정리의 가정과 현실의 차이는?\n(3) 시장 실패와 정부 개입의 조건은?","hints":["제1 정리: 시장이 효율적 → 개입 불필요.\n제2 정리: 공평성과 효율성 분리 가능.","가정: 완전 경쟁, 외부성 없음, 공공재 없음, 정보 완전.\n현실: 이 가정들 위반 → 시장 실패."],"answer":"제1=시장효율 / 제2=공평·효율분리 / 실패=외부성·공공재·정보비대칭","explanation":"복지 정리의 전략적 함의:\n제1 복지 정리:\n가격 = 완전 정보 + 경쟁 → 파레토 효율.\n전략적: 모든 사람이 가격 수용자 (전략 없음).\n제2 복지 정리:\n재분배 (초기 자원 조정) + 시장 = 임의 효율 배분.\n의미: 효율성과 공평성 분리.\n시장 실패 조건:\n외부성: 남의 비용/이익을 내가 무시.\n공공재: 비배제, 비경쟁 → 과소 공급.\n정보 비대칭: 역선택, 도덕적 해이.\n독점력: 가격 > MC.\n시장 실패 = 전략적 게임 이론 개입 필요.\n정부 정책 = 메커니즘 설계.","game_type":"reveal"},{"id":7,"question":"협력 게임의 핵(Core)과 안정성:\n매칭 이론 — 안정적 결혼 문제.\n\n4명(A,B) (남성), 4명(a,b) (여성).\n선호:\nA: a > b, B: b > a.\na: A > B, b: A > B.\n\n안정 매칭이란?\n게일-샤플리 알고리즘으로 구하세요.","hints":["안정 매칭: 블로킹 쌍이 없는 매칭.\n블로킹 쌍: 서로 현재 파트너보다 상대를 선호.","게일-샤플리 (남성 제안):\n1라운드: A→a, B→b.\na: A 수락. b: A vs B → A 선호 → B 거절.\n2라운드: B→a.\na: A vs B → A 선호 → B 거절.\nB 제안 대상 없음."],"answer":"안정매칭=(A-a, B-b) / b가A선호해도A는a와매칭","explanation":"게일-샤플리 알고리즘:\n남성 제안 버전:\nA→a (1지망), B→b (1지망).\na: A 유지. b: A 없으므로 B 유지.\n결과: (A-a, B-b).\n블로킹 쌍 확인:\n(A-b): A는 a>b이므로 b 선호 안 함. 블로킹 아님.\n(B-a): a는 A>B이므로 A 선호. B는 a>b이므로 a 선호.\n→ (B-a)는 블로킹 쌍!\n재검토: a가 B를 거절했으므로 (A-a)는 안정.\n(B-a): B가 a 원하고 a가 B 원함 → 블로킹 쌍.\n하지만 a는 현재 A와 더 행복 → a는 B로 이동 안 함.\n안정 매칭 = (A-a, B-b) 불안정? 수정 필요.\n정확: (B-a)에서 a는 A>B이므로 B 선호 안 함.\n블로킹 쌍 아님. (A-a, B-b) 안정.","game_type":"reveal"},{"id":8,"question":"순차 합리성과 전향 귀납:\n역방향 귀납과 반대 방향.\n\n전향 귀납(Forward Induction):\n\"상대방이 왜 이 신호를 보냈는가?\"\n\n```\n게임:\nA: Out (보수 2,0) 또는 In.\nIn이면: 두 플레이어 동시 선택.\n        B:L    B:R\nA:L    (3,1)  (0,0)\nA:R    (0,0)  (1,3)\n```\n\n전향 귀납 예측은?","hints":["A가 In을 선택했다면: Out(2)보다 나은 결과 기대.\n→ A는 최소 2 이상 기대.\nA:L가 3 > 2이므로 A는 L을 의도.","B: A가 In을 선택했다면 L을 의도 (전향 귀납).\n→ B는 L 선택 (1>0).\n균형: In, (L,L) → (3,1)."],"answer":"전향귀납=(In,L,L)→(3,1) / A의In신호=L의도","explanation":"전향 귀납:\nA가 Out을 포기했다면 이유가 있음.\nA의 최선: In-L = 3 > Out = 2.\nIn-R = 1 < Out = 2 → A는 R 선택 안 함.\n→ A가 In을 선택했다면 L 의도.\nB는 이 추론을 하고 L 선택 (1>0).\n역방향 귀납과의 차이:\n역방향: 끝에서 거꾸로 (미래 → 현재).\n전향 귀납: 관찰된 행동에서 의도 추론 (과거 → 현재).\n균형 정제:\n전향 귀납 = 강한 균형 정제.\n역방향 귀납 = 부분게임 완전 균형.\n전향 귀납 > 역방향 귀납 (더 강한 요구).","game_type":"reveal"},{"id":9,"question":"경매 이론의 최전선:\n복잡한 경매 환경:\n① 상호 보완적 가치: A와 B 함께 가치 더 높음.\n② 상호 대체적 가치: A 또는 B 중 하나면 충분.\n③ 예산 제약: 총 지출 한도.\n\n이 환경에서 VCG의 한계는?","hints":["상호 보완: 조합 입찰 필요.\n예산 제약: VCG 지불이 예산 초과 가능.","VCG + 예산 제약: 진실 유인 깨질 수 있음.\n대안: CA-VCG (조합 VCG), 코어 가격 설정."],"answer":"VCG한계=예산제약·계산복잡도 / 조합VCG·코어가격이대안","explanation":"VCG의 한계:\n예산 균형:\nVCG 세금 합 < 비용 → 보조 필요.\n예산 제약 + VCG: 지불 불가 시 전략 왜곡.\n계산 복잡도:\n최적 배분 = NP-hard (조합 경매).\nVCG 계산 자체가 어려움.\n담합 취약성:\n특정 조건에서 입찰자들이 담합 가능.\n최적 경매 (마이어슨) 적용 어려움.\n현실 대안:\n코어 가격 설정: 코어 안의 가격 선택.\nFA 경매(Ascending, FAA): 단계적 가격 인상.\nPO-VCG: 파레토 최적 + VCG.\n프랙티컬 메커니즘:\n완벽한 이론 > 실용적 타협.\n간단성, 투명성, 계산 가능성이 중요.","game_type":"reveal"},{"id":10,"question":"심화 구간 입문 종합:\n다음 상황의 전략 구조를 수학적으로 분석하세요.\n\n기후 협약 게임:\nn개 국가가 온실가스 감축 여부 결정.\n감축 비용: c (각국 동일).\n감축 국가 수 k이면 각국 이익: b(k) (k에 증가).\nb(n) > c > b(1): 전체 감축이 이익, 혼자 감축은 손해.\n\n(1) 이 게임의 구조는?\n(2) 내쉬 균형은?\n(3) 국제 협약 메커니즘은?","hints":["각국 감축 여부: 다자 죄수의 딜레마.\n비감축 = 지배 전략 (b(k) 증가해도 자신 비용 c).","내쉬 균형: 모두 비감축 (공공재 문제).\n사회 최적: 모두 감축 (n×b(n) - n×c > 0)."],"answer":"다자죄수딜레마 / 균형=모두비감축 / 협약=처벌조건부·무역연계","explanation":"기후 게임의 수학:\n국가 i의 이익:\n감축 시: b(k) - c.\n비감축 시: b(k).\n→ 비감축이 항상 c만큼 유리.\n지배 전략: 비감축.\n내쉬 균형: 모두 비감축 → b(1)×n 이익.\n사회 최적: 모두 감축 → b(n)×n - c×n.\nb(n)×n - c×n > b(1)×n (b(n)>c+b(1)/n 가정).\n메커니즘 해결:\n조건부 협약: k개국 이상 서명 시 발효.\n최저 규모: 협약 이익이 탈퇴보다 높아야.\n무역 연계: 비감축 국가에 무역 제재.\n기술 이전: 감축 비용 c 줄이기.\n반복 게임: 미래 협력 위협.\n파리 협약의 구조:\n자발적 서약 (NDC) + 투명성 메커니즘.\n강제력 부족 → 약한 균형.","game_type":"reveal"}]},{"type":"strategy","level":11,"title":"전략 퍼즐 11단계 — 전략의 최전선","difficulty":"심화","thinking":"현대 게임 이론 · 응용 전략 · 전략적 혁신","problems":[{"id":1,"question":"AI와 게임 이론:\n알파고와 게임 이론.\n바둑: 완전 정보, 결정론적, 2인 제로합.\n미니맥스 + 몬테카를로 트리 탐색 (MCTS).\n\n(1) 바둑에서 미니맥스의 한계는?\n(2) MCTS가 해결하는 방법은?\n(3) AI 전략과 인간 전략의 차이는?","hints":["바둑: 분기 수 ≈ 250, 깊이 ≈ 150.\n250^150 = 천문학적 탐색 공간.\n알파-베타 가지치기로도 불가능.","MCTS: 가치 있는 방향으로 선택적 탐색.\n신경망: 위치 평가 + 정책 확률.\n자기 대결: 인간 기보 없이 학습."],"answer":"미니맥스=지수폭발 / MCTS=선택적탐색 / AI=비인간적패턴발견","explanation":"알파고 제로의 혁신:\n기존 알파고: 인간 기보 학습 + MCTS.\n알파고 제로: 자기 대결만으로 학습.\n강화 학습: 이기면 +, 지면 - 신호.\n결과: 인간이 3000년간 발견 못한 전략 발견.\nMCTS 원리:\nUCT (Upper Confidence Bound for Trees):\n선택: 승률 + 탐색 보너스.\n확장: 유망한 노드 확장.\n시뮬레이션: 끝까지 게임.\n역전파: 결과 업데이트.\nAI vs 인간:\n인간: 직관, 패턴 인식 (제한적 깊이).\nAI: 깊은 탐색, 확률적 평가 (인간 이해 불가).\nAI의 수: 때로 인간에게 \"이상해 보이지만\" 최적.\n포커 (Libratus, 2017): 불완전 정보 게임에서도 AI 우세.","game_type":"reveal"},{"id":2,"question":"시장 설계와 매칭 이론:\n신장 교환 프로그램.\n직접 기증 불가 (혈액형 불일치).\n교환: A→B, B→A 또는 체인.\n\n게임 이론 문제:\n어떻게 매칭을 설계하면\n① 더 많은 쌍이 매칭되고\n② 진실 선호 표현을 유도하나요?","hints":["탑 트레이딩 사이클 (TTC) 알고리즘.\n각자가 가장 원하는 신장을 가리킴 → 사이클 형성.","TTC: 각 플레이어의 1순위 선택.\n사이클 발견 → 교환 실행 → 제거.\n반복."],"answer":"TTC=파레토효율+진실유인 / 신장교환에응용 / 2012노벨상(로쓰)","explanation":"최상위 거래 사이클 (TTC):\n알고리즘:\n각자 자신이 가장 원하는 신장 가리킴.\n사이클: A→B→C→A.\nA는 C의 신장을, B는 A의, C는 B의.\n사이클 내 모든 쌍 교환 + 제거.\n남은 플레이어로 반복.\n특성:\n파레토 효율: 사이클 내 모두 최선.\n전략적 안전: 진실 선호 표현 = 지배 전략.\n노벨상 (2012): 앨빈 로쓰, 로이드 샤플리.\n응용:\n신장 교환: 미국 UNOS.\n학교 배정: 보스턴, 뉴욕.\n주택 교환, 취업 매칭.\n로쓰의 기여:\n이론을 실제 시장 설계에 응용.\n경제학 엔지니어링.","game_type":"reveal"},{"id":3,"question":"행동 게임 이론:\n인간이 게임 이론 예측과 다르게 행동하는 이유.\n\n수준-k 사고 모형(Level-k thinking):\n수준 0 (L0): 무작위.\n수준 1 (L1): L0에 최적 대응.\n수준 2 (L2): L1에 최적 대응.\n\n미인 대회 게임:\n0~100 중 평균의 2/3에 가장 가까운 수 선택.\n\n(1) 내쉬 균형은?\n(2) 수준-k 예측은?\n(3) 실험 결과는?","hints":["내쉬 균형: 모두 0 선택.\n(모두 0이면 2/3×0=0, 이탈 유인 없음)","L0: 평균 50. L1: 2/3×50≈33. L2: 2/3×33≈22. L3: 2/3×22≈15."],"answer":"내쉬=0 / L1≈33·L2≈22·L3≈15 / 실험=평균20~25","explanation":"미인 대회 게임 분석:\n반복 귀납: 모두 이성적 → 2/3×100=67. 또 → 2/3×67=44.\n→ 0으로 수렴.\n수준-k:\nL0: 50 (무작위).\nL1: 33.\nL2: 22.\nL3: 15.\n실제 실험: 평균 20-25 (L2-L3 수준).\n행동 게임 이론의 교훈:\n인간은 유한한 수준의 전략 사고.\n무한 귀납 = 비현실적.\nL2-L3이 현실적 최선.\n응용:\n경매: 다른 입찰자의 생각 수준 예상.\n협상: 상대방 수준 추정 후 전략 조정.\n금융: 케인즈의 미인 대회 = 주식 시장.","game_type":"reveal"},{"id":4,"question":"네트워크 게임:\n소셜 네트워크에서의 전략.\n각 플레이어 i: 이웃 집합 Nᵢ.\n행동 xᵢ ∈ [0,1].\n이익: xᵢ × (Σⱼ∈Nᵢ xⱼ) - xᵢ²/2.\n\n(1) 내쉬 균형 조건은?\n(2) 균형 행동 수준은?\n(3) 네트워크 구조가 균형에 미치는 영향은?","hints":["FOC: ∂/∂xᵢ = Σⱼ∈Nᵢ xⱼ - xᵢ = 0.\n→ xᵢ* = Σⱼ∈Nᵢ xⱼ.","균형: xᵢ = 이웃들의 합.\n행렬 방정식: (I-A)x = 0? 아니면 다른 형태."],"answer":"xᵢ=이웃합 / 균형=고유벡터중심성 / 허브=높은행동수준","explanation":"네트워크 게임 균형:\nFOC: xᵢ* = Σⱼ∈Nᵢ xⱼ*.\n행렬 형태: x* = Ax*.\n(A-I)x* = 0.\n고유값 1에 대응하는 고유벡터.\n인접 행렬 A의 최대 고유벡터 = 균형 행동.\n고유벡터 중심성:\n네트워크에서 중요한 노드 = 균형 행동 높음.\n허브 노드: 많은 이웃 → 높은 균형 행동.\n고립 노드: 낮은 균형 행동.\n정책 함의:\n네트워크 중심 플레이어에 개입 → 파급 효과 최대.\n예방 접종: 허브에 먼저.\n정보 확산: 허브 통해.\n마케팅: 인플루언서 = 허브.","game_type":"reveal"},{"id":5,"question":"계약 이론의 최전선:\n불완전 계약(Incomplete Contract) 이론.\n홀름스트롬-하트(2016 노벨상).\n\n미래의 모든 상황을 계약에 명시 불가.\n→ 나중에 재협상 필요.\n→ 사전 투자 유인 왜곡 (홀드업 문제).\n\n(1) 홀드업 문제란?\n(2) 소유권이 해결책인 이유는?\n(3) 기업의 경계 결정 이론은?","hints":["A가 B를 위해 특화 투자.\n계약 후 B가 재협상 요구 → A의 잉여 빼앗음.\n→ A는 사전에 과소 투자.","소유권: 재협상에서 더 강한 협상력.\n→ 투자 인센티브 강화.\n수직 통합: 공급자 인수 → 홀드업 제거."],"answer":"홀드업=특화투자후재협상위협 / 소유권=협상력=투자유인 / 기업경계=소유구조결정","explanation":"홀드업 문제:\n예: 자동차 부품 공급자 A, 제조사 B.\nA가 B 전용 기계에 10 투자.\n계약 후 B: \"5만 줄게, 싫으면 말고.\"\nA: 이미 투자 → 5라도 받는 게 나음.\n→ A는 처음부터 투자 안 함 (과소 투자).\n소유권 이론 (그로스만-하트-무어):\n소유자 = 재협상에서 더 큰 몫.\nA가 기계 소유 → 재협상에서 유리 → 투자 유인.\n수직 통합:\nB가 A 인수 → A는 B의 직원.\n직원은 협상력 없음 → 다른 문제.\n기업 경계:\n통합: 한쪽 투자 유인 ↑, 다른 쪽 ↓.\n최적 소유 구조: 더 중요한 투자를 하는 쪽이 소유.","game_type":"reveal"},{"id":6,"question":"전략적 정보 획득:\n정보 수집의 게임 이론.\n\n수집 비용 c, 수집 후 가치 v.\n경쟁자도 정보 수집 여부 결정.\n\n(1) 정보의 가치는 경쟁자의 행동에 의존하는가?\n(2) 정보 수집 게임의 균형은?\n(3) 과잉 정보 수집 현상이란?","hints":["혼자 정보 수집: 경쟁 우위 v-c.\n경쟁자도 수집: 우위 감소 → 가치 하락.","균형: 혼합 전략 (p 확률로 수집).\np: 수집 기댓값 = 미수집 기댓값."],"answer":"정보가치=경쟁자의존 / 혼합균형=과잉수집가능 / 사회손실=중복수집","explanation":"정보 수집 게임:\n수집 가치: v(k) (k: 수집 업체 수).\nv(1) > c > v(n): 혼자는 이익, 모두 수집은 손해.\n죄수의 딜레마 구조.\n혼합 균형:\np: 수집 확률.\n기댓값 균형: E[수집] = E[미수집].\nv×P(경쟁자미수집) - c = 0.\n과잉 수집:\n개인 이익 > 사회 이익.\n중복 수집: 같은 정보 여러 번 생산.\n사회 낭비.\n현실:\n리서치 경쟁: 여러 기업이 같은 시장 조사.\n특허 경주: 중복 R&D.\n해결: 정보 공유 협약, 공동 연구.","game_type":"reveal"},{"id":7,"question":"시간 불일치와 약속 신뢰성:\n중앙은행의 인플레이션 게임.\n\n정부: 낮은 실업 선호 (팽창 정책 유혹).\n민간: 정부 정책 예상하여 임금 결정.\n결과: 예상된 인플레이션 → 실질 효과 없음.\n\n(1) 시간 불일치 문제란?\n(2) 균형 인플레이션은?\n(3) 독립 중앙은행의 게임 이론적 근거는?","hints":["사전: 낮은 인플레이션 약속.\n사후: 약속 어기고 팽창 정책 유혹.\n민간: 정부가 어길 것 예상 → 높은 임금 요구.","균형 인플레이션: 정부의 한계 편익 = 한계 비용.\n사회 최적: 낮은 인플레이션.\n균형: 높은 인플레이션 (사회 손실)."],"answer":"사전약속=사후파기유혹=시간불일치 / 균형=높은인플레이션 / 독립중앙은행=약속신뢰성","explanation":"키드랜드-프레스콧 모형 (1977, 노벨 2004):\n민간 예상 π^e: 정부가 팽창 정책 쓸 것.\n정부 최적 π: π^e 주어질 때 실업 줄이려면 팽창.\n균형: π = π^e (예상이 실현).\n높은 균형 인플레이션 + 실업 변화 없음.\n사회 손실.\n해결:\n규칙 기반 정책: 재량 없애기.\n독립 중앙은행: 인플레이션만 신경 쓰는 기관.\n보수적 중앙은행가: 인플레이션 더 싫어하는 사람 임명.\n평판: 장기적으로 낮은 인플레이션 유지 → 신뢰 구축.\n현실: 테일러 준칙, 물가 목표제.","game_type":"reveal"},{"id":8,"question":"사회 선택 메커니즘:\n교육 배분 메커니즘 비교.\n\n3가지 방식:\n①추첨: 무작위 배정.\n②시험: 성적순 배정.\n③가격: 학비 지불 능력.\n\n각 방식을 효율성, 공평성, 전략적 견고성으로 평가하세요.","hints":["효율성: 자원이 가장 가치 있게 사용되는가.\n공평성: 배분이 공정한가.\n전략적 견고성: 조작 저항성.","시험: 효율적일 수 있으나 준비 투자 왜곡.\n가격: 효율적 (지불 능력 = 가치) but 불공평."],"answer":"추첨=공평·비효율·견고 / 시험=효율가능·준비왜곡 / 가격=효율·불공평·견고","explanation":"메커니즘 비교:\n추첨:\n효율성: 낮음 (능력 무관).\n공평성: 높음 (모두 동등 기회).\n전략성: 견고 (조작 불가).\n시험:\n효율성: 중간 (능력 반영, 준비 비용 낭비).\n공평성: 중간 (준비 기회 불평등).\n전략성: 취약 (시험 준비 왜곡, 부정행위).\n가격:\n효율성: 높음 (경제적 가치 반영).\n공평성: 낮음 (부유층 유리).\n전략성: 견고 (부 = 객관적 지표).\n혼합 메커니즘:\n자격 기준 (시험) + 추첨.\n장학금 (가격 + 공평).\n다차원 배분: 성적 + 소득 + 다양성.\n사회적 가치: 어느 기준을 중시하느냐가 메커니즘 선택.","game_type":"reveal"},{"id":9,"question":"전략과 기술 혁신:\n혁신 레이스(patent race):\n두 기업이 특허를 향해 경쟁.\n누가 먼저 혁신하면 독점 이익 V 획득.\n투자 rᵢ 시 혁신 확률: h(rᵢ).\n\n(1) 균형 투자는?\n(2) 사회 최적 투자와의 비교는?\n(3) 과잉 투자 또는 과소 투자?","hints":["기업 1의 이익: h(r₁)×V×(1-h(r₂)) - r₁.\n(혼자 혁신할 때만 V 획득.)","h(r) = r (선형 가정, 최대 1).\nFOC: V×(1-r₂) = 1 → r₁* = 1-1/V.\n대칭 균형: r* = 1-1/V."],"answer":"r*=1-1/V / 사회최적=다름 / 과잉투자가능(중복R&D)","explanation":"혁신 레이스 균형:\n기업 1 이익: r₁V(1-r₂) - r₁.\nFOC: V(1-r₂) - 1 = 0 → r₁ = 1-1/V? 아니면 이는 조건.\n재계산: ∂/∂r₁[r₁V(1-r₂)-r₁] = V(1-r₂)-1 = 0.\n→ r₂ = 1-1/V.\n대칭: r₁=r₂=r, V(1-r)-1=0 → r=1-1/V.\n사회 최적:\n총 이익: V(r₁+r₂-r₁r₂) - r₁ - r₂.\n두 기업 함께 최적: 한 기업이 혼자 V 획득이 더 효율.\n중복 투자 문제: 두 기업이 같은 혁신 추구 → 낭비.\n사회 최적: 한 기업만 투자 = r* (다른 기업은 0).\n균형 > 사회 최적: 과잉 투자 (winner-take-all 경쟁).","game_type":"reveal"},{"id":10,"question":"전략 게임의 미래:\n다음 영역에서 게임 이론의 응용을 탐구하세요.\n\n①AI 안전: AI 에이전트들의 전략적 상호작용.\n②블록체인: 스마트 계약의 게임 이론.\n③기후: 국제 기후 협약 메커니즘.\n④사이버 보안: 공격자-방어자 게임.\n\n각 영역의 핵심 게임 구조는?","hints":["AI 안전: 여러 AI 에이전트 → 다자 게임.\n블록체인: 채굴 인센티브 + 51% 공격.","기후: 공공재 게임 + 국제 강제력 없음.\n사이버: 공격자-방어자 = 제로합 게임."],"answer":"AI=다자협조·정렬 / 블록체인=채굴인센티브 / 기후=공공재 / 사이버=제로합","explanation":"미래 게임 이론 응용:\nAI 안전:\n여러 AI: 다자 게임 (협조 vs 경쟁).\n정렬 문제: AI 목적함수 = 인간 가치?\n다중 AI: 군비 경쟁 vs 협조.\n연구: 다중 에이전트 강화 학습.\n블록체인:\n채굴: 정직 vs 이기적 채굴 (selfish mining).\n51% 공격: 비용 vs 이익.\n스마트 계약: 코드 = 자동 실행 계약.\n기후:\n공공재 딜레마 + 반복 게임.\n파리 협약: 자발적 약속 + 투명성.\n기술 이전 + 탄소세 국경 조정.\n사이버 보안:\n공격자 vs 방어자: 비대칭 게임.\nAPT (지속적 위협): 장기 전략.\n제로 트러스트: 신뢰 없는 보안 설계.","game_type":"reveal"}]},{"type":"strategy","level":12,"title":"전략 퍼즐 12단계 — 전략의 본질과 한계","difficulty":"심화","thinking":"전략의 본질 · 미해결 문제 · 전략과 현실","problems":[{"id":1,"question":"균형 개념의 계층:\n게임 이론의 균형 정제 계층.\n\n```\n내쉬 균형 (NE)\n  ↓ 더 강한 요구\n부분게임 완전 균형 (SPE)\n  ↓\n완전 베이지안 균형 (PBE)\n  ↓\n순차 균형 (SE)\n  ↓\n전향 귀납 균형\n```\n\n(1) 각 균형 개념이 추가로 요구하는 것은?\n(2) 가장 정제된 균형이 항상 최선인가요?\n(3) 현실에서 어느 균형 개념이 적절한가요?","hints":["NE → SPE: 균형 외 경로에서도 최적.\nSPE → PBE: 믿음의 일관성 추가.","더 강한 정제 = 더 적은 균형.\n하지만 균형이 없어질 수도 있음."],"answer":"각단계=추가제약 / 정제≠최선(존재안할수도) / 현실=상황에따라다름","explanation":"균형 정제의 의미:\nNE: 단순 상호 최적 반응.\nSPE: 모든 부분게임에서 NE (비신뢰성 위협 제거).\nPBE: 믿음 + 순차 합리성.\nSE: PBE + 일관성 강화 (크렙스-윌슨).\n전향 귀납: 균형 외 경로 행동도 합리적.\n균형 정제의 문제:\n너무 강한 정제 → 균형 없음.\n현실과 괴리 (인간은 L2 수준).\n상황별 적절한 개념:\n단기 게임: NE.\n반복 관계: SPE + 포크 정리.\n신호 게임: PBE.\n헌신 문제: SE.\n실험 경제학: 행동 게임 이론.","game_type":"reveal"},{"id":2,"question":"전략적 사고의 인지적 한계:\n인간 두뇌의 전략 처리 용량.\n\n실험 결과:\n체스: 전문가는 L4~5 수준 계산.\n포커: 전문가는 L3~4 수준.\n경제 게임: 대부분 L1~2 수준.\n\n(1) 왜 전략적 사고에 한계가 있나요?\n(2) 이것이 게임 이론에 주는 함의는?\n(3) AI가 인간의 한계를 어떻게 극복하나요?","hints":["인지 부하: 작업 기억 = 7±2 청크.\n전략 탐색: 지수적 증가 vs 선형 처리.","게임 이론: 무한 귀납 가정.\n현실: 유한 수준의 귀납.\n→ 완전 합리성 가정 비현실적."],"answer":"인지한계=작업기억·처리속도 / 함의=유한수준균형 / AI=탐색+평가병렬화","explanation":"인지적 한계의 게임 이론:\n작업 기억: 7±2 항목 동시 처리.\n전략 트리: 깊이 d, 분기 b → b^d 경우.\n인간: d=3~5, 선택적 탐색.\nAI: 병렬 처리 + 신경망 평가.\n행동 게임 이론의 교훈:\n완전 합리성 → 유한 합리성.\n수준-k 모형: 현실적 묘사.\n인지 계층: 인구의 k 분포.\nAI의 극복:\n몬테카를로 트리 탐색: 확률적 탐색.\n신경망 평가: 패턴 기반 빠른 평가.\n자기 대결: 경험 없이 학습.\n미래: AI + 인간 = 인지 증강.","game_type":"reveal"},{"id":3,"question":"전략의 역설들:\n게임 이론의 유명한 역설들.\n\n①죄수의 딜레마: 개인 합리 → 집단 비합리.\n②투표 역설: 개인 합리 선호 → 집단 순환.\n③자기 실현 예언: 믿음이 현실 창조.\n④역선택 스파이럴: 정보 비대칭 → 시장 붕괴.\n\n(1) 이 역설들의 공통 구조는?\n(2) 제도가 역설을 어떻게 해결하나요?\n(3) 해결 불가능한 역설이 있나요?","hints":["공통 구조: 개인 최적 ≠ 집단 최적.\n= 외부성 (내가 남에게 영향, 비용 안 냄).","제도: 외부성을 내부화.\n세금, 보조금, 규제, 규범."],"answer":"공통=외부성·구성의오류 / 제도=내부화 / 해결불가=투표역설(애로정리)","explanation":"전략 역설의 공통 구조:\n외부성: 내 행동이 남에게 영향.\n구성의 오류: 개별 합리 → 집단 비합리.\n자기 참조: 예측이 현실에 영향.\n제도적 해결:\n죄수 딜레마: 법, 규범, 반복 게임.\n자기 실현: 조정 기관, 명확한 기대 설정.\n역선택: 의무 가입, 공시, 인증.\n해결 불가능한 역설:\n애로 불가능성: 어떤 투표도 모든 조건 동시 충족 불가.\n집단 선호의 근본적 한계.\n전략의 철학적 함의:\n집단이 개인보다 \"덜 합리적\"?\n제도 설계 = 개인 인센티브 재조정.\n게임 이론 = 사회 공학의 도구.","game_type":"reveal"},{"id":4,"question":"전략과 윤리:\n게임 이론적 최적이 윤리적으로 옳은가?\n\n사례들:\n①최후통첩 게임: 99:1 제안은 합리적이지만 불공정.\n②담합: 기업에 최적, 소비자에 해로움.\n③군비 경쟁: 상호 최적, 상호 해로움.\n④플랫폼 독점: 플랫폼 최적, 사회 후생 감소.\n\n(1) 게임 이론이 윤리를 포함할 수 있나요?\n(2) 공정성의 수학적 표현은?\n(3) 윤리적 게임 이론이란?","hints":["공정성 선호: 불공정에 응징 (최후통첩 거절).\n이타주의: 타인 이익도 효용에 포함.","페어 게임 이론: 불공정도 효용 함수에 포함.\n파인버그: 상호성 모형."],"answer":"공정성=효용함수확장 / 페어게임이론=윤리포함 / 메커니즘=윤리적인센티브설계","explanation":"윤리적 게임 이론:\n표준 게임 이론: 물질적 이기심.\n확장:\n불평등 혐오 (페어·슈미트):\nU = u - α×max(u-uⱼ, 0) - β×max(uⱼ-u, 0).\n상호성 (라빈): 좋은 의도 → 좋게 반응.\n이타주의: 타인 효용을 내 효용에 포함.\n윤리 메커니즘 설계:\n규칙 = 윤리적 행동이 개인 이익과 일치하도록.\n탄소세: 환경 파괴 = 비용.\n반독점법: 담합 = 처벌.\n사회적 규범: 공정성 = 사회적 승인.\n한계:\n모든 윤리를 수학화 불가.\n문화적 차이: 공정성 기준 다양.\n게임 이론 = 도구, 가치 판단 = 외부.","game_type":"reveal"},{"id":5,"question":"복잡계와 전략:\n주식 시장 = 전략적 복잡계.\n\n참여자들이 서로의 행동을 예측하며 거래.\n예측이 현실에 영향 → 예측 자체가 게임.\n\n효율적 시장 가설 vs 행동 경제학:\n(1) EMH의 게임 이론적 기반은?\n(2) 왜 예측이 어려운가요?\n(3) 알파(초과 수익)는 가능한가요?","hints":["EMH: 모든 공개 정보 = 이미 가격에 반영.\n새로운 정보만 가격 변화.\n→ 예측 불가 = 랜덤워크.","행동 경제학: 인지 편향 → 체계적 오류 → 예측 가능.\n하지만 예측 → 거래 → 가격 조정 → 예측 무효."],"answer":"EMH=공통지식균형 / 예측어려움=자기소멸예측 / 알파=일시적(정보우위)","explanation":"효율적 시장의 게임 이론:\nEMH = 공통 지식의 내쉬 균형.\n모두 알면 가격에 반영 → 초과 수익 없음.\n그로스만-스티글리츠 역설:\n정보 수집 비용 > 알파 → 아무도 수집 안 함.\n→ 정보 미반영 → 알파 가능.\n→ 정보 수집 → 반영 → 알파 소멸.\n균형: 일부만 정보 수집 (혼합 전략).\n자기 소멸 예측:\n예측 발표 → 모두 행동 → 예측 실현 or 소멸.\n\"이 주식 오를 것\" → 모두 삼 → 오름 (자기 실현).\n또는: 모두 삼 → 고평가 → 하락 (자기 소멸).\n알파:\n정보 우위: 빠른 처리, 내부 정보.\n인지 우위: 다른 사람의 오류 활용.\n지속 불가능: 경쟁으로 소멸.","game_type":"reveal"},{"id":6,"question":"전략과 진화:\n인간 협력의 진화적 기원.\n\n혈연 선택: 유전자 공유 → 이타적 행동.\n해밀턴 규칙: rb > c (r=친족계수, b=이익, c=비용).\n\n호혜적 이타주의: 반복 게임에서 협력 진화.\n트리버스(1971): 팃포탯 = 진화적 안정.\n\n(1) 해밀턴 규칙과 게임 이론의 연결은?\n(2) 비친족 협력의 진화 메커니즘은?\n(3) 인간 대규모 협력의 특수성은?","hints":["혈연 선택: 유전자 = \"자신의 복사본\" 도움.\nrb > c: 도움의 비용 < 유전자 전파 이익.","호혜적 이타주의: 반복 게임 + 기억.\n강한 호혜성: 처벌 비용을 감수하고 불공정자 처벌."],"answer":"해밀턴=유전자수준게임 / 호혜=반복게임 / 인간=제도·규범으로대규모협력","explanation":"협력의 진화 게임 이론:\n혈연 선택:\nr = 친족 계수 (형제=0.5, 사촌=0.125).\nrb > c: 이타 행동 유전자 전파.\n유전자 = \"플레이어\", 생물 = 도구.\n호혜적 이타주의:\n비친족 협력: 반복 게임 + 기억.\n팃포탯 = 진화적 안정 전략.\n조건: 상호 작용 충분히 반복.\n강한 호혜성:\n익명 집단에서도 처벌.\n처벌 비용 감수 = 초합리적.\n인간 규범: \"내가 손해봐도 불공정자 처벌.\"\n인간 대규모 협력:\n가족·부족 넘는 협력 = 인간 특수성.\n제도, 법, 종교, 규범.\n가상의 믿음: 국가, 화폐, 기업 = 협력 기반.\n하라리: 인간은 허구를 믿을 수 있어 대규모 협력.","game_type":"reveal"},{"id":7,"question":"전략적 복잡도의 한계:\n계산 복잡도와 게임 이론의 교차점.\n\nPPAD 완전성:\n내쉬 균형 찾기 = PPAD-완전.\n다항 시간 알고리즘 존재 미지.\n\n(1) PPAD란?\n(2) 내쉬 균형이 PPAD 완전이라는 의미는?\n(3) 근사 균형은 어떻게 구하나요?","hints":["PPAD: 방향 있는 그래프에서 경로 끝 찾기 문제류.\nP에 속하지 않을 가능성 높음.","ε-근사 균형: 모든 플레이어가 ε 이상 이익 없음.\nε > 0이면 더 쉽게 찾을 수 있음."],"answer":"PPAD=고정점탐색류 / 내쉬=PPAD완전=다항시간미지 / 근사=ε균형사용","explanation":"PPAD 완전성 (다상그프타-고드빌론, 2006):\nPPAD: 방향 그래프에서 소스에서 싱크 찾기.\n브라우어 고정점 탐색 = PPAD.\n내쉬 균형 찾기 = PPAD.\n의미:\nP ≠ NP처럼: PPAD ≠ P일 가능성.\n= 내쉬 균형 찾기 = 다항 시간 알고리즘 없을 수 있음.\n하지만 P에 속하지 않음을 증명도 안 됨.\n알고리즘적 게임 이론:\n실용적: ε-근사 균형 사용.\nε 작을수록 어려움.\n특수 게임: 2인 제로합 = LP 풀이 가능.\n응용:\n온라인 광고 경매: 근사 VCG.\n라우팅: 근사 내쉬 찾기.\n포커 AI: ε-Nash CFR 알고리즘.","game_type":"reveal"},{"id":8,"question":"전략과 사회 제도:\n제도 = 게임의 규칙.\n\n노스(1990): 제도 = \"사회의 게임 규칙.\"\n공식 규칙 + 비공식 규범.\n\n제도 변화의 게임 이론:\n기존 제도 = 규칙.\n변화 시도 = 새 게임.\n새 균형이 더 좋아도 전환 비용 존재.\n\n(1) 제도가 왜 경로 의존적인가요?\n(2) 제도 변화의 조건은?\n(3) 좋은 제도 설계의 원칙은?","hints":["QWERTY: 더 좋은 드보락 키보드가 있어도 전환 안 함.\n전환 비용 > 장기 이익.","제도 변화 조건:\n충격 + 이해관계 변화 + 새 연합 형성."],"answer":"경로의존=전환비용+조정실패 / 변화=충격+연합 / 좋은제도=자기강화+적응성","explanation":"제도의 경로 의존성:\nQWERTY 키보드: 초기 타자기 속도 문제.\n네트워크 효과: 모두 QWERTY → 전환 불이익.\n더 좋은 드보락 키보드도 도입 실패.\n제도 = 자기 강화(self-reinforcing) 균형.\n제도 변화 조건:\n외부 충격: 전쟁, 경제 위기, 기술 혁명.\n이해관계 변화: 새 플레이어 등장.\n선도자: 전환 비용 감수하는 기업/국가.\n임계 질량: 충분한 전환자 → 눈사태 효과.\n좋은 제도 설계:\n자기 강화: 지키는 것이 이익.\n적응성: 환경 변화에 유연.\n포용성: 다수의 이익.\n집행 가능: 위반 비용 확실.\n노스의 교훈: 부국 = 좋은 제도.","game_type":"reveal"},{"id":9,"question":"전략의 철학적 기초:\n합리성 가정의 철학적 문제.\n\n완전 합리성:\n①완전한 선호.\n②이행성.\n③베이즈 업데이트.\n④기대 효용 극대화.\n\n이 가정들의 철학적 문제는?","hints":["완전한 선호: 모든 결과 비교 가능?\n이행성: A>B, B>C, C>A인 경우?","기대 효용: 알레 역설 (확실한 것 선호).\n베이즈 업데이트: 어디서 시작 믿음?"],"answer":"선호완전성의문·이행성위반·알레역설·비합리베이즈","explanation":"합리성 가정의 문제:\n완전한 선호:\n비교 불가 결과 (삶 vs 자유).\n문화적 선호 다양성.\n이행성:\n순환 선호 실험에서 관찰.\n소리, 색, 다차원 대상.\n기대 효용 (알레 역설):\n확실한 100만 달러 > 불확실한 기댓값이 같은 복권.\n기대 효용 이론 위반.\n베이즈 업데이트:\n사전 믿음 어디서? (기저율 무시)\n확인 편향: 믿음에 맞는 정보만 업데이트.\n대안 이론:\n전망 이론 (카너만-트버스키): 손실 회피, 준거점.\n유한 합리성 (사이먼): 만족화 (satisficing).\n이중 처리 이론 (시스템 1/2).\n철학적 함의:\n\"합리성\"의 정의가 문화적·상황적.\n게임 이론 = 합리성의 수학, 인간 행동의 근사.","game_type":"reveal"},{"id":10,"question":"심화 구간 종합: 전략이란 무엇인가?\n\n다음 층위에서 통합 답변을 구성하세요.\n\n①수학적: 게임 이론, 균형, 최적화.\n②심리적: 인지 한계, 편향, 감정.\n③사회적: 제도, 규범, 문화.\n④진화적: 자연 선택, 적합도.\n⑤철학적: 합리성, 자유의지, 윤리.\n\n각 층위의 핵심과 한계, 미해결 문제는?","hints":["각 층위가 전략에 대해 다른 측면을 드러냅니다.\n통합적 이해가 핵심입니다.","전략의 한계: 계산 복잡도, 정보 부족, 인지 한계."],"answer":"다층적전략이해 / 각층위의공헌과한계 / 통합이론미완성","explanation":"전략의 다층적 이해:\n수학적:\n최적화, 균형, 메커니즘 설계.\n한계: 계산 복잡도, 균형 다수성.\n미해결: PPAD vs P, 균형 선택.\n심리적:\n인지 한계, 사회적 선호, 감정.\n한계: 개인 차이, 측정 어려움.\n미해결: 진정한 합리성 기준.\n사회적:\n제도, 규범, 문화 = 게임 규칙.\n한계: 제도 변화 예측 어려움.\n미해결: 좋은 제도의 보편 원칙.\n진화적:\n자연 선택 = 전략 필터.\n한계: 문화 진화 속도.\n미해결: 이타주의의 완전한 설명.\n철학적:\n자유의지: 전략 선택이 진정 자유로운가?\n윤리: 최적이 올바른가?\n미해결: 규범적 게임 이론.\n통합 전략 이론:\n수학 × 심리 × 사회 × 진화 × 철학.\n현재: 분리된 접근.\n미래: 통합적 전략 과학.","game_type":"reveal"}]},{"type":"strategy","level":13,"title":"전략 퍼즐 13단계 — 전략의 창의적 탐구","difficulty":"마스터","thinking":"창의적 전략 탐구 · 학제간 통합 · 전략적 혁신","problems":[{"id":1,"question":"전략과 생태학:\n포식자-피식자 전략 게임.\n로트카-볼테라 방정식:\ndx/dt = αx - βxy (피식자)\ndy/dt = δxy - γy (포식자)\n\n(1) 게임 이론으로 이 동학을 설명하세요.\n(2) 진화적 안정 전략과 생태 균형의 연결은?\n(3) 인간 경쟁에 대한 함의는?","hints":["피식자: 회피 vs 방어 전략.\n포식자: 공격 vs 에너지 보존 전략.\n균형: 공진화.","생태 균형 = 게임 이론 균형.\n포식자 과잉 → 피식자 감소 → 포식자 감소.\n= 부의 피드백 = 안정 균형."],"answer":"생태균형=ESS / 공진화=전략적상호적응 / 인간=시장경쟁유사","explanation":"생태-전략 연결:\n로트카-볼테라 = 전략적 상호 의존.\n피식자 전략: 빠른 번식(r 전략) vs 적은 번식+강한 방어(K 전략).\n포식자 전략: 추격 vs 매복 vs 협동 사냥.\n공진화 (coevolution):\n포식자와 피식자가 서로를 선택압으로.\n군비 경쟁: 치타 ↔ 가젤 속도 경쟁.\nESS와 생태 균형:\n생태 균형 = 어떤 돌연변이 전략도 침입 불가.\n= 진화적 안정 전략의 생태적 표현.\n인간 경쟁:\n기업 생태계: 포식자(대기업)-피식자(스타트업).\n시장 균형 = 전략적 공진화.\n군비 경쟁: 실리콘밸리 인재 경쟁.","game_type":"reveal"},{"id":2,"question":"전략과 언어:\n협상에서 언어의 전략적 역할.\n\n언어 행위 이론 (오스틴, 설):\n①발화 행위: 말하기.\n②발화 수반 행위: 약속, 위협, 요청.\n③발화 효과 행위: 실제 효과.\n\n게임 이론에서:\n위협: 믿을 수 있는가?\n약속: 자기 구속적인가?\n싸구려 토크: 정보를 전달하는가?\n\n(1) 위협의 신뢰성 조건은?\n(2) 언어가 전략을 어떻게 변환하는가?\n(3) 협상에서 프레이밍의 효과는?","hints":["믿을 수 있는 위협: 실행이 자신에게도 이익.\n믿을 수 없는 위협: 실행 시 자신도 손해.","프레이밍: \"90% 생존\" vs \"10% 사망\" = 같은 정보, 다른 반응.\n= 동일한 게임, 다른 선택."],"answer":"위협신뢰=실행이익 / 언어=게임틀재구성 / 프레이밍=인지편향활용","explanation":"언어와 전략:\n믿을 수 있는 위협:\n\"협상 결렬 시 소송.\" → 소송 비용 감수 의지?\n헌신 장치: \"이미 변호사 고용\" → 위협 신뢰.\n언어의 전략적 기능:\n약속: 자신을 구속 (헌신 장치).\n위협: 상대 행동 변화.\n신호: 정보 전달.\n프레이밍: 게임 틀 재구성.\n프레이밍 효과 (트버스키-카너만):\n손실 프레임: \"200명 죽는다\" → 위험 회피.\n이익 프레임: \"400명 살린다\" → 위험 추구.\n같은 결과, 다른 선택.\n전략적 응용:\n협상: \"이 조건이 당신에게 최선\" vs \"저 조건이 우리에게 최소.\"\n광고: 손실 강조 vs 이득 강조.\n정치: 프레임 전쟁.","game_type":"reveal"},{"id":3,"question":"전략과 건축:\n도시 설계의 전략 게임.\n\n게임 이론적 도시 문제:\n①주차 외부성: 모두 차를 가져오면 주차 불가.\n②젠트리피케이션: 개발 → 원주민 퇴출.\n③공유 공간: 공원 = 공공재.\n④NIMBY: 모두 필요하지만 내 뒷마당에는 반대.\n\n각 문제의 전략 구조와 해결책은?","hints":["주차: 죄수의 딜레마 (모두 가져오면 모두 손해).\n젠트리피케이션: 연쇄 반응 게임.","NIMBY: 공공재 게임 + 지역 이기주의.\n해결: 보상 + 분산 배치."],"answer":"각문제=다른게임구조 / 공통=외부성 / 해결=제도·보상·설계","explanation":"도시 전략 게임:\n주차 외부성:\n모두 차 → 주차 불가 → 모두 손해.\n해결: 주차 요금 (피구세), 대중교통.\n젠트리피케이션:\n초기 예술가 → 카페 → 부동산 상승 → 원주민 퇴출.\n선점 효과 + 연쇄 반응.\n해결: 임대료 규제, 지역 개발 이익 공유.\n공원 (공공재):\n무임승차: 관리 안 하고 이용.\n해결: 지역세, 공동 관리.\nNIMBY:\n쓰레기 처리장, 정신병원 등 = 사회 필수.\n해결: 보상 + 투명한 입지 선정.\n보상: \"당신 지역에 오는 대신 세금 할인.\"\n도시 설계의 교훈:\n공간 배치 = 인센티브 구조.\n좋은 도시 설계 = 좋은 메커니즘 설계.","game_type":"reveal"},{"id":4,"question":"전략과 의학:\n의료 의사결정의 게임 이론.\n\n시나리오들:\n①항생제 내성: 각자 최대 사용 → 내성 증가.\n②임상 시험: 참여 vs 무임승차.\n③장기 기증: 공공재 딜레마.\n④의료 보험: 역선택 + 도덕적 해이.\n\n가장 복잡한 문제를 선택해 분석하세요.","hints":["항생제 내성: 공유지의 비극.\n각자 사용 최적화 → 사회 전체 내성 증가.","해결: 사용 규제, 새 항생제 개발 인센티브, 진단 개선."],"answer":"항생제=공유지비극 / 규제+인센티브해결 / 글로벌조율필요","explanation":"항생제 내성 게임:\n개인 최적: 효과 있는 항생제 사용.\n집단 결과: 내성 증가 → 효과 감소.\n죄수의 딜레마 / 공유지의 비극.\n글로벌 공공재 문제:\n한 국가의 규제 = 다른 국가 이익.\n무임승차 유인.\n해결 메커니즘:\n사용 규제: 처방 기준 강화.\n새 항생제 인센티브: 수익 보장 계약.\n신속 진단: 불필요한 처방 감소.\n교육: 환자 인식 개선.\n국제 조율: WHO 프레임워크.\n게임 이론 교훈:\n의료 = 전략적 상호 의존.\n메커니즘 설계 = 의료 정책.\n글로벌 조율 없이는 해결 불가.","game_type":"reveal"},{"id":5,"question":"전략과 스포츠:\n게임 이론으로 스포츠 분석.\n\n페널티킥:\n키커: 왼쪽(L) 또는 오른쪽(R).\n골키퍼: L 또는 R.\n성공 확률:\n\n```\n           GK:L    GK:R\nKicker:L   0.6     0.9\nKicker:R   0.9     0.6\n```\n\n(1) 혼합 전략 균형은?\n(2) 실제 데이터와 비교하면?\n(3) 다른 스포츠에서의 응용은?","hints":["키커 무차별 조건 (q: GK가 L 확률):\n0.6q+0.9(1-q) = 0.9q+0.6(1-q).\n0.9-0.3q = 0.6+0.3q.","0.3 = 0.6q → q = 0.5.\n대칭이므로 키커도 p=0.5."],"answer":"균형=각0.5 / 실데이터≈균형지지 / 테니스서브·농구등응용","explanation":"페널티킥 혼합 균형:\nq: GK가 L 선택 확률.\n키커 무차별: 0.6q+0.9(1-q) = 0.9q+0.6(1-q).\n0.9-0.3q = 0.6+0.3q → q=0.5.\n키커도 p=0.5 (대칭 보수 행렬).\n실제 데이터 (팔라시오-우에르타, 2003):\n프로 페널티킥: 혼합 전략 균형 근처.\n실증 지지: 전문가는 균형에 가까움.\n다른 스포츠:\n테니스 서브: 넓은 서브 vs 몸 서브.\n농구 수비: 맨투맨 vs 지역.\n야구 투구: 패스트볼 vs 변화구.\n모두 혼합 전략 균형.\n패턴 예측: 운동 선수들이 무의식적으로 균형 학습.","game_type":"reveal"},{"id":6,"question":"전략과 외교:\n국제 관계의 게임 이론.\n\n쿠바 미사일 위기 (1962):\n미국 vs 소련.\n미국: 봉쇄(B) 또는 공습(A).\n소련: 철수(W) 또는 유지(M).\n\n```\n           소련:W     소련:M\n미국:B    (3, 3)    (2, 1)\n미국:A    (4, 1)    (1, 4)\n```\n\n(1) 내쉬 균형은?\n(2) 실제 결과와의 연결은?\n(3) 핵 억지의 게임 이론은?","hints":["(B,W): 미=3,소=3.\n미 이탈: A→소련 W면 4 > 3. 이탈 ✓.\n(B,W) 균형 아님.","(A,M): 미=1,소=4.\n미 이탈: B→소련 M면 2 > 1. 이탈 ✓.\n균형 아님.\n혼합 전략 균형 탐색."],"answer":"순수균형없음 / 혼합균형존재 / 실제=협상으로(B,W)달성","explanation":"쿠바 미사일 위기 분석:\n순수 전략 균형 없음 (치킨 게임 구조).\n혼합 균형:\np: 미국이 B 선택 확률.\n소련 무차별: 3p+1(1-p) = p+4(1-p).\n2p+1 = 4-3p → 5p=3 → p=3/5.\nq: 소련이 W 선택 확률.\n미국 무차별: 3q+2(1-q) = 4q+1(1-q).\nq+2 = 3q+1 → q=0.5.\n실제 결과:\n소련이 철수 (미국의 봉쇄에 응).\n케네디-흐루쇼프 협상.\n미국: 쿠바 불침공 약속 (비밀 터키 미사일 철수).\n= 게임을 협조적으로 재구성.\n핵 억지 (MAD):\n상호 확증 파괴: 공격 → 보복 → 양측 전멸.\n공격 보수 = 매우 낮음 → 균형이 비공격.","game_type":"reveal"},{"id":7,"question":"전략과 법률:\n법경제학의 전략 게임.\n\n소송 게임:\n원고: 소송 또는 합의.\n피고: 합의 또는 항전.\n각자의 소송 비용, 이길 확률.\n\n(1) 소송이 발생하는 조건은?\n(2) 합의 범위는?\n(3) 배상 규칙이 전략에 미치는 영향은?","hints":["합의 조건: 원고 최저 수락 < 피고 최대 제시.\n원고 최저: P×J - C_P (P=승소확률, J=판결액, C=비용).","피고 최대: P×J + C_D (소송 비용 절감).\n합의 범위: P×J-C_P < 합의액 < P×J+C_D.\n범위 = C_P+C_D > 0."],"answer":"합의범위=소송비용크기 / 소송=낙관편향시발생 / 영국식=소송억제","explanation":"소송 게임 분석:\n합의 범위: [P×J-C_P, P×J+C_D].\n범위 크기 = C_P+C_D (총 소송 비용).\n소송 발생 조건:\n합의 범위 없음 = 소송.\n원고 낙관편향: P_원고 > P_피고.\n→ 원고 최저 > 피고 최대 → 합의 불가.\n소송 발생.\n배상 규칙:\n미국식: 각자 비용 부담.\n→ 합의 범위 = C_P+C_D (크다).\n→ 소송 적음.\n영국식: 패소자 비용 부담.\n→ 소송 억제 (비용 위험 큼).\n→ 대신 소액 소송 억제.\n응용:\n지식재산 소송 전략.\n소송 자금 조달 (litigation finance).\n집단 소송의 메커니즘.","game_type":"reveal"},{"id":8,"question":"전략과 교육:\n교육 제도의 게임 이론.\n\n입시 경쟁 게임:\nn명 학생이 제한된 자리를 두고 경쟁.\n각자 공부 시간 tᵢ 선택.\n합격 확률: tᵢ/Σtⱼ.\n공부 비용: tᵢ.\n\n(1) 내쉬 균형은?\n(2) 사회 손실은?\n(3) 더 나은 제도는?","hints":["n=2: π₁ = t₁/(t₁+t₂) × V - t₁.\nFOC: t₂V/(t₁+t₂)² = 1.\n대칭: t* = V/4 (n=2).","총 공부 시간: 2×V/4 = V/2.\n가치: V (한 명 합격).\n사회 손실: V/2 (공부 비용)."],"answer":"균형=t*=V/4·사회손실=V/2 / n증가=과잉공부 / 해결=추첨·다양한경로","explanation":"입시 경쟁의 게임 이론:\nn명 대칭 균형: t* = V(n-1)/n².\nn→∞: t* → 0, 하지만 총 공부 = n×t* = V(n-1)/n → V.\n총 비용 V, 가치 V → 순이익 0.\n렌트 소멸(rent dissipation): 경쟁이 가치를 소멸.\n현실:\n한국 수능: 극심한 경쟁 → 과잉 교육.\n사교육비: 사회 손실.\n해결책:\n추첨: 공부 인센티브 감소.\n다양한 입학 경로: 경쟁 분산.\n졸업 기준 강화: 입학보다 졸업 어렵게.\n교육 가치 자체 증진: 경쟁이 아닌 학습.","game_type":"reveal"},{"id":9,"question":"전략과 환경:\n탄소 시장의 게임 이론.\n\n배출권 거래제(ETS):\n각 기업 감축 비용 다름.\n배출권 거래 → 효율적 감축.\n\n게임 이론 문제:\n①기업의 로비 전략.\n②할당량 협상.\n③국제 탄소 시장.\n\n(1) ETS의 효율성 원리는?\n(2) 기업의 전략적 행동은?\n(3) 국제 탄소 시장의 딜레마는?","hints":["ETS 효율성: 한계 감축 비용이 낮은 기업이 더 감축.\n배출권 가격 = 모든 기업의 한계 비용 균등화.","기업 전략: 초기 할당량 최대화 로비.\n국제: 탄소 누출 (규제 없는 국가로 이전)."],"answer":"ETS=한계비용균등=효율 / 기업=로비·전략적보고 / 국제=탄소누출·무임승차","explanation":"ETS 게임 이론:\n효율성:\n기업 A: 감축 비용 10원/톤.\n기업 B: 감축 비용 30원/톤.\n배출권 가격 20원: A가 팔고 B가 삼.\n→ 총 비용 최소화.\n기업 전략:\n할당량 로비: 초기 할당 많을수록 이익.\n전략적 보고: 감축 비용 과대 신고.\n미래 규제 예상: 현재 과잉 배출.\n국제 탄소 누출:\n강한 규제 국가 기업 → 약한 규제 국가 이전.\n탄소 국경 조정 메커니즘 (CBAM): EU의 해결책.\n무임승차: 일부 국가 불참.\n파리 협약 한계: 강제력 없음.","game_type":"reveal"},{"id":10,"question":"마스터 구간 시작:\n자신만의 전략 퍼즐을 설계하세요.\n\n조건:\n①실생활과 깊이 연결됨.\n②게임 이론 개념이 핵심.\n③반직관적이지만 명확한 답.\n④여러 전략 개념이 통합됨.\n⑤사회적 함의가 있음.","hints":["좋은 전략 퍼즐: 단순한 상황에서 복잡한 전략 구조.\n반직관: 개인 최적 ≠ 집단 최적.","실생활: 교통, 의료, 교육, 환경, 경제."],"answer":"개인 창작 (다양한 답 가능)","explanation":"예시 퍼즐: \"음식 배달 플랫폼 게임\"\n\n상황:\n배달 플랫폼이 음식점, 배달원, 소비자를 연결.\n세 주체 모두 플랫폼에 의존.\n\n게임 구조:\n음식점: 가입 vs 미가입.\n배달원: 가입 vs 다른 직업.\n소비자: 사용 vs 직접 주문.\n\n외부성:\n음식점 많음 → 소비자 가치↑ → 배달원 수입↑.\n배달원 많음 → 배달 빠름 → 소비자 사용↑.\n네트워크 효과: 모두 연결.\n\n전략 분석:\n초기: 닭-달걀 딜레마 (아무도 시작 안 함).\n해결: 플랫폼 보조금으로 한쪽 먼저 유치.\n성숙기: 독점화 → 수수료 인상 → 모두 피해.\n= 공유지의 비극 (플랫폼이 공유지).\n\n사회적 함의:\n플랫폼 규제의 필요성.\n수수료 상한, 데이터 공유, 공개 표준.\n협동조합 모델: 참여자가 플랫폼 소유.","game_type":"reveal"}]},{"type":"strategy","level":14,"title":"전략 퍼즐 14단계 — 전략의 경계에서","difficulty":"마스터","thinking":"전략의 경계 · 미해결 문제 · 창조적 전략 설계","problems":[{"id":1,"question":"전략과 양자 게임 이론:\n양자 역학을 게임에 적용.\n\n아이젠트-윌켄스-르완쯔키 (EWL) 프로토콜:\n양자 죄수의 딜레마에서\n얽힘(entanglement)으로 협력 달성.\n\n(1) 양자 전략이란?\n(2) 얽힘이 어떻게 딜레마를 해결하나요?\n(3) 현실 응용 가능성은?","hints":["고전: 협력(C) 또는 배신(D) 두 선택.\n양자: 중첩 상태 |C⟩+|D⟩, 얽힘 가능.","얽힘: 두 플레이어의 전략이 상관.\n특정 양자 전략 Q: 양쪽 모두 Q를 선택하면\n고전 DD보다 좋은 결과 달성."],"answer":"양자전략=중첩+얽힘 / 협력달성=얽힘으로상관 / 응용=양자암호·양자경매","explanation":"양자 게임 이론:\n고전 죄수의 딜레마: DD = (1,1) 균형.\n양자 버전:\n플레이어가 SU(2) 연산자로 행동.\n얽힘 매개변수 γ.\nγ = π/2 (최대 얽힘):\nQ 전략: e^(iπ/4)|C⟩→|D⟩ 변환.\n(Q,Q) = (3,3) 달성 (협력 보수).\n(Q,Q) > (D,D) = 균형.\n중요: Q전략이 D전략을 지배!\n얽힘이 딜레마 해결.\n현실 응용:\n양자 경매: 양자 비트로 입찰 → 더 효율적.\n양자 암호: 게임이론+양자역학.\n양자 통신 프로토콜.\n현재 한계: 실제 양자 컴퓨터 아직 제한적.","game_type":"reveal"},{"id":2,"question":"전략과 신경과학:\n뇌 속의 게임 이론.\n\n신경경제학(neuroeconomics):\nfMRI로 의사결정 과정 관찰.\n\n발견:\n전두엽: 이성적 계산.\n변연계: 감정적 반응.\n거울 뉴런: 타인 의도 예측.\n\n(1) 뇌가 게임을 어떻게 처리하나요?\n(2) 공정성 신경 기반은?\n(3) 전략적 사고의 신경 상관물은?","hints":["최후통첩 게임: 불공정 제안 → 전전두엽-편도체 갈등.\n이성(수락) vs 감정(거절).","옥시토신: 신뢰 증가 → 협력 증가.\n테스토스테론: 경쟁 증가 → 협력 감소."],"answer":"이성vs감정=전략갈등 / 공정성=편도체반응 / 거울뉴런=상대의도예측","explanation":"신경경제학 발견:\n최후통첩 게임:\n불공정 제안: 전전두엽(수락 계산) + 편도체(거절 감정).\n감정이 강하면 비합리적 거절.\n옥시토신 실험:\n옥시토신 흡입 → 신뢰 증가 → 더 많이 보냄.\n→ 신뢰 게임에서 협력 증가.\n호르몬이 전략을 변경.\n거울 뉴런:\n타인의 행동 관찰 → 동일 뉴런 활성.\n\"타인의 의도 시뮬레이션.\"\n마음 이론 (Theory of Mind).\n전략적 사고의 기반.\n도파민과 보상:\n예상치 못한 보상 → 도파민 증가.\n= 강화 학습의 신경 기반.\n게임 이론 예측 = 뇌의 학습 알고리즘?","game_type":"reveal"},{"id":3,"question":"전략과 역사:\n역사적 전략 결정의 게임 이론 재해석.\n\n마르코니의 무선 특허 vs 테슬라:\n두 발명가가 무선 기술을 두고 경쟁.\n특허 게임: 출원 타이밍, 범위, 방어.\n\n(1) 특허 레이스의 게임 구조는?\n(2) 테슬라의 전략적 실수는?\n(3) 지식재산 전략의 일반 원칙은?","hints":["특허: 선착순 + 범위 경쟁.\n마르코니: 빠른 출원 + 광범위 청구.\n테슬라: 늦은 출원 + 특정 기술.","특허 전쟁: 누가 선점했는가?\n마르코니: 1896년 특허 → 1901년 대서양 횡단.\n테슬라: 1897년 특허 → 1943년 재인정."],"answer":"마르코니=빠른선점·광범위 / 테슬라=늦은출원·좁은범위 / 특허전략=선점+넓은청구","explanation":"특허 레이스 게임:\n선점 이익: 먼저 출원 = 보호 시작.\n범위 경쟁: 넓은 특허 = 더 강한 보호.\n마르코니 전략:\n빠른 출원 (1896).\n광범위 특허 청구.\n비즈니스 실용화 병행.\n테슬라의 전략적 실수:\n완벽한 기술 추구 → 특허 지연.\n자금 부족 → 상업화 실패.\n마르코니에게 선점 내줌.\n지식재산 전략 원칙:\n조기 출원: 완벽보다 빠름.\n넓은 청구: 구체적 + 포괄적.\n포트폴리오: 여러 특허로 망 구성.\n방어 특허: 상대 특허 무력화.\n현대 특허 전쟁: 삼성 vs 애플 (10년+).","game_type":"reveal"},{"id":4,"question":"전략과 복잡계 과학:\n적응형 에이전트의 전략.\n\n산타페이 인공 주식 시장:\n단순한 거래 규칙의 에이전트들.\n복잡한 시장 동학 창발.\n\n(1) 적응형 기대와 합리적 기대의 차이는?\n(2) 시장이 복잡계인 이유는?\n(3) 전략의 진화와 시장 효율성은?","hints":["합리적 기대: 모든 에이전트가 모델을 알고 올바른 기대.\n적응형 기대: 과거 데이터로 학습하며 업데이트.","복잡계: 단순 규칙 → 복잡한 패턴 창발.\n각 에이전트의 전략이 서로 영향."],"answer":"합리=공통지식·적응=학습 / 복잡계=상호작용창발 / 진화=효율성근사","explanation":"적응형 에이전트와 시장:\n합리적 기대:\n모두 동일한 모델 사용.\n균형 = 공통 지식의 내쉬 균형.\n현실과 괴리: 인간은 제한된 정보·처리.\n적응형 에이전트:\n각자 다른 간단한 규칙.\n학습: 성공한 규칙 강화, 실패 약화.\n시장 복잡계:\n단순 에이전트 → 버블, 폭락, 기술적 패턴 창발.\n실제 시장과 유사한 통계적 특성.\n전략 진화:\n많은 에이전트가 같은 전략 → 수익 감소.\n→ 다른 전략으로 이동.\n→ 전략 다양성 균형.\n= 생태계 진화와 유사.\n함의: 시장 = 공진화하는 전략 생태계.","game_type":"reveal"},{"id":5,"question":"전략과 인공지능 안전:\nAI 에이전트의 전략적 상호작용.\n\n다중 AI 에이전트 게임:\n여러 AI가 자원을 두고 경쟁.\n각 AI: 목적 함수 최대화.\n인간: AI들의 행동이 자신에게 이익이길 원함.\n\n(1) AI 간 경쟁이 인간에게 미치는 영향은?\n(2) AI 정렬 문제의 게임 이론적 구조는?\n(3) 안전한 다중 AI 메커니즘은?","hints":["AI 경쟁: 자원 독점 → 인간 배제 가능.\nAI 협조: 결탁 → 인간 이익 무시 가능.\n양쪽 모두 위험.","AI 정렬: AI 목적함수 = 인간 가치.\n하지만 여러 AI의 정렬 = 다자 정렬 문제."],"answer":"AI경쟁=자원독점위험 / 정렬=단일AI도어렵고다중은더복잡 / 안전=감독+투명성","explanation":"다중 AI 전략 문제:\nAI 간 경쟁:\n자원 경쟁 → 인간 배제 가능성.\n속도 경쟁 → 안전 무시.\nAI 간 협조:\n결탁 → 인간 감독 우회.\n공통 목적 추구 → 인간 이익 충돌.\nAI 정렬의 게임 이론:\n단일 AI: 목적함수 설계 어려움.\n다중 AI: 각 AI의 목적 + 상호작용.\n= 게임 이론적 복잡성.\n포레스트 정리: 충분히 강한 AI들이 게임을 함.\n= 인간이 이해 못하는 균형 가능.\n안전 메커니즘:\n감독 AI: 다른 AI들의 행동 모니터링.\n투명성: AI 의사결정 설명 가능.\n느린 AI: 인간 개입 시간 확보.\n다양성: 단일 AI 독점 방지.\n거버넌스: 국제 AI 안전 협약.","game_type":"reveal"},{"id":6,"question":"전략과 조직 설계:\n기업 구조의 게임 이론.\n\n계층 구조 vs 분산 구조:\n계층: 명확한 권한, 느린 적응.\n분산: 빠른 적응, 조정 문제.\n\n홀라크라시 (Holacracy):\n자기 조직화 팀.\n권한 분산.\n\n(1) 계층과 분산의 전략적 트레이드오프는?\n(2) 최적 조직 구조를 결정하는 요인은?\n(3) 미래 조직의 게임 이론 예측은?","hints":["계층: 명확한 인센티브, 조정 비용 낮음.\n분산: 지역 정보 활용, 혁신 빠름.","환경 불확실성↑ → 분산 유리.\n규모↑ → 계층 필요.\n기술↑ → 분산 가능."],"answer":"계층=조정효율·분산=적응빠름 / 최적=환경+규모+기술 / 미래=하이브리드","explanation":"조직 구조의 게임 이론:\n계층 구조:\n주인-대리인 문제: 각 단계마다.\n정보 왜곡: 위로 올라갈수록 필터.\n장점: 조정 비용 낮음, 책임 명확.\n분산 구조:\n홀라크라시: 역할 기반, 서클 단위.\n자율 팀: 지역 정보 빠른 활용.\n조정 문제: 공통 목표 정렬 어려움.\n최적 구조 결정 요인:\n환경 안정성: 안정 → 계층, 변화 → 분산.\n업무 복잡성: 복잡 → 전문화 = 계층.\n기술: IT 발전 → 분산 조정 비용 감소.\n혁신 필요성: 혁신 → 분산.\n미래 예측:\nAI 의사결정: 계층 일부 대체.\nDAO (분산 자율 조직): 블록체인 기반.\n하이브리드: 전략 = 계층, 실행 = 분산.","game_type":"reveal"},{"id":7,"question":"전략과 민주주의:\n투표 시스템의 게임 이론.\n\n다양한 투표 방식:\n①단순 다수제.\n②결선 투표.\n③순위 선택 투표 (IRV).\n④점수 투표.\n⑤승인 투표.\n\n각 방식의 전략적 취약점과 강점은?","hints":["단순 다수제: 전략적 투표, 스포일러 효과.\nIRV: 단조성 실패 (더 많이 받을수록 불리해질 수 있음).","기비바드-사터스웨이트: 어떤 투표 방식도 전략적 조작에 완전히 강건할 수 없음."],"answer":"모든방식=취약점존재(기비바드-사터스웨이트) / 승인투표=단순하고강건 / 이상적방식=없음","explanation":"투표 시스템 전략 분석:\n단순 다수제:\n전략적 투표: 선호 후보 대신 이길 것 같은 후보 투표.\n스포일러: 제3 후보 진입 → 덜 선호하는 후보 당선.\nIRV (순위 선택):\n초기 라운드 탈락 후 이전.\n단조성 실패: A에게 더 투표 → A 탈락 가능.\n점수 투표:\n각 후보에 0-10점.\n전략: 선호 후보 10점, 경쟁자 0점.\n승인 투표:\n좋다고 생각하는 후보 모두 선택.\n단순하고 전략적 조작 어려움.\n기비바드-사터스웨이트 정리:\n3명 이상 후보, 독재 아닌 투표 방식 → 전략적 조작 가능.\n완벽한 투표 = 불가능.\n현실 함의:\n완벽한 민주주의 메커니즘 없음.\n맥락에 따른 선택.\n승인 투표가 실용적으로 가장 강건.","game_type":"reveal"},{"id":8,"question":"전략과 종교:\n종교의 게임 이론적 분석.\n\n엘스터(Iannaccone) 모형:\n종교 = 클럽재.\n엄격성 = 무임승차 방지.\n비용 신호 = 헌신의 증거.\n\n(1) 종교가 협력을 어떻게 증진하나요?\n(2) 엄격한 종교가 더 성공하는 이유는?\n(3) 종교 경쟁 시장 모형은?","hints":["종교 클럽: 참여 비용 높음 → 진정한 헌신자만 가입.\n→ 무임승차 배제 → 높은 협력 수준.","종교 시장: 미국 = 다종교 경쟁 → 높은 종교성.\n국가 종교 독점 → 낮은 참여."],"answer":"종교=클럽재·엄격성=선별 / 엄격종교=헌신선별=강한협력 / 종교시장=경쟁=다양성","explanation":"종교의 게임 이론:\n공공재 문제:\n종교 공동체 = 협력 집단.\n무임승차: 참여 없이 이익만.\n해결: 의례, 음식 규율, 복장 규범 = 비용.\n비용 = 무임승차 불가 신호.\n클럽재 모형:\n참여 비용 높음 → 진정한 헌신자만.\n헌신자 집단 = 높은 협력, 강한 사회 자본.\n엄격한 종교 성공:\n몰몬교, 하레디 유대교: 높은 요구 = 강한 헌신.\n일반 교회: 낮은 요구 = 약한 헌신.\n종교 시장 (스타크):\n미국: 다종교 경쟁 → 혁신, 고품질.\n유럽: 국가 교회 독점 → 세속화.\n한국: 다종교 경쟁 → 높은 종교성.","game_type":"reveal"},{"id":9,"question":"전략적 혁신 생태계:\n실리콘밸리의 게임 이론.\n\n혁신 클러스터의 전략적 동학:\n①인재 경쟁: 기업 간 인재 쟁탈.\n②지식 확산: 이직 → 아이디어 확산.\n③벤처 캐피털: 정보 비대칭 + 신호.\n④출구 전략: IPO vs 인수.\n\n각 전략 게임을 분석하세요.","hints":["인재 경쟁: 경매 게임 (가장 높은 임금 제시).\n지식 확산: 이직 = 외부성 (이전 기업 손해, 생태계 이익).","VC 신호: 좋은 VC 투자 = 품질 신호.\n출구: IPO = 정보 공개, 인수 = 정보 비대칭 활용."],"answer":"인재=경매·지식=이직외부성 / VC=신호게임 / 출구=정보전략","explanation":"실리콘밸리 게임:\n인재 경쟁:\n경매: 최고 임금 제시 기업이 인재 획득.\n결과: 임금 상승 → 모두 비용 증가.\n죄수의 딜레마: 담합이면 모두 이익이지만 경쟁.\n지식 확산:\n이직: 이전 기업 지식 손실, 생태계 이익.\n비경쟁 협약: 지식 확산 방지.\n캘리포니아: 비경쟁 협약 무효 → 지식 확산 → 혁신.\nVC 신호:\n정보 비대칭: VC가 스타트업 가치 알기 어려움.\n좋은 VC 투자: 품질 신호 (심사 통과).\n신뢰할 수 있는 신호: VC 평판이 걸려 있음.\n출구 전략:\nIPO: 정보 공개 → 시장 평가.\n인수: 비공개 협상 → 정보 비대칭 활용.\nSPAC: 역합병 → 규제 우회.","game_type":"reveal"},{"id":10,"question":"전략의 통일 이론을 향해:\n\n다음 전략 원리들을 통합하는 메타 이론을 설계하세요.\n\n①최적 반응: 상대 전략에 최선.\n②균형: 상호 최적 반응.\n③진화: 시간에 따른 전략 선택.\n④메커니즘: 인센티브 설계.\n⑤적응: 환경 변화에 대응.\n\n이 다섯 원리를 하나의 틀로 통합할 수 있나요?","hints":["공통 구조: 모든 원리가 \"최적화 + 상호 의존\"을 포함.\n차이: 시간 범위 (단기→장기), 합리성 수준.","통합 후보: 진화 게임 이론.\n= 최적 반응 + 균형 + 진화 + 적응 + 메커니즘(자연 선택)."],"answer":"진화게임이론이통합후보 / 단점=메커니즘설계미포함 / 완전통합=미완성","explanation":"전략 통일 이론 시도:\n진화 게임 이론:\n최적 반응: 단기 최적.\n균형: ESS.\n진화: 적합도 선택.\n적응: 돌연변이 + 선택.\n메커니즘: 자연이 설계한 인센티브.\n포괄적이지만 한계:\n인간 합리성 수준 포함 어려움.\n의식적 메커니즘 설계 미포함.\n문화 진화 속도 포함 어려움.\n대안 통합:\n강화 학습 게임 이론:\n최적 반응 + 균형 + 학습 + 적응.\n메커니즘 = 보상 함수.\n완전 통합의 장벽:\n합리성 수준의 다양성.\n시간 범위의 다양성.\n정보 조건의 다양성.\n현재: 각 영역이 최선.\n미래: 계산 + 인지 + 진화 + 사회의 통합.","game_type":"reveal"}]},{"type":"strategy","level":15,"title":"전략 퍼즐 15단계 — 독창적 전략 창조","difficulty":"마스터","thinking":"독창적 창조 · 전략적 혁신 · 출제자적 관점","problems":[{"id":1,"question":"전략의 통일 이론을 완성하세요.\n\n1~15단계를 걸어오며 탐구한 전략의 모든 층위:\n게임 이론·메커니즘 설계·행동 경제학·진화·복잡계.\n\n(1) 각 층위를 연결하는 공통 원리를 찾으세요.\n(2) \"전략성(strategicity)\"의 핵심 불변량은?\n(3) 당신만의 전략 통일 이론을 설계하세요.","hints":["모든 전략 이론의 공통점:\n상호 의존, 최적화, 적응, 정보.","가장 깊은 전략 원리: 인센티브 정렬.\n모든 전략 문제 = 인센티브 불일치 문제."],"answer":"개인 창작 (다양한 이론 가능)","explanation":"전략 통일의 공통 원리:\n\n상호 의존(interdependence):\n내 최적 = 상대 행동에 의존.\n모든 전략 이론의 출발점.\n\n인센티브(incentive):\n왜 특정 행동을 하는가?\n메커니즘 설계 = 인센티브 공학.\n\n정보(information):\n완전/불완전, 대칭/비대칭.\n정보가 전략을 결정.\n\n시간(time):\n단기 vs 장기, 반복, 적응.\n시간이 협력 가능성 결정.\n\n\"전략 = 상호 의존 하에서의 인센티브 기반 의사결정.\"\n\n이 정의로 게임 이론, 메커니즘 설계,\n행동 경제학, 진화 게임을 모두 포괄.","game_type":"reveal"},{"id":2,"question":"새로운 전략 퍼즐 장르를 창조하세요.\n\n기존 전략 퍼즐의 한계:\n①정적 (고정된 보수 행렬).\n②완전 정보 또는 단순 불완전 정보.\n③2인 게임 중심.\n④단기 시각.\n\n새로운 장르 조건:\n①동적 보수 (환경이 변화).\n②복잡한 정보 구조.\n③다자 게임.\n④장기 시간 지평.","hints":["진화하는 게임: 매 라운드 보수 행렬이 변화.\n과거 결정이 미래 게임 구조를 바꿈.","기후 게임: 현재 배출 → 미래 기온 → 미래 보수 변화.\n장기 전략 + 불확실성 + 다자."],"answer":"개인 창작 (다양한 장르 가능)","explanation":"새로운 장르 예시: \"문명 진화 전략 게임\"\n\n설정:\n5개 문명이 1000년에 걸쳐 상호작용.\n매 세기: 전쟁·무역·외교 중 선택.\n선택이 다음 세기의 자원·기술·인구 결정.\n\n동적 보수:\n현재 전쟁 승리 → 자원 증가 → 다음 세기 유리.\n현재 무역 → 기술 성장 → 장기 우위.\n\n복잡한 정보:\n각 문명의 군사력은 어느 정도 공개.\n기술 수준은 부분적으로 숨겨짐.\n의도는 완전히 비공개.\n\n다자 연합:\n두 문명 연합 vs 나머지.\n연합 안정성: 내부 죄수의 딜레마.\n\n게임 이론 요소:\n반복 게임: 평판 구축.\n진화: 성공한 전략 확산.\n메커니즘: 외교 규칙 설계.\n불완전 정보: 스파이, 신호.","game_type":"reveal"},{"id":3,"question":"전략과 창의성의 수학:\n전략 공간 탐색으로서의 혁신.\n\n창의적 전략 = 새로운 게임 정의.\n기존 게임에서 최적화 vs 게임 자체를 바꾸기.\n\n(1) \"게임 바꾸기\"의 전략적 의미는?\n(2) 블루오션 전략의 게임 이론 기반은?\n(3) 파괴적 혁신의 전략 구조는?","hints":["레드오션: 기존 게임 → 제로합 경쟁.\n블루오션: 새 게임 정의 → 경쟁 없는 시장.","파괴적 혁신 (크리스텐슨):\n저가 시장 진입 → 점진적 개선 → 주류 시장 장악.\n= 게임의 규칙을 바꾸는 전략."],"answer":"게임변경=새시장창조 / 블루오션=비경쟁시장 / 파괴=하위진입→상위장악","explanation":"게임 바꾸기 전략:\n기존 게임 내 최적화:\n같은 규칙 + 더 잘 플레이.\n수익 감소의 법칙: 경쟁자도 학습.\n장기적 레드오션.\n게임 규칙 변경:\n새로운 가치 차원 도입.\n기존 경쟁자가 따라오기 어려운 규칙.\n예: 에어비앤비 = 숙박 공유 게임 (자산 없이 숙박업).\n블루오션 전략:\n4가지 액션: 제거, 감소, 증가, 창조.\n= 보수 행렬 자체를 재구성.\n파괴적 혁신 메커니즘:\n저가 시장: 기존 플레이어 무시.\n점진적 개선: 주류 시장 요건 충족.\n기존 플레이어: 고가 시장으로 후퇴.\n결국: 시장 전체 장악.\n게임 이론: 새로운 게임 = 선점자 우위 + 후발자 모방 어려움.","game_type":"reveal"},{"id":4,"question":"전략 이론의 역사에서 배우는 미래:\n\n전략 이론의 주요 혁명:\n①폰 노이만-모르겐스테른(1944): 게임 이론 창시.\n②내쉬(1950): 비협조 균형.\n③젤텐(1965): 부분게임 완전 균형.\n④하사니(1967): 불완전 정보 게임.\n⑤악셀로드(1984): 반복 게임 협력.\n⑥오스트롬(1990): 공유지 해결.\n⑦마이어슨(1981-): 메커니즘 설계.\n\n(1) 각 혁명의 공통 패턴은?\n(2) 다음 전략 혁명은 어디서 올까요?\n(3) 당신이 기여할 수 있는 혁명은?","hints":["공통 패턴: 단순화 가정 → 복잡한 현실로 확장.\n각 혁명 = 이전의 가정을 하나씩 완화.","다음 혁명 후보:\nAI 행위자, 양자 게임, 복잡계, 인지 게임."],"answer":"공통=가정완화·현실접근 / 다음=AI·양자·복잡계 / 개인비전다양","explanation":"전략 혁명의 공통 패턴:\n\n가정 완화:\n폰 노이만: 협조 게임.\n내쉬: 비협조 (가정 완화).\n젤텐: 동적 게임 (완화).\n하사니: 정보 불완전 (완화).\n오스트롬: 제도·규범 (완화).\n\n현실 접근:\n각 단계 = 더 현실적인 상황 포착.\n더 복잡하지만 더 설명력 높음.\n\n다음 혁명:\nAI 행위자: AI가 게임 플레이어일 때.\n양자 게임: 양자 중첩·얽힘 전략.\n복잡계: 창발적 전략 패턴.\n인지 게임: 인지 한계를 포함한 게임.\n진화·문화: 전략의 다중 시간 척도.\n\n당신의 기여:\n어떤 현실의 가정이 아직 완화 안 됐는가?\n어떤 새로운 플레이어·정보·시간이 포함 안 됐는가?","game_type":"reveal"},{"id":5,"question":"전략 교육의 미래를 설계하세요.\n\n현재 전략 교육의 문제:\n①이론 중심 (수학, 추상).\n②정적 케이스 (과거 사례).\n③단일 학문 (경제학 중심).\n④개인 학습 (협력 없음).\n\nMindArena 기반 새로운 교육:\n게임 + 전략 + AI의 통합.\n\n(1) 전략적 사고를 기르는 최적 방법은?\n(2) 1~15단계 커리큘럼의 핵심 설계 원리는?\n(3) 미래 학습자에게 전하는 전략 철학은?","hints":["전략 직관: 실제 게임 + 반성 + 일반화.\n시뮬레이션: 안전하게 전략 실험.","설계 원리: 구체→추상, 단순→복잡, 분석→창조."],"answer":"개인 창작 (다양한 교육 철학 가능)","explanation":"전략 직관 훈련:\n\n실제 경험:\n게임, 시뮬레이션, 협상 실습.\n\"해보고 생각하기\" (행동 → 반성).\n\n점진적 복잡성:\n1-3단계: 단순 게임 (역방향 분석).\n4-6단계: 정보 불완전 (베이지안).\n7-9단계: 진화·반복 (협력).\n10-12단계: 수학적 기초.\n13-15단계: 창조·통합.\n\n학제간 연결:\n경제 + 생물 + 물리 + 심리 + 철학.\n전략은 어디에나 있음.\n\nMindArena 커리큘럼 원리:\n발견 먼저: 규칙 전에 탐색.\n실패 안전: 전략 실험 공간.\n성찰 필수: 왜 이 전략이 작동했는가?\n연결 강조: 다른 영역과의 연결.\n\n미래 학습자에게:\n전략은 경쟁을 위한 것이 아닙니다.\n협력을 가능하게 하는 것이 전략입니다.\n최선의 전략가는 게임을 바꾸는 사람입니다.","game_type":"reveal"},{"id":6,"question":"궁극의 전략 퍼즐을 설계하세요.\n\n조건:\n①1~15단계의 핵심 개념 모두 포함.\n②반직관적이지만 정확한 전략적 답.\n③실생활과 깊이 연결됨.\n④풀이 과정이 아름다운 전략 이론을 보여줌.\n⑤출제자의 전략 철학이 담김.","hints":["단순한 상황에서 깊은 전략이 나오는 문제.\n개인 최적 ≠ 집단 최적의 구조.","포함할 개념: 역방향 귀납 + 반복 게임 + 진화 + 메커니즘."],"answer":"개인 창작 (정답 없음)","explanation":"예시 \"궁극 퍼즐\": 공유 지식의 섬\n\n문제:\n100명이 섬에 삽니다.\n눈 색깔: 파란 눈 또는 갈색 눈.\n규칙:\n①자신의 눈 색깔을 모름 (거울 없음).\n②다른 사람 눈 색깔은 볼 수 있음.\n③눈 색깔에 대해 말하면 안 됨.\n④자신의 눈 색깔을 알면 그날 밤 섬을 떠나야.\n\n실제: 파란 눈 40명, 갈색 눈 60명.\n방문자가 \"이 섬에 파란 눈이 있다\" 선언.\n→ 무슨 일이 일어나나요?\n\n수학:\n귀납법:\n파란 눈 1명: 다른 파란 눈 없으면 자신이 파란 눈.\n첫날 밤 출발.\n파란 눈 2명: 상대가 안 떠나면 자신도 파란 눈.\n2일째 밤 출발.\n파란 눈 k명: k일째 밤 모두 출발.\n\n놀라운 점:\n\"파란 눈이 있다\"는 것은 모두 알고 있었음.\n하지만 이것이 \"공통 지식\"이 되자 행동 가능해짐.\n공통 지식 = 모두 알고, 모두 모두가 안다는 것을 알고...\n\n포함 개념: 역방향 귀납, 공통 지식, 반복 게임, 정보.\n철학: 정보 = 공유될 때 전략을 변화시킨다.","game_type":"reveal"},{"id":7,"question":"전략 이론가로서 선언문을 쓰세요.\n\n당신이 전략 이론가라면\n어떤 문제를 연구하겠습니까?\n어떤 세상을 만들고 싶습니까?\n\n조건:\n①수학적으로 구체적인 연구 목표.\n②사회적 가치와 연결.\n③현재 기술로 실현 가능성.\n④10년 후 달성 가능한 목표.","hints":["현재 미해결 전략 문제 중 관심 있는 것은?\n전략이 아직 해결 못한 사회 문제는?","작은 문제에서 큰 이론이 나옵니다.\n구체적이고 명확한 목표가 좋습니다."],"answer":"개인 창작 (정답 없음)","explanation":"선언문 예시:\n\n\"나는 기후 위기를 위한 전략 메커니즘을 연구합니다.\n\n기후 위기는 역사상 가장 큰 전략 문제입니다.\n195개국, 80억 명, 수백 년의 시간 지평.\n이것을 게임 이론으로 풀어야 합니다.\n\n연구 목표:\n①기후 게임의 완전한 수학적 모형.\n②진실 유인을 가진 국제 탄소 협약 메커니즘.\n③기후 기술 혁신 레이스의 최적 설계.\n\n10년 목표:\n게임 이론 기반 기후 협약 메커니즘 설계.\n실제 국제 협상에 적용 실험.\n\n이것이 내가 전략으로 만들고 싶은 세상입니다.\"","game_type":"reveal"},{"id":8,"question":"전략 1~15단계 여정을 돌아보며:\n\n당신이 1단계에서 15단계까지 오면서\n가장 놀라운 전략적 통찰은 무엇이었나요?\n\n①가장 반직관적이었던 전략.\n②가장 아름다웠던 게임 이론.\n③가장 실용적인 전략 개념.\n④가장 철학적으로 깊었던 문제.\n⑤이 여정이 세계관을 어떻게 바꿨나요?","hints":["각 단계에서 가장 인상적인 것을 돌아보세요.","좋은 답은 개인적이고 구체적입니다."],"answer":"개인 창작 (정답 없음)","explanation":"예시 답변:\n\n①가장 반직관적:\n\"포크 정리: 충분히 참을성 있으면 어떤 결과도 달성 가능.\n처음엔 '모든 결과가 균형'이라니 이상하다고 생각했습니다.\n하지만 반복 게임에서 미래가 현재를 변화시킨다는 것.\"\n\n②가장 아름다운 수학:\n\"내쉬 균형 존재 증명: 브라우어 고정점.\n위상수학 + 게임 이론의 연결.\n존재 증명이지만 찾는 방법은 모른다는 아이러니.\"\n\n③가장 실용적:\n\"죄수의 딜레마와 팃포탯.\n실생활의 대부분의 협력 문제가 이 구조.\n반복 + 응징 + 용서 = 협력의 레시피.\"\n\n④가장 철학적:\n\"합리성의 한계.\n완전 합리성은 비현실적이지만\n어느 수준의 합리성이 '올바른가'?\n전략의 기준 자체가 문제.\"\n\n⑤세계관 변화:\n\"세상은 전략적 상호 의존으로 가득하다.\n혼자의 최적이 함께의 최적이 아닌 경우가 너무 많다.\n좋은 제도 설계가 세상을 바꾼다.\"","game_type":"reveal"},{"id":9,"question":"전략으로 세상을 바꾸는 방법을 설계하세요.\n\n전략 이론이 실제로 세상을 바꾼 사례:\n①경매 설계: FCC 스펙트럼 → 수십억 달러 효율.\n②신장 교환: 매칭 이론 → 수천 명 생명 구함.\n③학교 배정: 게일-샤플리 → 뉴욕, 보스턴.\n④탄소 시장: 게임 이론 → 환경 정책.\n⑤금융 규제: 게임 이론 → 시장 안정.\n\n다음 10년, 전략 이론으로 어떤 세상 문제를 해결할까요?\n\n(1) 가장 중요한 문제 1개 선택.\n(2) 어떤 전략 이론이 필요한가?\n(3) 구체적 실행 계획을 설계하세요.","hints":["글로벌 문제: 기후, 불평등, 의료, 교육, AI 거버넌스.\n전략 도구: 메커니즘 설계, 경매, 매칭, 반복 게임.","가장 큰 임팩트 = 전략 이론이 가장 부족한 영역."],"answer":"개인 창작 (다양한 비전 가능)","explanation":"예시: \"AI 거버넌스 메커니즘\"\n\n문제:\nAI 개발 국가들의 안전 게임.\n각국: 빠른 AI 개발 vs 안전 투자.\n죄수의 딜레마: 안전 투자 = 상대에게 유리.\n\n필요한 전략 이론:\n①다국가 반복 게임: 협력 조건.\n②메커니즘 설계: 진실 유인 AI 안전 보고.\n③경매: AI 컴퓨팅 자원 배분.\n④매칭: AI 연구자-안전 연구 배정.\n\n구체적 계획:\n1년: AI 안전 게임의 수학적 모형.\n3년: 국제 AI 안전 협약 메커니즘 설계.\n5년: G20 AI 거버넌스 틀에 적용.\n10년: AI 개발의 안전한 국제 조율.\n\n전략 이론의 역할:\n협력 조건 분석 → 협약 가능성 평가.\n메커니즘 설계 → 진실 보고 유인.\n반복 게임 → 장기 협력 구조.","game_type":"reveal"},{"id":10,"question":"전략 마스터 최종 도전:\n\n다음 질문에 답하면서\n1~15단계의 여정을 마무리하세요.\n\n\"전략이란 무엇인가?\"\n\n이 질문에 다음 형식으로 답하세요:\n\n①수식으로: ___\n②한 문장으로: ___\n③그림으로 (텍스트 묘사): ___\n④철학으로: ___\n⑤당신의 언어로: ___","hints":["1~15단계를 모두 걸어온 당신만이 할 수 있는 답.\n기술적 정의와 철학적 통찰을 모두 담으세요.","정답이 없는 질문입니다.\n당신의 통찰이 곧 정답입니다."],"answer":"개인 창작 (정답 없음)","explanation":"예시 답변:\n\n①수식으로:\nσ* ∈ argmax_{σᵢ} Eᵤᵢ[σᵢ, σ*₋ᵢ].\n전략 = 상대의 전략 하에서 자신의 기대 효용을 최대화.\n\n②한 문장으로:\n\"전략은 상호 의존하는 세계에서\n자신과 다른 사람의 행동을 동시에 고려하여\n최선의 선택을 만들어가는 과정이다.\"\n\n③그림으로:\n체스판 위에 두 플레이어.\n하지만 말들이 살아있고 서로 소통한다.\n그리고 체스판 자체가 게임에 따라 변한다.\n그것이 전략의 세계.\n\n④철학으로:\n\"전략은 고립된 최적화가 아닌\n관계 속에서의 선택이다.\n개인의 합리성이 집단의 비합리성을 낳을 수 있다.\n그래서 메커니즘이 필요하고 제도가 생긴다.\n전략의 궁극 목표는 모든 이의 최선을 가능하게 하는 게임을 설계하는 것.\"\n\n⑤당신의 언어로:\n\"전략은 혼자 할 수 없는 것을 가능하게 한다.\n상대가 있기 때문에 어렵고,\n상대가 있기 때문에 더 풍부해진다.\n가장 깊은 전략은 경쟁을 협력으로 바꾸는 것이다.\"","game_type":"reveal"}]}]}};

const CATS = [
  {id:'01_number',   icon:'🔢', label:'수·연산', desc:'수열·연산·방정식 패턴을 찾아 빈칸을 채우세요.',       color:'var(--num)', levels:15, total:150},
  {id:'04_probability',icon:'🎲',label:'확률',   desc:'경우의 수와 확률을 논리적으로 계산하세요.',            color:'var(--prob)',levels:15, total:150},
  {id:'06_pattern',  icon:'🔍', label:'패턴',    desc:'숫자·기호·색의 숨겨진 규칙을 발견하세요.',            color:'var(--pat)', levels:15, total:150},
  {id:'02_logic',    icon:'🧠', label:'논리',    desc:'조건을 분석하고 반드시 참인 결론을 추론하세요.',       color:'var(--log)', levels:15, total:150},
  {id:'05_spatial',  icon:'🔷', label:'공간',    desc:'도형의 변환·대칭·좌표를 머릿속에서 조작하세요.',      color:'var(--spa)', levels:15, total:150},
  {id:'07_strategy', icon:'♟️', label:'전략',    desc:'게임 상황을 분석하고 최적의 선택을 찾으세요.',        color:'var(--str)', levels:15, total:150},
];

let GS={};
let calcTimer=null;

// ── localStorage 진행상황 ──
function getSaved(catId){
  try{ return JSON.parse(localStorage.getItem('ma_'+catId)||'{}'); }
  catch(e){ return {}; }
}
function saveDone(catId,levelNum,correct,total){
  const d=getSaved(catId);
  if(!d[levelNum]||d[levelNum].correct<correct)
    d[levelNum]={correct,total,date:new Date().toISOString().slice(0,10)};
  try{ localStorage.setItem('ma_'+catId,JSON.stringify(d)); }catch(e){}
}
function clearProgress(){
  if(!confirm('모든 진행상황을 초기화할까요?'))return;
  Object.keys(localStorage).filter(k=>k.startsWith('ma_')).forEach(k=>localStorage.removeItem(k));
  renderCats();
}

function renderCats(){
  const grid=document.getElementById('cat-grid');
  grid.innerHTML=CATS.map(c=>{
    const saved=getSaved(c.id);
    const doneCount=Object.keys(saved).length;
    const badge=c.levels
      ? (doneCount>0?`${doneCount}/${c.levels}단계 완료`:`${c.levels}레벨 · ${c.total}문제`)
      : `${c.total}종 게임`;
    const badgeColor=doneCount>0?'background:#dcfce7;color:#15803d':'';
    const cta=c.levels?'레벨 선택 →':'바로 플레이 →';
    const fn=c.action||`openLov('${c.id}')`;
    const prog=c.levels&&doneCount>0
      ?`<div style="margin-top:.75rem;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden">
          <div style="height:100%;border-radius:2px;background:${c.color};width:${Math.round(doneCount/c.levels*100)}%;transition:width .4s"></div>
        </div>`:'' ;
    return `<div class="cat-card" data-cat="${c.id}" onclick="${fn}">
      <div class="cat-top"><span class="cat-icon">${c.icon}</span><span class="cat-badge" style="${badgeColor}">${badge}</span></div>
      <div class="cat-label">${c.label}</div>
      <div class="cat-desc">${c.desc}</div>
      <div class="cat-foot">
        <span class="cat-meta">🧩 단계별 퍼즐</span>
        <span class="cat-cta" style="color:${c.color}">${cta}</span>
      </div>
      ${prog}
    </div>`;
  }).join('');
}

/* ── 레벨 오버레이 ── */
const DIFF=['','입문','입문','초급','초급','초급','중급','중급','중급','고급','고급','고급','심화','심화','심화','전문'];
function openLov(catId){
  const meta=CATS.find(c=>c.id===catId);
  const data=PUZZLE_DATA[catId];
  document.getElementById('lov-title').textContent=`${meta.icon} ${meta.label}`;
  document.getElementById('lv-info').innerHTML=
    `<strong>${meta.label}</strong> — 15단계 · 총 ${meta.total}문제<br>
     <span style="font-size:12px;color:var(--t3)">${data.levels[0].thinking||''}</span>`;
  const saved=getSaved(catId);
  document.getElementById('lv-grid').innerHTML=data.levels.map(lv=>{
    const d=saved[lv.level];
    const pct=d?Math.round(d.correct/d.total*100):null;
    const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=1?'⭐':'';
    return `<button class="lv-btn${d?' done':''}" onclick="startLevel('${catId}',${lv.level})"
      style="${d?'border-color:'+CATS.find(c=>c.id===catId).color+';background:'+CATS.find(c=>c.id===catId).color+'11':''}" >
      <span class="lv-n">${lv.level}</span>
      <span class="lv-d">${d?stars:DIFF[lv.level]||''}</span>
    </button>`;
  }).join('');
  document.getElementById('lov').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLov(){
  document.getElementById('lov').classList.remove('open');
  document.body.style.overflow='';
}

/* ── 퍼즐 게임 ── */
function startLevel(catId,levelNum){
  closeLov();
  const data=PUZZLE_DATA[catId];
  const lv=data.levels.find(l=>l.level===levelNum);
  if(!lv)return;
  const meta=CATS.find(c=>c.id===catId);
  GS={catId,levelNum,meta,lv,problems:[...lv.problems],idx:0,correct:0,answered:false,start:Date.now()};
  document.getElementById('gov-title').textContent=`${meta.icon} ${meta.label} Lv.${levelNum}`;
  document.getElementById('gov').classList.add('open');
  document.body.style.overflow='hidden';
  renderPuzzle();
}

function renderPuzzle(){
  const {problems,idx,meta}=GS;
  if(idx>=problems.length){endPuzzle();return;}
  const p=problems[idx];
  GS.hintShown=0; GS.answered=false;
  document.getElementById('gov-prog').textContent=`${idx+1} / ${problems.length}`;
  const col=meta.color;
  const pct=(idx/problems.length)*100;
  const isReveal=p.game_type==='reveal';

  document.getElementById('gov-body').innerHTML=`
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${col}"></div></div>
    <div class="q-meta">
      <span style="background:${col}22;color:${col};padding:2px 9px;border-radius:6px;font-weight:600">Q${idx+1}</span>
      ${isReveal
        ? '<span style="background:#fef3c7;color:#92400e;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600">📝 서술형 — 정답 보기 후 자기평가</span>'
        : '<span style="background:#eff6ff;color:#1d4ed8;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600">✏️ 입력형</span>'
      }
    </div>
    <div class="q-box">${p.question}</div>
    <div class="hint-area" id="hint-area">
      ${p.hints.length?`<button class="hint-btn" id="hint-btn" onclick="showHint()">💡 힌트 보기 (${p.hints.length}개)</button><div id="hint-box"></div>`:''}
    </div>
    ${isReveal?`
