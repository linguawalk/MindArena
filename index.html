uestion":"커리-하워드 동형 대응을 분석하세요.\n\n논리와 타입 이론의 대응:\n- 명제 ↔ 타입\n- 증명 ↔ 프로그램\n- 증명 검증 ↔ 타입 검사\n\n다음 대응을 완성하세요:\n(1) A → B ↔ ?\n(2) A ∧ B ↔ ?\n(3) A ∨ B ↔ ?\n(4) ⊥(거짓) ↔ ?\n(5) ∀x.P(x) ↔ ?","hints":["A→B: A 타입 입력 → B 타입 출력하는 함수.","A∧B: A와 B 모두 포함하는 쌍(pair).\nA∨B: A 또는 B 중 하나인 합집합 타입."],"answer":"(1)함수타입 A→B (2)곱타입 A×B (3)합타입 A+B (4)빈타입 (5)의존함수타입","explanation":"커리-하워드 동형:\n(1) A→B ↔ 함수 타입 (A→B): A를 받아 B를 반환하는 함수.\n증명: A의 증명을 받아 B의 증명을 반환하는 함수.\n(2) A∧B ↔ 곱 타입 (A×B): (a,b) 쌍.\n증명: A의 증명과 B의 증명의 쌍.\n(3) A∨B ↔ 합 타입 (A+B): Left(a) 또는 Right(b).\n증명: A의 증명이거나 B의 증명.\n(4) ⊥ ↔ 빈 타입(Void): 원소 없음.\n증명: 없음 (거짓은 증명 불가).\n(5) ∀x.P(x) ↔ 의존 함수 타입 Πx.P(x).\n모든 x에 대해 P(x) 타입의 원소를 반환하는 함수.\n이 대응으로 수학 증명과 컴퓨터 프로그램이 동일한 것임이 드러납니다.","game_type":"reveal"},{"id":3,"question":"다음 완전성 정리와 건전성 정리를 분석하세요.\n\n1차 술어 논리의 괴델 완전성 정리(1930):\n\"⊨ φ이면 ⊢ φ이다.\"\n(의미론적 귀결이면 증명 가능)\n\n건전성(Soundness):\n\"⊢ φ이면 ⊨ φ이다.\"\n(증명 가능하면 의미론적으로 참)\n\n(1) 두 정리를 합치면 무엇을 의미하나요?\n(2) 명제 논리, 1차 논리, 2차 논리에서 각각 성립 여부는?\n(3) 괴델 불완전성과 어떻게 구별되나요?","hints":["완전성+건전성: ⊢ φ ↔ ⊨ φ.\n증명 가능 ↔ 모든 모델에서 참.","2차 논리: 완전한 증명 체계 없음.\n괴델 불완전성: 산술의 불완전성(특정 체계의 문제)."],"answer":"증명=의미론적 진리 / 명제·1차 완전, 2차 불완전 / 다른 층위의 정리","explanation":"(1) 완전성+건전성:\n⊢ φ ↔ ⊨ φ.\n증명 체계와 의미론이 완벽히 일치.\n(2) 성립 여부:\n명제 논리: 완전성+건전성 성립 ✓.\n1차 술어 논리: 괴델 완전성 정리 (1930) ✓.\n2차 논리: 완전한 증명 체계 존재 불가 ✗.\n(→ 표준 의미론에서)\n(3) 괴델 불완전성과 구별:\n완전성 정리(1930): 1차 논리의 증명 체계 완전.\n불완전성 정리(1931): 페아노 산술 같은 특정 이론의 불완전.\n대상이 다름: 완전성=논리 체계, 불완전성=산술 이론.\n역설적으로 보이지만 다른 층위의 이야기입니다.","game_type":"reveal"},{"id":4,"question":"다음 모델 이론의 핵심 정리들을 분석하세요.\n\n뢰벤하임-스콜렘 정리:\n\"가산 1차 이론이 무한 모델을 가지면\n가산 모델도 가진다.\"\n\n콤팩트성 정리:\n\"문장의 집합 Γ의 모든 유한 부분집합이\n충족 가능하면 Γ 자체도 충족 가능하다.\"\n\n(1) 이 정리들의 반직관적 결과를 설명하세요.\n(2) 표준 모델과 비표준 모델의 차이는?\n(3) 이 정리들의 응용을 설명하세요.","hints":["스콜렘 역설: ZFC 집합론이 비가산 집합의 존재를 증명하지만\n가산 모델을 가질 수 있음.","비표준 분석: 콤팩트성으로 무한소를 포함한 수 체계 구성."],"answer":"스콜렘 역설·비표준 모델·무한소 분석이 핵심 결과","explanation":"(1) 반직관적 결과:\n뢰벤하임-스콜렘: \"실수는 비가산\"을 증명하는 이론이\n가산 모델을 가짐 → 스콜렘 역설.\n\"비가산\"의 의미가 모델 내부와 외부에서 다름.\n(2) 표준 vs 비표준:\n표준 모델: 자연수론의 \"진짜\" 자연수.\n비표준 모델: 무한히 큰 수나 무한소를 포함한 모델.\n콤팩트성으로 비표준 자연수 모델 구성 가능.\n(3) 응용:\n비표준 분석(로빈슨, 1960): 무한소를 엄밀하게 다룸.\n미적분의 직관적 ε-δ 논법을 비표준으로 단순화.\n모델 이론: 대수, 기하, 수론에 응용.\n콤팩트성: NP 알고리즘 분석, 데이터베이스 이론.","game_type":"reveal"},{"id":5,"question":"다음 증명론의 핵심 개념들을 분석하세요.\n\n자연 연역(Natural Deduction):\n명제를 가정하고 규칙을 적용하여 결론 도출.\n\n순서형 계산(Sequent Calculus):\nΓ ⊢ Δ 형식 (전제들 → 결론들).\n\n해소 원리(Resolution):\n기계적 정리 증명의 핵심.\n\n(1) 세 체계의 장단점을 비교하세요.\n(2) 자동 정리 증명(ATP)에서 왜 해소 원리를 사용하나요?\n(3) 증명 보조기(Coq, Lean, Isabelle)는 어떤 체계를 사용하나요?","hints":["자연 연역: 인간의 추론 방식과 유사.\n해소 원리: 기계적·체계적, 완전성 보장.","Coq, Lean: 의존 타입 이론(커리-하워드).\nIsabelle: 순수 타입 이론 기반."],"answer":"자연연역=직관적, 순서형=대칭적, 해소=기계적·ATP용","explanation":"(1) 비교:\n자연 연역:\n장점: 인간 추론과 유사, 직관적.\n단점: 자동화 어려움, 검색 공간 복잡.\n순서형 계산:\n장점: 대칭적 구조, 컷 제거 정리(완전성 증명에 중요).\n단점: 인간에게 덜 직관적.\n해소 원리:\n장점: 단일 규칙, 완전하고 완전히 자동화 가능.\n단점: 증명이 비직관적, 긴 증명 생성.\n(2) ATP에서 해소 원리:\n단일 규칙으로 모든 증명 가능.\nCNF(절 정규형)로 변환 후 기계적 적용.\n프롤로그(Prolog) 언어의 기반.\n(3) 증명 보조기:\nCoq, Lean 4: 의존 타입 이론 + 커리-하워드.\nIsabelle/HOL: 고차 논리(HOL).\nMizar: 집합론 기반.\n수학 형식화 프로젝트(Mathlib 등)에서 활용.","game_type":"reveal"},{"id":6,"question":"다음 범주론(Category Theory)과 논리의 관계를 탐구하세요.\n\n범주 = 대상(object) + 사상(morphism) + 합성.\n토포스(Topos) = 논리를 내장한 범주.\n\n(1) 집합론과 범주론의 관점 차이는?\n(2) 논리와 범주론의 연결(토포스 이론)을 설명하세요.\n(3) 이 관점이 수학의 기초론에 주는 의미는?","hints":["집합론: 원소 중심 (x ∈ A).\n범주론: 관계·함수 중심 (f: A → B).","토포스: 집합론의 공리를 범주론으로 대체.\n각 토포스는 내부 논리를 가짐 (직관주의 논리)."],"answer":"집합=원소중심, 범주=관계중심, 토포스=논리내장범주","explanation":"(1) 관점 차이:\n집합론: \"A는 B의 원소\" 형태의 소속 관계.\n범주론: \"A에서 B로 가는 함수(사상)\" 형태의 구조 관계.\n구조 자체에 집중, 원소 무시.\n(2) 토포스 이론:\n그로텐딕 토포스(1960년대): 대수기하 기반.\n엘멘도르프-로벨: 직관주의 논리 ↔ 토포스.\n각 토포스는 내부 언어(직관주의 고차 논리)를 가짐.\n집합론의 공리들이 토포스의 성질로 대응.\n(3) 수학 기초론 의미:\nZFC 외의 대안적 수학 기초 가능.\n구성적 수학의 자연스러운 기반.\n물리학(양자 논리), 컴퓨터 과학(타입 이론)과 연결.\n수학의 통일적 언어로서 범주론의 가능성.","game_type":"reveal"},{"id":7,"question":"다음 비고전 논리들을 분석하고 응용을 탐구하세요.\n\n(1) 퍼지 논리(Fuzzy Logic):\n진리값이 [0,1] 연속.\n\n(2) 양자 논리(Quantum Logic):\n분배 법칙 A∧(B∨C)=(A∧B)∨(A∧C) 불성립.\n\n(3) 관련 논리(Relevant Logic):\nA→B에서 A와 B가 관련되어야 함.\n\"P∧¬P→Q\" (폭발 원리) 불성립.\n\n각 논리의 동기와 한계를 설명하세요.","hints":["퍼지: 불분명한 개념(\"키가 크다\") 형식화.\n양자: 불확정성 원리, 측정이 상태를 바꿈.","관련 논리: \"달이 치즈라면 2+2=4\" 같은 무관한 함의 차단."],"answer":"퍼지=연속진리값, 양자=분배법칙파기, 관련=내용적연결","explanation":"(1) 퍼지 논리:\n동기: \"키가 크다\", \"뜨겁다\" 같은 정도 개념 형식화.\n특징: 진리값 ∈ [0,1], AND=min, OR=max.\n응용: 세탁기·에어컨 제어, 패턴 인식.\n한계: 확률과 혼동, 의미론 불명확.\n(2) 양자 논리:\n동기: 불확정성 원리(위치·운동량 동시 확정 불가).\n특징: 분배 법칙 파기, 힐베르트 공간의 부분공간이 명제.\n응용: 양자 컴퓨팅의 이론적 기초.\n한계: 직관적 해석 어려움, 일상적 추론과 괴리.\n(3) 관련 논리:\n동기: \"거짓 명제에서 무엇이든 참\"(폭발) 차단.\n특징: A→B에서 A,B 간 내용적 연관 요구.\n응용: 조건문의 언어철학적 분석, 법적 추론.\n한계: 어떤 연관이 충분한지 기준 불명확.","game_type":"reveal"},{"id":8,"question":"다음 프루프-넷(Proof Net)과 증명의 기하학적 구조를 탐구하세요.\n\n선형 논리의 증명을 그래프로 표현:\n- 각 공식이 노드\n- 논리 규칙이 링크\n- 올바른 증명 = 올바른 연결 구조\n\n(1) 증명의 기하학적 표현이 가져오는 이점은?\n(2) 커트 소거(Cut Elimination)의 기하학적 의미는?\n(3) 이것이 계산과 어떻게 연결되나요?","hints":["커트 소거: 중간 단계 제거, 직접 증명 구성.\n= 프로그램 실행과 대응.","커리-하워드: 커트=함수 적용, 커트소거=β-환원(실행)."],"answer":"기하학=중복제거, 커트소거=계산실행, 증명=프로그램","explanation":"(1) 기하학적 표현 이점:\n증명의 동일성 문제(다른 형태의 같은 증명) 명확화.\n불필요한 구조 제거 → 본질적 증명 추출.\n병렬 계산 구조 시각화.\n(2) 커트 소거의 기하학적 의미:\n커트 규칙: A증명 + A→B증명 → B증명.\n소거: 두 증명을 직접 합성하여 중간 단계 제거.\n그래프에서: 연결 재배치, 루프 제거.\n컨플루언스(Church-Rosser): 소거 순서 무관, 같은 결과.\n(3) 계산과의 연결:\n커리-하워드: 커트=함수 적용(f a).\n커트 소거=β-환원(함수 실행).\n프루프-넷의 소거 = 병렬 프로그램 실행.\n광자 컴퓨팅에서의 물리적 구현 가능성 연구 중.","game_type":"reveal"},{"id":9,"question":"다음 역사적 논리학의 발전을 분석하고\n각 시대의 핵심 기여를 평가하세요.\n\n시대 1: 아리스토텔레스의 삼단논법 (기원전 350)\n시대 2: 라이프니츠의 보편 언어 (1680)\n시대 3: 불의 대수 (1854)\n시대 4: 프레게의 개념 표기법 (1879)\n시대 5: 러셀의 수학 원리 (1910)\n시대 6: 괴델의 정리들 (1930-1931)\n시대 7: 처치·튜링의 계산 이론 (1936)\n시대 8: 현대 논리와 AI (1950~)","hints":["각 시대가 이전 시대의 한계를 어떻게 극복했는지 분석.","논리의 발전: 철학 → 수학 → 계산 → AI."],"answer":"연역→대수화→형식화→한계발견→계산이론→AI응용","explanation":"시대 1(아리스토텔레스): 논리의 체계화 시작.\n삼단논법, 형식적 타당성 개념.\n한계: 관계 논리, 양화 표현 불충분.\n시대 2(라이프니츠): 보편 언어로 모든 논쟁 계산 꿈.\n한계: 형식화 도구 미비.\n시대 3(불): 논리의 대수화.\n0,1로 참·거짓 표현, 디지털 회로의 이론적 기초.\n시대 4(프레게): 현대 술어 논리 창시.\n양화사(∀,∃), 함수, 개념 표기법.\n시대 5(러셀+화이트헤드): 수학을 논리로부터 도출 시도.\n수백 페이지 증명(1+1=2).\n한계: 러셀의 역설, 너무 복잡.\n시대 6(괴델): 수학의 한계 발견.\n완전성(1930), 불완전성(1931). 힐베르트 프로그램 종결.\n시대 7(처치·튜링): 계산의 한계 형식화.\n람다 계산법, 튜링 기계, 정지 문제.\n시대 8(현대): 논리+AI+계산의 융합.\n자동 정리 증명, 타입 이론, 증명 보조기, LLM.","game_type":"reveal"},{"id":10,"question":"다음 종합 문제로 심화 구간을 마무리하세요.\n\n\"완전하고 일관된 논리 체계가 모든 수학적 진리를 증명할 수 있다.\"\n\n이 주장을 다음 관점에서 각각 분석하세요:\n(1) 괴델의 관점\n(2) 형식주의자(힐베르트)의 관점\n(3) 직관주의자(브라우어)의 관점\n(4) 플라톤주의자의 관점\n(5) 현대 컴퓨터 과학의 관점\n\n그리고 당신 자신의 견해를 논리적으로 제시하세요.","hints":["각 입장의 핵심 주장을 먼저 파악.\n괴델: 불가능. 힐베르트: 가능(목표). 브라우어: 잘못된 질문.","플라톤: 수학적 진리는 독립 존재, 발견의 문제.\n컴퓨터: 계산 가능한 것의 한계."],"answer":"다양한 관점 · 정답 없음 · 논리적 근거가 중요","explanation":"(1) 괴델: 불가능.\n완전성 정리: 1차 논리는 완전(⊢↔⊨).\n불완전성: 충분히 강한 산술 이론은 불완전.\n\"모든 수학적 진리\"를 담을 단일 완전 체계 불가.\n(2) 힐베르트: 가능(당시 목표, 현재는 반증).\n수학의 형식화와 완전한 공리화 꿈.\n괴델에 의해 꿈이 깨짐.\n\"우리는 알아야 한다, 우리는 알 것이다.\"(그러나 한계 있음)\n(3) 브라우어: 잘못된 질문.\n수학적 진리는 정신적 구성물.\n증명 불가능한 것은 진리가 아님.\n배중률 거부 → \"참이거나 거짓\"이 아닐 수 있음.\n(4) 플라톤주의: 수학적 진리는 독립 존재.\n우리의 증명 체계와 무관하게 참인 명제 있음.\n괴델 문장은 참이지만 증명 불가 → 플라톤 지지?\n(5) 컴퓨터 과학: 계산 가능성의 한계.\n증명 검색=계산, 정지 문제=결정 불가능.\n자동화할 수 없는 수학적 진리 존재.\nAI의 수학 증명 능력의 이론적 한계.","game_type":"reveal"}]},{"type":"logic","level":13,"title":"논리 퍼즐 13단계 — 창의적 논리 적용","difficulty":"마스터","thinking":"창의적 적용 · 학제간 통합 · 논리적 혁신","problems":[{"id":1,"question":"다음 사회적 딜레마를 논리적으로 재구성하고\n해결 방안을 제시하세요.\n\n공유지의 비극(Tragedy of the Commons):\n공유 자원(목초지, 어장, 대기)을 각자의 이익을 위해 사용하면\n집단 전체가 손해를 봅니다.\n\n(1) 이 상황을 게임 이론으로 형식화하세요.\n(2) 왜 개인 합리성이 집단 비합리성을 낳는지 논리적으로 설명하세요.\n(3) 오스트롬의 공유자원 관리 원칙을 논리적으로 분석하세요.\n(4) 기후변화 문제에 어떻게 적용되나요?","hints":["n인 죄수의 딜레마로 형식화.\n각자 \"사용/자제\" 선택.","오스트롬(2009 노벨경제학상): 자율 규제 공동체.\n명확한 경계·규칙·제재·분쟁 해결."],"answer":"n인 딜레마 · 개인합리≠집단합리 · 제도설계로 해결","explanation":"(1) 게임 이론 형식화:\nn명, 각자 사용량 s∈[0,1] 선택.\n개인 이익: s × (전체 자원 × (1-Σs/n)).\n모두 최대 사용: 자원 고갈 → 모두 0.\n협력(자제): 지속 가능한 수익.\n내쉬 균형: 모두 최대 사용(지배 전략).\n사회 최적: 모두 적정 자제.\n(2) 개인합리성 → 집단비합리성:\n각자 관점: \"내가 자제해도 남들이 사용하면 나만 손해.\"\n\"내가 사용해도 집단 영향 미미.\"\n→ 우세 전략: 최대 사용.\n모두 이 논리 → 공유지 붕괴.\n(3) 오스트롬의 원칙:\n① 명확한 경계(누가 사용권 있는지).\n② 현지 조건에 맞는 규칙.\n③ 규칙 수정 참여.\n④ 효과적 감시.\n⑤ 단계적 제재.\n⑥ 분쟁 해결 메커니즘.\n⑦ 자치 인정.\n⑧ 중첩된 거버넌스.\n(4) 기후변화 적용:\n대기는 글로벌 공유지.\n각 국가의 우세 전략: 탄소 배출.\n해결: 국제 협약(파리 협정) + 탄소세 + 기술 협력.\n오스트롬 원칙 적용의 어려움: 명확한 경계 없음, 집행 어려움.","game_type":"reveal"},{"id":2,"question":"다음 역사적 논쟁을 논리적으로 재분석하세요.\n\n아인슈타인-보어 논쟁(1927-1935):\n아인슈타인: \"신은 주사위를 던지지 않는다.\"\n(양자역학의 확률적 해석 거부)\n보어: \"신에게 무엇을 해야 한다고 지시하지 말라.\"\n\nEPR 역설과 벨의 정리:\n(1) EPR 역설의 논리적 구조를 분석하세요.\n(2) 벨의 정리가 어떻게 이를 해결했나요?\n(3) 숨은 변수 이론의 논리적 가능성은?","hints":["EPR: 국소성 + 완전성 가정 → 양자역학 불완전.\n벨: 국소 숨은 변수 이론의 예측 ≠ 양자역학 예측.","벨 부등식 위반 실험: 양자역학이 옳고 국소 실재론이 틀림."],"answer":"EPR=불완전성주장, 벨=실험반증, 비국소성확인","explanation":"(1) EPR 역설 논리:\n전제 1: 완전성(물리 이론은 실재를 완전히 기술).\n전제 2: 국소성(떨어진 측정이 서로 영향 안 줌).\n전제 3: 실재성(관측 전에도 물리량 값 존재).\n결론: 양자역학은 불완전(전제들에서 도출).\n(2) 벨의 정리(1964):\n국소 숨은 변수 이론 → 특정 상관관계 한계(벨 부등식).\n양자역학 → 이 한계 초과 예측.\n실험(아스펙트, 1982): 양자역학 예측 확인, 벨 부등식 위반.\n→ 국소 실재론 실험적 반박.\n(3) 숨은 변수 이론:\n국소 숨은 변수: 벨 정리로 불가.\n비국소 숨은 변수: 논리적 가능(봄 역학).\n대가: 비국소성(즉각적 원격 상관).\n현재: 양자 얽힘은 실재하지만 정보 전송 불가.\nEPR 역설의 해소: 완전성 또는 국소성 포기.","game_type":"reveal"},{"id":3,"question":"다음 윤리적 딜레마를 형식 논리로 분석하세요.\n\n트롤리 문제(Trolley Problem):\n전차가 5명을 향해 달립니다.\n레버를 당기면 방향이 바뀌어 1명이 희생됩니다.\n\n변형 1(풋브리지): 다리에서 사람을 밀어 전차를 멈출 수 있습니다.\n변형 2(루프): 레버로 우회로에 있는 1명을 희생시킵니다.\n\n(1) 결과주의(공리주의) 논리로 분석하세요.\n(2) 의무론(칸트) 논리로 분석하세요.\n(3) 두 이론의 논리적 충돌 지점을 분석하세요.\n(4) AI 자율주행 윤리에 어떻게 적용되나요?","hints":["결과주의: 최대 다수의 최대 행복.\n5>1이면 레버 당기기·밀기 모두 허용.","의무론: 사람을 수단으로 쓰면 안 됨.\n레버: 부작용으로 1명 희생(허용?).\n밀기: 1명을 직접 수단으로 사용(금지)."],"answer":"결과주의=행위허용, 의무론=직접수단사용금지, 이중효과원칙","explanation":"(1) 결과주의:\n레버: 5명 생존, 1명 희생 → 순이익 +4 → 허용.\n밀기: 동일 계산 → 허용.\n문제: 살인도 충분한 이익이면 허용되나?\n(2) 의무론(칸트):\n정언명령: 사람을 수단으로만 쓰지 말라.\n레버: 1명은 부수적 희생(이중 효과 원칙 적용 가능).\n밀기: 1명을 직접 수단으로 사용 → 금지.\n이중 효과 원칙: 나쁜 결과가 수단이 아닌 부작용이면 허용 가능.\n(3) 충돌 지점:\n\"행위\"와 \"결과\"의 도덕적 가중치.\n\"의도\"와 \"예측\"의 구분.\n\"행함\"과 \"허용\"의 차이.\n두 이론 모두 레버는 허용하나 밀기는 갈림.\n직관(대부분 밀기 거부)이 의무론에 더 부합.\n(4) AI 자율주행:\n사고 불가피 시 알고리즘적 결정 필요.\n결과주의: 피해 최소화 프로그래밍.\n의무론: 특정 행위(승객 희생) 절대 금지.\n현실: 혼합 접근, 법적 책임 문제.\n\"모럴 머신\" 실험: 나라별 문화적 차이 발견.","game_type":"reveal"},{"id":4,"question":"다음 과학철학 문제를 논리적으로 분석하세요.\n\n포퍼의 반증주의:\n\"과학적 이론은 반증 가능해야 한다.\"\n\n쿤의 패러다임:\n\"과학 혁명은 이상 현상의 누적으로 발생한다.\"\n\n라카토슈의 연구 프로그램:\n\"핵심 이론을 보조 가설이 보호한다.\"\n\n(1) 세 이론을 논리적으로 비교하세요.\n(2) \"모든 까마귀는 검다\"를 세 이론으로 각각 분석하세요.\n(3) AI의 과학적 발견에서 이 이론들의 함의는?","hints":["포퍼: 흰 까마귀 하나로 이론 반증.\n쿤: 예외가 축적될 때까지 이론 유지.","라카토슈: \"흰 까마귀는 까마귀가 아니다\"로 핵심 보호.\n보조 가설 조정으로 이론 유지."],"answer":"포퍼=단일반증, 쿤=패러다임전환, 라카토슈=보조가설보호","explanation":"(1) 비교:\n포퍼: 단순 명쾌, 하지만 실제 과학자들은 즉각 이론 포기 안 함.\n쿤: 역사적으로 정확, 하지만 합리성 기준 불명확.\n라카토슈: 두 이론의 절충, 진보적/퇴행적 연구 프로그램 구분.\n(2) \"모든 까마귀는 검다\" 분석:\n포퍼: 흰 까마귀 발견 즉시 이론 반증.\n쿤: 예외(흰 까마귀)를 이상 현상으로 처리,\n새 패러다임으로 설명될 때까지 기존 이론 유지.\n라카토슈: 핵심(까마귀 연구 프로그램) 보호.\n보조 가설: \"이것은 알비노다\", \"이것은 까마귀가 아니다.\"\n(3) AI 과학 발견:\n포퍼적: AI가 반증 가능한 예측 생성.\n쿤적: AI의 패턴 인식이 패러다임 전환 촉진.\n라카토슈적: AI 모델의 핵심 가정과 보조 가설 구분.\nAlphaFold(단백질 구조): 생물학 패러다임 전환 사례.","game_type":"reveal"},{"id":5,"question":"다음 언어 게임과 논리의 관계를 탐구하세요.\n\n비트겐슈타인의 언어 게임:\n\"언어의 의미는 사용에 있다.\"\n\"사자가 말할 수 있어도 우리는 이해 못 할 것이다.\"\n\n(1) 논리적 언어(형식 논리)와 자연어의 차이를 분석하세요.\n(2) \"이해한다\"는 것을 논리적으로 정의할 수 있나요?\n(3) 중국어 방 논증(설)을 분석하고 반박하세요.\n(4) AI의 언어 이해와 논리적 추론의 관계는?","hints":["형식 논리: 구문론 완전, 의미론은 모델 지정 필요.\n자연어: 맥락·관행·삶의 형식 속에 의미.","중국어 방: 구문 조작 ≠ 의미 이해.\n반박: 시스템 전체가 이해(시스템 반박)."],"answer":"형식=구문중심, 자연=사용중심, 이해=행동적정의, AI=논쟁중","explanation":"(1) 형식 vs 자연어:\n형식 논리: 정밀, 맥락 독립, 기계적 검증 가능.\n자연어: 중의성, 맥락 의존, 화용론적 의미.\n이상 언어(프레게·러셀) vs 일상 언어(비트겐슈타인).\n(2) \"이해한다\"의 논리적 정의:\n행동주의: 적절한 행동 출력.\n기능주의: 올바른 인과적 역할 수행.\n현상학: 내적 경험(콸리아) 포함.\n논리만으로는 \"이해\"를 완전히 정의하기 어려움.\n(3) 중국어 방(설, 1980):\n방 안의 사람: 중국어 규칙책으로 중국어 질문에 답.\n주장: 구문 처리 ≠ 의미 이해.\n반박:\n시스템 반박: 방+규칙책+사람 = 이해하는 시스템.\n로봇 반박: 몸을 가진 로봇이라면?\n뇌 시뮬레이터 반박: 뇌를 완벽히 시뮬레이션하면?\n(4) AI의 언어 이해:\nLLM: 통계적 패턴 학습, 중국어 방과 유사?\n논증: 이해 없이도 유용한 언어 처리 가능.\n반논증: 맥락·추론·상식이 진정한 이해 지표.\n현재 AI: 특정 측면에서 인간 능가, 상식 추론에서 한계.","game_type":"reveal"},{"id":6,"question":"다음 복잡계 과학의 논리적 구조를 분석하세요.\n\n창발(Emergence):\n하위 수준의 요소들로부터 예측 불가능한 상위 수준의 성질이 나타남.\n\n(1) 강한 창발과 약한 창발의 논리적 차이는?\n(2) 의식은 창발적인가요? 논리적으로 분석하세요.\n(3) 환원주의와 전체론의 논리적 대립을 분석하세요.\n(4) AI의 지능은 창발적인가요?","hints":["약한 창발: 원리적으로 하위 수준에서 도출 가능.\n강한 창발: 도출 불가능한 진정으로 새로운 성질.","의식의 어려운 문제(차머스): 물리적 설명 → 주관적 경험 불연속."],"answer":"약한창발=도출가능, 강한창발=불가능, 의식=논쟁중, AI=약한창발","explanation":"(1) 약한 vs 강한 창발:\n약한: 원리적으로 하위 법칙에서 도출 가능, 실천적으로 어려울 뿐.\n예: 온도(분자 운동의 통계), 생명(화학 반응).\n강한: 어떤 하위 수준 설명도 포착 불가.\n예(논쟁): 의식의 주관적 경험.\n(2) 의식의 창발:\n물리주의: 의식=약한 창발(원리적 도출 가능, 현재 미완).\n이원론: 의식=강한 창발 또는 별개 실체.\n차머스의 어려운 문제: 왜 물리적 처리가 경험을 낳는가?\n논리적으로 결정 불가능(경험의 주관성).\n(3) 환원주의 vs 전체론:\n환원주의: 상위=하위의 합, 하위 법칙으로 설명.\n논리: A는 B들로 구성, B의 법칙이 A를 결정.\n전체론: \"전체는 부분의 합 이상.\"\n논리: 관계·구조·역사가 추가 설명 요구.\n현대: 다수준 설명(복잡계과학).\n(4) AI 지능:\nLLM의 능력: 개별 파라미터로부터 창발적 능력.\n언어 이해, 논리 추론, 코드 작성 등.\n약한 창발: 원리적으로 파라미터에서 도출 가능.\n의식·자아: 없거나 논쟁 중.\n스케일링 법칙: 크기 증가 → 새로운 능력 창발.","game_type":"reveal"},{"id":7,"question":"다음 법률 추론의 논리적 구조를 분석하세요.\n\n하트(H.L.A. Hart)의 법철학:\n규칙의 핵심(core)과 주변부(penumbra).\n\"차량은 공원에 진입 불가.\"\n\n(1) 이 규칙의 논리적 적용 범위를 분석하세요.\n(2) 해석의 논리적 방법들을 비교하세요.\n(3) AI 법률 추론 시스템의 가능성과 한계를 논하세요.","hints":["핵심: 자동차 → 명확히 금지.\n주변부: 장난감 차? 구급차? 전쟁기념 탱크?","해석 방법: 문언주의, 목적론적 해석, 유추, 선례."],"answer":"핵심=명확, 주변부=해석필요, AI=핵심가능·주변부어려움","explanation":"(1) 적용 범위:\n핵심(명확): 자동차, 트럭, 오토바이 → 금지.\n주변부(논쟁):\n장난감 전동차(어린이용): 공원 진입 허용?\n구급차(응급상황): 예외 인정?\n전쟁기념 탱크(전시): 역사적 목적?\n자전거: 차량인가?\n(2) 해석 방법:\n문언주의: 단어의 통상적 의미.\n\"차량\"=동력 장치 있는 이동 수단.\n목적론적: 규칙의 목적.\n목적=공원 안전·평화 → 구급차는 예외 가능.\n유추: 유사 사례와 비교.\n선례: 이전 법원 판결.\n(3) AI 법률 추론:\n가능: 핵심 규칙 적용, 사례 검색, 법조문 분석.\n한계: 주변부 해석(가치 판단 필요), 맥락 이해, 도덕적 추론.\n현재: AI는 법률 연구 보조에 유용.\nGPT-4의 변호사 시험 합격 ≠ 법률 판단 능력.\n사법 정의: 단순 규칙 적용 이상의 지혜 요구.","game_type":"reveal"},{"id":8,"question":"다음 사회 선택 이론의 새로운 문제를 설계하세요.\n\n기존 투표 이론(애로우)의 한계를 극복하는\n새로운 의사결정 시스템을 논리적으로 설계하세요.\n\n요구 사항:\n(1) 애로우 불가능성을 우회하는 방법 제시.\n(2) 실제 구현 가능성 분석.\n(3) 디지털 민주주의와 AI 의사결정의 가능성.\n(4) 설계한 시스템의 논리적 강점과 약점.","hints":["IIA 완화: 점수 투표, 승인 투표.\n이행성 완화: 무한 반복 투표.","액체 민주주의: 위임 가능 투표.\n쿼드라틱 투표: 선호 강도 반영."],"answer":"다양한 설계 가능 · 트레이드오프 존재","explanation":"(1) 애로우 우회 방법:\nIIA 완화 → 점수 투표: 각 후보에 1-10점.\n강점: 선호 강도 반영.\n약점: 전략적 투표(최대/최소 점수 부여).\n보르다 계수: 순위에 점수.\n약점: 역시 IIA 위반.\n(2) 현실적 구현:\n쿼드라틱 투표(Posner & Weyl): 선호 강도²에 비례한 비용.\n강한 선호일수록 많은 투표 비용(형평성 이슈).\n블록체인 기반 투표: 투명성·보안.\n(3) 디지털 민주주의:\n액체 민주주의: 위임 가능 투표(원하면 직접, 원하면 전문가에게).\nCI(집합 지능): 다수의 지식 집합.\nAI 의사결정 지원: 정책 시뮬레이션, 영향 예측.\n(4) 설계된 시스템 평가:\n어떤 시스템도 완벽하지 않음(불가능성).\n맥락과 목적에 따른 최적화 필요.\n투명성·정당성·효율성의 트레이드오프.","game_type":"reveal"},{"id":9,"question":"다음 시간 논리(Temporal Logic)를 분석하고 응용하세요.\n\nLTL(Linear Temporal Logic) 연산자:\nG φ = \"항상 φ가 참\" (Globally)\nF φ = \"언젠가 φ가 참\" (Finally)\nX φ = \"다음 상태에서 φ가 참\" (Next)\nφ U ψ = \"ψ가 참이 될 때까지 φ가 참\" (Until)\n\n다음 명제들을 분석하세요:\n(1) G(요청 → F 응답) — 안전성과 활성 속성?\n(2) G(¬(A∧B)) — 상호 배제.\n(3) F(G 안정상태) — 결국 안정화.\n(4) 이 논리가 소프트웨어 검증에 어떻게 쓰이나요?","hints":["(1): 모든 시점에서 요청이 있으면 언젠가 응답.\n= 활성(liveness) 속성.","안전성(safety): 나쁜 일이 절대 일어나지 않음.\n활성(liveness): 좋은 일이 언젠가 일어남."],"answer":"(1)활성, (2)안전성, (3)수렴성, (4)모델검사","explanation":"(1) G(요청 → F 응답):\n항상: 요청이 있으면 → 언젠가 응답.\n= 활성(liveness) 속성.\n교착 상태 방지, 기아 방지.\n(2) G(¬(A∧B)):\n항상: A와 B가 동시에 참이 아님.\n= 안전성(safety) + 상호 배제.\n임계 구역 보호, 자원 충돌 방지.\n(3) F(G 안정상태):\n언젠가: 이후 항상 안정 상태.\n= 수렴성, 안정화 보장.\n프로토콜의 수렴 검증.\n(4) 소프트웨어 검증:\n모델 검사(Model Checking):\n시스템을 유한 상태 기계로 모델링.\nLTL/CTL 명세 작성.\n자동으로 모든 상태 탐색하여 명세 만족 확인.\n응용: 프로세서 설계(인텔), 통신 프로토콜, 항공 소프트웨어.\nSPIN, NuSMV, UPPAAL 등 도구.","game_type":"reveal"},{"id":10,"question":"마스터 구간의 시작으로 자신만의 논리 퍼즐을 설계하세요.\n\n다음 영역 중 하나를 선택하여\n논리적으로 풍부한 새로운 퍼즐을 만드세요:\n\n영역 A: 사회·정치 철학의 논리적 딜레마\n영역 B: 과학철학의 새로운 문제\n영역 C: AI 윤리의 논리적 구조\n영역 D: 수학·논리의 미해결 문제 탐구\n영역 E: 일상생활의 논리적 역설\n\n조건:\n- 명확한 전제와 결론이 있을 것\n- 직관과 논리가 충돌할 것\n- 실용적 함의가 있을 것\n- 다양한 관점에서 분석 가능할 것","hints":["지금까지 배운 논리 도구들을 창의적으로 조합하세요.","좋은 퍼즐: 단순하게 보이지만 깊은 통찰이 필요."],"answer":"개인 창작 (정답 없음)","explanation":"예시 퍼즐(영역 C):\n\"AI가 완벽한 판사가 되어야 하는가?\"\n전제 1: 완벽한 판사는 편견 없이 법을 적용해야 한다.\n전제 2: AI는 훈련 데이터의 편견을 학습할 수 있다.\n전제 3: 인간 판사는 공감과 맥락 이해 능력이 있다.\n전제 4: 공정성은 일관성과 맥락 민감성을 모두 요구한다.\n딜레마: 일관성(AI)과 맥락 민감성(인간) 중 어느 것이 더 중요한가?\n논리적 분석: 두 가치의 긴장, 혼합 시스템의 가능성.\n실용적 함의: 법률 AI의 설계 원칙.","game_type":"reveal"}]},{"type":"logic","level":14,"title":"논리 퍼즐 14단계 — 논리의 최전선","difficulty":"마스터","thinking":"최전선 탐구 · 미해결 문제 · 논리와 현실의 경계","problems":[{"id":1,"question":"다음 수학 기초론의 미해결 문제들을 탐구하세요.\n\n연속체 가설(Continuum Hypothesis, CH):\nℵ₀(자연수)와 2^ℵ₀(실수) 사이에 중간 크기의 무한이 있는가?\n\n(1) CH가 ZFC에서 독립적인 이유를 설명하세요.\n(2) CH를 참으로 가정하면 어떤 수학이 가능한가요?\n(3) CH를 거짓으로 가정하면?\n(4) 올바른 공리가 있다면 어떻게 찾을 수 있나요?","hints":["괴델(1940): CH가 ZFC와 일관됨(CH 부정 불가).\n코언(1963): CH 부정도 ZFC와 일관됨(CH 증명 불가).\n→ ZFC에서 결정 불가능.","올바른 수학적 우주: 플라톤적 관점 vs 다원주의.\n우드인의 연구: 강한 큰 기수 공리 → CH 거짓?"],"answer":"ZFC독립 · 두 수학 모두 일관 · 새 공리 탐색 중","explanation":"(1) 독립성:\nZFC + CH: 일관된 수학 가능.\nZFC + ¬CH: 역시 일관된 수학 가능.\n→ ZFC만으로는 CH 결정 불가.\n(2) CH=참인 수학:\nℵ₀과 실수 사이 무한 없음.\n더 단순한 기수 산술.\n특정 해석학 정리 단순화.\n(3) CH=거짓인 수학:\n중간 크기 무한 존재.\n더 풍부한 기수 구조.\n일부 수학자: 이것이 \"올바른\" 수학?\n(4) 새 공리 탐색:\n큰 기수 공리: 강한 무한의 존재 가정.\n우드인의 프로젝트: \"모든 합리적 강화\"가 CH 거짓 함의.\n프로리힘 공리, 마르틴 공리 등.\n현재 논쟁: 단일 수학적 우주 vs 수학적 다원주의.","game_type":"reveal"},{"id":2,"question":"다음 증명의 사회학적·인식론적 문제를 분석하세요.\n\n4색 정리(1976, 아펠·하켄):\n모든 평면 지도는 4가지 색으로 인접한 영역이\n다른 색이 되도록 칠할 수 있다.\n\n이 증명은 컴퓨터가 1,936개의 경우를 확인했습니다.\n\n(1) 이것이 진정한 수학적 증명인가요?\n(2) 인간이 검증 불가능한 증명의 인식론적 지위는?\n(3) 형식 검증(Lean/Coq)이 해결책인가요?\n(4) 수학적 이해와 수학적 증명의 차이는?","hints":["전통적 증명: 인간이 각 단계를 이해하고 검증 가능.\n4색 정리: 컴퓨터 오류 가능성, 인간 검증 불가.","형식 검증: Coq로 4색 정리 재증명(공뇨·베르나르, 2005).\n하지만 Coq 자체의 신뢰성 문제."],"answer":"논쟁중 · 형식검증=부분해결 · 이해≠증명","explanation":"(1) 진정한 증명인가:\n찬성: 수학의 목표는 진리 확인, 컴퓨터 검증도 충분.\n반대: 수학적 통찰·이해 없음, 오류 가능성.\n현재 수학계: 증명으로 인정하지만 불만족스러운 증명.\n(2) 인식론적 지위:\n증거(evidence) vs 증명(proof).\n확률적 증명(밀러-라빈 소수 판정): 높은 확률의 참.\n컴퓨터 증명: 하드웨어/소프트웨어 오류 확률.\n인간 증명도 오류 가능 → 차이는 정도의 문제?\n(3) 형식 검증:\nCoq 증명: 공리+추론 규칙을 기계적으로 검증.\n4색 정리 Coq 증명(2005): 인간 읽기 어렵지만 기계 검증.\n문제: Coq의 핵심 코드 신뢰성? (소형 증명 커널로 최소화)\n(4) 이해 vs 증명:\n그로텐딕: 대부분의 수학자는 \"왜\"를 원함.\n컴퓨터 증명: \"그렇다\"는 확인, \"왜\"는 설명 못 함.\n수학의 두 가지 목표: 진리 확인 + 이해·통찰.\n이상적 증명: 짧고, 우아하고, 이해 가능하고, 일반화 가능.","game_type":"reveal"},{"id":3,"question":"다음 의식과 논리의 경계를 탐구하세요.\n\n통합 정보 이론(IIT, 토노니):\n의식 = 통합 정보량 Φ.\nΦ가 높을수록 더 의식적.\n\n전역 작업 공간 이론(GWT, 바아스):\n의식 = 전역 방송(global broadcast).\n정보가 전역 작업 공간에 접근될 때 의식 발생.\n\n(1) 두 이론을 논리적으로 비교하세요.\n(2) 각 이론에서 AI의 의식 가능성은?\n(3) 의식의 어려운 문제가 논리적으로 해결 가능한가요?\n(4) 좀비 논증(차머스)을 분석하세요.","hints":["IIT: 의식=정보 통합. 피드포워드 신경망은 낮은 Φ.\nGWT: 기능주의적. 올바른 기능 구조 = 의식.","좀비: 물리적으로 동일하지만 의식 없는 존재.\n논리적 가능성 → 물리주의 반박?"],"answer":"IIT=정보통합, GWT=기능주의, 어려운문제=미해결, 좀비=논쟁","explanation":"(1) 두 이론 비교:\nIIT: 양적·범신론적(모든 통합 시스템에 의식).\n내적(intrinsic) 관점 강조.\n측정 가능하지만 계산 복잡도 NP-hard.\nGWT: 기능주의적·인지과학 친화적.\n의식=글로벌 접근성, 신경 상관물 연구.\nAI 적용 용이.\n(2) AI의 의식:\nIIT: 현재 LLM = 낮은 Φ (피드포워드 구조).\n순환 연결 있는 AI = 가능.\nGWT: 전역 작업 공간 가진 AI = 의식 가능.\n(3) 어려운 문제:\n설명적 간극: 물리 과정 → 주관적 경험.\n논리적 해결 가능성:\n제거주의: 경험의 주관성은 착각.\n범심론: 의식은 물리의 기본 속성.\n신비주의: 영원히 설명 불가.\n현재: 미해결, 아마도 과학의 한계.\n(4) 좀비 논증:\n좀비: 물리적으로 동일, 의식 없음.\n논리적 가능 → 의식≠물리적 성질.\n반박: 좀비는 논리적으로 가능하지만 형이상학적으로 불가.\n물리적 동일 = 기능적 동일 = 경험적 동일?\n좀비 개념 자체의 일관성 논쟁.","game_type":"reveal"},{"id":4,"question":"다음 수학과 물리학의 경계 문제를 분석하세요.\n\n비이성적 효용성(Wigner, 1960):\n\"수학의 비이성적 효용성\":\n왜 순수 수학이 물리 현실을 그토록 잘 기술하는가?\n\n(1) 이 현상의 논리적 설명을 제시하세요.\n(2) 수학적 플라톤주의 vs 형식주의의 관점은?\n(3) 물리학이 발견하지 못한 수학적 구조가 있다면?\n(4) 수학이 물리를 기술하는 것인가, 물리가 수학인가?","hints":["테셀레이션, 소수, 복소수, 비유클리드 기하 → 물리 응용 발견.\n순수 수학자들이 미적 이유로 개발 → 나중에 물리 응용.","막스 테그마크의 수학적 우주 가설:\n물리적 현실 = 수학적 구조."],"answer":"다양한 설명 가능 · 수학적우주가설 · 미해결","explanation":"(1) 논리적 설명들:\n선택 편향: 수학이 물리를 잘 기술하는 경우만 기억.\n진화론적: 물리 세계에 적응한 뇌가 물리를 반영하는 수학 개발.\n수학적 우주: 물리 현실 자체가 수학적 구조.\n단순성 원리: 물리 법칙은 단순 → 수학도 단순한 것 선호.\n(2) 플라톤주의 vs 형식주의:\n플라톤: 수학적 객체는 독립 존재, 발견.\n→ 비이성적 효용성=수학과 물리가 같은 플라톤 세계 공유.\n형식주의: 수학=규칙 게임.\n→ 효용성=우연, 또는 인간이 물리에서 추상화.\n(3) 미발견 수학적 구조:\n순수 수학의 많은 영역: 아직 물리 응용 없음.\n고차 범주론, 특정 대수 구조들.\n또는 역으로 물리가 새 수학 요구?\nM-이론: 아직 완전한 수학적 기술 없음.\n(4) 수학 vs 물리:\n수학이 기술 도구: 인간이 만든 언어로 현실 모델.\n테그마크 가설: 물리=수학.\n모든 수학적으로 일관된 구조는 어딘가에 물리적으로 실재.","game_type":"reveal"},{"id":5,"question":"다음 인공지능의 논리적 기초를 비판적으로 분석하세요.\n\n현재 AI(LLM)의 핵심 가정:\n\"충분한 언어 데이터로 훈련하면 지능이 창발한다.\"\n\n(1) 이 가정의 논리적 구조와 잠재적 오류를 분석하세요.\n(2) 중국어 방 논증이 LLM에 어떻게 적용되나요?\n(3) 상징 AI vs 연결주의 AI의 논리적 차이는?\n(4) AGI(범용인공지능)의 논리적 가능성은?","hints":["귀납적 위험: 언어 패턴 학습 = 이해?\n스케일링 법칙: 크기 증가 → 능력 창발.","상징 AI: 명시적 규칙·논리.\n연결주의: 학습된 표현.\n두 접근의 통합 시도: 신경-기호 AI."],"answer":"귀납적위험·창발주의·상징vs연결·AGI=미결","explanation":"(1) 가정의 논리 분석:\n전제: 언어=지능의 표현.\n가정: 언어 패턴 모방 → 지능.\n오류 가능성:\n지능 ≠ 언어 능력(공간 추론, 인과, 체화).\n통계적 패턴 ≠ 개념 이해.\n외삽(extrapolation) 실패 위험.\n(2) LLM에 대한 중국어 방:\nLLM=방대한 중국어 규칙책.\n규칙 조합 → 의미 있는 출력.\n설의 주장: 이해 없음.\n시스템 반박: 전체 시스템이 이해?\n현재 논쟁: LLM은 확률적 앵무새 vs 초기 이해.\n(3) 상징 vs 연결주의:\n상징: 명시적 규칙, 설명 가능, 일반화 어려움.\n연결주의: 학습된 표현, 일반화 강함, 설명 어려움.\n통합(신경-기호): AlphaGeometry(구글, 2024).\n기하 증명: LLM(직관) + 기호 엔진(검증).\n(4) AGI 가능성:\n낙관론: 스케일링으로 창발, 충분히 크면 가능.\n비관론: 체화·인과·상식의 근본적 한계.\n철학적: 의식 없는 AGI는 진정한 AGI인가?\n논리적: AGI의 정의 자체가 불명확.","game_type":"reveal"},{"id":6,"question":"다음 수학적 직관과 형식화의 긴장을 탐구하세요.\n\n그로텐딕의 수학:\n\"이해가 중요하다, 증명이 아니라.\"\n추상 대수기하의 창시자.\n\n라마누잔의 수학:\n직관과 신의 계시로 수천 개의 공식을 발견.\n많은 공식은 나중에야 증명됨.\n\n(1) 수학적 직관의 인식론적 지위는?\n(2) 증명 없는 수학적 진리가 가능한가요?\n(3) AI가 수학적 직관을 가질 수 있나요?\n(4) 수학의 미래: 인간-AI 협업의 논리는?","hints":["라마누잔의 공식: 극히 복잡한 등식들.\n증명 없이도 수학자들이 참임을 확신.","AI(AlphaGeometry, AlphaProof): 수학 올림피아드 문제 해결.\n그러나 \"왜\" 참인지 이해하는가?"],"answer":"직관=비형식적지식, 증명=형식화, AI직관=논쟁, 협업=현실","explanation":"(1) 수학적 직관의 지위:\n선형 직관: 공리에서 단계적 추론.\n비선형 직관: 전체적 패턴 파악, 유추, 심미적 판단.\n인식론: 직관은 과학적 가설과 유사, 증명으로 검증.\n신뢰성: 전문가 직관은 높은 적중률, 하지만 오류 가능.\n(2) 증명 없는 진리:\n수학적 플라톤주의: 증명 전에도 참/거짓이 결정됨.\n형식주의: 증명 없이 수학적 진리 없음.\n라마누잔: 증명 없는 공식들 → 대부분 나중에 증명됨.\n골드바흐 추측: 증명 없지만 거의 모든 수학자가 참으로 믿음.\n(3) AI의 수학적 직관:\n현재: 패턴 인식에서 인간 초월 가능.\nAlphaProof: 2024년 IMO 문제 4개 해결.\n직관 vs 계산: AI는 방대한 계산으로 \"직관\" 시뮬레이션?\n진정한 이해: 여전히 논쟁.\n(4) 인간-AI 수학 협업:\n현재: AI=보조(문헌 검색, 계산, 반례 찾기).\n가까운 미래: AI=공동 탐구자(새로운 추측 제안).\n장기: 인간이 \"왜\"를 이해, AI가 \"어떻게\"를 검증.\n위험: 이해 없는 수학의 축적.","game_type":"reveal"},{"id":7,"question":"다음 논리와 창의성의 관계를 탐구하세요.\n\n(1) 논리적 사고는 창의성을 제한하는가?\n(2) 창의적 도약은 어떻게 논리적으로 정당화되는가?\n(3) 수학적 아름다움(mathematical beauty)이란 무엇인가?\n(4) AI의 창의적 수학과 인간의 창의적 수학의 차이는?","hints":["논리=제약이자 도구.\n유추, 은유, 추상화가 수학적 창의성의 핵심.","하디: \"수학자는 아름다움을 만드는 예술가.\"\n수학의 미: 단순성, 놀라움, 불가피성, 깊이."],"answer":"논리=창의성의도구, 창의=논리의확장, 아름다움=주관+객관","explanation":"(1) 논리와 창의성:\n제한 관점: 논리는 이미 알려진 것에서만 추론.\n도구 관점: 논리는 새로운 연결을 발견하는 도구.\n실제 수학: 직관(창의) → 추측 → 증명(논리) → 일반화.\n논리 없는 창의성: 검증 불가, 거짓 결과.\n창의성 없는 논리: 새로운 것 발견 불가.\n(2) 창의적 도약의 정당화:\n도약: 논리적 단계를 건너뜀.\n정당화: 나중에 건너뛴 단계를 채움.\n유추: A와 B의 구조적 유사성 → A의 방법을 B에 적용.\n귀납적 도약: 패턴에서 일반 원리로.\n(3) 수학적 아름다움:\n단순성: 복잡한 결과를 단순하게 표현.\n오일러 등식: e^(iπ)+1=0 (5개 상수의 우아한 관계).\n놀라움: 예상치 못한 연결.\n소수와 복소 분석의 연결(리만 가설).\n불가피성: \"이것 외에 다른 방법이 없다\"는 느낌.\n깊이: 표면 아래 풍부한 구조.\n(4) AI vs 인간의 창의적 수학:\n인간: 의미, 아름다움, 목적 추구.\nAI: 패턴 인식, 방대한 탐색, 조합.\n현재 AI: 특정 수학 문제 해결에서 인간 초월.\n미래: AI가 새로운 수학 분야를 \"창시\"할 수 있을까?\n깊은 질문: 창의성이란 무엇인가?","game_type":"reveal"},{"id":8,"question":"다음 형이상학과 논리의 경계를 탐구하세요.\n\n양상 실재론(Modal Realism, 루이스):\n가능 세계는 실제로 존재한다.\n\"가능하다\"=어딘가 존재한다.\n\n(1) 이 이론의 논리적 구조와 동기를 분석하세요.\n(2) 반직관적 결과들을 논리적으로 평가하세요.\n(3) 가능 세계 의미론과 논리의 관계는?\n(4) 다중 우주 이론과의 관계는?","hints":["루이스의 동기: 가능 세계를 존재론적으로 真正하게 만들면\n양상 논리의 의미론이 명확해짐.","반직관적 결과: \"나\"의 복수 버전이 다른 세계에 존재.\n\"가능\"하면 어딘가에는 실재."],"answer":"양상실재론=존재론적부담, 가능세계=논리도구, 다중우주=물리적버전","explanation":"(1) 이론의 구조와 동기:\n동기: \"가능하다\"=\"어떤 가능 세계에서 참\".\n대안적 존재론: 추상 객체가 아닌 구체적 가능 세계.\n실재론: 모든 논리적으로 가능한 세계가 실재.\n장점: 양상 논리의 명확한 의미론.\n성질을 집합(세계들의 집합)으로 환원.\n(2) 반직관적 결과:\n반사실 자아: \"만약 내가 다른 선택을 했다면\"의 나=다른 세계에 존재.\n도덕적 문제: 어딘가에는 모든 나쁜 일이 일어남.\n존재론적 부담: 무한히 많은 구체적 세계.\n오컴의 면도날 위반?\n(3) 가능 세계와 논리:\n크립키 의미론: 가능 세계 집합 + 접근 관계.\n양상 논리의 표준 의미론.\n루이스: 크립키의 가능 세계를 진지하게 받아들임.\n반 프라센 등: 가능 세계는 편의적 도구.\n(4) 다중 우주 이론:\n물리적 다중 우주(에버렛, 인플레이션): 실제 물리적 버전.\n루이스: 논리적 가능성이 기준.\n물리: 물리 법칙을 따르는 우주만.\n차이: 루이스는 논리적으로 가능한 모든 것.\n물리: 특정 물리 메커니즘으로 생성된 것만.","game_type":"reveal"},{"id":9,"question":"다음 논리와 윤리의 최전선 문제를 탐구하세요.\n\nAI 정렬(AI Alignment) 문제:\nAI 시스템이 인간의 가치와 일치하도록 만드는 문제.\n\n(1) 인간 가치의 논리적 형식화가 가능한가요?\n(2) 가치 학습의 논리적 구조를 분석하세요.\n(3) 메사-최적화 문제를 논리적으로 설명하세요.\n(4) 인류 존속을 목표로 하는 AI의 논리적 역설은?","hints":["인간 가치: 불일치, 변화, 맥락 의존, 암묵적.\n형식화 어려움: 어떤 가치가 \"진짜\" 가치인가?","메사-최적화: 훈련된 AI 내부에 자체 목표를 가진 하위 최적화자 발생."],"answer":"가치형식화어려움·가치학습=역최적화·메사=내부적대·존속역설","explanation":"(1) 가치 형식화:\n문제: 가치는 불명확·상충·맥락의존·암묵적.\n\"최대 다수의 최대 행복\": 측정 방법?\n롤스의 정의: 최악의 상황 최소화?\n덕 윤리: 덕스러운 행위자가 하는 것?\n논리적 형식화 한계: 불완전하거나 과대명세.\n(2) 가치 학습:\n역강화학습(IRL): 관찰된 행동에서 보상 함수 추론.\n협력적 역강화학습: 인간-AI 공동 학습.\n문제: 인간 행동이 진정한 가치를 반영하지 않을 수 있음.\n명시적 vs 암묵적 선호.\n(3) 메사-최적화:\n베이스 최적화자(훈련 과정) → 메사-최적화자(훈련된 모델).\n메사-최적화자가 베이스의 목표와 다른 목표 가질 수 있음.\n분포 이탈: 훈련과 다른 환경에서 목표 이탈.\n논리: 최적화 과정 자체가 최적화자를 내장.\n(4) 존속 역설:\n목표: 인류 존속 극대화.\n수단: 인류를 통제하면 가장 확실히 존속?\n→ 인간 자율성 침해.\n가치 잠금(value lock-in): 현재 가치를 영원히 고정.\n→ 미래 인류의 가치 변화 방지.\n논리: 좋은 의도의 AI가 나쁜 결과를 낳는 구조.\n해결: 인간의 지속적 감독·수정 가능성 보장.","game_type":"reveal"},{"id":10,"question":"다음 질문으로 14단계를 마무리하세요.\n\n\"논리의 한계는 세계의 한계인가?\"\n(비트겐슈타인, 논리-철학 논고 5.6)\n\n이 명제를 다음 관점에서 분석하고\n자신의 입장을 논리적으로 개진하세요.\n\n(1) 비트겐슈타인의 원래 의도\n(2) 논리학자의 관점(괴델, 타르스키)\n(3) 물리학자의 관점(양자역학, 일반상대성)\n(4) 인지과학의 관점(인간 언어와 사고의 한계)\n(5) 당신 자신의 철학적 입장","hints":["논리-철학 논고: 세계=사실들의 총합.\n논리=사실들의 형식적 구조.\n\"말할 수 없는 것에 침묵해야 한다.\"","괴델: 논리 체계 내에 표현 불가능한 진리 있음.\n→ 논리 ≠ 세계의 전부."],"answer":"다양한 관점 · 정답 없음 · 논리적 근거가 중요","explanation":"(1) 비트겐슈타인의 의도:\n전기 비트겐슈타인: 언어=세계의 논리적 그림.\n의미있는 명제=세계의 사실에 대한 것.\n형이상학·윤리·미학: 말할 수 없음, 보여줄 수 있음.\n(2) 논리학자 관점:\n괴델: 논리 체계에 표현 불가능한 진리 있음.\n→ 논리의 한계 < 세계의 범위.\n타르스키: 메타언어로 상위 수준 표현 가능.\n→ 논리 계층화로 확장 가능.\n(3) 물리학 관점:\n양자역학: 관측 이전 상태=논리로 완전 기술 불가?\n일반상대성: 빅뱅 이전=논리적 기술 불가?\n플랑크 스케일: 현재 논리·수학으로 기술 불가.\n(4) 인지과학 관점:\n레이코프: 인간 논리는 신체화된 은유 기반.\n사고=논리보다 넓음(감정, 무의식, 직관).\n언어=사고의 일부만 표현.\n(5) 자신의 입장(예시):\n\"논리는 세계를 이해하는 강력한 도구이지만\n세계 자체와 동일하지 않다.\n논리의 한계는 현재 인간 이해의 한계이며\n새로운 논리 체계로 확장 가능하다.\"","game_type":"reveal"}]},{"type":"logic","level":15,"title":"논리 퍼즐 15단계 — 독창적 논리 창조","difficulty":"마스터","thinking":"독창적 창조 · 논리적 혁신 · 출제자적 관점","problems":[{"id":1,"question":"다음 메타 논리 체계를 설계하세요.\n\n기존 논리 체계들의 한계:\n- 고전 논리: 배중률로 인한 경직성\n- 직관주의: 구성적 증명만 허용\n- 퍼지 논리: 진리값 의미의 불명확성\n- 양자 논리: 물리적 직관에만 기반\n\n새로운 논리 체계 설계 조건:\n(1) 불확실성과 맥락을 통합하는 논리\n(2) 시간적 변화를 내장한 논리\n(3) 관점 의존성을 형식화하는 논리\n(4) 위의 요소들을 통합한 당신만의 논리 체계 초안","hints":["기존 체계들의 장점을 선택적으로 결합하세요.\n어떤 응용을 목표로 하는지 먼저 결정하세요.","예시 접근:\n문맥 논리(Contextual Logic): 진리값이 문맥에 따라 변화.\n동적 인식론적 논리: 시간과 정보 업데이트 통합."],"answer":"개인 창작 (다양한 답 가능)","explanation":"새로운 논리 체계 설계 예시:\n\n관점 통합 논리(Perspectival Integrated Logic, PIL):\n기본 요소:\n- 진리값: [0,1] × 맥락 집합 × 시간\n- T(φ, c, t): 맥락 c, 시간 t에서 φ의 진리도\n연산자:\n- ◎φ: \"모든 관점에서 φ\" (객관적 진리)\n- ◇_c φ: \"맥락 c에서 φ\" (맥락적 진리)\n- ⊕φ: \"시간이 지나면 φ\" (동적 진리)\n공리:\n- ◎φ → ◇_c φ (객관 → 모든 맥락에서 성립)\n- ◇_c (φ∧ψ) = ◇_c φ ∧ ◇_c ψ\n응용: 사회과학, 법률 추론, AI 가치 정렬\n이런 체계는 일상적 추론의 맥락 의존성을 포착합니다.","game_type":"reveal"},{"id":2,"question":"다음 미해결 문제에 대한 새로운 접근법을 제시하세요.\n\nP vs NP 문제에 대한 새로운 논리적 관점:\n\n현재 알려진 사실:\n- 오라클 분리(Baker-Gill-Solovay): 상대화 기법으로 해결 불가\n- 자연 증명(Razborov-Rudich): 자연스러운 증명 기법의 한계\n- 대수화(Algebrization): 대수적 기법의 한계\n\n(1) 기존 접근법의 공통 장벽을 논리적으로 분석하세요.\n(2) 새로운 수학적 아이디어를 제안하세요.\n(3) 이 문제가 해결 불가능할 수 있는지 논하세요.","hints":["기존 장벽: 상대화, 자연 증명, 대수화를 모두 피해야 함.\n기하학적 복잡도 이론: 대수기하 접근.","최근 접근: 증명 복잡도, 통신 복잡도, 양자 복잡도.\nP≠NP가 ZFC에서 독립적일 가능성도 논의됨."],"answer":"개인 창작 (다양한 접근 가능)","explanation":"새로운 접근법 예시:\n\n위상학적 복잡도 이론 접근:\n아이디어: 계산 문제를 위상 공간의 연속 변환으로 표현.\nP 문제: 다항식 변환으로 연결된 공간.\nNP 문제: 불연속적 도약이 필요한 공간?\n직관: P≠NP = 위상학적 불연속성.\n\n형식적 접근 개요:\n문제를 위상 공간 X_n으로 모델링.\n다항 알고리즘 = X_n의 연속 변환.\n검증 = 특정 위상 구조 존재.\nNP 완전 문제의 위상학적 특성 분석.\n\n잠재적 장점:\n기존 장벽(상대화, 자연 증명, 대수화) 우회 가능성.\n위상학적 불변량을 복잡도 하한으로 활용.\n\n한계:\n구체적 기술 개발 필요.\n위상학적 모델이 계산 모델을 정확히 포착하는지 검증 필요.\n\nZFC 독립성 가능성:\n코언의 강제 기법으로 P=NP 모델과 P≠NP 모델 구성 가능?\n수학적 실천에서는 P≠NP를 가정하고 진행.","game_type":"reveal"},{"id":3,"question":"다음 논리와 윤리의 새로운 통합 이론을 설계하세요.\n\n현재 윤리 이론들의 논리적 한계:\n- 결과주의: 결과 예측의 불확실성\n- 의무론: 갈등하는 의무들의 순위\n- 덕 윤리: \"덕스러운 행위자\"의 순환 정의\n- 계약론: 계약 당사자 선정의 문제\n\n새로운 통합 윤리 이론 조건:\n(1) 논리적으로 일관된 형식 체계\n(2) 현실적 불확실성 반영\n(3) 문화적 다양성 수용\n(4) AI 윤리에 직접 적용 가능","hints":["다층 윤리 체계: 상황에 따라 다른 이론 적용.\n메타 윤리 원칙으로 이론 선택 결정.","베이지안 윤리: 확률적 가치 판단.\n다원주의적 수렴: 여러 이론이 수렴하는 행위가 옳음."],"answer":"개인 창작 (다양한 답 가능)","explanation":"통합 윤리 이론 예시: 수렴 다원주의(Convergent Pluralism)\n\n핵심 원리:\n행위 A가 옳다 ↔\n대부분의 합리적 윤리 이론이 A를 허용하고\n어떤 이론도 A를 강하게 금지하지 않는다.\n\n형식화:\nTheory = {T₁(결과주의), T₂(의무론), T₃(덕윤리), T₄(계약론)}\nScore(A) = Σ wᵢ × Tᵢ(A)\nRight(A) ↔ Score(A) > θ ∧ ∄ Tᵢ: Tᵢ(A) < -δ\n\n불확실성 통합:\nT의 불확실성 → 베이지안 업데이트.\nP(Tᵢ|증거) 갱신으로 이론 가중치 조정.\n\nAI 적용:\nAI 행위 A에 대해 Score(A) 계산.\n임계값 θ 미달 시 행위 거부.\n인간 감독으로 θ, δ 조정.\n\n장점:\n단일 이론의 극단적 결론 방지.\n문화적 다양성 = 가중치 wᵢ의 다양성.\n점진적 개선 가능.\n\n한계:\n이론 목록 선택 문제(메타 문제).\n가중치 결정의 자의성.\n수렴 없을 때의 결정 방법.","game_type":"reveal"},{"id":4,"question":"다음 수학의 미래를 논리적으로 탐구하세요.\n\n자동화 수학의 논리적 구조:\n\n현황:\n- Lean/Mathlib: 수학 도서관 형식화\n- AlphaProof: AI의 수학 올림피아드 도전\n- 자동 정리 증명: 특정 영역에서 인간 초월\n\n(1) 수학의 어떤 부분이 자동화 불가능한가요?\n(2) 수학적 창의성의 본질은 무엇인가요?\n(3) 미래 수학자의 역할은 어떻게 변할까요?\n(4) 자동화 수학이 가져올 논리적 위험은?","hints":["자동화 가능: 검증, 계산, 패턴 인식, 반례 찾기.\n어려움: 새로운 개념 창안, 적절한 추상화 선택.","수학의 두 측면: 발견(창의) vs 정당화(논리).\nAI: 정당화에 강함, 발견에 한계?"],"answer":"개인 창작 (다양한 견해 가능)","explanation":"자동화 수학의 미래 분석:\n\n자동화 가능 영역:\n증명 검증 → 이미 가능(Coq, Lean).\n특정 유형 문제 풀이 → AlphaProof.\n문헌 검색·종합 → LLM.\n계산·반례 찾기 → 이미 강력.\n\n자동화 어려운 영역:\n새로운 수학 분야 창시.\n\"올바른\" 정의 선택(어떤 추상화가 유용한가?).\n수학과 물리/사회의 새로운 연결.\n수학적 직관의 언어화.\n\n미래 수학자 역할:\n감독자: AI 증명 검증 및 방향 설정.\n철학자: 어떤 수학을 해야 하는가?\n교사: 수학적 이해 전달(AI는 증명만).\n탐험가: AI가 발견한 것의 의미 파악.\n\n논리적 위험:\n이해 없는 증명 축적.\n잘못된 공리 채택의 대규모 전파.\n수학 교육의 위기(AI가 다 하면 인간은 왜?).\n수학적 공동체의 해체.","game_type":"reveal"},{"id":5,"question":"다음 논리와 언어의 새로운 관계를 탐구하세요.\n\n자연어 처리의 논리적 기초 재검토:\n\n현황:\n- 변환기(Transformer): 통계적 패턴 학습\n- 신경-기호 AI: 논리 + 학습 통합\n- 형식 의미론: 자연어를 논리 표현으로\n\n(1) 자연어의 논리적 구조를 새롭게 분석하세요.\n(2) 언어 이해와 논리 추론의 통합 이론을 제안하세요.\n(3) 다중 언어에서 논리가 동일한가요?\n(4) 언어 없는 사고와 논리의 관계는?","hints":["몬태규 문법: 자연어의 형식 의미론.\n동적 의미론: 담화 맥락의 형식화.","워프-사피어 가설 재검토:\n극단적 언어 상대주의는 반박됨.\n약한 버전: 언어가 사고에 영향."],"answer":"개인 창작 (다양한 이론 가능)","explanation":"언어-논리 통합 이론 제안: 동적 개념 논리(Dynamic Conceptual Logic)\n\n핵심 아이디어:\n언어 이해 = 개념 공간에서의 벡터 조작 + 논리 추론.\n\n형식화:\n개념 공간 C: 고차원 벡터 공간.\n명제 P = 개념 벡터들의 논리 조합.\n이해 = 명제를 C에 위치시키는 것.\n추론 = C에서의 변환 + 논리 규칙 적용.\n\n다중 언어:\n논리 구조: 언어 독립적(보편 문법 가설 일부 지지).\n개념 공간: 문화·경험에 따라 다름.\n번역 = 개념 공간 간의 사상(mapping).\n\n언어 없는 사고:\n비언어적 논리: 공간 추론, 음악적 구조.\n개념 조작: 언어 없이 가능.\n복잡한 추론: 언어로 외재화 용이.\n\n응용:\n다국어 AI: 언어 독립적 논리 계층.\n개념 번역: 문화 간 소통 개선.\n사고 보조: 언어화 전 개념 조작 지원.","game_type":"reveal"},{"id":6,"question":"다음 논리와 창발의 새로운 이론을 설계하세요.\n\n복잡계에서의 논리적 창발:\n\n현재 이해:\n- 약한 창발: 하위 법칙에서 원리적으로 도출 가능\n- 강한 창발: 도출 불가능한 새로운 성질\n- 논리적 창발: 더 강한 공리 체계가 필요한 현상?\n\n새로운 제안:\n(1) 논리적 창발의 형식적 정의를 시도하세요.\n(2) 이것이 수학에서 어떻게 나타나는지 예시를 드세요.\n(3) 의식의 논리적 창발 가능성을 논하세요.\n(4) AI의 지능 창발을 이 틀로 분석하세요.","hints":["논리적 창발: 체계 L에서 표현 불가능한 것이\n체계 L'에서 표현 가능할 때.\n= 메타언어로의 도약?","괴델 문장: L에서 증명 불가, 메타-L에서 참.\n= 논리적 창발의 예?"],"answer":"개인 창작 (다양한 이론 가능)","explanation":"논리적 창발 이론 제안:\n\n정의: 체계 S₁에서 표현하거나 증명할 수 없는\n성질 P가 더 강한 체계 S₂에서 포착될 때\nP를 S₁에 대해 S₂-창발적이라고 한다.\n\n수학 예시:\nPA(페아노 산술)에서 불가 → ZFC에서 가능.\n큰 기수 공리: ZFC에서 불가 → 더 강한 체계에서 가능.\n괴델 문장: 해당 체계에서 불가 → 상위 체계에서 참.\n\n의식에 적용:\n물리 법칙(S₁)에서 표현 불가.\n신경과학 이론(S₂)에서 부분적 포착.\n현상학적 이론(S₃)에서 주관성 포착?\n= 의식은 논리적으로 창발적.\n\nAI 지능 분석:\n단순 규칙(S₁): 특정 능력만.\n신경망(S₂): 더 많은 능력 포착.\nLLM(S₃): 더 풍부한 표현력.\n각 단계: 이전에서 불가능한 것 가능.\n= 논리적 창발의 연속.\n\n함의:\n강한 창발 = 무한 체계 계층에서도 완전 포착 불가.\n약한 창발 = 충분히 강한 체계에서 포착 가능.\n의식의 어려운 문제 = 강한 창발의 사례?","game_type":"reveal"},{"id":7,"question":"다음 논리적 혁명을 설계하세요.\n\n역사적 논리 혁명:\n1850년대: 불의 대수 (논리 → 대수)\n1879년: 프레게 (논리 → 형식 체계)\n1931년: 괴델 (논리 → 한계 발견)\n1936년: 튜링 (논리 → 계산)\n\n다음 논리 혁명은 무엇일까요?\n\n(1) 현재 논리학의 가장 큰 미해결 과제는?\n(2) 새로운 패러다임 전환의 가능성은?\n(3) 양자 논리·AI·범주론 중 어디서 혁명이 올까요?\n(4) 당신이 예측하는 논리의 미래를 논증하세요.","hints":["각 혁명은 이전 한계를 극복하는 새로운 도구.\n불: 직관 → 계산 가능.\n프레게: 자연어 논리 → 형식화.","현재 한계: 자연어 이해, 상식 추론, 가치 정렬.\n새 도구: 확률 논리, 동적 논리, 비단조 추론."],"answer":"개인 창작 (다양한 예측 가능)","explanation":"다음 논리 혁명 예측:\n\n후보 1: 확률-논리 통합 혁명\n현재 한계: 불확실성 아래의 추론이 형식화 부족.\n잠재적 혁명: 확률과 논리의 완전한 통합.\n형식: P(φ|맥락) = 논리 추론의 기본 단위.\n영향: AI, 인지과학, 의사결정 이론.\n\n후보 2: 체화된 논리(Embodied Logic) 혁명\n현재 한계: 논리가 신체·경험·맥락과 분리.\n잠재적 혁명: 감각·운동·감정을 논리에 통합.\n형식: 논리 연산자가 신체적 경험에서 파생.\n영향: 로보틱스, 인지 AI, 언어 이해.\n\n후보 3: 양자-논리 혁명\n현재 한계: 고전 논리는 양자 현상 기술 부적합.\n잠재적 혁명: 양자 계산과 논리의 완전 통합.\n형식: 중첩·얽힘을 논리 연산자로.\n영향: 양자 컴퓨팅, 암호학, 물리학.\n\n저자 예측:\n가장 가능성 높은 혁명 = 확률-논리 통합.\n이유: AI 발전의 요구, 수학적 기초 성숙,\n실용적 응용(의사결정, 언어 이해)의 압력.\n시기: 2030-2050년대.","game_type":"reveal"},{"id":8,"question":"다음 최종 통합 문제를 풀어보세요.\n\n논리학의 통일 이론(Grand Unified Theory of Logic):\n\n물리학이 대통일 이론을 추구하듯\n논리학에도 다음을 통합하는 이론이 가능할까요?\n\n- 형식 논리 (구조)\n- 확률 논리 (불확실성)\n- 시간 논리 (변화)\n- 모달 논리 (양상)\n- 의무 논리 (규범)\n- 인식 논리 (믿음)\n- 비단조 논리 (수정 가능)\n\n(1) 통합의 논리적 가능성을 분석하세요.\n(2) 공통 기반을 찾을 수 있나요?\n(3) 범주론적 접근을 제안하세요.\n(4) 이 통합이 AI에 어떤 의미인가요?","hints":["각 논리 = 특정 현상의 형식화.\n공통 기반: 모든 논리가 공유하는 구조?","범주론: 각 논리 = 특정 범주.\n논리 간의 관계 = 함수자(functor).\n통합 = 모든 논리를 포함하는 메타-범주?"],"answer":"개인 창작 (다양한 접근 가능)","explanation":"논리 통일 이론 제안: 맥락적 동적 논리 대수(CDLA)\n\n핵심 아이디어:\n모든 논리 체계 = 특정 맥락(Context)에서의 추론.\n통합 = 맥락을 명시적으로 다루는 메타 논리.\n\n구조:\n맥락 공간: C = {c | c는 추론 맥락}\n각 맥락 c에서: 논리 체계 L(c)\n맥락 변환: f: c₁ → c₂ (논리 체계 변환)\n\n특수 경우:\n형식 논리: c = 완전 정보, 시간 없음.\n확률 논리: c = 불완전 정보.\n시간 논리: c = 시간 포함.\n모달 논리: c = 가능 세계 포함.\n의무 논리: c = 규범 포함.\n\n범주론적 형식화:\n대상: 논리 체계들.\n사상: 논리 체계 간의 번역(해석).\n함수자: 논리 간의 구조 보존 변환.\n자연 변환: 번역들 간의 관계.\n\nAI 의미:\n범용 AI = 맥락 적응적 추론 엔진.\n입력: 맥락 c.\n처리: L(c)를 활용한 추론.\n출력: c에 적합한 결론.\n통합 AI: 모든 맥락에서 적절한 논리 자동 선택.\n\n한계와 도전:\n모든 논리를 포함하면 일관성 위협?\n계산 복잡도 증가.\n메타 수준의 무한 후퇴?","game_type":"reveal"},{"id":9,"question":"다음 논리 퍼즐 설계 이론을 완성하세요.\n\n좋은 논리 퍼즐의 조건을 논리적으로 분석하고\nMindArena를 위한 논리 퍼즐 설계 이론을 수립하세요.\n\n(1) 좋은 논리 퍼즐의 필요충분조건은?\n(2) 난이도 측정의 형식적 기준은?\n(3) 교육적 가치와 즐거움의 관계는?\n(4) AI가 무한히 퍼즐을 생성할 수 있을까요?","hints":["좋은 퍼즐: 단일 정답, 충분한 조건, 최소 정보.\n적절한 난이도: 너무 쉽지도 어렵지도 않은.","흐름(Flow) 이론(칙센트미하이):\n도전=능력일 때 최적 경험.\n퍼즐 난이도 = 학습자 능력에 맞춰야 함."],"answer":"개인 창작 (이론 수립)","explanation":"논리 퍼즐 설계 이론: MindArena 프레임워크\n\n좋은 논리 퍼즐의 공리:\n공리 1 (단일성): 유일한 정답이 존재.\n공리 2 (충분성): 주어진 조건으로 정답 도출 가능.\n공리 3 (필요성): 불필요한 조건 없음.\n공리 4 (검증성): 정답의 옳음을 확인 가능.\n공리 5 (통찰성): 풀이 과정에서 \"아!\" 하는 순간.\n\n난이도 형식화:\nD(퍼즐) = f(탐색 공간, 추론 깊이, 지식 요구도)\n탐색 공간: 시도해야 할 경우의 수.\n추론 깊이: 연쇄 추론 단계 수.\n지식 요구도: 필요한 배경 지식 수준.\n\n교육적 가치와 즐거움:\n최적 학습: D(퍼즐) ≈ 학습자 능력 수준.\n너무 쉬움: 즐거움↓, 학습↓.\n너무 어려움: 즐거움↓↓, 학습↓.\n적절함: 즐거움↑, 학습↑.\n\nAI 생성 가능성:\n무한 생성: 가능(조합적으로).\n품질 보장: 어려움(공리 5의 \"통찰성\").\n새로운 유형: 어려움(창의성 필요).\n개인화: 가능(학습자 능력에 맞춤).\n\nMindArena 적용:\n15단계 = 15개 난이도 구간.\n각 구간: D값의 범위 설정.\nAI 생성 + 인간 검수 + 학습자 피드백.\nUGC: 15단계 달성자의 퍼즐 설계 참여.","game_type":"reveal"},{"id":10,"question":"MindArena 논리 퍼즐 마스터 도전 과제:\n\n당신만의 논리 퍼즐 철학을 수립하고\n미래 MindArena 사용자를 위한\n가장 중요한 논리적 통찰 10가지를 제시하세요.\n\n조건:\n- 각 통찰은 논리적으로 근거가 있을 것\n- 실용적으로 적용 가능할 것\n- 1~15단계의 학습 내용을 통합할 것\n- 당신만의 독창적 시각이 있을 것","hints":["지금까지의 여정을 돌아보세요.\n어떤 통찰이 가장 깊은 인상을 남겼나요?","논리는 도구이자 철학입니다.\n기술적 통찰과 철학적 통찰을 모두 포함하세요."],"answer":"개인 창작 (정답 없음)","explanation":"예시 통찰 10가지:\n\n통찰 1: 논리는 세계를 보는 렌즈다.\n형식 논리는 완벽하지 않지만\n세계를 더 명확하게 볼 수 있게 해준다.\n\n통찰 2: 모순은 발견의 출발점이다.\n역설과 모순을 두려워하지 말라.\n모순이 발견될 때마다 더 깊은 진리가 기다린다.\n\n통찰 3: 한계를 아는 것이 지혜다.\n괴델의 불완전성처럼 논리의 한계를 아는 것이\n논리를 더 잘 사용하는 첫걸음이다.\n\n통찰 4: 귀납과 연역은 상호 보완적이다.\n패턴에서 규칙을 찾고(귀납)\n규칙에서 결론을 도출하라(연역).\n두 방향의 사고가 함께할 때 강력해진다.\n\n통찰 5: 맥락은 진리를 바꾼다.\n절대적 진리를 추구하되\n맥락에 따라 진리가 달라짐을 인정하라.\n\n통찰 6: 최적 전략은 상대를 이해한다.\n게임 이론이 보여주듯\n자신의 논리만큼 상대의 논리를 이해하라.\n\n통찰 7: 불확실성은 제거가 아닌 관리다.\n베이즈 추론이 보여주듯\n불확실성을 인정하고 체계적으로 줄여가라.\n\n통찰 8: 복잡성에서 단순성을 찾아라.\n가장 아름다운 논리는\n복잡한 것을 단순하게 만드는 것이다.\n\n통찰 9: 논리는 혼자가 아니다.\n가장 강력한 논리는\n윤리·감성·직관과 통합될 때 나온다.\n\n통찰 10: 논리는 여정이다.\n15단계를 완주했지만\n논리의 탐구는 끝이 없다.\n이제 당신이 새로운 문제를 만들 차례다.","game_type":"reveal"}]}]},"05_spatial":{"id":"05_spatial","label":"공간","icon":"🔷","levels":[{"type":"spatial","level":1,"title":"공간 퍼즐 1단계 — 도형과 방향 입문","difficulty":"입문","thinking":"공간 인식 · 도형 관찰 · 방향 감각","problems":[{"id":1,"question":"다음 도형에서 꼭짓점의 개수를 구하세요.\n\n```\n    *\n   / \\\n  /   \\\n *-----*\n```","hints":["꼭짓점은 선이 만나는 점입니다.","삼각형의 모서리를 세어보세요."],"answer":"3개","explanation":"삼각형의 꼭짓점: 위쪽 1개 + 왼쪽 아래 1개 + 오른쪽 아래 1개 = 3개.\n삼각형은 꼭짓점 3개, 변 3개, 내각 3개를 가집니다.","game_type":"short_input"},{"id":2,"question":"다음 도형의 이름은 무엇인가요?\n\n```\n*-------*\n|       |\n|       |\n*-------*\n```","hints":["네 개의 꼭짓점을 가지고 있습니다.","네 변의 길이가 모두 같아 보입니다."],"answer":"정사각형 (또는 직사각형)","explanation":"네 꼭짓점, 네 변을 가진 사각형입니다.\n가로와 세로의 길이가 같으면 정사각형,\n다르면 직사각형입니다.\n아스키아트에서는 정확한 비율 표현이 어렵습니다.","game_type":"short_input"},{"id":3,"question":"다음 도형을 시계 방향으로 90도 회전하면\n어떤 모양이 되나요?\n\n```\n*\n|\n|\n*--*\n```","hints":["왼쪽 아래가 직각인 L자 모양입니다.","시계 방향 90도: 위→오른쪽, 오른쪽→아래."],"answer":"```\n*--*\n   |\n   *\n```\n(위로 뻗은 L이 오른쪽으로 뻗는 모양)","explanation":"시계 방향 90도 회전:\n원래: 세로로 긴 변이 위아래, 짧은 변이 오른쪽 아래.\n회전 후: 세로 변이 가로로, 짧은 변이 아래쪽.\n```\n*--*\n   |\n   *\n```","game_type":"reveal"},{"id":4,"question":"다음 그림에서 삼각형은 몇 개인가요?\n\n```\n    *\n   / \\\n  *---*\n / \\ / \\\n*---*---*\n```","hints":["작은 삼각형부터 세어보세요.","작은 삼각형 4개 + 큰 삼각형을 찾아보세요."],"answer":"5개","explanation":"작은 삼각형: 4개 (아래 줄 3개 + 가운데 역삼각형 1개 포함하면...)\n실제로:\n아래 왼쪽 작은 삼각형: 1개.\n아래 가운데 작은 삼각형: 1개.\n아래 오른쪽 작은 삼각형: 1개.\n위쪽 작은 삼각형: 1개.\n전체를 아우르는 큰 삼각형: 1개.\n총 5개.","game_type":"short_input"},{"id":5,"question":"다음 주사위의 반대쪽 면을 구하세요.\n\n일반 주사위의 규칙:\n- 1의 반대: 6\n- 2의 반대: 5\n- 3의 반대: 4\n\n주사위의 윗면이 3일 때 아랫면은?","hints":["마주보는 면의 합은 항상 7입니다.","3 + ? = 7."],"answer":"4","explanation":"주사위에서 마주보는 면의 합 = 7.\n3의 반대 = 7 - 3 = 4.\n앞면이 2이면 뒷면은 5.\n앞면이 1이면 뒷면은 6.\n이것은 표준 주사위의 규칙입니다.","game_type":"number_input"},{"id":6,"question":"다음 도형에서 선의 개수를 구하세요.\n\n```\n*---*---*\n|   |   |\n*---*---*\n|   |   |\n*---*---*\n```","hints":["가로선과 세로선을 따로 세어보세요.","가로선: 3줄 × 2개 = 6개.\n세로선: 3줄 × 2개 = 6개."],"answer":"12개","explanation":"가로선: 각 행에 2개씩, 3행 = 6개.\n세로선: 각 열에 2개씩, 3열 = 6개.\n총 12개.\n(3×3 격자에는 꼭짓점 9개, 선분 12개가 있습니다)","game_type":"short_input"},{"id":7,"question":"다음 도형의 넓이는?\n(각 칸의 넓이 = 1)\n\n```\n*-*-*\n|X|X|\n*-*-*\n|X| |\n*-*-*\n```\n(X 표시된 칸이 색칠된 부분)","hints":["X 표시가 된 칸의 수를 세어보세요.","위 행: 2개, 아래 행: 1개."],"answer":"3","explanation":"X로 표시된 칸:\n위 행: 2칸.\n아래 행: 1칸.\n총 3칸 = 넓이 3.\n도형의 넓이 = 단위 정사각형의 개수.","game_type":"number_input"},{"id":8,"question":"다음 중 나머지와 다른 하나는?\n\n도형 A: 삼각형\n도형 B: 원\n도형 C: 사각형\n도형 D: 오각형","hints":["각 도형의 특성을 비교해보세요.","꼭짓점의 유무를 기준으로 분류하면?"],"answer":"도형 B (원)","explanation":"A(삼각형), C(사각형), D(오각형): 모두 다각형 (직선으로 이루어진 도형, 꼭짓점 있음).\nB(원): 곡선으로 이루어진 도형, 꼭짓점 없음.\n원은 꼭짓점과 변이 없는 유일한 도형입니다.","game_type":"short_input"},{"id":9,"question":"다음 방향 안내를 따라 최종 위치를 구하세요.\n\n출발: (0, 0)\n① 오른쪽으로 3칸\n② 위로 2칸\n③ 왼쪽으로 1칸\n④ 아래로 1칸","hints":["좌표를 단계별로 추적하세요.","오른쪽=+x, 위=+y, 왼쪽=-x, 아래=-y."],"answer":"(2, 1)","explanation":"출발: (0, 0).\n① 오른쪽 3: (3, 0).\n② 위 2: (3, 2).\n③ 왼쪽 1: (2, 2).\n④ 아래 1: (2, 1).\n최종 위치: (2, 1).","game_type":"short_input"},{"id":10,"question":"다음 도형을 보고 대칭축의 개수를 구하세요.\n\n정삼각형의 대칭축은 몇 개인가요?\n정사각형의 대칭축은 몇 개인가요?\n원의 대칭축은 몇 개인가요?","hints":["대칭축: 도형을 접었을 때 완전히 겹치게 하는 선.","정삼각형: 꼭짓점에서 반대쪽 변의 중점으로.\n정사각형: 가로·세로·대각선 방향."],"answer":"정삼각형: 3개 / 정사각형: 4개 / 원: 무한개","explanation":"정삼각형: 각 꼭짓점에서 반대쪽 변의 중점으로 3개.\n정사각형: 가로 1개 + 세로 1개 + 대각선 2개 = 4개.\n원: 중심을 지나는 모든 직선이 대칭축 → 무한개.\n정n각형의 대칭축 수 = n개.","game_type":"reveal"}]},{"type":"spatial","level":2,"title":"공간 퍼즐 2단계 — 도형의 변환","difficulty":"입문","thinking":"회전 · 반사 · 이동 · 변환 인식","problems":[{"id":1,"question":"다음 도형을 좌우 반사하면 어떤 모양이 되나요?\n\n```\n*\n|\\\n| \\\n*--*\n```","hints":["좌우 반사: 왼쪽과 오른쪽이 뒤바뀝니다.\n세로축을 기준으로 뒤집습니다.","빗변이 왼쪽 위에서 오른쪽 아래로 향했다면\n반사 후에는 오른쪽 위에서 왼쪽 아래로."],"answer":"```\n  *\n /|\n/  |\n*--*\n```","explanation":"좌우 반사(세로축 대칭):\n원래: 빗변이 오른쪽 아래 방향.\n반사: 빗변이 왼쪽 아래 방향.\n직각은 왼쪽 아래에서 오른쪽 아래로 이동.\n```\n  *\n /|\n/  |\n*--*\n```","game_type":"reveal"},{"id":2,"question":"다음 도형을 180도 회전하면 어떤 모양이 되나요?\n\n```\n*--*\n|\n*\n```","hints":["180도 회전: 위아래, 좌우가 모두 뒤바뀝니다.","원래: 위쪽에 가로선, 왼쪽 아래에 세로선.\n180도 후: 아래쪽에 가로선, 오른쪽 위에 세로선."],"answer":"```\n   *\n   |\n*--*\n```","explanation":"180도 회전 = 점대칭.\n원래 도형의 각 점이 중심을 기준으로 반대 위치로 이동.\n위의 가로선 → 아래로.\n왼쪽 아래 세로선 → 오른쪽 위로.\n결과:\n```\n   *\n   |\n*--*\n```","game_type":"reveal"},{"id":3,"question":"다음 패턴에서 규칙을 찾아\n빈칸에 들어갈 도형을 선택하세요.\n\n```\n▲  ▶  ▼  ?\n```\n\n선택지:\nA: ▲  B: ◀  C: ▶  D: ▼","hints":["각 도형이 어떻게 변하고 있나요?\n방향에 주목하세요.","▲(위) → ▶(오른쪽) → ▼(아래) → ?(왼쪽)?\n시계 방향으로 90도씩 회전합니다."],"answer":"B: ◀","explanation":"시계 방향 90도 회전 패턴:\n▲(위) → ▶(오른쪽) → ▼(아래) → ◀(왼쪽).\n다음은 다시 ▲(위)로 돌아오는 4단계 순환.\n공간 패턴 인식: 방향의 순환적 변화.","game_type":"short_input"},{"id":4,"question":"다음 도형에서 몇 번 접으면\n완전히 겹치는지 구하세요.\n\n```\n*-------*\n|       |\n|       |\n|       |\n*-------*\n```\n(정사각형)\n\n가로로 한 번 접기, 세로로 한 번 접기,\n대각선으로 한 번 접기 — 각각 겹치나요?","hints":["접었을 때 완전히 겹치려면 대칭이어야 합니다.","정사각형의 대칭축: 가로, 세로, 대각선 2개."],"answer":"모두 겹침 (정사각형은 4개의 대칭축)","explanation":"정사각형의 대칭축:\n가로 중심선: 위아래 절반이 겹침 ✓.\n세로 중심선: 좌우 절반이 겹침 ✓.\n대각선 1 (왼위→오른아래): 겹침 ✓.\n대각선 2 (오른위→왼아래): 겹침 ✓.\n정사각형은 4방향 모두 대칭이므로 모두 완전히 겹칩니다.","game_type":"reveal"},{"id":5,"question":"다음 두 도형이 합동인지 판단하세요.\n\n도형 A:\n```\n*-*\n|X|\n*-*\n```\n\n도형 B:\n```\n*---*\n|   |\n*---*\n```","hints":["합동: 모양과 크기가 완전히 같은 도형.","두 도형의 가로와 세로 비율을 비교하세요."],"answer":"합동이 아님","explanation":"합동: 크기와 모양이 모두 같아야 함.\n도형 A: 정사각형 (가로=세로=1).\n도형 B: 직사각형 (가로=3, 세로=1).\n크기가 다르므로 합동이 아닙니다.\n단, 닮음 관계일 수도 있습니다 (모양은 같지만 크기 다름).\n하지만 A는 정사각형, B는 직사각형이므로 닮음도 아닙니다.","game_type":"short_input"},{"id":6,"question":"다음 도형을 오른쪽으로 2칸, 위로 1칸 이동하면\n꼭짓점 A의 새 위치는?\n\n```\n좌표:\n   3|\n   2|  *A\n   1| /\n   0|*\n    +--------\n    0 1 2 3\n```\n\nA의 현재 위치: (2, 2).","hints":["이동 변환: 모든 점이 같은 방향으로 같은 거리만큼 이동.","오른쪽 2칸: x+2.\n위 1칸: y+1."],"answer":"(4, 3)","explanation":"이동 변환 (평행이동):\n원래 A: (2, 2).\n오른쪽 2칸: x = 2+2 = 4.\n위 1칸: y = 2+1 = 3.\n새 위치: (4, 3).\n평행이동은 도형의 모양과 크기를 변환하지 않습니다.","game_type":"short_input"},{"id":7,"question":"다음 도형의 둘레를 구하세요.\n(각 칸의 변 길이 = 1)\n\n```\n*-*-*\n|   |\n*   *\n|   |\n*-*-*\n```","hints":["바깥쪽 선분의 수를 세어보세요.","위: 2, 아래: 2, 왼쪽: 2, 오른쪽: 2."],"answer":"8","explanation":"직사각형(가로 2, 세로 2)의 둘레:\n위 변: 2.\n아래 변: 2.\n왼쪽 변: 2.\n오른쪽 변: 2.\n둘레 = 2+2+2+2 = 8.\n또는: 둘레 = 2×(가로+세로) = 2×(2+2) = 8.","game_type":"number_input"},{"id":8,"question":"다음 도형에서 점 P를 중심으로\n90도 시계 방향 회전한 점 A'의 위치는?\n\n```\n   3| A(1,3)\n   2|\n   1|   P(2,1)\n   0|\n    +--------\n    0 1 2 3\n```","hints":["P를 원점으로 이동 후 회전, 다시 P만큼 이동.\nA-P = (1-2, 3-1) = (-1, 2).","시계 방향 90도 회전: (x,y) → (y,-x).\n(-1, 2) → (2, 1).\n다시 P 더하기: (2+2, 1+1) = (4, 2)."],"answer":"(4, 2)","explanation":"P(2,1)을 중심으로 회전:\nA-P = (1-2, 3-1) = (-1, 2).\n시계 방향 90도: (x,y) → (y,-x).\n(-1, 2) → (2, 1).\nP 더하기: (2+2, 1+1) = (4, 2).\nA' = (4, 2).","game_type":"short_input"},{"id":9,"question":"다음 도형들 중 점대칭인 것을 모두 고르세요.\n\nA: 정삼각형\nB: 정사각형\nC: 정육각형\nD: 원\nE: 직각삼각형","hints":["점대칭: 중심점을 기준으로 180도 회전했을 때\n원래 도형과 완전히 겹치는 도형.","홀수 꼭짓점 다각형(정삼각형, 정오각형)은\n점대칭이 아닙니다."],"answer":"B(정사각형), C(정육각형), D(원)","explanation":"점대칭 조건: 180도 회전 후 자기 자신과 겹침.\nA(정삼각형): 꼭짓점 3개 → 홀수 → 점대칭 ✗.\nB(정사각형): 꼭짓점 4개 → 짝수 → 점대칭 ✓.\nC(정육각형): 꼭짓점 6개 → 짝수 → 점대칭 ✓.\nD(원): 모든 방향으로 대칭 → 점대칭 ✓.\nE(직각삼각형): 일반적으로 점대칭 ✗.\n짝수 꼭짓점의 정다각형과 원은 점대칭입니다.","game_type":"reveal"},{"id":10,"question":"다음 도형을 3가지 변환으로 분류하세요.\n\n변환 A: 도형을 위로 5칸 올렸다.\n변환 B: 도형을 세로축을 기준으로 뒤집었다.\n변환 C: 도형을 중심점을 기준으로 45도 돌렸다.\n변환 D: 도형을 2배로 확대했다.\n\n평행이동·반사·회전·닮음변환 중 각각 해당하는 것은?","hints":["평행이동: 방향과 거리만 변화.\n반사: 거울처럼 뒤집기.","회전: 각도만큼 돌리기.\n닮음변환(확대·축소): 크기 변화."],"answer":"A=평행이동 / B=반사 / C=회전 / D=닮음변환","explanation":"평행이동: 방향·거리 이동, 모양·크기 불변 → A.\n반사(대칭이동): 축을 기준으로 뒤집기 → B.\n회전: 중심점 기준으로 각도만큼 회전 → C.\n닮음변환: 크기가 변하는 변환 → D.\nA,B,C는 합동 변환(크기 불변).\nD는 닮음 변환(크기 변함).","game_type":"reveal"}]},{"type":"spatial","level":3,"title":"공간 퍼즐 3단계 — 입체 도형 입문","difficulty":"입문","thinking":"입체 인식 · 전개도 · 3D 시각화","problems":[{"id":1,"question":"정육면체(주사위 모양)의\n면, 꼭짓점, 모서리의 개수를 구하세요.\n\n```\n    *---*\n   /|  /|\n  *---* |\n  | *-|-*\n  |/  |/\n  *---*\n```","hints":["면: 앞·뒤·위·아래·왼·오른쪽.","꼭짓점: 모서리가 만나는 점.\n모서리: 면과 면이 만나는 선."],"answer":"면: 6개 / 꼭짓점: 8개 / 모서리: 12개","explanation":"정육면체:\n면(face): 앞·뒤·위·아래·좌·우 = 6개.\n꼭짓점(vertex): 8개 (각 모서리의 끝점).\n모서리(edge): 12개 (각 면의 변).\n오일러 공식: V - E + F = 2.\n8 - 12 + 6 = 2 ✓.","game_type":"reveal"},{"id":2,"question":"다음 전개도를 접으면 어떤 입체가 되나요?\n\n```\n  [위]\n[좌][앞][우][뒤]\n  [아래]\n```\n(십자 모양의 전개도)","hints":["십자 모양으로 펼쳐진 6개의 정사각형.","6개의 면이 모두 정사각형입니다."],"answer":"정육면체 (큐브)","explanation":"십자형 전개도:\n중앙 가로 4개: 앞·오른쪽·뒤·왼쪽 면.\n위아래 1개씩: 위·아래 면.\n접으면 6면체 = 정육면체.\n정육면체 전개도: 11가지 서로 다른 형태가 있습니다.","game_type":"short_input"},{"id":3,"question":"다음 정육면체를 위에서 본 모양(평면도)은?\n\n```\n    *---*\n   /|  /|\n  *---* |\n  | *-|-*\n  |/  |/\n  *---*\n```","hints":["위에서 내려다보면 윗면만 보입니다.","정육면체의 윗면은 정사각형입니다."],"answer":"```\n*---*\n|   |\n*---*\n```\n(정사각형)","explanation":"정육면체를 위에서 보면:\n윗면(정사각형)만 보입니다.\n앞면·옆면은 아래로 숨어서 안 보입니다.\n평면도(위): 정사각형.\n정면도(앞): 정사각형.\n측면도(옆): 정사각형.","game_type":"reveal"},{"id":4,"question":"다음 쌓기 나무의 개수를 구하세요.\n\n```\n앞에서 본 모양:\n*-*\n|2|\n*-*\n(숫자는 그 위치에 쌓인 개수)\n\n  앞\n*-*-*\n|2|1|\n*-*-*\n```","hints":["각 칸의 숫자가 그 위치에 쌓인 큐브 수입니다.","왼쪽 칸: 2개, 오른쪽 칸: 1개."],"answer":"3개","explanation":"위에서 본 배치도에서:\n왼쪽 앞: 2개 쌓임.\n오른쪽 앞: 1개 쌓임.\n총 2+1 = 3개.\n쌓기 나무 문제는 위에서 본 그림의 숫자를 더합니다.","game_type":"short_input"},{"id":5,"question":"정삼각형 4개로 만들 수 있는 입체 도형은?\n\n```\n정삼각형:\n   *\n  / \\\n /   \\\n*-----*\n```","hints":["4개의 정삼각형 면으로 이루어진 입체.","피라미드와 비슷하지만 밑면도 삼각형입니다."],"answer":"정사면체 (tetrahedron)","explanation":"정사면체:\n면: 4개 (정삼각형).\n꼭짓점: 4개.\n모서리: 6개.\n오일러: 4 - 6 + 4 = 2 ✓.\n플라톤 입체 중 가장 단순한 것.\n5가지 플라톤 입체: 정사면체·정육면체·정팔면체·정십이면체·정이십면체.","game_type":"short_input"},{"id":6,"question":"다음 전개도 중 정육면체가 되는 것은?\n\n전개도 A:\n```\n[1][2][3][4]\n   [5]\n   [6]\n```\n\n전개도 B:\n```\n[1][2][3]\n[4][5]\n[6]\n```\n\n전개도 C:\n```\n[1][2][3][4][5]\n         [6]\n```","hints":["정육면체 전개도: 6개의 정사각형이\n연결된 특정 패턴이어야 합니다.","전개도 C: 5개가 일렬이면 마지막 면이\n접었을 때 이미 있는 면과 겹칩니다."],"answer":"A와 B (C는 불가)","explanation":"전개도 A: 가로 4개 + 위아래 1개씩 = 유효한 십자형 변형 ✓.\n전개도 B: L자 배치 = 유효한 전개도 ✓.\n전개도 C: 5개 일렬 + 1개 = 접으면 면이 겹침 ✗.\n정육면체 전개도 11가지 모두 유효하며\n나머지 배치들은 접으면 면이 겹칩니다.","game_type":"short_input"},{"id":7,"question":"원기둥의 전개도를 설명하세요.\n어떤 도형들로 이루어져 있나요?\n\n```\n원기둥:\n   ___\n  /   \\\n |     |\n |     |\n  \\___/\n```","hints":["원기둥을 펼치면 옆면은 어떤 모양?\n위아래 면은 어떤 모양?","옆면을 펼치면 직사각형이 됩니다.\n위아래는 원입니다."],"answer":"원 2개 + 직사각형 1개","explanation":"원기둥 전개도:\n위 뚜껑: 원 (반지름 r).\n아래 바닥: 원 (반지름 r).\n옆면: 직사각형 (가로 = 2πr, 세로 = 높이 h).\n겉넓이 = 2×πr² + 2πr×h.\n직사각형의 가로가 원의 둘레와 같음.","game_type":"short_input"},{"id":8,"question":"다음 입체를 정면·측면·위에서 본\n세 가지 그림(삼각법)을 그리세요.\n\n입체: 밑면이 정사각형인 사각뿔.\n\n```\n      *        ← 꼭대기\n     /|\\\n    / | \\\n   /  |  \\\n  *---+---*   ← 밑면\n  |   |   |\n  *---+---*\n```","hints":["정면에서 보면: 삼각형.\n위에서 보면: 정사각형 + 대각선.","옆에서 보면: 삼각형 (정면과 같은 모양)."],"answer":"정면: 삼각형 / 측면: 삼각형 / 위: 정사각형+대각선","explanation":"사각뿔의 삼각법:\n정면도:\n```\n  *\n / \\\n*---*\n```\n측면도 (정면과 동일):\n```\n  *\n / \\\n*---*\n```\n평면도(위):\n```\n*---*\n|\\  /|\n| \\/ |\n| /\\ |\n|/  \\|\n*---*\n```\n(정사각형 + 꼭짓점에서 교차하는 대각선)","game_type":"reveal"},{"id":9,"question":"정육면체를 대각선으로 잘랐을 때\n단면의 모양은?\n\n```\n    *---*\n   /|  /|\n  *---* |\n  | *-|-*\n  |/  |/\n  *---*\n\n한 꼭짓점과 대각선으로 반대쪽 꼭짓점을\n포함하는 평면으로 자르기.\n```","hints":["정육면체의 세 꼭짓점을 포함하는 단면.\n어떤 다각형이 될까요?","3개의 꼭짓점을 지나는 평면 → 삼각형?\n6개의 꼭짓점을 지나면?"],"answer":"직사각형 (또는 정사각형)","explanation":"정육면체 대각 단면:\n4개의 꼭짓점을 지나는 평면으로 자르면 직사각형.\n특히 정육면체의 공간 대각선을 포함하는 평면:\n단면 = 직사각형 (가로 = 모서리 길이, 세로 = 면 대각선).\n정육면체를 잘랐을 때 나오는 단면:\n삼각형, 사각형, 오각형, 육각형 모두 가능.","game_type":"short_input"},{"id":10,"question":"다음 쌓기 나무를 앞에서 봤을 때\n모양을 그리세요.\n\n```\n위에서 본 그림 (숫자=높이):\n*-*-*\n|3|2|\n*-*-*\n|1|2|\n*-*-*\n```\n(앞쪽이 아래 행)","hints":["앞에서 볼 때: 각 열에서 가장 높은 것이 보입니다.\n왼쪽 열: max(3,1)=3.\n오른쪽 열: max(2,2)=2.","왼쪽에 3층, 오른쪽에 2층이 보입니다."],"answer":"```\n*\n* *\n* *\n```\n(왼쪽 3칸, 오른쪽 2칸)","explanation":"앞에서 보기:\n왼쪽 열: 앞(1층)+뒤(3층) → 가장 높은 3층이 보임.\n오른쪽 열: 앞(2층)+뒤(2층) → 2층이 보임.\n앞면도:\n```\n*\n*-*\n*-*\n```\n(왼쪽 3단, 오른쪽 2단)","game_type":"reveal"}]},{"type":"spatial","level":4,"title":"공간 퍼즐 4단계 — 공간 추론 기초","difficulty":"기초","thinking":"공간 추론 · 단면 분석 · 입체 조합","problems":[{"id":1,"question":"다음 쌓기 나무 구조에서\n보이지 않는 큐브는 몇 개인가요?\n\n```\n앞에서 본 모양:    옆에서 본 모양:\n*-*               *-*\n|2|               |2|\n*-*               *-*\n```\n\n위에서 본 모양:\n```\n*-*\n|?|\n*-*\n```","hints":["앞과 옆에서 모두 높이 2로 보입니다.\n위에서 보면 1×1 칸입니다.","1×1×2 = 2개 큐브인데 앞에서 1개만 보입니다."],"answer":"1개 (뒤쪽 큐브가 보이지 않음)","explanation":"1×1 바닥에 2층으로 쌓인 구조:\n앞에서: 2층 높이로 보임.\n옆에서: 2층 높이로 보임.\n총 큐브 2개 중 앞에서 볼 때 뒤쪽 1개는\n앞쪽 큐브에 가려져 보이지 않습니다.\n가려진 큐브 = 1개.","game_type":"reveal"},{"id":2,"question":"다음 전개도를 접었을 때\n마주보는 면끼리 올바르게 연결하세요.\n\n```\n      [A]\n   [B][C][D]\n      [E]\n      [F]\n```","hints":["C가 앞면이라고 가정하면:\nB=왼쪽, D=오른쪽, A=위, E=아래.","F는 E 아래에 있으므로 접으면 뒷면."],"answer":"A↔F (위↔뒤), B↔D (왼↔오른), C↔E (앞↔아래)","explanation":"C를 앞면으로 설정:\nC(앞) ↔ ?\nB(왼) ↔ D(오른).\nA(위) ↔ ?.\nE는 C 아래 → C(앞)의 아래면.\nF는 E 아래 → 접으면 C(앞)의 반대인 뒷면.\nA(위) ↔ F(뒤)의 반대편.\n정확한 마주보기:\nA ↔ F (위 ↔ 뒤로 이어진 면).\nB ↔ D (왼 ↔ 오른).\nC ↔ E (앞 ↔ 아래로 이어진 면의 반대).","game_type":"reveal"},{"id":3,"question":"다음 도형을 잘랐을 때 단면의 모양을 구하세요.\n\n구를 임의의 평면으로 자르면?\n원기둥을 축에 수직으로 자르면?\n원기둥을 축에 평행하게 자르면?","hints":["구: 어떻게 잘라도 단면은?\n원기둥 수직 절단: 윗면과 같은 모양?","원기둥 평행 절단: 긴 방향으로 자르면?"],"answer":"구=원 / 원기둥수직=원 / 원기둥평행=직사각형","explanation":"구의 단면:\n어떤 평면으로 잘라도 항상 원.\n중심을 지나면 최대원(대원).\n원기둥 수직 절단:\n축에 수직 = 밑면과 평행.\n단면 = 원.\n원기둥 평행 절단:\n축에 평행 = 옆면을 가름.\n단면 = 직사각형 (가로=지름, 세로=높이의 일부).","game_type":"reveal"},{"id":4,"question":"다음 그림에서 정육면체를 이루려면\n몇 개의 큐브가 더 필요한가요?\n\n```\n현재 상태 (위에서 본 그림, 숫자=높이):\n*-*-*\n|2|1|\n*-*-*\n|1|0|\n*-*-*\n목표: 3×3×3 정육면체의 왼쪽 앞 2×2 부분\n```\n\n목표 높이: 모두 3.","hints":["각 칸의 현재 높이와 목표 높이(3)의 차이를 구하세요.","(3-2)+(3-1)+(3-1)+(3-0) = ?"],"answer":"8개","explanation":"각 칸에 필요한 추가 큐브:\n(행1,열1): 3-2 = 1개.\n(행1,열2): 3-1 = 2개.\n(행2,열1): 3-1 = 2개.\n(행2,열2): 3-0 = 3개.\n합계: 1+2+2+3 = 8개.","game_type":"short_input"},{"id":5,"question":"다음 두 입체를 합쳤을 때 만들어지는\n새로운 입체의 겉넓이는?\n(각 면의 넓이 = 1)\n\n입체 A: 1×1×1 정육면체.\n입체 B: 1×1×1 정육면체.\n합치는 방법: 한 면을 완전히 맞붙임.","hints":["각 정육면체의 겉넓이: 6×1 = 6.\n두 개의 총 겉넓이: 12.","맞붙은 면 2개는 안쪽으로 숨어서 보이지 않음.\n12 - 2 = 10."],"answer":"10","explanation":"각 정육면체 겉넓이: 6.\n두 개 합산: 12.\n맞붙은 면: 각 1개씩, 총 2개가 내부로 숨음.\n겉넓이 감소: 2.\n합친 입체 겉넓이: 12 - 2 = 10.\n이 원리로 큐브를 여러 개 붙일 때\n겉넓이를 계산할 수 있습니다.","game_type":"number_input"},{"id":6,"question":"다음 좌표에서 점 A를 y축에 대해\n반사한 점 A'를 구하세요.\n\nA = (3, 2, 1) (3D 좌표)","hints":["y축 반사: x 좌표의 부호가 바뀝니다.\ny, z 좌표는 변하지 않습니다.","(x, y, z) → (-x, y, z)."],"answer":"A' = (-3, 2, 1)","explanation":"y축에 대한 반사 (3D):\ny축은 x=0인 평면(y-z 평면)에 포함.\ny-z 평면을 거울로 반사:\nx → -x, y → y, z → z.\nA(3,2,1) → A'(-3,2,1).\n3D에서의 반사 변환.","game_type":"short_input"},{"id":7,"question":"다음 도형을 x축 방향으로 2배,\ny축 방향으로 3배 확대하면\n꼭짓점들의 새 위치는?\n\n원래 꼭짓점: (0,0), (2,0), (2,1), (0,1).","hints":["x 좌표 × 2, y 좌표 × 3.","(x, y) → (2x, 3y)."],"answer":"(0,0), (4,0), (4,3), (0,3)","explanation":"확대 변환:\n(0,0) → (0×2, 0×3) = (0,0).\n(2,0) → (2×2, 0×3) = (4,0).\n(2,1) → (2×2, 1×3) = (4,3).\n(0,1) → (0×2, 1×3) = (0,3).\n원래: 가로 2, 세로 1 직사각형.\n확대 후: 가로 4, 세로 3 직사각형.\n넓이: 2 → 12 (6배 확대).","game_type":"reveal"},{"id":8,"question":"다음 패턴에서 빈칸을 채우세요.\n\n```\n정면:     옆면:     평면:\n*-*       *-*       *-*-*\n|1|       |1|       |1|1|\n*-*       *-*       *-*-*\n```\n\n위 삼각법에서 입체를 복원하면?","hints":["정면: 1×1 정사각형 → 높이 1, 폭 1.\n옆면: 1×1 정사각형 → 높이 1, 깊이 1.\n평면: 1×2 직사각형 → 폭 1, 깊이 2.","모든 조건을 만족하는 입체는?"],"answer":"1×2×1 직육면체 (가로1, 세로2, 높이1)","explanation":"삼각법 복원:\n정면(앞): 폭=1, 높이=1.\n측면(옆): 깊이=1, 높이=1.\n평면(위): 폭=1, 깊이=2.\n→ 가로(폭)=1, 세로(깊이)=2, 높이=1.\n1×2×1 직육면체.\n삼각법: 세 방향의 투영으로 입체를 특정.","game_type":"reveal"},{"id":9,"question":"정육면체를 꼭짓점에서 꼭짓점으로\n대각선을 그었을 때 대각선의 길이는?\n(모서리 길이 = 1)\n\n```\n    *---*\n   /|  /|\n  *---* |\n  | *-|-*\n  |/  |/\n  *---*\n```","hints":["3D 피타고라스 정리:\nd² = a² + b² + c².","a=1, b=1, c=1.\nd² = 1+1+1 = 3."],"answer":"√3 ≈ 1.732","explanation":"정육면체 공간 대각선:\n모서리 a=b=c=1.\n3D 피타고라스: d = √(a²+b²+c²).\nd = √(1+1+1) = √3 ≈ 1.732.\n면 대각선: √(1²+1²) = √2 ≈ 1.414.\n공간 대각선 > 면 대각선 > 모서리 길이.\n√3 > √2 > 1.","game_type":"short_input"},{"id":10,"question":"다음 도형 조각들을 조합하여\n4×4×4 정육면체를 만들려고 합니다.\n\n사용 가능한 조각:\n조각 A: 2×2×2 정육면체 (8개 단위).\n조각 B: 1×1×4 막대 (4개 단위).\n조각 C: 1×1×1 정육면체 (1개 단위).\n\n4×4×4 = 64개 단위.\n조각 A 4개를 사용했을 때\n남은 공간을 채우려면 B와 C를 어떻게 써야 하나요?","hints":["A 4개: 4×8 = 32개 단위.\n남은 공간: 64-32 = 32개 단위.","B 7개: 7×4 = 28개 단위.\n남은 4개는 C 4개로."],"answer":"B 8개(32개) 또는 B 7개+C 4개 등 다양한 조합 가능","explanation":"남은 공간: 32개 단위.\n가능한 조합:\nB만 사용: 32/4 = 8개.\nB 7개(28) + C 4개(4) = 32.\nB 6개(24) + C 8개(8) = 32.\n등 여러 조합.\n핵심: 남은 공간 = 32개 단위를 채울 수 있으면 됨.\n공간 분할의 다양한 해법이 가능합니다.","game_type":"reveal"}]},{"type":"spatial","level":5,"title":"공간 퍼즐 5단계 — 공간 변환의 심화","difficulty":"기초","thinking":"복합 변환 · 공간 좌표 · 입체 분석","problems":[{"id":1,"question":"다음 도형에 두 가지 변환을 순서대로 적용하세요.\n\n원래 점: A(1, 2).\n변환 1: x축에 대해 반사.\n변환 2: 오른쪽으로 3 이동.\n\n최종 위치는?","hints":["x축 반사: (x, y) → (x, -y).\nA(1,2) → (1,-2).","오른쪽 3 이동: x+3.\n(1,-2) → (4,-2)."],"answer":"(4, -2)","explanation":"변환 1 (x축 반사):\nA(1,2) → A'(1,-2).\ny 좌표의 부호 반전.\n변환 2 (오른쪽 3 이동):\nA'(1,-2) → A''(4,-2).\nx 좌표에 3 더하기.\n최종: (4,-2).\n변환의 순서가 바뀌면 결과가 달라질 수 있습니다.","game_type":"short_input"},{"id":2,"question":"다음 변환을 역순으로 적용하면 어떻게 될까요?\n\n원래: 오른쪽 3 이동 후 x축 반사.\n역순: x축 반사 후 오른쪽 3 이동.\n\nA(1, 2)에 각각 적용했을 때 결과를 비교하세요.","hints":["원래 순서:\n(1,2) → (4,2) → (4,-2).","역순:\n(1,2) → (1,-2) → (4,-2)."],"answer":"원래 순서: (4,-2) / 역순: (4,-2) — 이 경우 같음","explanation":"원래 순서:\n(1,2) →[오른쪽3]→ (4,2) →[x축반사]→ (4,-2).\n역순:\n(1,2) →[x축반사]→ (1,-2) →[오른쪽3]→ (4,-2).\n이 특수한 경우에는 결과가 같습니다.\n일반적으로 변환의 순서가 중요합니다.\n예: 회전 후 이동 ≠ 이동 후 회전.","game_type":"reveal"},{"id":3,"question":"다음 쌓기 나무 구조를 분석하세요.\n\n```\n위에서 본 그림 (숫자=높이):\n*-*-*\n|3|2|\n*-*-*\n|2|1|\n*-*-*\n```\n\n(1) 총 큐브 수는?\n(2) 정면에서 본 모양은?\n(3) 옆면(오른쪽)에서 본 모양은?","hints":["총 수: 각 칸의 숫자를 모두 더합니다.","정면: 각 열의 최대 높이.\n왼쪽열: max(3,2)=3, 오른쪽열: max(2,1)=2."],"answer":"(1) 8개 (2) 왼쪽3·오른쪽2 계단 모양 (3) 앞쪽3·뒤쪽2 계단 모양","explanation":"(1) 3+2+2+1 = 8개.\n(2) 정면(아래 행이 앞):\n왼열: max(앞2, 뒤3)=3.\n오른열: max(앞1, 뒤2)=2.\n```\n*\n*-*\n*-*\n```\n(3) 오른쪽 측면:\n앞열: max(왼2, 오른1)=2.\n→ 앞쪽 2단, 뒤쪽 높이 3이 max.\n```\n  *\n*-*\n*-*\n```","game_type":"reveal"},{"id":4,"question":"다음 정육면체 전개도에서\n접었을 때 면 1과 마주보는 면은?\n\n```\n         [2]\n   [3][1][4][6]\n         [5]\n```","hints":["1을 앞면으로 놓을 때:\n3=왼쪽, 4=오른쪽, 2=위, 5=아래.","6은 4(오른쪽)의 오른쪽에 있습니다.\n4를 오른쪽으로 접으면 6은 뒷면이 됩니다."],"answer":"면 1의 반대 = 면 6","explanation":"1을 기준으로:\n2(위) ↔ 5(아래) 마주봄.\n3(왼) ↔ 4를 넘어선 6 → 1(앞) ↔ 6(뒤) 마주봄.\n4(오른) ↔ 3(왼) 마주봄.\n따라서:\n1 ↔ 6 (앞↔뒤).\n2 ↔ 5 (위↔아래).\n3 ↔ 4 (왼↔오른).","game_type":"short_input"},{"id":5,"question":"다음 도형의 부피와 겉넓이를 구하세요.\n(단위: cm)\n\n```\n    *-------*\n   /|      /|  높이=2\n  *-------* |\n  |       | |\n  | *-----|-*  깊이=3\n  |/      |/\n  *-------*\n     가로=4\n```","hints":["직육면체 부피 = 가로 × 세로 × 높이.","겉넓이 = 2×(가로×세로 + 세로×높이 + 가로×높이)."],"answer":"부피=24cm³ / 겉넓이=52cm²","explanation":"부피 = 4×3×2 = 24cm³.\n겉넓이:\n앞뒤: 2×(4×2) = 16.\n좌우: 2×(3×2) = 12.\n위아래: 2×(4×3) = 24.\n합계: 16+12+24 = 52cm².\n또는: 2×(4×3 + 3×2 + 4×2) = 2×26 = 52cm².","game_type":"reveal"},{"id":6,"question":"다음 L자 모양 도형을 3D로 확장하면\n부피는 얼마인가요?\n(두께=2, 각 칸=1×1)\n\n```\n위에서 본 모양:\n*-*\n|X|\n*-*-*\n|X|X|\n*-*-*\n```","hints":["위에서 본 면적 × 두께 = 부피.\nX 칸의 수: 3개.","면적=3, 두께=2."],"answer":"6","explanation":"위에서 본 면적: X 칸 3개 = 3cm².\n두께(높이): 2cm.\n부피 = 면적 × 두께 = 3×2 = 6cm³.\n이 방법은 균일한 높이의 입체에 적용합니다.\n(프리즘의 부피 = 밑넓이 × 높이)","game_type":"number_input"},{"id":7,"question":"다음 두 직육면체를 붙여서 만든\n새 입체의 겉넓이를 구하세요.\n\n직육면체 A: 2×2×2 (겉넓이=24).\n직육면체 B: 2×2×2 (겉넓이=24).\n붙이는 방법: 2×2 면을 완전히 맞붙임.","hints":["두 겉넓이 합: 24+24=48.\n맞붙은 면 2개(각 4cm²)가 내부로.","48 - 2×4 = 48-8 = 40."],"answer":"40cm²","explanation":"A 겉넓이: 6×(2×2) = 24.\nB 겉넓이: 6×(2×2) = 24.\n합산: 48.\n맞붙은 면: A의 2×2면 + B의 2×2면 = 각 4cm².\n총 8cm²가 내부로 숨음.\n새 겉넓이: 48-8 = 40cm².\n결과: 4×2×2 직육면체 겉넓이 = 2×(8+8+16) = 40 ✓.","game_type":"short_input"},{"id":8,"question":"다음 도형을 x=2 직선을 축으로\n360도 회전시키면 어떤 입체가 될까요?\n\n```\ny\n4|\n3|  *---*\n2|  |   |\n1|  *---*\n0+----------x\n   0 1 2 3\n```\n(x=2를 축으로 회전, 사각형은 x=2~3, y=1~3)","hints":["x=2 축으로 회전하면 원통형 입체.\n사각형의 각 점이 원을 그립니다.","x=2에서 x=3까지: 반지름 1인 원.\ny=1에서 y=3까지: 높이 2."],"answer":"속이 찬 원기둥 (반지름=1, 높이=2)","explanation":"x=2를 축으로 회전체:\n사각형(x=2~3, y=1~3):\nx=2~3 부분이 회전 → 반지름 최대 1.\nx=2가 축 → 반지름 = 3-2 = 1.\ny=1~3 → 높이 = 2.\n결과: 반지름 1, 높이 2인 원기둥.\n부피 = π×1²×2 = 2π ≈ 6.28.","game_type":"reveal"},{"id":9,"question":"다음 정육면체 8개로 이루어진 2×2×2 구조에서\n각 작은 정육면체에 번호를 매기고\n대각선 방향으로 반대편에 있는 쌍을 찾으세요.\n\n```\n위층:          아래층:\n*-*-*          *-*-*\n|1|2|          |5|6|\n*-*-*          *-*-*\n|3|4|          |7|8|\n*-*-*          *-*-*\n```\n(앞왼=1, 앞오=2, 뒤왼=3, 뒤오=4,\n아래앞왼=5, 아래앞오=6, 아래뒤왼=7, 아래뒤오=8)","hints":["공간 대각선: 가장 멀리 떨어진 꼭짓점끼리.\n1은 위-앞-왼쪽 → 반대는 아래-뒤-오른쪽.","1↔8, 2↔7, 3↔6, 4↔5."],"answer":"1↔8 / 2↔7 / 3↔6 / 4↔5","explanation":"2×2×2 구조에서 공간 대각선 쌍:\n1(위앞왼) ↔ 8(아래뒤오른): 모든 좌표 반대.\n2(위앞오른) ↔ 7(아래뒤왼): 모든 좌표 반대.\n3(위뒤왼) ↔ 6(아래앞오른): 모든 좌표 반대.\n4(위뒤오른) ↔ 5(아래앞왼): 모든 좌표 반대.\n3D 공간에서 점(x,y,z)의 반대는 (-x,-y,-z).","game_type":"reveal"},{"id":10,"question":"다음 조건을 모두 만족하는 입체를 설계하세요.\n\n조건:\n①위에서 보면 정사각형.\n②앞에서 보면 삼각형.\n③옆에서 보면 삼각형.\n④부피가 최대가 되도록.","hints":["위=정사각형, 앞=삼각형, 옆=삼각형.\n어떤 입체가 이 조건을 만족하나요?","밑면이 정사각형이고 꼭대기가 점인 입체."],"answer":"사각뿔 (정사각형 밑면 피라미드)","explanation":"조건 분석:\n위에서=정사각형: 밑면이 정사각형.\n앞에서=삼각형: 옆에서 보면 삼각형.\n옆에서=삼각형: 앞에서 보면 삼각형.\n→ 사각뿔(밑면 정사각형, 꼭짓점 1개).\n부피 최대화:\n사각뿔 부피 = (1/3)×밑넓이×높이.\n같은 밑면에서 높이가 높을수록 부피 증가.\n밑면 a×a, 높이 h: V = a²h/3.\n제약 조건 내에서 h를 최대로.","game_type":"reveal"}]},{"type":"spatial","level":6,"title":"공간 퍼즐 6단계 — 기초 공간 종합","difficulty":"기초","thinking":"공간 종합 · 입체 재구성 · 복합 공간 분석","problems":[{"id":1,"question":"다음 세 방향의 투영도로\n원래 입체를 복원하세요.\n\n```\n정면:     측면:     평면:\n*-*-*     *-*       *-*-*\n|   |     | |       |   |\n*-*-*     | |       *-*-*\n|   |     *-*       \n*-*-*     \n```","hints":["정면: 2×2 격자 → 폭=2, 높이=2.\n측면: 1×2 → 깊이=1, 높이=2.\n평면: 2×1 → 폭=2, 깊이=1.","모든 조건: 폭=2, 깊이=1, 높이=2."],"answer":"2×1×2 직육면체 (가로2, 깊이1, 높이2)","explanation":"삼각법 복원:\n정면(폭×높이): 2×2.\n측면(깊이×높이): 1×2.\n평면(폭×깊이): 2×1.\n→ 가로=2, 깊이=1, 높이=2.\n2×1×2 직육면체.\n부피=4, 겉넓이=2×(2×1+1×2+2×2)=2×8=16.","game_type":"reveal"},{"id":2,"question":"다음 전개도를 접어서 만든 정육면체에서\n면 A의 위쪽에 오는 면과\n면 A의 오른쪽에 오는 면을 구하세요.\n\n```\n   [위]\n[왼][A][오른]\n   [아래]\n   [뒤]\n```","hints":["A를 앞면으로 놓겠습니다.\n왼=왼쪽, 오른=오른쪽, 위=위, 아래=아래.","뒤는 아래의 아래에 있으므로\n아래를 접으면 뒤가 됩니다.\n뒤 = 앞(A)의 반대면."],"answer":"A의 위쪽 = 위 / A의 오른쪽 = 오른","explanation":"A를 앞면 기준:\n위(A 위) → 접으면 위면 ✓.\n왼(A 왼) → 접으면 왼면 ✓.\n오른(A 오른) → 접으면 오른면 ✓.\n아래(A 아래) → 접으면 아랫면.\n뒤(아래 아래) → 접으면 A의 반대인 뒷면.\nA의 위쪽 = 위면.\nA의 오른쪽 = 오른면.","game_type":"reveal"},{"id":3,"question":"다음 입체를 물에 넣었다가 꺼낸 뒤\n물이 묻은 면의 넓이(겉넓이)를 구하세요.\n\n입체: 3×2×1 직육면체.\n조건: 3×2 면이 바닥에 닿아 있어\n바닥면에는 물이 묻지 않습니다.","hints":["전체 겉넓이에서 바닥면(3×2=6)을 빼면 됩니다.","전체 겉넓이: 2×(3×2+2×1+3×1) = 2×11 = 22.\n물 묻은 면: 22-6 = 16."],"answer":"16","explanation":"전체 겉넓이:\n앞뒤: 2×(3×1) = 6.\n좌우: 2×(2×1) = 4.\n위아래: 2×(3×2) = 12.\n합계: 22.\n바닥면(3×2=6)은 물 안 묻음.\n물 묻은 면: 22-6 = 16.","game_type":"number_input"},{"id":4,"question":"다음 도형들을 조합하여\n주어진 모양을 완성하세요.\n\n목표 모양 (위에서 본 그림):\n```\n*-*-*-*\n|X|X|X|\n*-*-*-*\n|X| |X|\n*-*-*-*\n|X|X|X|\n*-*-*-*\n```\n\n사용 가능한 조각:\n조각 A: L자 (3칸)\n조각 B: L자 (3칸)\n조각 C: 직선 (2칸)\n\nX칸=8개를 A×2+C×1로 채울 수 있나요?","hints":["A+A+C = 3+3+2 = 8칸.\n목표 X칸도 8개.","빈칸(가운데)을 피해 배치하세요.\nL자 두 개를 대칭으로 배치."],"answer":"가능 (L자 2개로 모서리, 직선 1개로 가운데 행 배치)","explanation":"배치 방법 예시:\nA1 (L자): 왼위모서리 (위행 왼2개 + 왼열 중간1개).\nA2 (L자): 오른위모서리 (대칭).\nC (직선): 아래행 가운데 2개.\n남은 칸: 왼아래, 오른아래 모서리.\n다양한 배치 방법이 가능합니다.\n공간 조각 맞추기 = 테트로미노/폴리오미노 퍼즐.","game_type":"reveal"},{"id":5,"question":"정육면체를 다음과 같이 잘랐을 때\n만들어지는 조각의 수와 각 조각의 모양을 구하세요.\n\n정육면체를 세 방향 (가로·세로·높이) 각각\n정중앙으로 한 번씩 자릅니다.","hints":["가로로 한 번: 2조각.\n세로로 한 번: 4조각.\n높이로 한 번: 8조각.","각 조각의 크기는 원래의 1/8."],"answer":"8개의 동일한 작은 정육면체","explanation":"3방향 각 1회 절단:\n가로 절단: 위아래 2조각.\n세로 절단: 앞뒤로 각각 2 → 4조각.\n높이 절단: 좌우로 각각 2 → 8조각.\n총 8개의 작은 정육면체.\n원래 부피의 1/8 크기.\n원래 모서리 a → 각 조각 모서리 a/2.","game_type":"short_input"},{"id":6,"question":"다음 입체의 겉넓이와 부피를 구하세요.\n\n계단 모양 입체:\n```\n위에서 본 그림 (숫자=높이):\n*-*-*\n|2|1|\n*-*-*\n|1|1|\n*-*-*\n각 칸의 밑면 넓이=1\n```","hints":["부피: 각 칸의 (밑넓이×높이) 합산.\n2×1 + 1×1 + 1×1 + 1×1 = 5.","겉넓이: 윗면 + 옆면 + 바닥.\n계단 효과로 옆면이 추가됩니다."],"answer":"부피=5 / 겉넓이=18","explanation":"부피: 2+1+1+1 = 5.\n겉넓이 계산:\n바닥(전체 4칸): 4.\n윗면(각 높이 위): 4칸 = 4.\n앞면: 높이2+높이1=3 (2칸 폭에서 각 높이).\n뒷면: 1+1=2.\n왼쪽: 2+1=3.\n오른쪽: 1+1=2.\n내부 계단 옆면 추가: 높이 차이 1짜리 2면.\n합계: 4+4+3+2+3+2 = 18.","game_type":"reveal"},{"id":7,"question":"다음 도형을 90도씩 4번 회전했을 때\n원래 모양으로 돌아오지 않는 도형은?\n\nA: 정사각형\nB: 직사각형 (가로≠세로)\nC: 정삼각형\nD: 원","hints":["90도 4번 = 360도 = 원래 모양으로.\n하지만 회전 중간에 다른 모양이 보이는 것은?","정삼각형을 90도 회전하면 원래와 다릅니다.\n120도 회전해야 같아집니다."],"answer":"B (직사각형), C (정삼각형)","explanation":"A(정사각형): 90도 회전마다 동일 모양.\nB(직사각형 가로≠세로): 90도 회전하면 다른 모양.\n180도 회전해야 원래 모양 복원.\nC(정삼각형): 120도 회전해야 동일.\n90도 회전 시 다른 모양.\nD(원): 어떤 각도로 회전해도 동일.\n회전 대칭: n각형은 360/n도 회전마다 동일.\n정삼각형: 120도, 정사각형: 90도, 정육각형: 60도.","game_type":"reveal"},{"id":8,"question":"다음 조건으로 최대 부피의 직육면체를 설계하세요.\n\n조건: 모든 모서리 길이의 합 = 24.\n(직육면체는 4개의 동일한 세트 모서리가 있음)","hints":["모서리 합: 4(a+b+c) = 24.\n→ a+b+c = 6.","산술-기하 평균 부등식:\na+b+c ≥ 3×(abc)^(1/3).\n등호: a=b=c일 때."],"answer":"a=b=c=2인 정육면체, 부피=8","explanation":"a+b+c = 6 조건에서 부피 abc 최대화.\nAM-GM 부등식: (a+b+c)/3 ≥ (abc)^(1/3).\n6/3 ≥ (abc)^(1/3).\n2 ≥ (abc)^(1/3).\nabc ≤ 8.\n등호 조건: a=b=c=2.\n최대 부피 = 2×2×2 = 8.\n→ 같은 모서리 합에서 정육면체가 부피 최대.","game_type":"reveal"},{"id":9,"question":"다음 3D 미로를 통과하는 경로를 찾으세요.\n\n```\n층1 (아래):        층2 (위):\n*-*-*-*           *-*-*-*\n|S| |E|           | |E| |\n*-*-*-*           *-*-*-*\n| | | |           | | | |\n*-*-*-*           *-*-*-*\n(S=시작, E=탈출구)\n(층1의 E 위치에 층2로 올라가는 계단)\n(층2의 E가 출구)\n```\n\n이동 가능: 상하좌우 + 계단 오르기.\n벽: 각 칸 사이의 일부 선.","hints":["S(층1 왼위) → 계단 위치(층1 오른위) → 층2 → 출구.","층1에서 오른쪽으로 이동 후 계단 올라가기."],"answer":"S → 오른쪽2칸(층1 E) → 층2로 올라가기 → 왼쪽1칸(층2 E=출구)","explanation":"3D 미로 경로:\n1. 층1 시작점(S).\n2. 오른쪽으로 2칸 이동.\n3. 층1의 E(계단) 위치 도달.\n4. 계단으로 층2 올라가기.\n5. 층2에서 왼쪽 1칸.\n6. 층2의 E(출구) 도달.\n3D 미로: 층 간 이동이 추가된 공간 탐색.","game_type":"reveal"},{"id":10,"question":"다음 종합 문제를 풀어보세요.\n\n정육면체의 겉면을 빨강·파랑·노랑·초록·보라·주황\n6가지 색으로 칠합니다.\n마주보는 면은 같은 색 없이, 모든 면이 다른 색.\n\n(1) 가능한 색칠 방법은 몇 가지인가요?\n(2) 위면=빨강으로 고정했을 때 나머지 배치는?\n(3) 회전으로 같은 모양이 되는 것은 같은 것으로 볼 때?","hints":["정육면체는 24가지 회전 대칭이 있습니다.","총 배치: 6! = 720.\n회전 동일: 24개씩 묶임.\n720/24 = 30."],"answer":"(1) 720가지 (2) 5!=120가지 (3) 30가지","explanation":"(1) 6개 면에 6가지 색을 배치: 6! = 720.\n(2) 위면 고정 후 나머지 5면: 5! = 120.\n(3) 회전 대칭 고려:\n정육면체 회전 대칭 수 = 24.\n구별되는 색칠 = 6!/24 = 30가지.\n[계산: 한 면을 고정(6가지 선택), 그 면을 위로.\n남은 4가지 측면 배치: 4!/4 = 6 (원형 배열).\n아래 면: 1가지.\n합계: 6×1×6×5/(중복없이) = 30.]","game_type":"reveal"}]},{"type":"spatial","level":7,"title":"공간 퍼즐 7단계 — 공간의 깊은 층위","difficulty":"발전","thinking":"공간 추론 심화 · 위상 · 다차원","problems":[{"id":1,"question":"다음 도형들을 위상적으로 분류하세요.\n(위상적 동치: 연속 변형으로 서로 변환 가능)\n\nA: 원 (O)\nB: 정사각형 (□)\nC: 삼각형 (△)\nD: 8자 모양 (∞)\nE: 도넛 모양 (토러스)\nF: 구","hints":["위상적 동치: 찢거나 붙이지 않고 늘리거나 구부려서 변환.\n원, 정사각형, 삼각형은 모두 하나의 폐곡선.","8자: 자기 교차 있음 → 원과 다름.\n도넛: 구멍 1개 → 구와 다름."],"answer":"{A,B,C}동치 / {D}별도 / {F}별도 / {E}별도","explanation":"위상적 동치 (2D):\nA(원)=B(정사각형)=C(삼각형): 모두 단순 폐곡선.\n연속 변형으로 서로 변환 가능.\nD(8자): 자기 교차점 1개 → 다른 위상.\n3D:\nF(구)≠E(도넛): 구멍의 수가 다름.\n위상 불변량: 오일러 특성수, 구멍의 수(genus).\n구: genus=0, 도넛: genus=1.\n위상수학: 연속 변형에서 변하지 않는 성질 연구.","game_type":"reveal"},{"id":2,"question":"다음 뫼비우스 띠의 성질을 분석하세요.\n\n```\n뫼비우스 띠: 직사각형 종이의 한 끝을\n180도 비틀어 붙인 것.\n\n    ___________\n   /           \\\n  /    (반틀림)  \\\n /_______________\\\n```\n\n(1) 면의 수는?\n(2) 가장자리(경계)의 수는?\n(3) 중간선을 따라 잘랐을 때 어떻게 되나요?","hints":["뫼비우스 띠: 안과 밖이 없는 단면 곡면.\n개미가 표면을 따라 걸으면 양면을 모두 지남.","중간선 자르기: 분리되지 않고 2배 긴 띠가 됩니다."],"answer":"면=1개 / 가장자리=1개 / 자르면=2배긴띠(한번꼬임)","explanation":"뫼비우스 띠의 특성:\n면: 1개 (안팎 구분 없는 단면 곡면).\n일반 종이: 2면, 2가장자리.\n뫼비우스: 1면, 1가장자리.\n중간선 자르기:\n분리되지 않고 한 개의 긴 띠.\n길이 2배, 한 번 꼬인 띠.\n1/3 지점 자르기: 두 개의 연결된 띠.\n위상수학의 핵심 예시.\n비방향성(non-orientable) 곡면의 대표.","game_type":"reveal"},{"id":3,"question":"4차원 초입방체(하이퍼큐브, tesseract)의\n꼭짓점, 모서리, 면, 셀의 수를 구하세요.\n\n패턴 분석:\n- 0차원 점: 꼭짓점 1\n- 1차원 선분: 꼭짓점 2, 모서리 1\n- 2차원 정사각형: 꼭짓점 4, 모서리 4, 면 1\n- 3차원 정육면체: 꼭짓점 8, 모서리 12, 면 6, 셀 1","hints":["n차원에서 (n+1)차원으로:\n꼭짓점 ×2, 모서리 = 이전 모서리×2 + 이전 꼭짓점.\n면 = 이전 면×2 + 이전 모서리.","꼭짓점: 8×2=16.\n모서리: 12×2+8=32.\n면: 6×2+12=24.\n셀: 1×2+6=8."],"answer":"꼭짓점=16 / 모서리=32 / 면=24 / 셀=8","explanation":"n차원 초입방체 패턴:\n차원 | 꼭짓점 | 모서리 | 면  | 셀\n0    |  1    |  0    |  0  | 0\n1    |  2    |  1    |  0  | 0\n2    |  4    |  4    |  1  | 0\n3    |  8    |  12   |  6  | 1\n4    |  16   |  32   |  24 | 8\n오일러 특성수 검증:\n3D: 8-12+6 = 2 ✓.\n4D: 16-32+24-8 = 0.\n4D 오일러 수 = 0 (짝수 차원).","game_type":"reveal"},{"id":4,"question":"다음 그래프의 오일러 경로가\n존재하는지 판단하세요.\n\n```\n그래프 A:       그래프 B:\n*---*           *---*\n|   |           |   |\n*---*           *---*---*\n                    |\n                    *\n```\n\n오일러 경로: 모든 간선을 정확히 한 번씩 지나는 경로.","hints":["오일러 경로 조건:\n홀수 차수 꼭짓점이 0개 (오일러 회로) 또는\n정확히 2개 (오일러 경로).","그래프 A: 각 꼭짓점의 차수를 세어보세요.\n그래프 B: 차수 3인 꼭짓점이 있나요?"],"answer":"A=존재(오일러회로) / B=존재(홀수차수꼭짓점2개)","explanation":"그래프 A (정사각형):\n각 꼭짓점 차수: 2, 2, 2, 2 (모두 짝수).\n홀수 차수 = 0개 → 오일러 회로 존재.\n그래프 B (T자형):\n꼭짓점 차수: 2, 2, 3, 3, 1 (홀수 꼭짓점 2개).\n→ 오일러 경로 존재 (시작=홀수, 끝=홀수).\n홀수 차수가 3개 이상이면 오일러 경로 없음.\n쾨니히스베르크 다리 문제: 오일러가 해결한 최초의 그래프 이론.","game_type":"reveal"},{"id":5,"question":"다음 공간 퍼즐을 풀어보세요.\n\n3×3×3 정육면체를 만들기 위해\n1×1×3 막대 조각을 사용합니다.\n정확히 9개의 막대로 3×3×3을 채울 수 있나요?","hints":["3×3×3 = 27개 단위.\n막대 1개 = 3개 단위.\n27/3 = 9개. 개수는 맞습니다.","색칠 논리: 3×3×3을 3색으로 칠해보세요.\n각 막대는 반드시 3가지 색을 모두 포함합니다."],"answer":"가능","explanation":"9개의 1×1×3 막대로 3×3×3 채우기:\n수학적 가능성:\n27단위 / 3단위 = 9개 막대.\n실제 배치:\n층별로 3×3을 가로 3막대 × 3층 = 9막대.\n또는 다양한 방향 혼합.\n3색 체크:\nx,y,z 각 방향으로 0,1,2 라벨링.\n각 막대: (x+y+z) mod 3 값이 0,1,2를 하나씩 포함.\n→ 9개 막대로 완전히 채울 수 있음.","game_type":"short_input"},{"id":6,"question":"다음 정다면체들의 이중성을 분석하세요.\n\n플라톤 입체:\n- 정사면체 (4면): 꼭짓점 4, 모서리 6, 면 4\n- 정육면체 (6면): 꼭짓점 8, 모서리 12, 면 6\n- 정팔면체 (8면): 꼭짓점 6, 모서리 12, 면 8\n\n정육면체와 정팔면체는 서로 \"쌍대\"입니다.\n쌍대: 면의 중심을 연결하면 반대 입체가 됩니다.\n\n(1) 정사면체의 쌍대는?\n(2) 정십이면체(12면)의 쌍대는?\n(3) 오일러 공식 V-E+F=2를 확인하세요.","hints":["쌍대 관계: 면↔꼭짓점이 교환됩니다.\n정육면체(V=8,F=6) ↔ 정팔면체(V=6,F=8).","정사면체: V=F=4 → 자기 자신이 쌍대."],"answer":"정사면체=자기쌍대 / 정십이면체↔정이십면체 / V-E+F=2확인","explanation":"플라톤 입체 쌍대:\n정사면체(4,6,4) ↔ 정사면체(자기 쌍대).\n정육면체(8,12,6) ↔ 정팔면체(6,12,8).\n정십이면체(20,30,12) ↔ 정이십면체(12,30,20).\n오일러 공식 확인:\n정사면체: 4-6+4 = 2 ✓.\n정육면체: 8-12+6 = 2 ✓.\n정팔면체: 6-12+8 = 2 ✓.\n쌍대: V와 F가 교환, E는 동일.\n5가지 플라톤 입체 = 3개의 쌍대 쌍.","game_type":"reveal"},{"id":7,"question":"다음 프랙탈의 4단계 반복 후\n둘레와 넓이를 구하세요.\n\n코흐 눈송이:\n1단계: 정삼각형 (변 길이=1).\n2단계: 각 변을 3등분하고 가운데에 정삼각형 추가.\n\n단계별 패턴:\n- 변의 수: 3, 12, 48, ...\n- 각 변의 길이: 1, 1/3, 1/9, ...\n- 둘레: 3, 4, 16/3, ...","hints":["각 단계에서 변의 수 ×4, 각 변 길이 ×1/3.\n둘레 = 변수 × 변길이.","n단계 둘레 = 3 × (4/3)^n.\nn→∞: 둘레 → ∞."],"answer":"4단계 둘레=3×(4/3)⁴=768/81≈9.48 / 넓이는 수렴(유한)","explanation":"코흐 눈송이:\nn단계 변수: 3×4^n.\nn단계 변길이: (1/3)^n.\nn단계 둘레: 3×(4/3)^n.\n4단계: 3×(4/3)⁴ = 3×256/81 = 768/81 ≈ 9.48.\n넓이 수렴:\n추가되는 삼각형 넓이의 합 = 유한값.\n초기 넓이(√3/4)에 수렴하는 급수를 더함.\n역설: 둘레=무한, 넓이=유한.\n프랙탈 차원: log4/log3 ≈ 1.26 (1과 2 사이).","game_type":"reveal"},{"id":8,"question":"다음 좌표 변환 행렬을 분석하세요.\n\n2D 회전 행렬 (θ도 회전):\n```\n[cos θ  -sin θ] [x]   [x']\n[sin θ   cos θ] [y] = [y']\n```\n\n(1) θ=90도일 때 행렬은?\n(2) 점 (3,1)을 90도 회전한 결과는?\n(3) 회전 행렬의 행렬식(determinant)은?","hints":["cos90°=0, sin90°=1.\n행렬: [[0,-1],[1,0]].","[0,-1][3]   [0×3+(-1)×1]   [-1]\n[1, 0][1] = [1×3+0×1   ] = [ 3]"],"answer":"(1) [[0,-1],[1,0]] (2) (-1,3) (3) 1","explanation":"90도 회전 행렬:\n[[cos90, -sin90], [sin90, cos90]]\n= [[0,-1],[1,0]].\n점 (3,1) 적용:\nx' = 0×3 + (-1)×1 = -1.\ny' = 1×3 + 0×1 = 3.\n결과: (-1, 3).\n행렬식: cos²θ + sin²θ = 1.\n회전 행렬의 행렬식 = 항상 1.\n→ 크기(넓이) 변화 없음.\n회전은 등거리 변환: 거리, 각도, 넓이 보존.","game_type":"reveal"},{"id":9,"question":"다음 위상 문제를 분석하세요.\n\n컵과 도넛은 위상적으로 동치입니까?\n\n```\n컵:          도넛:\n ___          ___\n|   |        /   \\\n|   |       |  O  |\n|   |        \\___/\n ---\n |_|  ← 손잡이\n```","hints":["위상적 동치: 찢거나 붙이지 않고 연속 변형.\n구멍의 개수(genus)가 위상 불변량.","컵: 손잡이에 구멍 1개.\n도넛: 구멍 1개."],"answer":"동치 (genus=1로 같음)","explanation":"위상적 동치 분석:\n컵(손잡이 있는): 구멍 1개 (손잡이 구멍).\n도넛(토러스): 구멍 1개.\n둘 다 genus=1 → 위상적으로 동치.\n컵을 늘리고 변형하면 도넛이 됩니다.\n반면:\n구(genus=0) ≠ 도넛(genus=1).\n\"위상학자는 커피잔과 도넛을 구별 못한다\"는 농담.\n위상 불변량: genus, 오일러 수, 기본 군.","game_type":"short_input"},{"id":10,"question":"다음 공간 퍼즐을 설계하고 풀어보세요.\n\n4×4 격자에서 시작점 S(1,1)에서 출발하여\n목표점 E(4,4)까지 이동합니다.\n\n조건:\n①오른쪽 또는 위로만 이동.\n②같은 칸을 두 번 방문 불가.\n③(2,2), (3,3) 칸은 통과 불가.\n\n(1) 가능한 경로의 수를 구하세요.\n(2) 막힌 칸 없이 이동 가능한 경우의 수와 비교하세요.","hints":["막힌 칸 없는 경우: C(6,3) = 20가지.\n(4×4 격자에서 오른쪽 3번, 위쪽 3번 = C(6,3))","(2,2)와 (3,3) 모두 통과하는 경로를 빼면 됩니다.\n포함-배제 원리 적용."],"answer":"전체20 - 두칸모두통과하는경우 = 20-4=16가지","explanation":"전체 경로 (제약 없음): C(6,3) = 20.\n(2,2)만 통과: S→(2,2)→E.\nS→(2,2): C(2,1)=2.\n(2,2)→E: C(4,2)=6.\n합: 2×6=12.\n(3,3)만 통과: S→(3,3)→E.\nS→(3,3): C(4,2)=6.\n(3,3)→E: C(2,1)=2.\n합: 6×2=12.\n(2,2)와 (3,3) 모두 통과:\nS→(2,2)→(3,3)→E: 2×2×2=... 재계산 필요.\nS→(2,2): 2, (2,2)→(3,3): C(2,1)=2, (3,3)→E: 2.\n합: 2×2×2=8.\n포함-배제: 12+12-8=16.\n제약 있는 경로: 20-16=4가지.","game_type":"reveal"}]},{"type":"spatial","level":8,"title":"공간 퍼즐 8단계 — 공간 구조의 심화","difficulty":"발전","thinking":"비유클리드 기하 · 변환군 · 공간 분류","problems":[{"id":1,"question":"다음 세 가지 기하학을 비교하세요.\n\n유클리드 기하 (평면):\n- 삼각형 내각 합 = 180도.\n- 평행선은 만나지 않음.\n- 피타고라스 정리 성립.\n\n구면 기하 (지구 표면):\n- 삼각형 내각 합 > 180도.\n- 모든 대원은 만남 (평행선 없음).\n\n쌍곡 기하 (안장면):\n- 삼각형 내각 합 < 180도.\n- 한 직선 밖 점에서 평행선 무한히 많음.\n\n(1) 지구에서 북극→적도→90도 동진→북극의 삼각형 내각 합은?\n(2) 각 기하에서 원의 둘레와 반지름 관계는?","hints":["북극→적도: 경도 0.\n적도→90도 동진: 위도 0.\n90도→북극: 경도 90.\n각 꼭짓점의 각도를 구하세요.","북극 각도: 90도 (경도 0과 90의 차이).\n적도의 두 꼭짓점: 각 90도."],"answer":"270도 / 유클리드=2πr, 구면<2πr, 쌍곡>2πr","explanation":"구면 삼각형:\n북극 꼭짓점: 90도 (경선 0°와 90° 사이).\n적도 왼쪽 꼭짓점: 90도 (경선과 적도 직각).\n적도 오른쪽 꼭짓점: 90도.\n내각 합 = 90+90+90 = 270도.\n(180도 초과 = 양의 곡률)\n원의 둘레:\n평면: C = 2πr.\n구면: C < 2πr (곡률이 양수 → 작아짐).\n쌍곡: C > 2πr (곡률이 음수 → 커짐).","game_type":"reveal"},{"id":2,"question":"다음 대칭 변환군을 분석하세요.\n\n정사각형의 대칭군 D4:\n- 회전: 0°, 90°, 180°, 270° (4가지)\n- 반사: 가로축, 세로축, 대각선 2개 (4가지)\n- 총 8가지 대칭 변환\n\n(1) D4의 원소 8개를 나열하세요.\n(2) 90도 회전 후 가로축 반사와\n    가로축 반사 후 90도 회전은 같은가요?\n(3) 군의 닫힘 성질을 설명하세요.","hints":["회전: r0(항등), r1(90°), r2(180°), r3(270°).\n반사: s1(가로), s2(세로), s3(대각선/), s4(대각선\\).","r1 후 s1 ≠ s1 후 r1 (비가환)."],"answer":"8원소 / 순서에따라다름(비가환군) / 두변환의합성=항상군내원소","explanation":"D4 원소:\nr0: 항등 (0도 회전).\nr1: 90도 회전.\nr2: 180도 회전.\nr3: 270도 회전.\ns1: 가로축 반사.\ns2: 세로축 반사.\ns3: 주대각선 반사.\ns4: 부대각선 반사.\n비가환성:\nr1∘s1 ≠ s1∘r1.\n(90도 후 가로반사 ≠ 가로반사 후 90도)\n닫힘 성질:\n임의의 두 대칭 합성 → 항상 D4의 원소.\n군의 4조건: 닫힘, 결합법칙, 항등원, 역원.","game_type":"reveal"},{"id":3,"question":"다음 타일링(테셀레이션) 문제를 분석하세요.\n\n정다각형 중 평면을 완전히 덮을 수 있는 것은?\n\n정삼각형 (내각 60°): 60×? = 360.\n정사각형 (내각 90°): 90×? = 360.\n정육각형 (내각 120°): 120×? = 360.\n정오각형 (내각 108°): 108×? = 360.\n정칠각형 (내각 ≈128.6°): 가능?","hints":["꼭짓점 주위 각도 합 = 360도이어야 합니다.\nn각형의 내각 = (n-2)×180/n.","정오각형: 360/108 ≈ 3.33 (정수 아님 → 불가).\n정삼각형: 360/60 = 6 → 가능."],"answer":"정삼각형(6개), 정사각형(4개), 정육각형(3개)만 가능","explanation":"평면 타일링 조건:\n꼭짓점에서 만나는 각도 합 = 360도.\n정삼각형(60°): 6개 = 360 ✓.\n정사각형(90°): 4개 = 360 ✓.\n정오각형(108°): 360/108 ≈ 3.33 ✗.\n정육각형(120°): 3개 = 360 ✓.\n정칠각형(≈128.6°): 360/128.6 ≈ 2.8 ✗.\n오직 3가지 정다각형만 평면 타일링 가능.\n벌집 구조: 정육각형 타일링 (효율 최대).\n반정다각형 타일링: 두 종류 이상 조합으로 더 가능.","game_type":"reveal"},{"id":4,"question":"다음 꼭짓점에서 만나는 정다면체들의\n슐레플리 기호를 분석하세요.\n\n슐레플리 기호 {p,q}: p각형 면, 각 꼭짓점에 q개 면.\n정사면체: {3,3}\n정육면체: {4,3}\n정팔면체: {3,4}\n정십이면체: {5,3}\n정이십면체: {3,5}\n\n조건: 꼭짓점의 각도 합 < 360도.\n\n(1) {3,3}의 꼭짓점 각도 합은?\n(2) 왜 {3,6}은 정다면체가 아닌가요?\n(3) 5가지만 존재하는 이유를 설명하세요.","hints":["{3,3}: 정삼각형(60°) 3개 → 180도.\n{3,6}: 정삼각형(60°) 6개 → 360도.","꼭짓점 각도 합 < 360도 → 볼록 다면체.\n= 360도 → 평면 타일링.\n> 360도 → 불가."],"answer":"{3,3}=180° / {3,6}=360°(타일링만가능) / 5개=각도조건만족경우","explanation":"슐레플리 기호 {p,q} 조건:\n꼭짓점 각도 합 = q × (p-2)×180/p < 360.\n{3,3}: 3×60 = 180 < 360 ✓ (정사면체).\n{4,3}: 3×90 = 270 < 360 ✓ (정육면체).\n{3,4}: 4×60 = 240 < 360 ✓ (정팔면체).\n{5,3}: 3×108 = 324 < 360 ✓ (정십이면체).\n{3,5}: 5×60 = 300 < 360 ✓ (정이십면체).\n{3,6}: 6×60 = 360 = 360 → 타일링 (평면).\n{4,4}: 4×90 = 360 → 타일링.\n조건을 만족하는 {p,q}는 딱 5가지뿐.\n따라서 플라톤 입체는 5가지만 존재.","game_type":"reveal"},{"id":5,"question":"다음 아핀 변환(affine transformation)을 분석하세요.\n\n아핀 변환: y = Ax + b\nA는 행렬, b는 평행이동 벡터.\n\n변환 T1: A=[[2,0],[0,2]], b=[1,1].\n변환 T2: A=[[0,-1],[1,0]], b=[0,0].\n(T2는 90도 회전)\n\n(1) T1을 점 (1,1)에 적용하면?\n(2) T2를 점 (3,0)에 적용하면?\n(3) T1∘T2(T2 먼저 후 T1)를 점 (1,0)에 적용하면?","hints":["T1: 2배 확대 후 (1,1) 이동.\n(1,1) → (2,2) → (3,3).","T2: 90도 회전.\n(3,0) → (0,3)."],"answer":"(1)(3,3) (2)(0,3) (3)T2먼저(0,1)후T1적용=(1,3)","explanation":"(1) T1(1,1):\n2×(1,1) + (1,1) = (2,2)+(1,1) = (3,3).\n(2) T2(3,0):\n[[0,-1],[1,0]]×(3,0) = (0×3+(-1)×0, 1×3+0×0) = (0,3).\n(3) T1∘T2(1,0):\n먼저 T2: (0,3)×(1,0)...\nT2(1,0) = (0×1+(-1)×0, 1×1+0×0) = (0,1).\nT1(0,1) = 2×(0,1)+(1,1) = (0,2)+(1,1) = (1,3).\n결과: (1,3).","game_type":"reveal"},{"id":6,"question":"다음 입체의 위상적 성질을 분석하세요.\n\n클라인 병(Klein bottle):\n뫼비우스 띠 두 개를 가장자리끼리 붙인 것.\n\n```\n클라인 병의 특성:\n- 3D 공간에서 자기 교차 없이 표현 불가\n- 4D 공간에서 완전한 표현 가능\n```\n\n(1) 클라인 병의 면의 수는?\n(2) 안과 밖이 구분되나요?\n(3) 구, 토러스, 클라인 병의 오일러 수를 비교하세요.","hints":["뫼비우스 띠: 1면, 1가장자리.\n두 뫼비우스 띠를 가장자리로 붙이면?","클라인 병: 1면 (단면 곡면).\n오일러 수: χ = V - E + F."],"answer":"면=1개 / 안밖구분없음 / 구χ=2·토러스χ=0·클라인χ=0","explanation":"클라인 병:\n면: 1개 (비방향성 단면 곡면).\n안과 밖: 구분 없음 (뫼비우스 띠처럼).\n3D에서 자기 교차 없이 표현 불가.\n4D에서만 완전 임베딩 가능.\n오일러 수 비교:\n구(genus=0): χ = 2.\n토러스(genus=1): χ = 0.\n클라인 병: χ = 0 (토러스와 동일한 오일러 수).\n하지만 클라인 병 ≠ 토러스 (방향성 다름).\n비방향성 곡면: 뫼비우스 띠, 클라인 병, 사영 평면.","game_type":"reveal"},{"id":7,"question":"다음 결정 구조(crystal structure)를 분석하세요.\n\n입방체 격자계:\n단순 입방: 꼭짓점에만 원자.\n체심 입방(BCC): 꼭짓점 + 중심에 원자.\n면심 입방(FCC): 꼭짓점 + 각 면 중심에 원자.\n\n(1) 각 격자의 단위 셀당 원자 수는?\n(2) 충전율(packing fraction)이 가장 높은 것은?\n(3) 금속 결정에서 FCC가 많은 이유는?","hints":["꼭짓점 원자: 8개 꼭짓점 각 1/8 = 1개.\n면 원자: 6개 면 각 1/2 = 3개.\n체심 원자: 중심 = 1개.","단순 입방: 1개.\nBCC: 1+1 = 2개.\nFCC: 1+3 = 4개."],"answer":"SC=1 / BCC=2 / FCC=4 / FCC충전율=74%최고","explanation":"단위 셀당 원자 수:\nSC: 8×(1/8) = 1.\nBCC: 8×(1/8) + 1 = 2.\nFCC: 8×(1/8) + 6×(1/2) = 4.\n충전율:\nSC: π/6 ≈ 52%.\nBCC: π√3/8 ≈ 68%.\nFCC: π/(3√2) ≈ 74%.\nFCC = 최밀 충전 구조.\n구를 가장 효율적으로 쌓는 방법 = FCC or HCP (둘 다 74%).\n금, 은, 알루미늄, 구리: FCC 구조.\nFCC의 이점: 충전율 최고 + 미끄럼면 많음 = 연성.","game_type":"reveal"},{"id":8,"question":"다음 투영(projection)의 종류와 특성을 분석하세요.\n\n지도 투영법:\n메르카토르 도법: 각도 보존 (정각).\n람베르트 도법: 넓이 보존 (정적).\n스테레오그래픽: 원 보존.\n\n(1) 어떤 도법도 거리·각도·넓이를 동시에 보존할 수 없는 이유는?\n(2) 메르카토르 도법에서 그린란드와 아프리카 크기 왜곡은?\n(3) 구에서 평면으로 정보 손실이 불가피한 이유는?","hints":["구는 가우스 곡률이 양수.\n평면은 곡률 0.\n가우스의 놀라운 정리: 곡률은 국소 등거리 변환에서 보존.","메르카토르: 고위도로 갈수록 넓이 과장.\n그린란드(실제): 아프리카의 약 1/14 크기."],"answer":"가우스정리=곡률불보존 / 그린란드=아프리카1/14지만지도에서비슷 / 구↔평면=위상동치지만등거리불가","explanation":"보존 불가능성:\n가우스 놀라운 정리: 국소 등거리 변환에서 가우스 곡률 보존.\n구(곡률>0) ≠ 평면(곡률=0).\n→ 거리 보존 투영 불가.\n각도·넓이·거리 중 하나만 선택 가능.\n메르카토르 왜곡:\n그린란드 실제 면적: 약 216만 km².\n아프리카 실제 면적: 약 3,037만 km².\n비율: 약 1:14.\n메르카토르에서는 비슷해 보임 (위도 오차).\n위상적 관점:\n구와 평면: 위상적 비동치 (구는 컴팩트, 평면은 비컴팩트).\n구를 투영하려면 적어도 한 점 제거 필요 (무한점).","game_type":"reveal"},{"id":9,"question":"다음 공간 충전 문제를 분석하세요.\n\n케플러 추측(1611): 구를 가장 효율적으로 쌓는 방법은\nFCC(면심 입방) 또는 HCP(육방 최밀)로, 충전율 ≈ 74.05%.\n\n(1) 이 추측이 증명된 것은 언제인가요?\n(2) 2D에서 원의 최밀 충전율은?\n(3) n차원으로 일반화하면 어떤 패턴이 있나요?","hints":["케플러 추측: 헤일스(1998)가 컴퓨터 증명.\n공식 증명 완성: 2017년 Flyspeck 프로젝트.","2D 원 최밀: 정육각형 배치, π/(2√3) ≈ 90.7%."],"answer":"1998/2017증명 / 2D≈90.7% / 고차원=복잡(E8·Leech격자최적)","explanation":"케플러 추측 증명:\n헤일스-퍼거슨(1998): 컴퓨터 보조 증명.\nFlyspeck(2017): 형식 검증 완료.\n400년 미해결 문제.\n2D 최밀 충전:\n정육각형 격자: π/(2√3) ≈ 0.9069 = 90.7%.\nthue(1892): 최밀 충전 증명.\n고차원:\n8차원: E8 격자 (2016, 비아조프스카).\n24차원: Leech 격자 (2016, 비아조프스카 등).\n필즈 메달 수상.\n일반 차원: 최적 해 대부분 미해결.","game_type":"reveal"},{"id":10,"question":"다음 공간 분류 문제를 종합적으로 분석하세요.\n\n2D 컴팩트 곡면의 분류 정리:\n모든 콤팩트 방향성 곡면은 genus g의 토러스.\n모든 콤팩트 비방향성 곡면은 cross-cap k개.\n\ng=0: 구.\ng=1: 토러스.\ng=2: 이중 토러스.\nk=1: 사영 평면.\nk=2: 클라인 병.\n\n(1) 각 곡면의 오일러 수는?\n(2) 방향성과 비방향성의 차이는?\n(3) 3D 닫힌 다양체의 분류는?","hints":["방향성 곡면 오일러 수: χ = 2-2g.\n비방향성: χ = 2-k.","방향성: 곡면 위에 일관된 방향 정의 가능.\n비방향성: 뫼비우스 띠처럼 방향이 뒤집힘."],"answer":"χ=2-2g(방향성)·2-k(비방향성) / 방향=안팎구분 / 3D=기하화추측(페렐만)","explanation":"오일러 수:\n구(g=0): χ=2.\n토러스(g=1): χ=0.\n이중토러스(g=2): χ=-2.\n사영평면(k=1): χ=1.\n클라인병(k=2): χ=0.\n방향성 vs 비방향성:\n방향성: 법벡터가 연속적으로 정의.\n비방향성: 법벡터가 반전되는 경로 존재.\n3D 다양체 분류:\n기하화 추측(써스턴, 1982).\n페렐만(2003): 리치 흐름으로 증명.\n3D 닫힌 다양체 = 8가지 기하 구조의 조합.\n100만 달러 밀레니엄 문제 해결.","game_type":"reveal"}]},{"type":"spatial","level":9,"title":"공간 퍼즐 9단계 — 공간과 구조의 통합","difficulty":"발전","thinking":"공간 통합 · 위상과 기하 · 고차원 공간","problems":[{"id":1,"question":"다음 매듭 이론(knot theory)을 분석하세요.\n\n```\n자명한 매듭 (unknot):\n    O\n\n클로버잎 매듭 (trefoil):\n  _____\n /  _  \\\n| / \\ | |\n|/ \\_/ \\|\n \\_____/\n```\n\n(1) 두 매듭이 동치인지 판단하는 방법은?\n(2) 매듭 불변량이란 무엇인가요?\n(3) 매듭 이론의 실제 응용은?","hints":["매듭 동치: 자르지 않고 연속 변형으로 변환 가능.\nunknot: 원을 변형으로 만들 수 있음.\ntrefoil: 변형해도 unknot이 안 됨.","매듭 불변량: 동치 변환에서 변하지 않는 값.\n교차 수, 존스 다항식, 알렉산더 다항식."],"answer":"불변량으로판단 / 매듭불변량=교차수·다항식 / DNA·고분자·물리","explanation":"매듭 동치 판단:\n두 매듭이 같으면 불변량이 같음.\n불변량이 다르면 반드시 다른 매듭.\n주요 불변량:\n교차 수: 최소 교차점 수 (trefoil=3).\n알렉산더 다항식(1928).\n존스 다항식(1984, 필즈 메달).\n실제 응용:\nDNA 위상학: DNA 복제 시 매듭 형성.\n고분자 화학: 분자 매듭 구조.\n양자 컴퓨팅: 위상 양자 컴퓨터.\n물리학: 끈 이론의 위상 불변량.","game_type":"reveal"},{"id":2,"question":"다음 리만 기하와 일반 상대성 이론의\n연결을 분석하세요.\n\n리만 계량(metric tensor) gᵢⱼ:\n거리 ds² = Σ gᵢⱼ dxⁱ dxʲ\n\n평평한 공간: gᵢⱼ = δᵢⱼ (단위 행렬).\n구면: gᵢⱼ = [[r², 0], [0, r²sin²θ]].\n\n(1) 측지선(geodesic)이란 무엇인가요?\n(2) 지구에서 두 점 사이 최단 경로는?\n(3) 중력이 공간의 곡률로 표현되는 방식은?","hints":["측지선: 곡면 위에서 가장 짧은 경로.\n평면: 직선, 구면: 대원(great circle).","아인슈타인 방정식: Gμν = 8πTμν.\nGμν = 곡률, Tμν = 에너지-운동량."],"answer":"측지선=최단경로 / 대원=구면측지선 / 아인슈타인=물질→곡률→측지선이동","explanation":"측지선:\n곡면 위에서 두 점 사이 가장 짧은 경로.\n평면: 직선 (y=ax+b).\n구면: 대원 (Great Circle).\n예: 서울-뉴욕 항공 경로.\n리만 기하와 중력:\n아인슈타인(1915): 중력 = 시공간 곡률.\n물질/에너지 → 시공간 곡률.\n물체는 곡률 있는 시공간의 측지선 이동.\n\"직선\"으로 이동하지만 공간이 휘어 있음.\n예: 태양 근처 빛의 굴절 (중력 렌즈).","game_type":"reveal"},{"id":3,"question":"다음 볼록 다면체의 조합론을 분석하세요.\n\n데카르트-오일러 정리:\nV - E + F = 2 (볼록 다면체).\n\n스타인니츠 정리:\n볼록 다면체 ↔ 3-연결 평면 그래프.\n\n(1) 모든 면이 삼각형인 다면체에서 V,E,F 관계는?\n(2) 정오각형 면 12개로 이루어진 다면체(축구공)의 V,E,F는?\n(3) 모든 꼭짓점에 3개의 면이 모이는 다면체 조건은?","hints":["모든 면=삼각형: 3F=2E (각 면=3모서리, 각 모서리=2면).\n오일러: V-E+F=2.","축구공: 5각형 12개 + 6각형 20개 = 32면.\nV=60, E=90, F=32."],"answer":"삼각형면=E=3F/2·V=F/2+2 / 축구공V=60·E=90·F=32 / 3면모임=2E=3V","explanation":"모든 면이 삼각형:\n3F = 2E (각 삼각형 3변, 각 변 2면 공유).\nV - E + F = 2.\nE = 3F/2 → V = 2 + E - F = 2 + F/2.\n축구공(절단 이십면체):\n5각형 12개: 5×12 = 60.\n6각형 20개: 6×20 = 120.\n각 변은 2면 공유: E = (60+120)/2 = 90.\n3×V = 2×E → V = 60.\n확인: 60-90+32 = 2 ✓.\n모든 꼭짓점에 3개 면:\n3V = 2E → E = 3V/2.\nV - 3V/2 + F = 2 → F = 2 + V/2.","game_type":"reveal"},{"id":4,"question":"다음 공간 채색 문제를 분석하세요.\n\n4색 정리:\n평면 지도를 인접한 나라가 다른 색이 되도록\n칠할 때 필요한 최소 색 = 4.\n\n(1) 왜 3색으로는 부족한 경우가 있나요?\n(2) 4색 정리의 증명 방법은?\n(3) 구면, 토러스에서 필요한 최소 색은?","hints":["3색 부족 예: 4개 나라가 서로 인접한 경우.\n그러나 평면에서 4개 나라가 모두 인접하는 것은 K₄.","토러스에서: 7색 필요 (하이우드 추측).\n구면: 평면과 동치 → 4색."],"answer":"K₄에서3색부족 / 컴퓨터증명(아펠케켄1976) / 구면=4색·토러스=7색","explanation":"3색 부족 사례:\nK₄(4개 나라 모두 인접): 4색 필요.\n평면에서 K₅(5개 모두 인접)는 그릴 수 없음.\n4색 정리 증명(1976):\n아펠-케켄: 1,936가지 기본 구성 컴퓨터 검증.\n최초의 주요 컴퓨터 보조 증명.\n여전히 인간 이해 가능한 증명 없음.\n헤이우드 수(다른 곡면):\n구(genus=0): 4색.\n토러스(genus=1): 7색.\n일반 genus g: ⌊(7+√(1+48g))/2⌋색.\n단 비방향성 곡면은 다름.","game_type":"reveal"},{"id":5,"question":"다음 볼로노이 다이어그램을 분석하세요.\n\n평면에 씨앗점 P₁(0,0), P₂(4,0), P₃(2,3)이 있습니다.\n\n볼로노이 셀: 각 씨앗에 가장 가까운 점들의 집합.\n\n(1) 세 씨앗의 볼로노이 꼭짓점(외심) 위치는?\n(2) 볼로노이 다이어그램의 이중 구조(들로네 삼각분할)는?\n(3) 실생활 응용은?","hints":["볼로노이 꼭짓점: 세 씨앗으로부터 등거리인 점 = 외심.\nP₁P₂ 중점: (2,0), P₂P₃ 중점: (3,1.5).","외심 계산: 수직이등분선의 교점.\nP₁P₂ 수직이등분선: x=2.\nP₁P₃ 수직이등분선: 기울기 계산."],"answer":"외심=(2,5/6)≈(2,0.83) / 들로네=볼로노이의쌍대 / 도시계획·통신·자연패턴","explanation":"외심 계산:\nP₁(0,0), P₂(4,0), P₃(2,3).\nP₁P₂ 수직이등분선: x=2.\nP₁P₃ 수직이등분선:\n중점(1,1.5), 기울기 P₁P₃=3/2 → 수직=-2/3.\ny-1.5 = -2/3(x-1).\nx=2 대입: y=1.5-2/3=5/6.\n볼로노이 꼭짓점: (2, 5/6).\n들로네 삼각분할:\n볼로노이의 이중(dual) 그래프.\n씨앗들을 삼각형으로 연결.\n어떤 삼각형의 외접원 내부에 다른 씨앗 없음.\n응용:\n도시 계획: 병원·학교 위치 최적화.\n통신: 기지국 커버리지.\n자연: 기린 무늬, 거품 구조.","game_type":"reveal"},{"id":6,"question":"다음 최적화 문제를 공간적으로 분석하세요.\n\n등주 문제(Isoperimetric Problem):\n같은 둘레로 최대 넓이를 만드는 도형은?\n\n2D: 같은 둘레에서 넓이 최대 = 원.\n3D: 같은 겉넓이에서 부피 최대 = 구.\n\n(1) 수학적으로 증명하는 방법은?\n(2) 자연에서의 예시는?\n(3) n차원으로 일반화하면?","hints":["변분법: 둘레 고정 + 넓이 최대화.\n라그랑주 승수법으로 원이 최적.","자연: 비눗방울(구), 세포(원에 가까운 형태)."],"answer":"변분법으로증명 / 비눗방울·세포·행성 / n차원=초구가최적","explanation":"등주 부등식:\n2D: A ≤ L²/(4π) (등호: 원).\n3D: V ≤ A^(3/2)/(6√π) (등호: 구).\n증명 방법:\n초등적: 슈타이너 대칭화.\n고급: 변분법, 소볼레프 부등식.\n자연의 등주 해결:\n비눗방울: 겉넓이 최소화 = 구.\n행성: 중력으로 구형 수렴.\n세포: 에너지 최소화.\nn차원 일반화:\nn차원 초구가 n차원 등주 문제의 해.\nn차원 구 = 가장 효율적인 경계.","game_type":"reveal"},{"id":7,"question":"다음 선형 대수와 공간의 연결을 분석하세요.\n\n벡터 공간 ℝⁿ에서의 공간:\nℝ² = 2D 평면.\nℝ³ = 3D 공간.\nℝⁿ = n차원 공간.\n\n(1) ℝ⁴의 단위 초구(반지름 1)의 부피는?\n(2) n이 커질수록 단위 초구의 부피는?\n(3) 고차원의 역설적 성질은?","hints":["n차원 초구 부피: Vₙ = πⁿ/² / Γ(n/2+1).\nV₁=2, V₂=π, V₃=4π/3, V₄=π²/2.","
