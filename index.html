<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindArena — 두뇌 게임 커뮤니티</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f7f2;
            color: #2c2c2c;
        }
        header {
            background: #1a2744;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            color: #c9a84c;
        }
        header p {
            font-size: 14px;
            color: #aab4cc;
        }
        .hero {
            background: #1a2744;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }
        .hero h2 {
            font-size: 42px;
            margin-bottom: 16px;
            color: #c9a84c;
        }
        .hero p {
            font-size: 18px;
            color: #aab4cc;
            max-width: 600px;
            margin: 0 auto 32px;
            line-height: 1.7;
        }
        .hero-btn {
            background: #c9a84c;
            color: #1a2744;
            padding: 14px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        .games {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .games h3 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 40px;
            color: #1a2744;
        }
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .game-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            border: 1px solid #e0ddd5;
            transition: transform 0.2s;
        }
        .game-card:hover { transform: translateY(-4px); }
        .game-icon { font-size: 56px; margin-bottom: 16px; }
        .game-card h4 {
            font-size: 22px;
            color: #1a2744;
            margin-bottom: 10px;
        }
        .game-card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .game-btn {
            background: #1a2744;
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }
        .coming { background: #aab4cc; }
        footer {
            background: #1a2744;
            color: #aab4cc;
            text-align: center;
            padding: 30px;
            font-size: 14px;
            margin-top: 60px;
        }
        @media (max-width: 600px) {
            .game-grid { grid-template-columns: 1fr; }
            .hero h2 { font-size: 28px; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>MindArena</h1>
        <p>두뇌 게임 커뮤니티</p>
    </div>
</header>

<div class="hero">
    <h2>생각하고, 도전하고, 성장하세요</h2>
    <p>수학과 과학 원리를 활용한 지식형 게임으로 두뇌를 훈련하고 같은 관심사를 가진 사람들과 교류하세요.</p>
    <a href="#games" class="hero-btn">게임 시작하기</a>
</div>

<div class="games" id="games">
    <h3>지금 플레이할 수 있는 게임</h3>
    <div class="game-grid">
        <div class="game-card">
            <div class="game-icon">🔢</div>
            <h4>수도쿠</h4>
            <p>논리적 사고력을 키우는 클래식 숫자 퍼즐. 4가지 난이도로 도전하세요.</p>
            <a href="sudoku.html" class="game-btn">플레이</a>
        </div>
        <div class="game-card">
            <div class="game-icon">🖼️</div>
            <h4>명화 퍼즐</h4>
            <p>세계 명화를 조각으로 맞추며 미술 교양도 함께 쌓으세요.</p>
            <a href="puzzle.html" class="game-btn coming">준비 중</a>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 MindArena — 지식과 게임이 만나는 곳</p>
</footer>

</body>
</html>
