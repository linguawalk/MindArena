"explanation":"A는 맨 앞에 고정.\n나머지 B,C,D,E 4명의 순서: 4! = 4×3×2×1 = 24가지.\n전체 5명 나열: 5! = 120가지.\nA가 맨 앞에 설 확률 = 24/120 = 1/5.","game_type":"short_input"},{"id":10,"question":"동전 3개를 동시에 던질 때\n정확히 2개가 앞면이 나오는\n경우의 수와 확률은?","hints":["동전 3개를 (첫째, 둘째, 셋째)로 구분합니다.\n전체 경우의 수: 2³ = 8.","앞면 2개, 뒷면 1개인 경우를 나열해보세요.\n(앞,앞,뒤), (앞,뒤,앞), (뒤,앞,앞)"],"answer":"경우의 수: 3가지 / 확률: 3/8","explanation":"전체: 2×2×2 = 8가지.\n정확히 2개 앞면:\n(앞,앞,뒤), (앞,뒤,앞), (뒤,앞,앞) → 3가지.\n확률 = 3/8.\n이런 경우를 세는 공식이 조합 C(3,2) = 3입니다.","game_type":"reveal"}]},{"type":"probability","level":3,"title":"확률·경우의 수 3단계 — 순열과 조합 입문","difficulty":"입문","thinking":"순열 · 조합 · 순서의 중요성","problems":[{"id":1,"question":"다음 두 상황의 차이를 설명하고\n각각의 경우의 수를 구하세요.\n\n상황 A: 5명 중 회장·부회장·총무를 뽑기.\n상황 B: 5명 중 대표 3명을 뽑기.","hints":["상황 A: 같은 3명이라도 역할이 다르면 다른 경우.\n상황 B: 같은 3명이면 같은 경우.","A: 순서(역할)가 중요 → 순열.\nB: 순서 무관 → 조합."],"answer":"A: 60가지 / B: 10가지","explanation":"상황 A (순열, 순서 중요):\n5×4×3 = 60가지.\n상황 B (조합, 순서 무관):\nC(5,3) = 5×4×3 / (3×2×1) = 10가지.\n같은 3명을 뽑아도 역할이 있으면 60가지,\n역할이 없으면 10가지.\n순열 = 조합 × 같은 수를 배열하는 경우의 수.","game_type":"reveal"},{"id":2,"question":"P(5,3)과 C(5,3)을 각각 계산하세요.\n그리고 P(5,3) = C(5,3) × 3!이 성립하는지 확인하세요.","hints":["P(n,r) = n × (n-1) × ... × (n-r+1)\nC(n,r) = P(n,r) / r!","P(5,3) = 5 × 4 × 3 = 60.\nC(5,3) = 60 / (3×2×1) = 10."],"answer":"P(5,3)=60 / C(5,3)=10 / 60 = 10 × 6 ✓","explanation":"P(5,3) = 5×4×3 = 60.\nC(5,3) = 60/(3!) = 60/6 = 10.\nP(5,3) = C(5,3) × 3! → 60 = 10 × 6 ✓.\n관계: 순열 = 조합 × (뽑은 수의 계승).\n3명을 뽑은 후 배열하는 방법이 3! = 6가지이므로.","game_type":"reveal"},{"id":3,"question":"10명의 학생 중 3명을 뽑아 만드는\n위원회의 경우의 수는?","hints":["위원회는 역할 구분이 없습니다.\n순서가 중요하지 않습니다.","C(10,3) = 10×9×8 / (3×2×1)"],"answer":"120가지","explanation":"C(10,3) = (10×9×8) / (3×2×1)\n= 720 / 6\n= 120가지.\n위원회는 구성원만 중요하고 역할이 없으므로 조합.","game_type":"short_input"},{"id":4,"question":"MATH라는 단어의 알파벳을\n일렬로 나열하는 경우의 수는?\n그리고 M이 첫 번째에 오는 경우는?","hints":["4개의 서로 다른 알파벳을 나열하는 경우의 수.","M이 첫 번째 고정: 나머지 3개 나열."],"answer":"전체: 24가지 / M이 첫 번째: 6가지","explanation":"전체: 4! = 4×3×2×1 = 24가지.\nM이 첫 번째: 나머지 A,T,H를 나열\n= 3! = 3×2×1 = 6가지.\nM이 첫 번째일 확률 = 6/24 = 1/4.","game_type":"reveal"},{"id":5,"question":"1, 2, 3, 4, 5 중에서 3개를 골라\n만들 수 있는 세 자리 수의 개수는?\n(같은 숫자 반복 사용 불가)","hints":["순서가 다르면 다른 수입니다.\n123과 321은 다른 수입니다.","P(5,3) = 5×4×3 = ?"],"answer":"60개","explanation":"백의 자리: 5가지.\n십의 자리: 4가지 (백의 자리 숫자 제외).\n일의 자리: 3가지 (앞 두 자리 제외).\n5×4×3 = P(5,3) = 60개.\n순서가 중요하므로 순열을 사용합니다.","game_type":"short_input"},{"id":6,"question":"52장의 카드 덱에서 5장을 뽑는\n경우의 수는?","hints":["5장을 뽑는 것은 순서가 중요하지 않습니다.","C(52,5) = 52×51×50×49×48 / (5×4×3×2×1)"],"answer":"2,598,960가지","explanation":"C(52,5) = (52×51×50×49×48) / (5!)\n= 311,875,200 / 120\n= 2,598,960가지.\n포커 카드 게임의 가능한 패의 수입니다.\n이렇게 큰 숫자가 나오기 때문에\n포커에서 특정 패를 받을 확률이 매우 낮습니다.","game_type":"short_input"},{"id":7,"question":"남학생 4명, 여학생 4명 중에서\n남학생 2명, 여학생 2명을 뽑는\n경우의 수는?","hints":["남학생 뽑기와 여학생 뽑기는 독립적입니다.","C(4,2) × C(4,2) = ?"],"answer":"36가지","explanation":"남학생 2명 뽑기: C(4,2) = 6가지.\n여학생 2명 뽑기: C(4,2) = 6가지.\n전체: 6 × 6 = 36가지.\n두 독립적 조합은 곱의 법칙으로 구합니다.","game_type":"short_input"},{"id":8,"question":"원형 테이블에 4명이 앉는\n경우의 수는?","hints":["원형 배열에서는 회전이 같은 경우로 봅니다.\n한 명을 고정하고 나머지를 배열합니다.","한 명 고정 → 나머지 3명 배열: 3!"],"answer":"6가지","explanation":"일렬 배열: 4! = 24가지.\n하지만 원형에서는 회전한 배열이 같습니다.\n4개의 회전이 동일하므로: 24/4 = 6가지.\n원형 순열: (n-1)! = 3! = 6.\n원탁에 앉는 배열은 일렬보다 n분의 1입니다.","game_type":"short_input"},{"id":9,"question":"같은 종류의 공 중에서 고르기:\n빨강 공 3개, 파랑 공 3개가 있습니다.\n이 중 3개를 고르는 경우의 수는?\n(같은 색 공은 서로 구별하지 않음)","hints":["빨강 몇 개, 파랑 몇 개를 고르는지만 중요합니다.","(빨강0·파랑3), (빨강1·파랑2),\n(빨강2·파랑1), (빨강3·파랑0)"],"answer":"4가지","explanation":"같은 색은 구별 불가이므로 색의 조합만 따집니다.\n(빨강 0, 파랑 3): 1가지.\n(빨강 1, 파랑 2): 1가지.\n(빨강 2, 파랑 1): 1가지.\n(빨강 3, 파랑 0): 1가지.\n총 4가지.\n구별 불가능한 물체를 고를 때는 조합이 줄어듭니다.","game_type":"short_input"},{"id":10,"question":"다음 중 순열인지 조합인지 판단하고\n경우의 수를 구하세요.\n\n①8명 중 회장·부회장 선출.\n②10명 중 5명을 뽑아 팀 구성.\n③6권의 책을 책장에 꽂는 방법.\n④5가지 색 중 3가지를 골라 사용.","hints":["역할·순서가 있으면 순열.\n역할·순서가 없으면 조합.","①역할 있음(순열) / ②역할 없음(조합)\n③순서 있음(순열) / ④순서 없음(조합)"],"answer":"①P(8,2)=56 / ②C(10,5)=252 / ③6!=720 / ④C(5,3)=10","explanation":"①P(8,2) = 8×7 = 56 (순열: 역할 구분).\n②C(10,5) = 252 (조합: 팀 구성, 역할 없음).\n③6! = 720 (순열: 꽂는 순서가 다르면 다른 배열).\n④C(5,3) = 10 (조합: 색 선택, 순서 무관).\n판단 기준: \"순서/역할이 있으면 순열, 없으면 조합.\"","game_type":"choice"}]},{"type":"probability","level":4,"title":"확률·경우의 수 4단계 — 중복과 제한 조건","difficulty":"기초","thinking":"중복 순열 · 중복 조합 · 제한 조건 처리","problems":[{"id":1,"question":"0~9까지 숫자로 만드는 네 자리 비밀번호의\n경우의 수는?\n(같은 숫자 반복 사용 가능)","hints":["각 자리마다 0~9 중 하나를 독립적으로 선택합니다.","10 × 10 × 10 × 10 = ?"],"answer":"10,000가지","explanation":"각 자리: 10가지 (0~9).\n네 자리: 10⁴ = 10,000가지.\n중복 순열: 같은 것을 반복 사용할 수 있을 때.\nn개 중에서 r개를 중복 허용하여 나열: nʳ.\n10⁴ = 10,000.\n비밀번호 0000~9999까지 총 10,000가지.","game_type":"short_input"},{"id":2,"question":"A, B, C 세 문자를 중복을 허용하여\n두 자리 문자열을 만드는 경우의 수는?\n모두 나열하세요.","hints":["첫 번째 자리: A, B, C 중 하나.\n두 번째 자리: A, B, C 중 하나 (중복 허용).","3 × 3 = 9가지."],"answer":"9가지: AA, AB, AC, BA, BB, BC, CA, CB, CC","explanation":"AA, AB, AC (첫째=A)\nBA, BB, BC (첫째=B)\nCA, CB, CC (첫째=C)\n총 3² = 9가지.\n중복 순열: 3개 중 2개 중복 허용 선택 = 3² = 9.","game_type":"reveal"},{"id":3,"question":"같은 종류 사탕 5개를 3명에게 나눠주는\n경우의 수는?\n(한 명이 0개 받아도 됩니다)","hints":["중복 조합 문제입니다.\nH(n,r) = C(n+r-1, r)","H(3,5) = C(3+5-1, 5) = C(7,5) = C(7,2)"],"answer":"21가지","explanation":"같은 것 r개를 n개 그룹에 나누는 경우:\nH(n,r) = C(n+r-1, r)\nH(3,5) = C(7,5) = C(7,2) = 7×6/2 = 21가지.\n예: (5,0,0), (4,1,0), (3,2,0), (3,1,1),\n(2,2,1), (2,3,0) 등의 모든 배분 방식.","game_type":"short_input"},{"id":4,"question":"5명을 일렬로 세울 때\n특정 2명(A, B)이 반드시 이웃하는\n경우의 수는?","hints":["A와 B를 하나의 묶음으로 생각합니다.\n묶음 + 나머지 3명 = 4개를 나열합니다.","4개 나열: 4!\nA,B 묶음 내부 순서: 2!"],"answer":"48가지","explanation":"A,B를 하나의 덩어리로 묶으면:\n덩어리 + C + D + E = 4개 나열: 4! = 24.\nA,B 내부 순서 (AB 또는 BA): 2! = 2.\n전체: 24 × 2 = 48가지.\n전체 5! = 120에서 이웃 확률 = 48/120 = 2/5.","game_type":"short_input"},{"id":5,"question":"6명을 일렬로 세울 때\n특정 2명(A, B)이 절대 이웃하지 않는\n경우의 수는?","hints":["전체 경우 - A,B가 이웃하는 경우.","전체: 6! = 720.\nA,B가 이웃: (5개 나열) × 2! = 5! × 2 = 240."],"answer":"480가지","explanation":"전체: 6! = 720.\nA,B가 이웃하는 경우:\n5개(덩어리+나머지4명) × A,B 내부순서\n= 5! × 2 = 120 × 2 = 240.\nA,B가 이웃하지 않는 경우:\n720 - 240 = 480가지.\n여사건 활용: P(이웃 안 함) = 1 - P(이웃함).","game_type":"short_input"},{"id":6,"question":"a, a, b, b, c를 일렬로 나열하는\n경우의 수는?","hints":["같은 문자가 있으면 전체 나열에서 나눠줍니다.","전체 5개 나열: 5!\na가 2개 같음: 2! 로 나눔.\nb가 2개 같음: 2! 로 나눔."],"answer":"30가지","explanation":"같은 것이 있는 순열:\n5! / (2! × 2!) = 120 / (2×2) = 120/4 = 30가지.\n같은 원소가 있을 때는 겹치는 배열을 나눠줍니다.\n예: aabbc, aabcb, aacbb, ... 등 30가지.","game_type":"short_input"},{"id":7,"question":"1, 1, 2, 2, 3을 나열하여 만드는\n다섯 자리 수 중 홀수는 몇 개인가요?","hints":["홀수: 일의 자리가 1 또는 3이어야 합니다.","경우 A: 일의 자리 = 1 (남은 1,1,2,2,3 중 1개가 사용됨)\n경우 B: 일의 자리 = 3 (남은 1,1,2,2 나열)"],"answer":"18개","explanation":"경우 A: 일의 자리 = 1.\n남은 네 자리에 1,2,2,3 나열: 4!/(1!×2!) = 12.\n경우 B: 일의 자리 = 3.\n남은 네 자리에 1,1,2,2 나열: 4!/(2!×2!) = 6.\n합계: 12 + 6 = 18개.","game_type":"short_input"},{"id":8,"question":"남학생 3명, 여학생 3명을 일렬로 세울 때\n남녀가 교대로 서는 경우의 수는?","hints":["남녀 교대: 남-여-남-여-남-여 또는 여-남-여-남-여-남.","남-여-남-여-남-여: 남 3! × 여 3!.\n여-남-여-남-여-남: 여 3! × 남 3!."],"answer":"72가지","explanation":"남-여-남-여-남-여 순서:\n남학생 자리: 3! = 6가지.\n여학생 자리: 3! = 6가지.\n소계: 6 × 6 = 36가지.\n여-남-여-남-여-남 순서도 마찬가지: 36가지.\n합계: 36 + 36 = 72가지.\n전체 6! = 720에서 남녀 교대 확률 = 72/720 = 1/10.","game_type":"short_input"},{"id":9,"question":"10명 중 3명을 뽑아 원형으로 앉히는\n경우의 수는?","hints":["3명 뽑기: C(10,3).\n뽑은 3명을 원형으로 앉히기: (3-1)!.","C(10,3) = 120.\n원형 배열: 2! = 2."],"answer":"240가지","explanation":"3명 뽑기: C(10,3) = 120.\n뽑힌 3명을 원형으로 앉히기: (3-1)! = 2! = 2.\n전체: 120 × 2 = 240가지.\n원형 배열은 회전이 동일하므로 (n-1)!을 사용합니다.","game_type":"short_input"},{"id":10,"question":"다음 조건을 모두 만족하는\n네 자리 자연수의 개수를 구하세요.\n\n조건 1: 각 자리 숫자가 모두 다릅니다.\n조건 2: 맨 앞자리는 0이 아닙니다.\n조건 3: 짝수입니다.","hints":["짝수: 일의 자리가 0, 2, 4, 6, 8.\n경우 A: 일의 자리 = 0.\n경우 B: 일의 자리 = 2, 4, 6, 8 중 하나.","경우 A: 천의 자리(1~9 중)×백×십 나열.\n경우 B: 천의 자리(0 제외)×백×십 나열."],"answer":"2,296개","explanation":"경우 A: 일의 자리 = 0.\n천의 자리: 1~9 중 하나 = 9가지.\n백·십의 자리: 남은 8개 중 2개 나열 = P(8,2) = 56.\n소계: 9 × 56 = 504.\n경우 B: 일의 자리 = 2,4,6,8 중 하나 = 4가지.\n천의 자리: 0과 일의 자리 제외 = 8가지.\n백·십의 자리: 남은 8개 중 2개 = P(8,2) = 56.\n소계: 4 × 8 × 56 = 1,792.\n합계: 504 + 1,792 = 2,296개.","game_type":"short_input"}]},{"type":"probability","level":5,"title":"확률·경우의 수 5단계 — 확률의 심화","difficulty":"기초","thinking":"조건부 확률 · 독립사건 · 여사건 · 확률의 덧셈","problems":[{"id":1,"question":"주사위를 던져 나온 수가 짝수일 때\n그 수가 4 이상일 확률은?","hints":["조건부 확률: 이미 짝수가 나왔다는 조건이 주어졌습니다.","짝수: 2, 4, 6 (3가지).\n이 중 4 이상: 4, 6 (2가지)."],"answer":"2/3","explanation":"P(4 이상 | 짝수) = P(4 이상이고 짝수) / P(짝수)\n= (2/6) / (3/6) = 2/3.\n조건부 확률: P(A|B) = P(A∩B) / P(B).\n조건 B가 주어지면 표본 공간이 B로 축소됩니다.\n짝수 {2,4,6} 중 4 이상 {4,6}이므로 2/3.","game_type":"short_input"},{"id":2,"question":"흰 공 3개, 검은 공 2개가 든 주머니에서\n공을 1개 꺼냈을 때 흰 공이었습니다.\n이 공을 돌려놓지 않고 다시 1개를 꺼낼 때\n흰 공일 확률은?","hints":["첫 번째에 흰 공을 꺼낸 후\n주머니에 남은 공의 상태를 파악하세요.","남은 공: 흰 2개 + 검은 2개 = 4개."],"answer":"1/2","explanation":"처음: 흰 3, 검은 2 = 5개.\n흰 공 1개 꺼낸 후: 흰 2, 검은 2 = 4개.\n두 번째 흰 공 확률 = 2/4 = 1/2.\n비복원 추출: 꺼낸 것을 돌려놓지 않아 확률이 변합니다.\n복원 추출이었다면: 3/5로 동일.","game_type":"short_input"},{"id":3,"question":"동전을 두 번 던질 때\n첫 번째가 앞면이면 두 번째 결과에\n영향을 미치나요?\n두 번째가 앞면일 확률은?","hints":["독립 사건: 한 사건의 결과가 다른 사건에 영향을 주지 않음.","동전 던지기는 매번 독립적입니다."],"answer":"1/2 (첫 번째 결과와 무관)","explanation":"독립 사건: P(A∩B) = P(A) × P(B).\n동전 던지기는 독립 사건입니다.\n첫 번째가 앞면이든 뒷면이든\n두 번째 앞면 확률은 항상 1/2.\nP(두 번째 앞면 | 첫 번째 앞면) = P(두 번째 앞면) = 1/2.","game_type":"reveal"},{"id":4,"question":"어떤 시험에서 합격 확률이 0.6입니다.\n두 번 시험을 볼 때\n적어도 한 번 합격할 확률은?","hints":["여사건 활용:\nP(적어도 한 번 합격) = 1 - P(두 번 모두 불합격).","P(두 번 모두 불합격) = 0.4 × 0.4 = 0.16."],"answer":"0.84 (84%)","explanation":"P(불합격) = 1 - 0.6 = 0.4.\nP(두 번 모두 불합격) = 0.4 × 0.4 = 0.16.\nP(적어도 한 번 합격) = 1 - 0.16 = 0.84.\n여사건: \"적어도 하나\"는 \"모두 아님\"의 반대.\nP(적어도 하나) = 1 - P(하나도 없음).","game_type":"short_input"},{"id":5,"question":"카드 10장(1~10번)에서 1장을 뽑을 때\n뽑힌 카드가 짝수이거나 3의 배수일 확률은?","hints":["짝수: 2,4,6,8,10 → 5장.\n3의 배수: 3,6,9 → 3장.","둘 다 해당(짝수이면서 3의 배수): 6 → 1장.\n포함-배제: 5+3-1 = 7."],"answer":"7/10","explanation":"P(짝수) = 5/10.\nP(3의 배수) = 3/10.\nP(짝수이고 3의 배수) = 1/10 (6번 카드).\nP(짝수 또는 3의 배수) = 5/10 + 3/10 - 1/10 = 7/10.\n확률의 덧셈 법칙:\nP(A∪B) = P(A) + P(B) - P(A∩B).","game_type":"short_input"},{"id":6,"question":"주사위 2개를 던질 때\n두 수의 합이 소수일 확률은?","hints":["가능한 합: 2~12.\n소수인 합: 2, 3, 5, 7, 11.","합=2: (1,1) 1가지.\n합=3: (1,2),(2,1) 2가지.\n합=5: 4가지.\n합=7: 6가지.\n합=11: 2가지."],"answer":"15/36 = 5/12","explanation":"전체: 6×6 = 36가지.\n합=2: (1,1) → 1가지.\n합=3: (1,2),(2,1) → 2가지.\n합=5: (1,4),(2,3),(3,2),(4,1) → 4가지.\n합=7: (1,6),(2,5),(3,4),(4,3),(5,2),(6,1) → 6가지.\n합=11: (5,6),(6,5) → 2가지.\n합계: 1+2+4+6+2 = 15가지.\n확률: 15/36 = 5/12.","game_type":"short_input"},{"id":7,"question":"어느 학급에서 수학을 좋아하는 학생은 60%,\n과학을 좋아하는 학생은 50%,\n둘 다 좋아하는 학생은 30%입니다.\n수학 또는 과학을 좋아하는 학생의 비율은?\n둘 다 싫어하는 학생의 비율은?","hints":["P(수학∪과학) = P(수학) + P(과학) - P(수학∩과학).","둘 다 싫어함 = 전체 - (수학 또는 과학)."],"answer":"수학 또는 과학: 80% / 둘 다 싫어함: 20%","explanation":"P(수학∪과학) = 0.6 + 0.5 - 0.3 = 0.8 = 80%.\n둘 다 싫어하는 비율 = 1 - 0.8 = 0.2 = 20%.\n벤 다이어그램으로 시각화:\n[수학만:30%][둘다:30%][과학만:20%][둘다싫어:20%].","game_type":"reveal"},{"id":8,"question":"불량품이 10%인 공장에서 제품을 3개 샀을 때\n적어도 1개가 불량품일 확률은?","hints":["여사건: 1 - P(모두 정상품).","P(모두 정상) = 0.9³ = 0.729."],"answer":"0.271 (27.1%)","explanation":"P(정상품) = 0.9.\nP(3개 모두 정상) = 0.9³ = 0.729.\nP(적어도 1개 불량) = 1 - 0.729 = 0.271.\n불량률 10%이지만 3개 살 때 하나라도 불량일 확률은 27.1%!\n이것이 품질 관리에서 확률이 중요한 이유입니다.","game_type":"short_input"},{"id":9,"question":"두 사건 A, B에 대해\nP(A) = 0.4, P(B) = 0.3,\nP(A∩B) = 0.12일 때\n\n(1) A와 B는 독립 사건인가요?\n(2) P(A∪B)는?\n(3) P(A|B)는?","hints":["독립 조건: P(A∩B) = P(A) × P(B).","0.4 × 0.3 = 0.12 = P(A∩B).\nP(A|B) = P(A∩B) / P(B)."],"answer":"(1) 독립 / (2) 0.58 / (3) 0.4","explanation":"(1) P(A)×P(B) = 0.4×0.3 = 0.12 = P(A∩B) → 독립 ✓.\n(2) P(A∪B) = 0.4+0.3-0.12 = 0.58.\n(3) P(A|B) = 0.12/0.3 = 0.4.\n독립이면 P(A|B) = P(A): 조건이 주어져도 확률 불변.\n독립 사건에서 조건부 확률=원래 확률.","game_type":"reveal"},{"id":10,"question":"민준이가 A 방향으로 갈 확률 0.6,\nB 방향으로 갈 확률 0.4입니다.\nA 방향으로 가면 목적지에 도착할 확률 0.8,\nB 방향으로 가면 도착할 확률 0.5입니다.\n민준이가 목적지에 도착할 확률은?","hints":["전체 확률의 법칙:\nP(도착) = P(A방향)×P(도착|A) + P(B방향)×P(도착|B).","= 0.6×0.8 + 0.4×0.5"],"answer":"0.68 (68%)","explanation":"P(도착) = P(A)×P(도착|A) + P(B)×P(도착|B)\n= 0.6×0.8 + 0.4×0.5\n= 0.48 + 0.20\n= 0.68.\n전체 확률의 법칙: 여러 경로를 통한 확률의 합산.\n이것이 의사결정 나무(decision tree)의 기초입니다.","game_type":"short_input"}]},{"type":"probability","level":6,"title":"확률·경우의 수 6단계 — 기초 종합","difficulty":"기초","thinking":"베이즈 정리 · 기댓값 · 확률 분포 입문","problems":[{"id":1,"question":"어느 병원의 검사에서\n실제 환자의 90%를 양성으로 판정하고\n건강한 사람의 5%를 양성으로 판정합니다.\n전체 인구의 1%가 실제 환자일 때\n양성 판정을 받은 사람이 실제 환자일 확률은?","hints":["베이즈 정리:\nP(환자|양성) = P(양성|환자)×P(환자) / P(양성)","P(양성) = P(양성|환자)×P(환자) + P(양성|건강)×P(건강)\n= 0.9×0.01 + 0.05×0.99"],"answer":"약 15.4%","explanation":"P(환자) = 0.01, P(건강) = 0.99.\nP(양성|환자) = 0.9, P(양성|건강) = 0.05.\nP(양성) = 0.9×0.01 + 0.05×0.99 = 0.009 + 0.0495 = 0.0585.\nP(환자|양성) = (0.9×0.01) / 0.0585 = 0.009/0.0585 ≈ 0.154.\n양성 판정을 받아도 실제 환자일 확률이 15.4%에 불과합니다.\n유병률이 낮으면 위양성 비율이 높아지는 베이즈의 역설입니다.","game_type":"short_input"},{"id":2,"question":"주사위를 한 번 던질 때\n나오는 눈의 기댓값은?","hints":["기댓값 = Σ (값 × 확률).\n각 눈이 나올 확률은 1/6.","E = 1×(1/6) + 2×(1/6) + ... + 6×(1/6)"],"answer":"3.5","explanation":"E = (1+2+3+4+5+6) × (1/6)\n= 21 × (1/6)\n= 3.5.\n기댓값: 확률적으로 기대되는 평균 결과.\n주사위를 많이 던질수록 평균이 3.5에 가까워집니다.\n실제로 3.5는 나올 수 없지만 평균값이 3.5입니다.","game_type":"number_input"},{"id":3,"question":"복권 1장의 가격이 1,000원입니다.\n당첨 확률과 상금:\n1등(100만원): 1/100,000\n2등(10만원): 1/10,000\n3등(1만원): 1/1,000\n꽝: 나머지\n\n복권 1장의 기댓값은?\n구매할 만한가요?","hints":["기댓값 = 각 상금 × 확률의 합.","1,000,000×(1/100,000) + 100,000×(1/10,000) + 10,000×(1/1,000) + 0×(나머지)"],"answer":"기댓값 ≈ 30원 (구매 비용 1,000원보다 훨씬 낮음)","explanation":"E = 1,000,000×0.00001 + 100,000×0.0001 + 10,000×0.001\n= 10 + 10 + 10 = 30원.\n복권 1장에 1,000원을 내고 기대 수익은 30원.\n기댓값이 구매 비용보다 낮으므로 기대 손실 = 970원.\n복권은 확률적으로 불리한 게임입니다.\n(실제 복권 수익금의 일부가 공익 기금으로 사용됩니다)","game_type":"reveal"},{"id":4,"question":"공정한 동전을 던져\n앞면이 나오면 +2점, 뒷면이 나오면 -1점을 받는\n게임을 10번 할 때 기댓값은?","hints":["한 번 던질 때 기댓값: E = 2×(1/2) + (-1)×(1/2).","10번의 기댓값 = 한 번 기댓값 × 10."],"answer":"5점","explanation":"한 번 기댓값: E = 2×(1/2) + (-1)×(1/2) = 1 - 0.5 = 0.5점.\n10번 기댓값: 0.5 × 10 = 5점.\n기댓값의 선형성: E(X₁+X₂+...+Xₙ) = n×E(X).\n이 게임은 앞면이 유리합니다.\n기댓값이 양수이므로 많이 할수록 이득.","game_type":"short_input"},{"id":5,"question":"이항 분포: 동전을 5번 던질 때\n앞면이 정확히 3번 나올 확률은?","hints":["이항 확률: P(X=k) = C(n,k) × p^k × (1-p)^(n-k)","n=5, k=3, p=1/2.\nC(5,3) × (1/2)³ × (1/2)²."],"answer":"10/32 = 5/16 ≈ 31.25%","explanation":"P(X=3) = C(5,3) × (1/2)³ × (1/2)²\n= 10 × (1/8) × (1/4)\n= 10/32 = 5/16 ≈ 0.3125.\n이항 분포 B(n,p):\nn번 시행, 성공 확률 p, 정확히 k번 성공.\nC(5,3) = 10: 5번 중 앞면 3번 나오는 위치 선택.","game_type":"reveal"},{"id":6,"question":"상자 A에 흰 공 3개, 검은 공 2개,\n상자 B에 흰 공 2개, 검은 공 3개가 있습니다.\n동전을 던져 앞면이면 A, 뒷면이면 B에서 공을 뽑습니다.\n흰 공을 뽑았을 때 A 상자에서 뽑혔을 확률은?","hints":["베이즈 정리 적용.\nP(A|흰) = P(흰|A)×P(A) / P(흰).","P(흰) = P(흰|A)×P(A) + P(흰|B)×P(B)\n= (3/5)×(1/2) + (2/5)×(1/2)."],"answer":"3/5","explanation":"P(A) = P(B) = 1/2.\nP(흰|A) = 3/5, P(흰|B) = 2/5.\nP(흰) = (3/5)×(1/2) + (2/5)×(1/2) = 3/10 + 2/10 = 1/2.\nP(A|흰) = (3/5×1/2) / (1/2) = (3/10) / (1/2) = 3/5.\n직관적으로도 A에서 흰 공 뽑을 확률이 더 높으므로 타당.","game_type":"short_input"},{"id":7,"question":"A 팀과 B 팀이 경기를 합니다.\nA가 이길 확률 0.6, B가 이길 확률 0.4.\n5판 3선승제에서 A가 우승할 확률은?","hints":["A가 우승: 3판을 먼저 이겨야 합니다.\n3:0, 3:1, 3:2로 이기는 경우를 각각 계산.","A가 3:0으로 이김: 3연승.\nA가 3:1로 이김: 4경기 중 처음 3경기에서 정확히 2승 + 4번째 승.\nA가 3:2로 이김: 5경기 중 처음 4경기에서 정확히 2승 + 5번째 승."],"answer":"약 68.3%","explanation":"P(3:0) = 0.6³ = 0.216.\nP(3:1) = C(3,2)×0.6²×0.4×0.6 = 3×0.36×0.4×0.6 = 0.2592.\nP(3:2) = C(4,2)×0.6²×0.4²×0.6 = 6×0.36×0.16×0.6 = 0.20736.\nP(A 우승) = 0.216+0.2592+0.20736 ≈ 0.683.\nA가 이길 확률이 0.6이어도 5판 3선승제에서는 약 68.3%로 더 높아집니다.","game_type":"short_input"},{"id":8,"question":"연속 확률 분포 입문:\n어느 버스가 0~10분 사이에 도착하는데\n도착 시간은 균일 분포(uniform distribution)를 따릅니다.\n\n(1) 5분 이내에 도착할 확률은?\n(2) 3분~7분 사이에 도착할 확률은?\n(3) 정확히 5분에 도착할 확률은?","hints":["균일 분포: 모든 구간에서 확률이 동일.\n전체 구간 = 10분, 확률 밀도 = 1/10.","P(a≤X≤b) = (b-a)/전체 구간 길이."],"answer":"(1) 1/2 (2) 2/5 (3) 0","explanation":"(1) P(0≤X≤5) = 5/10 = 1/2.\n(2) P(3≤X≤7) = (7-3)/10 = 4/10 = 2/5.\n(3) P(X=5) = 0.\n연속 분포에서 특정 점의 확률은 0입니다.\n확률은 구간의 넓이로 계산합니다.\n균일 분포: 넓이 = 높이(1/10) × 구간 길이.","game_type":"reveal"},{"id":9,"question":"카드 52장 중 무작위로 2장을 뽑을 때\n(비복원 추출)\n\n(1) 두 장 모두 에이스일 확률은?\n(2) 두 장의 숫자가 같을 확률은?\n(3) 두 장이 같은 무늬일 확률은?","hints":["52장 중 2장 뽑기: C(52,2) = 1,326.\n에이스 4장 중 2장: C(4,2) = 6.","(2) 숫자가 같은 쌍: 13가지 숫자 × C(4,2) = 13×6 = 78.\n(3) 같은 무늬: 4가지 무늬 × C(13,2) = 4×78 = 312."],"answer":"(1) 6/1326 = 1/221 (2) 78/1326 = 1/17 (3) 312/1326 = 12/51","explanation":"전체: C(52,2) = 1,326.\n(1) C(4,2)/C(52,2) = 6/1,326 = 1/221.\n(2) 78/1,326 = 1/17.\n(3) 4×C(13,2)/C(52,2) = 4×78/1,326 = 312/1,326 = 12/51.\n카드 게임의 확률적 기초입니다.","game_type":"reveal"},{"id":10,"question":"몬티 홀 문제:\n3개의 문 중 하나 뒤에 자동차가 있습니다.\n참가자가 문 1을 선택했습니다.\n진행자가 염소가 있는 문 3을 열었습니다.\n참가자가 문 2로 바꾸면 당첨 확률이\n높아지나요?","hints":["처음 선택이 맞을 확률: 1/3.\n처음 선택이 틀릴 확률: 2/3.","처음이 틀렸다면(확률 2/3) 바꾸면 반드시 맞습니다.\n처음이 맞았다면(확률 1/3) 바꾸면 틀립니다."],"answer":"바꾸면 2/3, 안 바꾸면 1/3 → 바꾸는 것이 유리","explanation":"P(바꿔서 당첨) = P(처음 틀림) × 1 = 2/3.\nP(안 바꿔서 당첨) = P(처음 맞음) = 1/3.\n바꾸는 것이 2배 유리합니다.\n직관적으로는 50:50처럼 보이지만 실제는 2:1.\n이것이 베이즈 추론의 핵심 역설입니다.\n실제 실험에서도 바꾸는 전략이 약 2/3 승률을 보입니다.","game_type":"reveal"}]},{"type":"probability","level":7,"title":"확률·경우의 수 7단계 — 확률 분포와 통계","difficulty":"발전","thinking":"이항 분포 · 정규 분포 · 기댓값과 분산","problems":[{"id":1,"question":"이항 분포 B(10, 0.3)에서\nX의 기댓값과 분산을 구하세요.","hints":["이항 분포 B(n,p)의 기댓값: E(X) = np.\n분산: V(X) = np(1-p).","n=10, p=0.3.\nE(X) = 10×0.3.\nV(X) = 10×0.3×0.7."],"answer":"기댓값=3, 분산=2.1","explanation":"E(X) = np = 10×0.3 = 3.\nV(X) = np(1-p) = 10×0.3×0.7 = 2.1.\n표준편차 σ = √2.1 ≈ 1.449.\n해석: 10번 시행에서 평균 3번 성공,\n실제 값은 3 ± 1.449 범위에 주로 분포.","game_type":"reveal"},{"id":2,"question":"어느 공장의 불량률이 20%입니다.\n제품 5개를 검사할 때\n불량품이 2개 이하일 확률은?","hints":["X ~ B(5, 0.2).\nP(X≤2) = P(X=0) + P(X=1) + P(X=2).","P(X=k) = C(5,k) × 0.2^k × 0.8^(5-k)."],"answer":"약 94.2%","explanation":"P(X=0) = C(5,0)×0.2⁰×0.8⁵ = 1×1×0.32768 = 0.32768.\nP(X=1) = C(5,1)×0.2¹×0.8⁴ = 5×0.2×0.4096 = 0.4096.\nP(X=2) = C(5,2)×0.2²×0.8³ = 10×0.04×0.512 = 0.2048.\nP(X≤2) = 0.32768+0.4096+0.2048 = 0.94208 ≈ 94.2%.","game_type":"short_input"},{"id":3,"question":"정규 분포 N(μ, σ²)의 특성을 분석하세요.\n\n어느 학교 시험 점수가\n평균 70점, 표준편차 10점인\n정규 분포를 따릅니다.\n\n(1) 60~80점 사이에 있을 확률은?\n(2) 90점 이상일 확률은?\n(3) 상위 16%에 들려면 몇 점 이상?\n\n(정규 분포: μ±σ 구간에 약 68%, μ±2σ에 약 95%)","hints":["60~80점 = μ±σ 구간.\n90점 = μ+2σ.","P(μ-σ ≤ X ≤ μ+σ) ≈ 0.68.\nP(X > μ+σ) ≈ (1-0.68)/2 = 0.16."],"answer":"(1) 약 68% (2) 약 2.5% (3) 80점 이상","explanation":"μ=70, σ=10.\n(1) 60~80 = 70±10 = μ±σ → 약 68%.\n(2) 90점 = μ+2σ.\nP(X>90) = (1-0.95)/2 = 0.025 = 2.5%.\n(3) 상위 16% = P(X>x) = 0.16.\nP(X>μ+σ) ≈ 0.16이므로 x = μ+σ = 80점.","game_type":"reveal"},{"id":4,"question":"포아송 분포:\n어느 콜센터에 1시간에 평균 4건의 전화가 옵니다.\n1시간에 정확히 3건 올 확률은?\n\n포아송 분포: P(X=k) = (e^(-λ) × λ^k) / k!\n(λ=평균, e≈2.718)","hints":["λ=4, k=3.\nP(X=3) = e^(-4) × 4³ / 3!","e^(-4) ≈ 0.0183.\n4³ = 64.\n3! = 6."],"answer":"약 19.5%","explanation":"P(X=3) = e^(-4) × 4³ / 3!\n= 0.0183 × 64 / 6\n= 0.0183 × 10.667\n≈ 0.195.\n포아송 분포: 단위 시간·공간에서\n드물게 발생하는 사건의 횟수 모델.\nλ = 평균 발생 횟수.\n콜센터, 방사선 붕괴, 교통사고 등에 적용.","game_type":"short_input"},{"id":5,"question":"두 확률 변수 X, Y가 독립이고\nE(X)=3, E(Y)=5,\nV(X)=4, V(Y)=9일 때\n\n(1) E(X+Y) = ?\n(2) E(2X-3Y) = ?\n(3) V(X+Y) = ?\n(4) V(2X-3Y) = ?","hints":["E(aX+bY) = aE(X) + bE(Y).\n독립이면 V(X+Y) = V(X) + V(Y).","V(aX) = a²V(X).\n독립이면 V(aX+bY) = a²V(X) + b²V(Y)."],"answer":"(1)8 (2)-9 (3)13 (4)97","explanation":"(1) E(X+Y) = E(X)+E(Y) = 3+5 = 8.\n(2) E(2X-3Y) = 2E(X)-3E(Y) = 6-15 = -9.\n(3) V(X+Y) = V(X)+V(Y) = 4+9 = 13 (독립).\n(4) V(2X-3Y) = 4V(X)+9V(Y) = 4×4+9×9 = 16+81 = 97.\n독립인 경우 분산은 항상 더해집니다 (빼기 아님).","game_type":"reveal"},{"id":6,"question":"큰 수의 법칙과 중심극한정리를\n설명하는 실험입니다.\n\n동전을 n번 던질 때 앞면 비율이\n0.5에 가까워지는 과정을 분석하세요.\n\nn=10: 앞면 7번 → 비율 0.7.\nn=100: 앞면 52번 → 비율 0.52.\nn=1000: 앞면 503번 → 비율 0.503.\n\n(1) 이 현상의 수학적 원리는?\n(2) 도박사의 오류란?\n(3) 중심극한정리란?","hints":["큰 수의 법칙: n이 커질수록 표본 평균이 모평균에 수렴.","도박사의 오류: \"이번에 앞면이 자주 나왔으니 다음에는 뒷면이 나올 것\"이라는 잘못된 생각."],"answer":"큰수의법칙=n증가시수렴 / 도박사오류=독립사건혼동 / 중심극한=표본평균정규분포수렴","explanation":"큰 수의 법칙:\n표본 크기 n이 커질수록\n표본 평균 → 모집단 평균.\n비율 → 실제 확률.\n도박사의 오류:\n\"앞면이 많이 나왔으니 다음은 뒷면\"이라는 오류.\n각 동전 던지기는 독립적, 이전 결과 영향 없음.\n중심극한정리:\n표본 크기가 충분히 크면\n표본 평균의 분포가 정규 분포에 근사.\nσ가 아무리 이상해도 n≥30이면 근사 가능.\n통계학의 핵심 정리입니다.","game_type":"reveal"},{"id":7,"question":"다음 확률 게임의 공정성을 분석하세요.\n\n게임: 주사위 2개를 던져\n합이 7이면 +5점,\n합이 2 또는 12이면 +10점,\n그 외에는 -2점.\n\n이 게임은 공정한가요?\n(기댓값으로 판단)","hints":["전체: 36가지.\n합=7: 6가지, 합=2: 1가지, 합=12: 1가지.","E = 5×(6/36) + 10×(2/36) + (-2)×(28/36)."],"answer":"기댓값 ≈ -0.389 → 불공정 (참가자에게 불리)","explanation":"P(합=7) = 6/36 = 1/6.\nP(합=2 또는 12) = 2/36 = 1/18.\nP(그 외) = 28/36 = 7/9.\nE = 5×(6/36) + 10×(2/36) + (-2)×(28/36)\n= 30/36 + 20/36 - 56/36\n= -6/36 = -1/6 ≈ -0.167점.\n기댓값이 음수이므로 참가자에게 불리한 게임.\n공정한 게임: 기댓값 = 0.","game_type":"reveal"},{"id":8,"question":"표본 추출과 통계 추정:\n어느 도시의 유권자 100만 명 중\n1,000명을 무작위로 조사했더니\n60%가 A 후보를 지지했습니다.\n\n(1) 표본 비율은?\n(2) 모집단 비율의 추정값은?\n(3) 왜 전수 조사를 하지 않나요?","hints":["표본 비율 = 조사 결과 / 표본 수.\n표본 비율로 모집단 비율을 추정합니다.","전수 조사: 100만 명 모두 조사.\n표본 조사: 1,000명으로 추정."],"answer":"(1) 0.6(60%) (2) 약 60% (3) 비용·시간·현실성","explanation":"표본 비율 p̂ = 600/1000 = 0.6.\n모집단 비율 추정값 ≈ 60%.\n전수 조사를 안 하는 이유:\n비용: 100만 명 조사는 천문학적 비용.\n시간: 선거 전에 완료 불가.\n정확성: 오히려 표본이 더 정확할 수 있음.\n중심극한정리: 충분한 표본(n≥30)이면 정규 분포 근사.\n오차 범위: ±1/√n = ±1/√1000 ≈ ±3.2%.","game_type":"reveal"},{"id":9,"question":"조건부 확률의 역설:\n심프슨의 역설을 분석하세요.\n\n치료법 A와 B를 비교한 데이터:\n\n전체 결과:\nA: 400명 중 300명 회복 (75%)\nB: 600명 중 500명 회복 (83%)\n\n경증 환자:\nA: 100명 중 90명 회복 (90%)\nB: 500명 중 450명 회복 (90%)\n\n중증 환자:\nA: 300명 중 210명 회복 (70%)\nB: 100명 중 50명 회복 (50%)\n\n어떤 치료법이 더 좋은가요?","hints":["전체: B가 좋아 보임.\n경증·중증 각각: A가 같거나 좋음.","환자 구성 비율이 다르기 때문에 역설이 발생합니다.\nA는 중증 환자 비율이 높고, B는 경증 환자 비율이 높습니다."],"answer":"실제로는 A가 더 좋음 (심프슨의 역설)","explanation":"심프슨의 역설: 전체를 합칠 때 방향이 역전되는 현상.\nA는 중증(300명) 위주, B는 경증(500명) 위주.\n중증은 회복률이 원래 낮음.\nA: 중증 환자도 70% 회복 → 매우 효과적.\nB: 중증은 50%만 회복.\n경증·중증 각각 비교하면 A가 우수하거나 동일.\n전체 통계만 보면 오해할 수 있습니다.\n데이터 분석 시 그룹 구성을 반드시 확인해야 합니다.","game_type":"reveal"},{"id":10,"question":"도박 게임의 파산 확률:\nA가 1만원, B가 2만원을 가지고 동전 게임을 합니다.\n매번 1,000원씩 걸어 앞면이면 A가 받고\n뒷면이면 B가 받습니다.\nA가 파산(0원)할 확률은?\n\n(공정한 게임: p = 1/2)","hints":["도박꾼의 파산 이론(Gambler's Ruin).\n공정한 게임에서 파산 확률 = 상대방 돈 / 전체 돈.","A의 파산 확률 = B의 초기 금액 / (A+B의 초기 금액)\n= 2만 / (1만+2만) = 2/3."],"answer":"A의 파산 확률 = 2/3","explanation":"도박꾼의 파산 이론(공정한 게임):\nP(A 파산) = B의 초기 금액 / 전체 금액\n= 20,000 / 30,000 = 2/3.\nP(B 파산) = A의 초기 금액 / 전체 금액\n= 10,000 / 30,000 = 1/3.\n같은 확률의 게임이지만\n초기 자본이 적으면 파산 확률이 높습니다.\n카지노가 항상 이기는 이유:\n카지노의 초기 자본 >> 개인의 자본.\n파산 확률이 거의 1에 수렴.","game_type":"short_input"}]},{"type":"probability","level":8,"title":"확률·경우의 수 8단계 — 확률의 심층 구조","difficulty":"발전","thinking":"마르코프 체인 · 생성 함수 · 확률 부등식","problems":[{"id":1,"question":"마르코프 체인 입문:\n날씨가 맑음/흐림 두 가지 상태만 있고\n전이 확률이 다음과 같습니다.\n\n맑음→맑음: 0.7, 맑음→흐림: 0.3\n흐림→맑음: 0.4, 흐림→흐림: 0.6\n\n오늘 맑음일 때 모레(2일 후)가 맑을 확률은?","hints":["내일 상태를 먼저 구하세요.\n오늘 맑음 → 내일 맑음: 0.7, 내일 흐림: 0.3.","모레 맑음 = (내일 맑음 × 맑→맑) + (내일 흐림 × 흐→맑)."],"answer":"0.61","explanation":"내일: 맑음=0.7, 흐림=0.3.\n모레 맑음:\n= 0.7×0.7 + 0.3×0.4\n= 0.49 + 0.12\n= 0.61.\n마르코프 체인: 현재 상태만으로 다음 상태 결정.\n\"마르코프 성질\": 과거 이력과 무관.\n날씨·주가·언어 모델 등에 광범위하게 사용됩니다.","game_type":"number_input"},{"id":2,"question":"마르코프 체인의 정상 분포:\n문제 1의 날씨 모델에서\n장기적으로 맑은 날의 비율은?","hints":["정상 분포 π = (π_맑음, π_흐림)에서\nπ_맑음 × 0.3 = π_흐림 × 0.4.","π_맑음 + π_흐림 = 1.\n연립방정식을 풀어보세요."],"answer":"맑음: 4/7 ≈ 57.1%, 흐림: 3/7 ≈ 42.9%","explanation":"정상 분포 조건:\nπ_맑음 × 0.3 = π_흐림 × 0.4 (유출=유입).\nπ_맑음 + π_흐림 = 1.\n0.3π_맑음 = 0.4(1-π_맑음).\n0.3π + 0.4π = 0.4.\n0.7π = 0.4.\nπ_맑음 = 4/7.\n장기적으로 약 57%는 맑고 43%는 흐립니다.\n초기 상태와 무관하게 수렴합니다.","game_type":"reveal"},{"id":3,"question":"확률 생성 함수 입문:\n확률 변수 X의 확률 생성 함수:\nG(t) = Σ P(X=k) × t^k\n\n주사위 X의 생성 함수:\nG(t) = (t + t² + t³ + t⁴ + t⁵ + t⁶) / 6\n\n주사위 2개의 합 Y = X₁ + X₂의\n생성 함수는? 그리고 합이 7일 확률은?","hints":["독립인 경우 합의 생성 함수 = 두 생성 함수의 곱.\nG_Y(t) = G_{X₁}(t) × G_{X₂}(t).","t⁷의 계수가 P(Y=7)입니다."],"answer":"G_Y(t) = [(t+t²+...+t⁶)/6]² / P(Y=7) = 6/36 = 1/6","explanation":"G_Y(t) = G_{X₁}(t) × G_{X₂}(t)\n= [(t+t²+t³+t⁴+t⁵+t⁶)/6]².\nt⁷ 항의 계수:\nt¹×t⁶, t²×t⁵, t³×t⁴, t⁴×t³, t⁵×t², t⁶×t¹ → 6가지.\nP(Y=7) = 6/36 = 1/6.\n생성 함수: 확률 분포를 다항식으로 표현.\n덧셈이 곱셈으로 변환되어 계산이 편리합니다.","game_type":"reveal"},{"id":4,"question":"마르틴게일 전략 분석:\n카지노 룰렛에서 빨강에 베팅.\nP(빨강) = 18/38 ≈ 47.4%.\n\n마르틴게일: 질 때마다 베팅액을 2배로.\n1→2→4→8→16...\n\n(1) 5번 연속 지는 확률은?\n(2) 5번 안에 한 번 이기면 순이익은?\n(3) 이 전략의 근본적 문제점은?","hints":["P(5번 연속 짐) = (20/38)^5.","5번 안에 이기면: 이긴 판 수입 - 이전 손실 합 = 1 (최초 베팅액)."],"answer":"(1) ≈3.9% (2) 최초 베팅액 1단위 (3) 파산 위험·배팅 한도","explanation":"(1) P(5연패) = (20/38)^5 ≈ 0.039 = 3.9%.\n(2) 1+2+4+8+16 = 31 손실 후 32 획득 → 순이익 1.\n(3) 근본 문제:\n자본 한계: 연패가 길어지면 베팅액이 천문학적.\n카지노 한도: 최대 베팅액 제한.\n기댓값 변화 없음: 전략 불문 기댓값은 동일.\n10연패: 확률 0.6%, 필요 자본 1,023배.\n마르틴게일은 단기 승률을 높이지만\n파산 위험을 극적으로 증가시킵니다.","game_type":"reveal"},{"id":5,"question":"체비쇼프 부등식:\nP(|X-μ| ≥ kσ) ≤ 1/k²\n\n기댓값 50, 표준편차 10인 분포에서\nX가 20~80 범위 밖에 있을 확률의 상한은?","hints":["20~80 범위 밖 = |X-50| ≥ 30.\nk = 30/σ = 30/10 = 3.","P(|X-50| ≥ 30) ≤ 1/3² = 1/9."],"answer":"1/9 ≈ 11.1%","explanation":"|X-μ| ≥ kσ에서:\nμ=50, 범위 밖 = |X-50| ≥ 30.\nk = 30/10 = 3.\nP(|X-50| ≥ 30) ≤ 1/3² = 1/9 ≈ 11.1%.\n체비쇼프 부등식:\n분포의 형태와 무관하게 성립하는 보편적 부등식.\n단, 정규 분포에서 3σ 밖은 실제 0.3%로 훨씬 작습니다.\n체비쇼프는 최악의 경우 상한을 제공합니다.","game_type":"short_input"},{"id":6,"question":"무작위 그래프의 확률:\n6명이 참석한 파티에서\n임의의 두 사람이 친구이거나\n모르는 사이입니다.\n반드시 3명이 서로 모두 친구이거나\n서로 모두 모르는 사이인 3명이 존재합니다.\n\n이것을 확률적으로 분석하세요.\n(라지 램지 정리의 확률적 이해)","hints":["6명 중 1명(A)을 고정.\nA와 나머지 5명의 관계: 각각 친구 또는 비친구.","비둘기집 원리:\nA의 5개 관계 중 친구 ≥ 3 또는 비친구 ≥ 3."],"answer":"6명 중 반드시 그런 3명이 존재 (확률 1)","explanation":"A의 5개 관계: 친구 또는 비친구.\n비둘기집 원리: 5개 중 한 쪽이 최소 3개.\n경우 1: A와 친구 B,C,D가 있음.\nB-C, B-D, C-D가 모두 친구 → {A,B,C,...}에서 3인 친구 그룹.\nB-C가 비친구 → B,C 중 하나와 비친구 관계 탐색.\n귀납적으로 반드시 3인 동질 그룹 존재.\n램지 이론: 충분히 큰 구조에는 반드시 규칙적 부분이 존재.\nR(3,3) = 6: 6명이면 반드시 성립.","game_type":"reveal"},{"id":7,"question":"정보 이론과 확률:\n섀넌 엔트로피 H(X) = -Σ p_i × log₂(p_i)\n\n공정한 동전: H = -[0.5×log₂(0.5) + 0.5×log₂(0.5)]\n편향된 동전(앞면 0.9): H = ?\n\n(1) 공정한 동전의 엔트로피는?\n(2) 편향된 동전의 엔트로피는?\n(3) 엔트로피가 의미하는 것은?","hints":["log₂(0.5) = -1.\nH(공정) = -[0.5×(-1) + 0.5×(-1)] = 1비트.","log₂(0.9) ≈ -0.152, log₂(0.1) ≈ -3.322."],"answer":"공정한 동전: 1비트 / 편향된 동전: 약 0.469비트","explanation":"H(공정) = -[0.5×(-1) + 0.5×(-1)] = 1비트.\nH(편향) = -[0.9×(-0.152) + 0.1×(-3.322)]\n= -(−0.137 − 0.332)\n= 0.469비트.\n엔트로피의 의미:\n불확실성의 측도.\n공정한 동전: 최대 불확실성(1비트).\n편향된 동전: 낮은 불확실성(결과 예측 쉬움).\nH=0: 완전히 확정적(엔트로피 없음).\nH=1: 완전한 불확실성.\nAI·데이터 압축·암호화의 이론적 기반.","game_type":"reveal"},{"id":8,"question":"확률적 알고리즘:\n몬테카를로 방법으로 π 추정하기.\n\n단위 정사각형(변 길이 1)에\n무작위로 점을 찍습니다.\n원점 중심 반지름 1인 원 안에 있는 점의 비율로\nπ를 추정합니다.\n\n(1) 원리를 설명하세요.\n(2) 10,000번 시도에서 원 안 점이 7,854개라면 π 추정값은?\n(3) 표본이 많을수록 정확해지는 이유는?","hints":["정사각형 넓이 = 1.\n사분원 넓이 = πr²/4 = π/4.\n점이 원 안에 있을 확률 = π/4.","π/4 ≈ 7854/10000 → π ≈ 4 × 0.7854."],"answer":"(1) 넓이 비율로 π 추정 (2) π ≈ 3.1416 (3) 큰 수의 법칙","explanation":"(1) P(원 안) = π/4.\n무수히 많은 점 → 비율이 π/4에 수렴.\n(2) π ≈ 4 × (7854/10000) = 4 × 0.7854 = 3.1416.\n(3) 큰 수의 법칙: 시행 수 증가 → 표본 비율 → 실제 확률.\n몬테카를로 방법: 복잡한 계산을 무작위 시뮬레이션으로.\n금융·물리·AI 등 다양한 분야에 활용.","game_type":"reveal"},{"id":9,"question":"생일 문제:\nn명이 모였을 때 적어도 두 명의 생일이\n같을 확률이 50%를 넘는 최소 n은?","hints":["여사건: P(모두 다름) = 365/365 × 364/365 × ... × (365-n+1)/365.","P(적어도 하나 같음) = 1 - P(모두 다름).\nn=23일 때 P(모두 다름) ≈ 0.4927."],"answer":"n = 23명","explanation":"P(모두 다름):\nn=1: 1.\nn=2: 364/365 ≈ 0.9973.\nn=23: 365×364×...×343 / 365²² ≈ 0.4927.\nP(적어도 하나 같음) = 1 - 0.4927 = 0.5073 > 50%.\n단 23명만 있어도 생일이 겹칠 확률이 50%를 넘습니다.\n직관적으로 훨씬 많은 사람이 필요할 것 같지만\n23명으로 충분합니다.\n이것이 확률의 반직관적 아름다움입니다.","game_type":"short_input"},{"id":10,"question":"최적 정지 문제 (비서 문제):\nn명의 지원자를 순서대로 면접합니다.\n면접 후 즉시 채용 여부를 결정해야 하며\n한 번 거절하면 돌이킬 수 없습니다.\n최고의 지원자를 뽑을 최적 전략은?","hints":["최적 전략: 처음 k명은 무조건 탈락시키고\n(관찰만), 그 이후 처음 k명보다 나은 사람을 채용.","최적 k ≈ n/e (e ≈ 2.718).\n이 전략의 성공 확률 ≈ 1/e ≈ 36.8%."],"answer":"k = n/e ≈ 37% 관찰 후 선택, 성공 확률 ≈ 37%","explanation":"최적 정지 문제(Secretary Problem):\n100명 지원자: 처음 37명 관찰만.\n38번째부터 지금까지 본 것 중 최고보다 나으면 채용.\n이 전략의 성공 확률 ≈ 1/e ≈ 36.8%.\n어떤 전략으로도 36.8%보다 나을 수 없습니다.\n응용:\n결혼 상대 선택, 부동산 구매, 채용, 투자 시점.\n\"언제 결정을 내릴 것인가\"의 수학적 해답.\n최적의 관망 기간 = 전체의 약 37%.","game_type":"reveal"}]},{"type":"probability","level":9,"title":"확률·경우의 수 9단계 — 확률과 전략의 통합","difficulty":"발전","thinking":"게임 이론 · 확률 전략 · 통계적 추론","problems":[{"id":1,"question":"혼합 전략 내쉬 균형:\n가위바위보에서 상대가 가위만 낸다면\n최적 전략은 바위.\n하지만 상대가 이를 알면 보를 냅니다.\n\n순수 전략이 없을 때 혼합 전략 균형은?\n각 선택을 동일한 확률(1/3)로 낼 때\n상대방이 어떤 선택을 해도\n기댓값이 같음을 보이세요.","hints":["상대가 가위만 낸다고 가정.\n나의 가위(무승부), 바위(승), 보(패)의 기댓값.","나의 전략이 1/3씩일 때:\n상대가 가위를 내든, 바위를 내든, 보를 내든\n나의 기댓값이 모두 0임을 보이세요."],"answer":"1/3 혼합 전략이 내쉬 균형, 기댓값=0","explanation":"나의 전략: 가위(1/3), 바위(1/3), 보(1/3).\n상대가 가위를 낼 때:\nE = (1/3)×0 + (1/3)×1 + (1/3)×(-1) = 0.\n상대가 바위를 낼 때:\nE = (1/3)×(-1) + (1/3)×0 + (1/3)×1 = 0.\n상대가 보를 낼 때:\nE = (1/3)×1 + (1/3)×(-1) + (1/3)×0 = 0.\n어떤 선택이든 기댓값 = 0.\n1/3 혼합 전략이 유일한 내쉬 균형.\n상대가 내 전략을 알아도 대응할 방법이 없습니다.","game_type":"reveal"},{"id":2,"question":"베이지안 업데이트:\n처음에 동전이 공정할 확률 0.5,\n편향(앞면 0.7)일 확률 0.5로 추정합니다.\n\n동전을 3번 던져 앞면 3번이 나왔을 때\n편향된 동전일 사후 확률은?","hints":["P(편향|앞앞앞) = P(앞앞앞|편향)×P(편향) / P(앞앞앞).","P(앞앞앞|공정) = (0.5)³ = 0.125.\nP(앞앞앞|편향) = (0.7)³ = 0.343."],"answer":"약 73.3%","explanation":"P(앞앞앞) = P(앞앞앞|공정)×P(공정) + P(앞앞앞|편향)×P(편향)\n= 0.125×0.5 + 0.343×0.5\n= 0.0625 + 0.1715 = 0.234.\nP(편향|앞앞앞) = (0.343×0.5) / 0.234\n= 0.1715 / 0.234 ≈ 0.733.\n처음 50%이던 편향 확률이 증거(앞면 3번)로 73.3%로 업데이트.\n베이지안 추론: 새 증거로 믿음을 지속 업데이트.\n과학적 방법론의 수학적 기초.","game_type":"short_input"},{"id":3,"question":"확률 그래프 이론:\n에르되시-레니 랜덤 그래프 G(n,p):\nn개의 노드, 각 간선이 독립적으로 확률 p로 존재.\n\nn=5, p=0.5일 때\n(1) 간선의 기댓값은?\n(2) 연결 그래프일 확률은 대략 얼마인가요?\n(3) 거대 연결 요소가 나타나는 임계 확률은?","hints":["가능한 간선 수: C(5,2) = 10.\n각 간선 존재 확률: 0.5.","임계 확률: p = 1/n 근처에서 거대 연결 요소 등장."],"answer":"(1) 5개 (2) 약 34% (3) p = 1/n = 0.2","explanation":"(1) E(간선 수) = C(5,2)×0.5 = 10×0.5 = 5개.\n(2) 연결 그래프 확률:\n정확한 계산은 복잡하지만 p=0.5에서 약 34%.\np가 클수록 연결 확률 증가.\n(3) 임계 현상:\np < 1/n: 작은 요소들만 존재.\np = 1/n: 거대 연결 요소 탄생.\np > log(n)/n: 거의 확실히 연결.\n상전이(phase transition): 물리의 상변화와 유사.\n소셜 네트워크, 인터넷 구조 분석에 적용.","game_type":"reveal"},{"id":4,"question":"확률 부등식의 응용:\n마르코프 부등식:\nP(X ≥ a) ≤ E(X)/a (X ≥ 0)\n\n기댓값이 100인 시험에서\n150점 이상 받을 확률의 상한은?\n\n체비쇼프 부등식으로\n평균 100, 표준편차 15인 시험에서\n70점 이하 또는 130점 이상일 확률의 상한은?","hints":["마르코프: P(X ≥ 150) ≤ 100/150 = 2/3.","체비쇼프: |X-100| ≥ 30 = 2σ.\nP(|X-100| ≥ 30) ≤ 1/4."],"answer":"마르코프: 2/3 / 체비쇼프: 1/4","explanation":"마르코프 부등식:\nP(X ≥ 150) ≤ E(X)/150 = 100/150 = 2/3.\n매우 느슨한 상한이지만 분포를 몰라도 성립.\n체비쇼프 부등식:\n|X-100| ≥ 30, k=30/15=2.\nP(|X-100| ≥ 30) ≤ 1/2² = 1/4.\n실제 정규 분포에서 2σ 밖은 약 5%이므로\n체비쇼프의 25%는 훨씬 느슨합니다.\n확률 부등식: 분포를 몰라도 성립하는 보편적 한계.","game_type":"reveal"},{"id":5,"question":"확률 암호학 입문:\n일회용 암호 패드(One-Time Pad):\n메시지 M, 키 K (무작위), 암호문 C = M XOR K.\n\nM = 10110 (이진수), K = 01101 (무작위)일 때\n(1) C는?\n(2) K를 모르면 C에서 M을 추론할 수 있나요?\n(3) 완전 비밀성이란?","hints":["XOR: 같으면 0, 다르면 1.\n10110 XOR 01101 = ?","완전 비밀성: P(M|C) = P(M).\n암호문이 메시지에 대한 정보를 전혀 주지 않음."],"answer":"(1) 11011 (2) 불가능 (3) 암호문이 메시지 정보 없음","explanation":"(1) C = 10110 XOR 01101:\n1XOR0=1, 0XOR1=1, 1XOR1=0, 1XOR0=1, 0XOR1=1.\nC = 11011.\n(2) K가 완전 무작위이면:\n어떤 C도 모든 M에 동일한 확률로 대응.\n정보 이론적으로 해독 불가.\n(3) 완전 비밀성(Shannon, 1949):\nP(M|C) = P(M).\n암호문을 봐도 메시지 확률이 변하지 않음.\n일회용 패드만이 완전 비밀성 달성.\n단점: 키 길이 = 메시지 길이, 재사용 불가.","game_type":"reveal"},{"id":6,"question":"통계적 가설 검정:\n동전이 공정한지 검정합니다.\n귀무 가설 H₀: p = 0.5 (공정)\n대립 가설 H₁: p ≠ 0.5 (편향)\n\n동전을 100번 던져 60번 앞면이 나왔습니다.\n유의 수준 5%에서 귀무 가설을 기각할 수 있나요?\n\n(H₀ 하에서: 평균=50, 표준편차=5)","hints":["검정 통계량 Z = (X - μ) / σ = (60-50)/5.","Z = 2.0.\n유의 수준 5%: |Z| > 1.96이면 기각."],"answer":"|Z|=2.0 > 1.96이므로 귀무 가설 기각 (p < 0.05)","explanation":"Z = (60-50)/5 = 2.0.\n유의 수준 5%의 임계값: ±1.96.\n|2.0| > 1.96 → 귀무 가설 기각.\n결론: 통계적으로 유의미하게 편향된 동전.\np-value ≈ 0.046 < 0.05.\n단, 이것이 \"확실히 편향\"을 의미하지는 않습니다.\n5%의 오류 가능성(1종 오류)이 있습니다.","game_type":"reveal"},{"id":7,"question":"랜덤 워크:\n수직선 위에서 출발점 0에서 시작.\n매 스텝: +1 (확률 0.5) 또는 -1 (확률 0.5).\n\n(1) n스텝 후 위치의 기댓값은?\n(2) n스텝 후 위치의 분산은?\n(3) 원점 복귀 확률은?","hints":["각 스텝: E(스텝) = 0.5×1 + 0.5×(-1) = 0.\nV(스텝) = E(X²) - [E(X)]² = 1.","n스텝: E(위치) = 0, V(위치) = n.\n표준편차 = √n."],"answer":"(1) 0 (2) n (3) 1 (반드시 돌아옴, 무한 시간 후)","explanation":"(1) E(위치) = n×E(스텝) = n×0 = 0.\n(2) V(위치) = n×V(스텝) = n×1 = n.\n표준편차 = √n → 퍼짐이 √n에 비례.\n(3) 원점 복귀 확률:\n1차원 랜덤 워크는 확률 1로 원점 귀환.\n\"취한 사람은 반드시 집에 돌아간다.\"\n2차원: 확률 1로 귀환.\n3차원: 귀환 확률 < 1 (약 34%).\n\"취한 새는 집에 못 돌아갈 수 있다.\"","game_type":"reveal"},{"id":8,"question":"확률 알고리즘:\n퀵소트의 평균 시간 복잡도를 확률로 분석합니다.\n\nn개 원소 중 피벗을 무작위로 선택할 때\n피벗이 중간 50% (n/4 ~ 3n/4) 안에 있을 확률은?\n\n이 경우 양쪽이 각각 최대 3n/4이 됩니다.\n\n(1) 피벗이 \"좋은\" 위치일 확률은?\n(2) 연속으로 k번 좋은 피벗을 선택할 확률은?\n(3) 평균적으로 몇 번 시도해야 좋은 피벗을 얻나요?","hints":["중간 50%: n/4 ~ 3n/4 → n/2개 위치.\n좋은 피벗 확률 = 1/2.","기하 분포: 좋은 피벗이 나올 때까지 평균 시도 수 = 1/p."],"answer":"(1) 1/2 (2) (1/2)^k (3) 평균 2번","explanation":"(1) 좋은 피벗: n/4~3n/4 범위 = n/2개.\n확률 = (n/2)/n = 1/2.\n(2) k번 연속 좋은 피벗: (1/2)^k.\n(3) 기하 분포 기댓값: 1/p = 1/(1/2) = 2번.\n퀵소트 평균 O(n log n):\n절반씩 분할이 평균적으로 O(log n) 단계.\n각 단계 O(n) 작업 → 평균 O(n log n).\n랜덤화 알고리즘의 위력:\n최악 O(n²)이지만 평균 O(n log n).\n랜덤화로 최악 케이스를 회피.","game_type":"reveal"},{"id":9,"question":"확률과 정보:\n압축 이론의 기초.\n\n공정한 동전(엔트로피 1비트) vs\n편향 동전(앞면 3/4, 뒷면 1/4).\n\n편향 동전의 엔트로피는?\n100번 던진 결과를 저장할 때\n공정한 동전은 100비트가 필요합니다.\n편향 동전은 몇 비트가 필요한가요?","hints":["H = -[0.75×log₂(0.75) + 0.25×log₂(0.25)].\nlog₂(0.75) ≈ -0.415, log₂(0.25) = -2.","편향 동전의 엔트로피 ≈ 0.811비트.\n100번 → 약 81.1비트."],"answer":"엔트로피 ≈ 0.811비트 / 100번 ≈ 81비트","explanation":"H = -[0.75×(-0.415) + 0.25×(-2)]\n= -(-0.311 - 0.5)\n= 0.811비트.\n100번 시퀀스 최소 저장: 81.1비트.\n허프만 코딩: 빈번한 결과(앞면)에 짧은 코드.\n앞면: \"0\" (1비트), 뒷면: \"10\" (2비트).\n평균: 0.75×1 + 0.25×2 = 1.25비트 (최적에 가까움).\n엔트로피 = 이론적 최소 비트 수.\n데이터 압축의 수학적 한계.","game_type":"reveal"},{"id":10,"question":"종합 확률 퍼즐:\n3개의 상자에 공이 다음과 같이 들어있습니다.\n\n상자 1: 흰 공 2개, 검은 공 1개.\n상자 2: 흰 공 1개, 검은 공 2개.\n상자 3: 흰 공 1개, 검은 공 1개.\n\n다음 실험을 합니다:\n①주사위를 던져 1~2면이면 상자1, 3~4면이면 상자2, 5~6면이면 상자3을 선택.\n②선택된 상자에서 공 1개를 꺼냄.\n③꺼낸 공이 흰 공이었을 때 상자3에서 꺼냈을 확률은?","hints":["P(상자1)=1/3, P(상자2)=1/3, P(상자3)=1/3.\nP(흰|상자1)=2/3, P(흰|상자2)=1/3, P(흰|상자3)=1/2.","P(흰) = (1/3)×(2/3) + (1/3)×(1/3) + (1/3)×(1/2).\nP(상자3|흰) = P(흰|상자3)×P(상자3) / P(흰)."],"answer":"약 31.6%","explanation":"P(흰) = (1/3)×(2/3) + (1/3)×(1/3) + (1/3)×(1/2)\n= 2/9 + 1/9 + 1/6\n= 4/18 + 2/18 + 3/18\n= 9/18 = 1/2.\nP(상자3|흰) = [(1/2)×(1/3)] / (1/2)\n= (1/6) / (1/2)\n= 1/3 ≈ 33.3%.\n\n재계산:\nP(흰|상자3)×P(상자3) = (1/2)×(1/3) = 1/6.\nP(흰) = 2/9+1/9+1/6 = 4/18+2/18+3/18 = 9/18 = 1/2.\nP(상자3|흰) = (1/6)/(1/2) = 2/6 = 1/3 ≈ 33.3%.","game_type":"short_input"}]},{"type":"probability","level":10,"title":"확률·경우의 수 10단계 — 확률의 수학적 구조","difficulty":"심화","thinking":"측도론 · 확률 공간 · 고급 확률 이론","problems":[{"id":1,"question":"콜모고로프 공리 체계:\n확률의 수학적 정의를 분석하세요.\n\n공리 1: P(A) ≥ 0 (비음성)\n공리 2: P(Ω) = 1 (전체 확률)\n공리 3: 서로소인 사건들의 합집합:\nP(A₁∪A₂∪...) = P(A₁)+P(A₂)+...\n\n(1) 이 공리에서 P(∅)=0을 증명하세요.\n(2) P(Aᶜ) = 1-P(A)를 증명하세요.\n(3) P(A∪B) = P(A)+P(B)-P(A∩B)를 증명하세요.","hints":["P(∅)=0: Ω와 ∅이 서로소이고 Ω∪∅=Ω임을 활용.","P(Aᶜ): A와 Aᶜ은 서로소, A∪Aᶜ=Ω.\n공리 2,3 활용."],"answer":"공리에서 유도 가능 (아래 해설 참조)","explanation":"(1) P(∅)=0:\nΩ = Ω∪∅ (서로소).\n공리3: P(Ω) = P(Ω)+P(∅).\n1 = 1+P(∅).\n∴ P(∅) = 0.\n(2) P(Aᶜ)=1-P(A):\nΩ = A∪Aᶜ (서로소).\nP(Ω) = P(A)+P(Aᶜ).\n1 = P(A)+P(Aᶜ).\n∴ P(Aᶜ) = 1-P(A).\n(3) P(A∪B) = P(A)+P(B)-P(A∩B):\nA∪B = A∪(B\\A) (서로소).\nP(A∪B) = P(A)+P(B\\A).\nB = (A∩B)∪(B\\A) (서로소).\nP(B) = P(A∩B)+P(B\\A).\nP(B\\A) = P(B)-P(A∩B).\n∴ P(A∪B) = P(A)+P(B)-P(A∩B).","game_type":"reveal"},{"id":2,"question":"시그마 대수(σ-algebra)와 측도론:\n왜 모든 부분집합에 확률을 부여할 수 없나요?\n\n비가측 집합의 존재(비탈리 집합):\n[0,1]에서 측도 이론과 일치하는\n확률을 모든 부분집합에 부여하면 모순이 발생합니다.\n\n(1) 이 문제의 핵심을 설명하세요.\n(2) 시그마 대수가 해결책인 이유는?\n(3) 실용적 확률에서 이것이 문제가 되는가?","hints":["선택 공리(Axiom of Choice)를 사용하면\n측도가 정의되지 않는 집합을 만들 수 있습니다.","σ-대수: 사건들의 모임으로, 모든 부분집합보다 제한적.\n우리가 \"관심 있는\" 사건들만 포함."],"answer":"비가측집합존재→전체부분집합불가 / σ대수=가측집합한정 / 실용적으로는문제없음","explanation":"문제의 핵심:\n[0,1]의 모든 부분집합에 평행이동 불변 측도 부여 불가.\n비탈리(1905): 선택 공리로 비가측 집합 구성.\n이 집합에는 \"확률\"을 의미 있게 정의할 수 없음.\nσ-대수 해결:\n모든 부분집합 대신 \"잘 정의된\" 사건의 모임.\n닫힘 성질: 합집합, 여집합에 닫혀있음.\n보렐 σ-대수: 열린 집합으로 생성된 σ-대수.\n실용적 의미:\n일상적 확률 문제에서는 전혀 문제없음.\n이산 확률: 모든 부분집합이 가측.\n연속 확률: 보렐 집합이면 충분.\n수학적 엄밀성을 위한 이론적 기초.","game_type":"reveal"},{"id":3,"question":"특성 함수(Characteristic Function):\n확률 변수 X의 특성 함수:\nφ(t) = E[e^(itX)] = E[cos(tX)] + i·E[sin(tX)]\n\n(1) 공정한 동전(±1)의 특성 함수는?\n(2) 특성 함수의 주요 성질은?\n(3) 중심극한정리와의 관계는?","hints":["P(X=1)=P(X=-1)=1/2.\nφ(t) = (1/2)e^(it) + (1/2)e^(-it) = cos(t).","합의 특성 함수 = 각 특성 함수의 곱.\nn개 합의 정규화 → 정규 분포의 특성 함수 수렴."],"answer":"φ(t)=cos(t) / 합의특성함수=곱 / CLT=특성함수수렴으로증명","explanation":"(1) φ(t) = (1/2)e^(it) + (1/2)e^(-it)\n= (e^(it)+e^(-it))/2 = cos(t).\n(2) 특성 함수의 성질:\nφ(0) = 1 (항상).\n|φ(t)| ≤ 1.\n독립 합: φ_{X+Y}(t) = φ_X(t)·φ_Y(t).\n분포를 유일하게 결정.\n(3) 중심극한정리 증명:\nn개 독립 동일 분포의 합을 정규화.\nφ_n(t) = [φ(t/√n)]^n → e^(-t²/2).\ne^(-t²/2)는 표준 정규 분포의 특성 함수.\n특성 함수는 확률론의 강력한 도구.","game_type":"reveal"},{"id":4,"question":"마르팅게일 이론:\n확률 과정 {Xₙ}이 마르팅게일이면:\nE[Xₙ₊₁ | X₀,...,Xₙ] = Xₙ.\n\n(1) 공정한 게임에서의 자산이 마르팅게일임을 보이세요.\n(2) 마르팅게일 수렴 정리를 설명하세요.\n(3) 옵션 가격 결정에서의 응용은?","hints":["공정한 게임: 기댓값=0인 베팅.\n현재 자산 + 베팅 기댓값 = 현재 자산.","마르팅게일 수렴: 유계 마르팅게일은 거의 확실히 수렴."],"answer":"공정게임자산=마르팅게일 / 유계마르팅게일수렴 / 블랙숄즈=위험중립측도","explanation":"(1) 공정한 게임의 자산:\nE[X_{n+1}|X₀,...,Xₙ] = Xₙ + E[베팅 결과] = Xₙ + 0 = Xₙ.\n∴ 마르팅게일.\n(2) 마르팅게일 수렴 정리:\nE[|Xₙ|] ≤ M (유계)이면\nXₙ → X∞ (거의 확실하게 수렴).\n랜덤 워크는 유계가 아니므로 수렴 안 함.\n(3) 블랙-숄즈 모델:\n위험 중립 측도(Q) 하에서 주가는 마르팅게일.\n옵션 가격 = E_Q[할인된 미래 페이오프].\n금융 파생상품 가격 결정의 수학적 기초.\n노벨 경제학상(1997): 블랙-숄즈-머튼.","game_type":"reveal"},{"id":5,"question":"확률 불등식의 심화:\n호에프딩 부등식:\nn개 독립 유계 확률 변수의 합 Sₙ에 대해:\nP(Sₙ - E[Sₙ] ≥ t) ≤ exp(-2t²/Σ(bᵢ-aᵢ)²)\n(aᵢ ≤ Xᵢ ≤ bᵢ)\n\n동전 100번 던져 앞면 횟수가 65 이상일 확률의 상한은?","hints":["X = 앞면 횟수, E[X] = 50.\n각 Xᵢ ∈ {0,1}, aᵢ=0, bᵢ=1.\nt = 65-50 = 15.","P(X ≥ 65) ≤ exp(-2×15² / 100×1²)."],"answer":"약 0.011 = 1.1%","explanation":"P(X-50 ≥ 15) ≤ exp(-2×225/100)\n= exp(-4.5)\n≈ 0.0111 = 1.11%.\n실제 이항 분포에서: P(X≥65) ≈ 0.0018.\n호에프딩은 상한이므로 실제보다 느슨합니다.\n호에프딩 부등식의 활용:\n기계 학습: 일반화 오차 경계.\n알고리즘 분석: 확률적 알고리즘의 오차 보장.\n표본 복잡도: 필요한 데이터 수 결정.","game_type":"short_input"},{"id":6,"question":"확률 과정의 분류:\n다음 확률 과정들을 분류하고 특성을 설명하세요.\n\n(1) 브라운 운동(위너 과정)\n(2) 포아송 과정\n(3) 가우시안 과정\n(4) 레비 과정","hints":["브라운 운동: 연속 경로, 정규 증분, 독립 증분.\n포아송 과정: 이산 점프, 지수 대기 시간.","가우시안 과정: 임의 유한 집합이 다변량 정규.\n레비 과정: 독립 정류 증분의 일반화."],"answer":"연속=브라운·가우시안 / 이산점프=포아송·레비 / 일반화=레비가포아송+브라운포함","explanation":"브라운 운동 B(t):\nB(0)=0, 연속 경로.\nB(t)-B(s) ~ N(0, t-s) (독립 정규 증분).\n물리: 분자 운동, 금융: 주가 모델.\n포아송 과정 N(t):\nN(t)-N(s) ~ Poisson(λ(t-s)).\n이산 점프, 지수 대기.\n콜센터, 방사선 붕괴.\n가우시안 과정:\n임의 유한 부분집합 → 다변량 정규 분포.\n가우시안 프로세스 회귀(머신러닝).\n레비 과정:\n독립 정류 증분의 가장 일반적 형태.\n브라운 운동 + 포아송 과정의 합을 포함.\n금융의 점프-확산 모델.","game_type":"reveal"},{"id":7,"question":"엔트로피와 정보의 심화:\nKL 발산(쿨백-라이블러 발산):\nD_KL(P||Q) = Σ P(x) × log(P(x)/Q(x))\n\nP = (1/2, 1/2), Q = (3/4, 1/4)일 때\nD_KL(P||Q)와 D_KL(Q||P)를 구하고\n비대칭성을 설명하세요.","hints":["D_KL(P||Q) = (1/2)×log(1/2 / 3/4) + (1/2)×log(1/2 / 1/4).\nlog₂ 사용.","log₂(2/3) ≈ -0.585, log₂(2) = 1."],"answer":"D_KL(P||Q) ≈ 0.208비트 / D_KL(Q||P) ≈ 0.189비트","explanation":"D_KL(P||Q):\n= (1/2)×log₂(2/3) + (1/2)×log₂(2)\n= (1/2)×(-0.585) + (1/2)×1\n= -0.292 + 0.5 = 0.208비트.\nD_KL(Q||P):\n= (3/4)×log₂(3/2) + (1/4)×log₂(1/2)\n= (3/4)×0.585 + (1/4)×(-1)\n= 0.439 - 0.25 = 0.189비트.\n비대칭성: D_KL(P||Q) ≠ D_KL(Q||P).\nKL 발산은 거리가 아님 (삼각 부등식 불성립).\n해석: P를 기준으로 Q를 근사할 때의 \"정보 손실\".\n응용: 머신러닝 손실 함수, 정보 이론, 통계 추론.","game_type":"reveal"},{"id":8,"question":"랜덤 행렬 이론 입문:\nn×n 랜덤 행렬의 고유값 분포.\n\n가우시안 직교 앙상블(GOE):\n원소가 독립 정규 분포인 대칭 행렬.\n위그너 반원 법칙: n→∞일 때\n정규화된 고유값 분포 → 반원 분포.\n\n(1) 위그너 반원 법칙의 의미는?\n(2) 실생활 응용은?\n(3) 왜 \"반원\"인가?","hints":["고유값을 √n으로 나누면 [-2,2] 위의 반원에 수렴.\n밀도: ρ(x) = (1/2π)√(4-x²).","응용: 핵물리학(에너지 준위), 통신 이론, 머신러닝."],"answer":"랜덤행렬고유값=반원분포 / 핵물리·통신·ML응용 / 수학적보편성","explanation":"위그너 반원 법칙:\n랜덤 대칭 행렬의 고유값을 정규화하면\n[-2,2] 구간의 반원 분포로 수렴.\nρ(x) = (1/2π)√(4-x²).\n왜 반원?\n중심극한정리의 행렬 버전.\n독립성과 대칭성에서 수학적으로 도출.\n실생활 응용:\n핵물리: 원자핵의 에너지 준위 통계.\n무선 통신: MIMO 안테나 시스템.\n머신러닝: 신경망 가중치 초기화.\n금융: 상관 행렬 분석(소음 vs 신호).\n랜덤 행렬 이론은 현대 수학·물리·공학의 교차점.","game_type":"reveal"},{"id":9,"question":"확률과 계산 복잡도:\nBPP(Bounded-error Probabilistic Polynomial time):\n확률 알고리즘으로 다항 시간에 풀 수 있는 문제.\n\n소수 판별(밀러-라빈 알고리즘):\nn이 소수일 확률적 판별.\nk번 반복 시 오류 확률 ≤ (1/4)^k.\n\n(1) k=10이면 오류 확률은?\n(2) BPP와 P의 관계는?\n(3) 무작위성이 계산에 주는 이점은?","hints":["오류 확률 ≤ (1/4)^10 = 1/4^10.","BPP ⊆ P²(PSPACE). 대부분 학자는 BPP = P로 추측."],"answer":"(1) 약 10^(-6) (2) P⊆BPP, BPP=P추측 (3) 속도·간결성","explanation":"(1) (1/4)^10 = 1/1,048,576 ≈ 10^(-6).\n10번 반복으로 오류 확률이 100만분의 1.\n(2) BPP와 P:\nP ⊆ BPP (결정론적 알고리즘은 확률적 알고리즘).\n대부분 학자: BPP = P (무작위성이 진정한 도움 안 됨).\nAKS 알고리즘(2002): 소수 판별이 실제로 P임을 증명.\n(3) 무작위성의 이점:\n알고리즘 단순화.\n평균적 성능 개선.\n최악 케이스 회피.\n암호학: 진정한 무작위성이 보안의 핵심.","game_type":"reveal"},{"id":10,"question":"확률론의 미해결 문제들:\n다음 미해결/최근 해결된 문제들을 탐구하세요.\n\n(1) 콜모고로프 복잡도와 랜덤성:\n가장 무작위한 수열이란?\n\n(2) 브라운 운동의 프랙탈 차원:\n2차원에서 브라운 운동의 경로 차원 = 2.\n3차원에서 경로 차원 = ?\n\n(3) 랜덤 그래프의 임계 현상:\nG(n,p)에서 해밀턴 순환이 나타나는 임계 p는?","hints":["콜모고로프 복잡도: 수열을 생성하는 가장 짧은 프로그램.\n무작위 = 압축 불가능.","브라운 운동 3차원 경로: 자기 교차 없음, 차원 < 2."],"answer":"(1) 압축불가능한수열 (2) 3차원에서도4/3 (3) p=log(n)/n","explanation":"(1) 콜모고로프 랜덤성:\nC(x) = x를 생성하는 최단 프로그램 길이.\n무작위 수열: C(x) ≈ |x| (압축 불가).\n역설: 가장 무작위한 수열은 정의 불가.\n(최단 프로그램의 존재는 결정 불가능)\n(2) 브라운 운동 경로 차원:\n2차원: 경로가 평면을 채움 → 하우스도르프 차원 = 2.\n3차원: 자기 교차 없음 → 하우스도르프 차원 = 2.\n(3, 4차원도 동일)\n로른(1982): 3차원 이상에서도 브라운 경로 차원 = 2.\n(3) 랜덤 그래프 해밀턴 순환:\np = log(n)/n 근처에서 해밀턴 순환 임계.\n포즈나(1983): 정확한 임계 결정.\n확률론과 그래프 이론의 아름다운 교차.","game_type":"reveal"}]},{"type":"probability","level":11,"title":"확률·경우의 수 11단계 — 확률의 최전선","difficulty":"심화","thinking":"확률 최전선 · 응용 확률 · 현대 확률 이론","problems":[{"id":1,"question":"확률과 머신러닝:\n로지스틱 회귀의 확률적 해석.\n\nP(Y=1|X) = σ(wᵀX) = 1/(1+e^(-wᵀX))\n\n(1) σ 함수의 확률적 의미는?\n(2) 교차 엔트로피 손실 함수와 최대 가능도의 관계는?\n(3) 과적합을 확률로 어떻게 해석하나요?","hints":["σ(z): 실수 → (0,1) 변환 → 확률로 해석.\nP(Y=1|X) + P(Y=0|X) = 1.","최대 가능도: log P(데이터|파라미터) 최대화.\n= 교차 엔트로피 최소화."],"answer":"σ=확률변환 / 교차엔트로피=음의로그가능도 / 과적합=사전분포무시","explanation":"(1) 시그모이드 함수 σ:\n-∞→0, 0→0.5, ∞→1.\n선형 결합을 확률로 변환.\n이진 분류의 핵심 함수.\n(2) 교차 엔트로피와 최대 가능도:\nL = -Σ[yᵢlog(ŷᵢ) + (1-yᵢ)log(1-ŷᵢ)].\n= -log P(데이터|w) (음의 로그 가능도).\n최대 가능도 = 교차 엔트로피 최소화.\n(3) 과적합의 베이지안 해석:\n과적합 = 데이터에만 집중, 사전 지식 무시.\n정규화 = 파라미터에 사전 분포 부여.\nL2 정규화 = 가우시안 사전 분포.\nL1 정규화 = 라플라스 사전 분포.\n베이지안 머신러닝의 핵심 관점.","game_type":"reveal"},{"id":2,"question":"확률적 최적화:\n확률적 경사 하강법(SGD)의 수렴 분석.\n\n전체 데이터 n개에서 미니배치 크기 b를 사용할 때:\n(1) 그레디언트 추정의 분산은?\n(2) 학습률 스케줄이 필요한 이유는?\n(3) 확률론적 관점에서 모멘텀의 역할은?","hints":["전체 그레디언트 분산을 b로 나누면 미니배치 분산.\nb가 클수록 분산 감소.","고정 학습률: 수렴 후 진동.\n감소 학습률: 진동 감소하며 수렴.\n로빈스-모로 조건: Σαₜ=∞, Σαₜ²<∞."],"answer":"분산=σ²/b / 학습률감소=수렴안정 / 모멘텀=랜덤워크에서관성","explanation":"(1) 미니배치 분산:\n전체 그레디언트 분산 σ².\n미니배치 추정 분산 = σ²/b.\nb 증가 → 분산 감소 → 안정적이지만 느림.\n(2) 학습률 스케줄:\n고정 αₜ=α: 최솟값 근처에서 α² 크기 진동.\n감소 αₜ: 초기=빠른 이동, 후기=세밀한 탐색.\n로빈스-모로: Σαₜ=∞(충분히 이동), Σαₜ²<∞(수렴).\n(3) 모멘텀의 확률론적 해석:\nSGD = 확률적 랜덤 워크.\n모멘텀 = 이전 방향의 가중 평균.\n분산 감소 효과: 방향의 안정화.\n래스카르(Langevin 동역학): 모멘텀 SGD = 물리적 마찰이 있는 입자.","game_type":"reveal"},{"id":3,"question":"확률 그래픽 모델:\n베이지안 네트워크(Bayesian Network).\n\n변수: B(도둑), E(지진), A(경보), J(John 전화), M(Mary 전화).\n구조: B→A, E→A, A→J, A→M.\n\nP(B)=0.001, P(E)=0.002.\nP(A|B,E)=0.95, P(A|B,¬E)=0.94,\nP(A|¬B,E)=0.29, P(A|¬B,¬E)=0.001.\nP(J|A)=0.90, P(M|A)=0.70.\n\nJohn과 Mary 모두 전화했을 때 도둑일 확률은?","hints":["P(B|J,M) ∝ P(J,M|B) × P(B).\nP(J,M|B) = Σ_{E,A} P(J|A)P(M|A)P(A|B,E)P(E).","전체 확률의 법칙으로 각 경우를 합산.\nE와 A를 모두 합산해야 합니다."],"answer":"약 28.4%","explanation":"P(J,M,B) = Σ_{e,a} P(J|a)P(M|a)P(a|B,e)P(e)P(B).\nB=True, E=True:\nP(A=T|B,E)=0.95.\n기여: 0.9×0.7×0.95×0.002×0.001.\nB=True, E=False:\nP(A=T|B,¬E)=0.94.\n기여: 0.9×0.7×0.94×0.998×0.001.\n합산 후 정규화:\nP(B=T|J,M) ≈ 0.284.\n베이지안 네트워크: 변수 간 조건부 독립 구조를 그래프로.\n추론: 관측된 증거로 숨겨진 변수 추론.\nAI·의료 진단·자연어처리 등에 광범위 사용.","game_type":"short_input"},{"id":4,"question":"포트폴리오 이론과 확률:\n마코위츠 평균-분산 최적화.\n\n자산 A: 기대수익 10%, 분산 4%.\n자산 B: 기대수익 6%, 분산 1%.\nA,B의 상관계수: -0.5.\n\n(1) 포트폴리오 w_A, w_B (w_A+w_B=1)의\n기대수익과 분산을 구하세요.\n(2) 분산을 최소화하는 가중치는?\n(3) 다각화의 확률론적 원리는?","hints":["E[R_p] = w_A×0.1 + w_B×0.06.\nV[R_p] = w_A²×0.04 + w_B²×0.01 + 2×w_A×w_B×(-0.5)×√0.04×√0.01.","공분산 = -0.5×√0.04×√0.01 = -0.5×0.2×0.1 = -0.01.\nV[R_p] = 0.04w_A² + 0.01w_B² - 0.02w_Aw_B."],"answer":"최소 분산: w_A ≈ 0.25, w_B ≈ 0.75","explanation":"V[R_p] = 0.04w² + 0.01(1-w)² - 0.02w(1-w).\n(w = w_A)\ndV/dw = 0.08w - 0.02(1-w) - 0.02(1-2w) = 0.\n0.08w - 0.02 + 0.02w - 0.02 + 0.04w = 0.\n0.14w = 0.04.\nw_A = 2/7 ≈ 0.286, w_B ≈ 0.714.\n다각화의 원리:\n음의 상관자산 혼합 → 분산 감소.\n완전 음의 상관(ρ=-1): 분산 0 달성 가능.\n무작위한 가격 움직임이 상쇄.\n현대 포트폴리오 이론(마코위츠, 1952).","game_type":"reveal"},{"id":5,"question":"확률과 암호화:\nRSA의 확률론적 기초.\n\np=61, q=53이라면:\nn = p×q\nφ(n) = (p-1)(q-1)\ne=17 (gcd(e, φ(n))=1)\nd: e×d ≡ 1 (mod φ(n))\n\n(1) n, φ(n)을 구하세요.\n(2) d를 구하세요.\n(3) 메시지 M=65를 암호화·복호화하세요.\n(4) RSA의 보안이 확률론에 의존하는 이유는?","hints":["n = 61×53.\nφ(n) = 60×52.\n17×d ≡ 1 (mod 3120).","확장 유클리드로 d 계산.\nC = M^e mod n, M = C^d mod n."],"answer":"n=3233, φ(n)=3120, d=2753","explanation":"n = 61×53 = 3233.\nφ(n) = 60×52 = 3120.\n17×d ≡ 1 (mod 3120) → d = 2753.\n(17×2753 = 46801 = 15×3120+1 ✓)\n암호화: C = 65^17 mod 3233.\n복호화: M = C^2753 mod 3233 = 65.\nRSA와 확률론:\n소인수분해: n=3233을 61×53으로 분해하는 것이 어려움.\n밀러-라빈: 확률적 소수 판별로 p,q 생성.\n큰 소수 찾기: 무작위 수에서 소수 확률 ≈ 1/ln(n).\n2048비트 RSA: 소인수분해가 현실적으로 불가능.","game_type":"reveal"},{"id":6,"question":"확률과 역학:\nSIR 모델(감염병 확산).\n\ndS/dt = -βSI/N\ndI/dt = βSI/N - γI\ndR/dt = γI\n\nβ=0.3(감염률), γ=0.1(회복률), N=1000.\n초기: S=990, I=10, R=0.\n\n(1) 기본 재생산지수 R₀는?\n(2) R₀>1의 확률론적 의미는?\n(3) 집단 면역 임계값은?","hints":["R₀ = β/γ: 한 감염자가 만드는 평균 2차 감염자 수.","집단 면역: 1-1/R₀ 이상이 면역이면 확산 억제."],"answer":"R₀=3 / R₀>1=확산 / 집단면역 2/3(67%)","explanation":"R₀ = β/γ = 0.3/0.1 = 3.\nR₀ = 3: 한 감염자가 평균 3명에게 전파.\nR₀의 확률론적 의미:\nR₀ < 1: 확산 소멸 (분기 과정 소멸).\nR₀ > 1: 대규모 확산 가능 (양의 확률로).\nR₀ = 3: 초기 확산이 기하급수적.\n집단 면역 임계값:\n1 - 1/R₀ = 1 - 1/3 = 2/3 ≈ 67%.\n전체의 67% 이상이 면역이면 확산 억제.\n코로나19: R₀ ≈ 2~3 → 집단 면역 50~67%.\n변이 오미크론: R₀ ≈ 10 → 90% 이상 필요.","game_type":"reveal"},{"id":7,"question":"확률과 양자 컴퓨팅:\n양자 확률의 특성.\n\n고전 확률:\n동전: 앞(1/2) 또는 뒤(1/2).\n측정 전에도 값이 결정되어 있다고 가정 가능.\n\n양자 확률:\n큐비트: |ψ⟩ = α|0⟩ + β|1⟩\n|α|² + |β|² = 1.\n측정 전: 0과 1의 중첩 상태.\n측정 시: |α|²로 0, |β|²로 1.\n\n(1) 양자 확률과 고전 확률의 차이는?\n(2) 중첩이 계산에 주는 이점은?\n(3) 양자 얽힘과 벨 부등식은?","hints":["고전: 확률 = 모름의 표현.\n양자: 확률 = 본질적 불확정성.","중첩: n큐비트로 2^n개 상태 동시 표현.\n그러나 측정하면 하나로 붕괴."],"answer":"양자=본질적불확정성·중첩=병렬계산·얽힘=비국소상관","explanation":"(1) 차이:\n고전: 확률 = 정보 부족. 숨은 변수 가정 가능.\n양자: 확률 = 본질적. 숨은 변수 이론 불가(벨 정리).\n양자 간섭: 확률 진폭이 더하고 빼짐. 음수 가능.\n(2) 중첩의 계산 이점:\nn큐비트: 2^n개 상태 동시 중첩.\n양자 알고리즘: 모든 입력 동시 처리.\n그러나 측정하면 1개만 추출.\nGrover: √N 탐색(고전: N).\nShor: 다항 소인수분해(고전: 지수).\n(3) 얽힘과 벨 부등식:\n얽힌 두 큐비트: 측정 결과 즉각 상관.\n벨 부등식: 국소 숨은 변수 이론의 예측.\n실험: 벨 부등식 위반 → 양자역학 확인.\n아인슈타인의 \"유령 같은 원격 작용\"이 실재.","game_type":"reveal"},{"id":8,"question":"확률과 통계 학습 이론:\nPAC(Probably Approximately Correct) 학습.\n\n목표: ε-근사(오차 ≤ ε) 가설을 1-δ 이상의 확률로.\n필요한 샘플 수 m ≥ (1/ε)×ln(|H|/δ).\n(|H|: 가설 공간 크기)\n\n(1) ε=0.1, δ=0.05, |H|=100이면 m ≥ ?\n(2) 가설 공간이 클수록 왜 더 많은 데이터가 필요한가요?\n(3) VC 차원이란?","hints":["m ≥ (1/0.1)×ln(100/0.05) = 10×ln(2000).","ln(2000) ≈ 7.6.\nm ≥ 76."],"answer":"m ≥ 76 / 복잡한가설=더많은데이터 / VC차원=표현력측도","explanation":"(1) m ≥ (1/ε)×ln(|H|/δ)\n= 10×ln(2000)\n= 10×7.6 = 76.\n적어도 76개 샘플로 원하는 정확도 보장.\n(2) 가설 공간이 클수록:\n더 많은 가설 중 \"우연히 맞는\" 것이 있을 확률 증가.\n이것을 과적합이라 함.\n많은 데이터로 진짜 패턴과 우연 구분.\n(3) VC 차원:\n가설 공간의 표현력을 나타내는 정수.\nVC 차원 d인 공간: m ≥ O(d/ε) 샘플 필요.\n무한 VC 차원: PAC 학습 불가능.\n신경망: VC 차원이 파라미터 수에 비례.","game_type":"reveal"},{"id":9,"question":"확률 게임의 최전선:\n외판원 문제(TSP)의 확률적 근사.\n\nn개 도시를 한 번씩 방문하는 최단 경로.\n도시를 랜덤 배치할 때:\n\n(1) 최적 경로 길이의 기댓값은 n에 어떻게 비례하나요?\n(2) 2-근사 알고리즘이란?\n(3) 확률적 근사 알고리즘의 역할은?","hints":["n개 도시가 단위 정사각형에 균일 분포할 때\n최적 경로 길이 ≈ 0.7124√n (비트-홀트만 상수).","2-근사: 최적의 2배 이내 보장.\n크리스토피데스: 1.5-근사."],"answer":"O(√n) / 최적의2배이내 / 확률적=실용적근사","explanation":"(1) 랜덤 TSP:\nn개 도시가 [0,1]² 균일 분포.\n최적 경로 ≈ 0.7124×√n.\nn=100: 약 7.1, n=10000: 약 71.\n(2) 근사 알고리즘:\n2-근사: 최소 신장 트리 구성 후 단축.\n크리스토피데스(1976): 1.5-근사.\nPTAS: n에 대해 임의의 (1+ε) 근사.\n(3) 확률적 알고리즘:\nTSP는 NP-난해 → 정확한 다항 알고리즘 없음.\n모의 담금질(SA): 확률적으로 나쁜 해도 수용.\n유전 알고리즘: 확률적 선택·변이.\n대규모 실제 문제에서 수초 내 우수한 해 찾기.","game_type":"reveal"},{"id":10,"question":"확률론의 철학적 해석:\n다음 세 가지 확률 해석을 비교하세요.\n\n빈도주의:\n확률 = 무한 반복 시 상대 빈도.\n\n베이지안:\n확률 = 믿음의 정도 (주관적).\n\n논리주의:\n확률 = 증거에 대한 논리적 관계.\n\n(1) 각 해석의 장단점은?\n(2) \"내일 비올 확률 70%\"를 각 해석으로 설명하세요.\n(3) AI의 확률 사용은 어느 해석에 가깝나요?","hints":["빈도주의: 반복 가능한 실험에서 자연스럽지만\n일회성 사건에 적용 어려움.","베이지안: 사전 정보를 활용하지만 주관적.\n과학에서 점점 더 중요해지는 관점."],"answer":"빈도=객관·반복가능 / 베이지안=주관적믿음·일회성가능 / AI=베이지안에가까움","explanation":"(1) 비교:\n빈도주의: 객관적, 통계 검정에 강점.\n단점: 일회성 사건(내일 날씨) 적용 어려움.\n베이지안: 사전 정보 활용, 일회성 적용 가능.\n단점: 사전 분포 선택의 주관성.\n논리주의: 객관적 근거 관계 강조.\n단점: 적용 범위 제한.\n(2) \"내일 비올 확률 70%\":\n빈도주의: 비슷한 기상 조건에서 70%가 비.\n베이지안: 현재 증거(기압·습도)로 70% 믿음.\n논리주의: 기상 데이터가 비를 70% 지지.\n(3) AI의 확률:\n대부분 베이지안적: 사전 분포(파라미터 초기값) + 데이터 업데이트.\n딥러닝: 최대 가능도 = 베이지안 MAP 추정.\n불확실성 정량화: 베이지안 딥러닝.\n현대 AI는 점점 더 베이지안 관점을 채택합니다.","game_type":"reveal"}]},{"type":"probability","level":12,"title":"확률·경우의 수 12단계 — 확률의 본질과 한계","difficulty":"심화","thinking":"확률의 본질 · 미해결 문제 · 확률과 현실","problems":[{"id":1,"question":"확률의 역설들을 분석하세요.\n\n버트란드 역설:\n단위 원에서 무작위 현(chord)을 선택할 때\n현의 길이가 내접 정삼각형 변보다 길 확률은?\n\n방법 1 (끝점 기준): 1/3.\n방법 2 (중점 기준): 1/4.\n방법 3 (반지름 기준): 1/2.\n\n(1) 세 답이 모두 다른 이유는?\n(2) \"무작위\"가 무엇을 의미하는지의 문제는?\n(3) 이 역설의 해결책은?","hints":["\"무작위\"라는 단어가 세 가지 다른 확률 분포를 의미합니다.","물리적 실험으로 어떤 분포가 자연스러운지 판단.\n야코비안(변환) 불변성."],"answer":"세 분포가 다름 / 무작위의정의모호성 / 물리적맥락또는대칭성으로해결","explanation":"세 방법의 차이:\n방법 1: 원 위의 두 점 → 균일 분포.\n방법 2: 원 내부의 중점 → 균일 분포.\n방법 3: 반지름 위 중점 → 균일 분포.\n각각 다른 \"균일 분포\"이므로 다른 답.\n해결 방법:\n물리적 실험: 막대를 원 위에 던지면 방법 2에 가까움.\n야코비안 불변성(제인스): 대칭 변환에 불변인 분포 선택.\n핵심 교훈: \"무작위\"는 반드시 어떤 확률 공간 위의\n어떤 분포인지 명시해야 합니다.","game_type":"reveal"},{"id":2,"question":"무한 확률의 역설:\n세인트 피터스버그 역설.\n\n게임: 앞면이 나올 때까지 동전을 던집니다.\nk번째에 처음 앞면이 나오면 2^k 달러를 받습니다.\n\n(1) 이 게임의 기댓값은?\n(2) 실제로 얼마를 내고 참여하겠나요?\n(3) 역설의 해결책은?","hints":["P(k번째 첫 앞면) = (1/2)^k.\n기댓값 = Σ 2^k × (1/2)^k.","각 항 = 1, 무한히 더하면 = ∞.\n하지만 실제로 많은 돈을 내지 않으려 함."],"answer":"기댓값=무한대 / 실제=소액(20달러미만선호) / 해결=로그효용·유한자원·리스크회피","explanation":"기댓값 = Σ_{k=1}^∞ 2^k × (1/2)^k = Σ_{k=1}^∞ 1 = ∞.\n기댓값이 무한대이지만 실제로 수만 달러를 내지 않음.\n해결책들:\n(1) 로그 효용: U(x) = log(x).\nEU = Σ (1/2)^k × log(2^k) = Σ k×log2/2^k < ∞.\n(2) 자본 한계: 게임 주최자가 유한한 자본.\n(3) 위험 회피: 분산이 무한대 → 위험 기피.\n(4) 베르누이 해결(1738): 기대 효용 = 유한.\n역설 교훈: 기댓값만으로 의사결정 불충분.\n분산·리스크·효용 함수를 함께 고려해야 합니다.","game_type":"reveal"},{"id":3,"question":"확률과 자유의지:\n라플라스의 악마와 확률.\n\n라플라스(1814):\n\"모든 원자의 위치·속도를 아는 지성이 있다면\n미래를 완전히 예측할 수 있다.\"\n\n현대적 반론:\n①양자 불확정성(하이젠베르크).\n②카오스 이론(초기 조건 민감성).\n③계산 불가능성(튜링).\n\n(1) 각 반론이 라플라스 악마를 어떻게 무력화하나요?\n(2) 확률이 \"근본적\"인가 \"인식론적\"인가?\n(3) 자유의지와 확률의 관계는?","hints":["양자: 위치·운동량 동시 측정 불가 → 초기 조건 자체가 불확정.\n카오스: 초기 조건의 미세 차이 → 예측 불가능.","근본적 확률: 세계 자체가 확률적(양자).\n인식론적 확률: 우리의 무지를 반영(고전)."],"answer":"양자=근본불확정·카오스=예측불가·계산=원리적불가 / 확률=근본적(양자관점) / 자유의지=열린질문","explanation":"라플라스 악마 무력화:\n양자 불확정성: 초기 조건 자체가 불확정.\nΔxΔp ≥ ℏ/2 (하이젠베르크).\n악마도 정확한 초기 조건을 알 수 없음.\n카오스: 초기 조건 ε 차이 → t 후 e^(λt)ε 차이.\n무한 정확도의 측정이 필요하지만 불가능.\n계산 불가능성: 무한 계산이 필요할 수 있음.\n확률의 본질:\n양자역학: 근본적(ontological) 확률.\n고전역학: 인식론적(epistemic) 확률.\n자유의지: 비결정론적 우주에서도\n의지의 본질은 미해결.","game_type":"reveal"},{"id":4,"question":"확률 이론의 미해결 문제들:\n\n(1) 리만 가설과 소수의 분포:\n소수의 분포가 어느 정도 \"무작위\"한가?\n\n(2) P vs NP와 확률:\nBPP = P인가?\n\n(3) 양자 우월성:\n양자 컴퓨터가 고전 컴퓨터보다 확률적으로 우월한가?\n\n(4) 자유 에너지 원리:\n뇌가 베이지안 추론 기계인가?","hints":["리만 가설: ζ(s)=0의 비자명 근이 모두 Re(s)=1/2 위에.\n소수의 \"무작위성\"과 연관.","구글의 양자 우월성(2019): 특정 샘플링 문제에서 고전 초과.\n하지만 실용적 우월성은 여전히 논쟁."],"answer":"모두 미해결 / 소수=준랜덤 / BPP=P추측 / 양자=특정문제우월 / 뇌=부분적으로베이지안","explanation":"(1) 리만 가설과 소수:\nGUE 추측: 소수 간격이 랜덤 행렬 고유값처럼 분포.\n몽고메리-오들리즈코 법칙: 실제 데이터에서 확인.\n리만 가설 증명 → 소수 분포의 정밀 이해.\n(2) BPP = P:\n대부분 이론 컴퓨터과학자: BPP = P로 추측.\nAKS(2002): 소수 판별이 P임 증명(BPP→P 이동).\n무작위성이 계산적으로 진정한 도움이 안 된다면 BPP=P.\n(3) 양자 우월성:\n구글(2019): 랜덤 양자 회로 샘플링에서 우월성 주장.\nIBM 반박: 고전 알고리즘 개선으로 따라잡기 가능.\n실용적 우월성: 아직 달성 안 됨(오류 수정 필요).\n(4) 자유 에너지 원리(프리스턴):\n뇌 = 생성 모델로 감각 데이터 예측.\n지각 = 베이지안 추론.\n행동 = 예측 오류 최소화.\n부분적 증거: 착시·환각에서 확인.","game_type":"reveal"},{"id":5,"question":"확률과 복잡계:\n임계 현상과 상전이.\n\n물리: 물→얼음(1차 상전이), 자성(2차 상전이).\n확률: G(n,p)에서 거대 연결 요소 등장.\n생물: 개체군 소멸 임계점.\n\n(1) 2차 상전이와 보편성 클래스는?\n(2) 확률적 임계 현상의 특성은?\n(3) 사회 시스템에서의 임계 현상은?","hints":["2차 상전이: 연속적 변화, 임계점에서 요동 발산.\n보편성: 다른 시스템이 같은 임계 지수를 가짐.","임계점에서 상관 길이 → ∞.\n크기 척도 불변: 프랙탈 구조."],"answer":"보편성=시스템무관임계지수 / 임계점=상관길이발산 / 사회=의견전파·혁명·금융위기","explanation":"2차 상전이와 보편성:\n임계점 근처: 모든 스케일에서 요동.\n상관 길이 ξ ~ |T-Tc|^(-ν).\n보편성 클래스: 공간 차원과 대칭성만으로 결정.\n물·자성·퍼콜레이션이 같은 임계 지수.\n확률적 특성:\n임계점: 프랙탈 구조, 멱함수 분포.\n소규모·대규모 요동이 공존.\n사회 시스템:\n의견 전파: 임계 확산 계수에서 갑자기 전파.\n혁명: 임계 불만 수준에서 급격한 변화.\n금융 위기: 시스템 임계점에서 붕괴.\n소셜 미디어: 바이럴 임계 수준.\n복잡계 과학: 확률·물리·사회의 교차점.","game_type":"reveal"},{"id":6,"question":"확률 이론의 교육학적 역설:\n다음 학생 오해를 분석하고 교정하세요.\n\n오해 1: \"동전을 10번 던져 모두 앞면이면\n다음은 뒷면이 나올 가능성이 높다.\"\n\n오해 2: \"로또 번호 1,2,3,4,5,6은\n랜덤 번호보다 당첨 가능성이 낮다.\"\n\n오해 3: \"표본이 크면 반드시 정확하다.\"\n\n오해 4: \"p-value < 0.05이면 효과가 크다.\"","hints":["오해 1: 도박사의 오류 - 독립 사건.\n오해 2: 모든 조합의 확률이 동일.","오해 3: 편향된 표본은 크기 무관.\n오해 4: p-value는 효과 크기가 아닌 통계 유의성."],"answer":"오해1=독립사건혼동 / 오해2=조합확률동일 / 오해3=편향무관 / 오해4=유의성≠크기","explanation":"오해 1 교정:\n독립 사건: 이전 결과가 다음에 영향 없음.\nP(뒷면 | 10번 앞면) = P(뒷면) = 1/2.\n\"기억 없는\" 동전.\n오해 2 교정:\nC(45,6)개 조합 모두 동일 확률.\n1,2,3,4,5,6도 다른 번호와 동일: 1/8,145,060.\n단, 1,2,3,4,5,6은 많은 사람이 고르므로\n당첨 시 상금이 나뉠 수 있음.\n오해 3 교정:\n편향된 표본(선택 편향, 생존 편향)은\n크기가 아무리 커도 편향 유지.\n1936년 Literary Digest: 230만 표본이지만 틀림.\n오해 4 교정:\np-value: 귀무 가설 하에서 이 데이터 확률.\n효과 크기: Cohen's d, r² 등으로 별도 측정.\n표본이 크면 사소한 차이도 유의미.\n실용적 유의성과 통계적 유의성 구분 필요.","game_type":"reveal"},{"id":7,"question":"확률의 응용 최전선:\n다음 현대 응용을 분석하세요.\n\n(1) 확산 모델(Diffusion Model, 생성 AI):\n가우시안 노이즈 추가(확산) → 역확산으로 이미지 생성.\n\n(2) 강화 학습의 탐색-활용 딜레마:\n확률적 정책으로 탐색과 활용 균형.\n\n(3) 확률적 변분 추론:\n복잡한 사후 분포를 단순한 분포로 근사.","hints":["확산 모델: 정규화된 노이즈 추가 과정을 학습하면\n역으로 노이즈→이미지 생성 가능.","UCB 알고리즘: 불확실성이 큰 선택지를 탐색.\nELBO: 로그 가능도의 하한을 최대화."],"answer":"확산=정방향역방향마르코프 / 탐색활용=UCB·Thompson샘플링 / 변분=사후분포근사","explanation":"(1) 확산 모델:\n정방향: x₀ → x₁ → ... → xT (노이즈 추가).\n역방향: xT → ... → x₀ (노이즈 제거, 이미지 생성).\nP(x_{t-1}|x_t)를 신경망으로 학습.\nDALL-E, Stable Diffusion의 수학적 기초.\n(2) 탐색-활용 딜레마:\nUCB(Upper Confidence Bound): 불확실성 보너스.\nThompson 샘플링: 믿음 분포에서 샘플링.\nε-탐욕: 확률 ε로 무작위 탐색.\n강화학습의 확률적 정책 최적화.\n(3) 변분 추론:\n진짜 사후 P(θ|X)는 계산 불가.\n근사 분포 Q(θ; φ)를 최적화.\nELBO = E_Q[log P(X,θ)] - E_Q[log Q(θ)].\nVAE(변분 오토인코더)의 수학적 기초.","game_type":"reveal"},{"id":8,"question":"확률의 윤리적 차원:\n알고리즘적 공정성과 확률.\n\n문제: ML 모델이 특정 그룹에 불공정한 예측.\n예: 대출 승인 모델, 채용 알고리즘, 형사 판결 지원.\n\n공정성 기준들 (수학적 정의):\n①통계적 동등성: P(Ŷ=1|A=0) = P(Ŷ=1|A=1).\n②균등화 기회: P(Ŷ=1|Y=1,A=0) = P(Ŷ=1|Y=1,A=1).\n③보정: P(Y=1|Ŷ=p,A=0) = P(Y=1|Ŷ=p,A=1).\n\n(1) 세 기준이 동시에 만족될 수 없음을 설명하세요.\n(2) 어떤 기준을 선택해야 하는가?\n(3) 확률 모델이 사회 불평등을 영속화하는 방식은?","hints":["초우(Chouldechova, 2017): 세 공정성 기준이 동시 불가능.\n정확도 역설과 유사.","역사적 편향 데이터 → 모델이 편향 학습.\n모델 예측이 현실에 영향 → 피드백 루프."],"answer":"세기준동시불가(수학적증명) / 맥락에따라기준선택 / 역사적편향재생산","explanation":"세 기준의 불가능성:\n완벽한 보정 + 동일 기저율 불일치 → 나머지 불만족.\n초우 불가능성 정리: 세 공정성 기준은 동시 달성 불가.\n선택의 문제:\n의료: 균등화 기회 중시 (동일 증상, 동일 치료).\n채용: 통계적 동등성 중시 (비율 공정성).\n형사: 보정 중시 (동일 위험 점수, 동일 위험).\n피드백 루프:\n역사적 차별 데이터 → 모델 학습 → 편향 예측.\n편향 예측 → 차별 결과 → 새 데이터 편향.\n악순환이 불평등을 영속화.\n해결: 편향 인식, 공정성 기준 명시, 다양한 이해관계자 참여.","game_type":"reveal"},{"id":9,"question":"확률의 수학적 아름다움:\n다음 아름다운 확률 결과들을 분석하세요.\n\n①Wald의 정체성:\nE[S_{N}] = E[N]×E[X₁] (랜덤 합).\n\n②Polya 항아리:\n자기 강화적 무작위 과정 → 극한 베타 분포.\n\n③브라운 운동의 반사 원리:\nB(t)가 최대 M을 초과할 확률 = 2×P(B(t)>M).\n\n④랜덤 행렬의 보편성:\n다양한 분포에서 동일한 극한 스펙트럼.","hints":["Wald: 기댓값의 선형성 + 선택 규칙 독립.\nPolya: 공의 색깔 비율이 베타 분포로 수렴.","반사 원리: 브라운 운동의 대칭성 활용.\n보편성: 중심극한정리의 행렬 버전."],"answer":"Wald=기댓값선형성 / Polya=경로의존적수렴 / 반사=대칭성 / 보편성=보편적극한","explanation":"①Wald의 정체성:\nS_N = X₁+...+X_N (랜덤 개수 합).\nE[S_N] = E[N]×E[X₁].\n조건: N이 정지 시간, X가 iid.\n응용: 보험·재고 관리의 기댓값 계산.\n②Polya 항아리:\n초기: 빨강 a개, 파랑 b개.\n매번: 뽑은 색 공 + 1개 추가.\n극한: 빨강 비율 ~ Beta(a,b).\n경로 의존성: 초기 조건이 장기에 영향.\n③반사 원리:\nt 시점까지 M 초과 확률 = 2P(B(t)>M).\n브라운 운동의 공간적 대칭성에서 유도.\n④보편성:\n중심극한정리: 다양한 분포 → 정규 분포.\n위그너: 다양한 행렬 → 반원 분포.\n자연에서 반복되는 수학적 패턴.","game_type":"reveal"},{"id":10,"question":"심화 구간 종합:\n확률이란 무엇인가?\n\n다음 관점에서 통합 답변을 구성하세요:\n①수학적 관점: 콜모고로프 공리.\n②철학적 관점: 빈도주의 vs 베이지안.\n③물리적 관점: 결정론 vs 비결정론.\n④실용적 관점: 의사결정 도구.\n⑤한계: 확률이 말할 수 없는 것.","hints":["확률은 여러 층위에서 다른 의미를 가집니다.\n단일 정의보다 통합적 이해가 중요합니다.","확률의 한계: 블랙 스완, 완전한 무지,\n자기 지시적 역설, 무한 확률 공간."],"answer":"다층적개념 / 수학=공리체계 / 철학=해석다양 / 물리=근본적? / 실용=의사결정 / 한계=극단·무지·역설","explanation":"통합적 답변:\n수학적: 콜모고로프 공리로 엄밀하게 정의.\n(0,1) 범위, 가산 가법성.\n철학적: 빈도(반복)·베이지안(믿음)·논리(관계).\n맥락에 따라 다른 해석이 적절.\n물리적: 고전=결정론적(확률=무지).\n양자=근본적 비결정론.\n실용적: 불확실성 정량화 → 최적 결정.\n기댓값·위험·효용의 균형.\n한계:\n블랙 스완: 예상치 못한 극단 사건.\n완전한 무지: 가능성 자체를 모를 때.\n자기 지시: \"이 명제의 확률은 0.5\" 역설.\n무한 공간: 균일 분포 정의 불가.\n결론: 확률은 불확실한 세계를 이해하는\n인류 최강의 도구이지만\n그 자체로 한계를 가집니다.","game_type":"reveal"}]},{"type":"probability","level":13,"title":"확률·경우의 수 13단계 — 창의적 확률 탐구","difficulty":"마스터","thinking":"창의적 탐구 · 학제간 통합 · 확률적 혁신","problems":[{"id":1,"question":"확률과 진화:\n진화를 확률 과정으로 모델링하세요.\n\n유전적 부동(Genetic Drift):\n유한 집단 크기 N, 대립 유전자 빈도 p.\n매 세대 이항 분포 B(2N, p).\n\n(1) 빈도 변화의 기댓값과 분산은?\n(2) 작은 집단에서 부동이 더 강한 이유는?\n(3) 중립 이론과 자연선택의 확률적 차이는?","hints":["다음 세대 빈도 p' ~ B(2N,p)/(2N).\nE[p'] = p, V[p'] = p(1-p)/(2N).","N이 작을수록 분산이 큼 → 더 큰 랜덤 변동.\nN→∞: 분산 0 → 결정론적 변화."],"answer":"E[p']=p / V[p']=p(1-p)/(2N) / 작은N=큰분산=강한부동","explanation":"유전적 부동:\n기댓값: E[p'] = p (평균적으로 변하지 않음).\n분산: V[p'] = p(1-p)/(2N).\nN=10: V = 0.025 (큰 변동).\nN=1000: V = 0.00025 (작은 변동).\n작은 집단에서 부동이 강한 이유:\nV ∝ 1/N → N이 작을수록 변동 크다.\n샘플링 오류: 작은 표본에서 우연성 지배.\n중립 이론(기무라, 1968):\n대부분 돌연변이는 중립 (선택적 이점 없음).\n고정 확률 = 초기 빈도 = 1/(2N).\n자연선택: 결정론적 방향성.\n부동: 확률론적 랜덤 워크.\n실제 진화 = 자연선택 + 유전적 부동 + 돌연변이.","game_type":"reveal"},{"id":2,"question":"확률과 경제학:\n불확실성 하의 최적 경매 설계.\n\n독립 사적 가치 모델:\nn명 입찰자, 각자 가치 vᵢ ~ U[0,1].\n최고가 경매: 최고 입찰자가 자신의 입찰액 지불.\n2위가 경매: 최고 입찰자가 2위 금액 지불.\n\n(1) 최고가 경매에서 최적 입찰 전략은?\n(2) 2위가 경매에서 최적 전략은?\n(3) 수입 동등성 정리란?","hints":["최고가 최적 입찰: vᵢ × (n-1)/n.\n2위가 최적 입찰: vᵢ (솔직 입찰).","수입 동등성: 두 경매에서 판매자 기대 수입이 같음."],"answer":"최고가=v×(n-1)/n / 2위가=v(지배전략) / 수입동등=판매자기대수입동일","explanation":"최고가 경매 최적 입찰:\nn명 중 최고로 이기려면 낮게 입찰.\nv_i가 균일이면 최적 = v_i × (n-1)/n.\nn=2: v_i/2, n=10: 0.9v_i.\n2위가 경매:\nv_i 그대로 입찰이 지배 전략.\n이유: 어떤 상대 입찰에도 vᵢ 입찰이 최적.\nv_i > 낙찰가: 이득, v_i < 낙찰가: 안 사는 게 이득.\n수입 동등성 정리(비크레이-미를레스):\n표준 조건 하에서 모든 경매 메커니즘에서\n기대 수입 = 동일.\n경제학의 노벨상(1996): 비크레이, 미를레스.","game_type":"reveal"},{"id":3,"question":"확률과 기후 과학:\n극단적 기상 현상의 확률적 분석.\n\n극값 이론(Extreme Value Theory):\n100년 재현 홍수: 매년 1%로 발생.\n\n(1) 100년 기간에 한 번도 발생 안 할 확률은?\n(2) \"100년 홍수\"가 100년에 정확히 한 번 온다는 의미인가요?\n(3) 기후변화가 극값 분포에 미치는 영향은?","hints":["매년 독립 1% 확률.\n100년간 0번: (0.99)^100.","(0.99)^100 ≈ e^(-1) ≈ 0.368."],"answer":"37% / 아님(기댓값이100년) / 기후변화=꼬리두꺼워짐","explanation":"(1) P(100년간 발생 없음) = (0.99)^100 ≈ 0.366.\n약 37%로 100년간 한 번도 안 올 수 있음.\n(2) \"100년 홍수\"의 의미:\n매년 발생 확률 1% = 평균 재현 기간 100년.\n확률 1/100이지 \"정확히 100년에 한 번\"이 아님.\n100년 내 적어도 1번: 1-(0.99)^100 ≈ 63%.\n(3) 기후변화의 영향:\n온난화 → 극단 현상 더 자주·강하게.\n\"100년 홍수\"가 50년, 20년 재현으로 단축.\nGEV(일반화 극값 분포): 꼬리 두께 변화.\n형상 매개변수 ξ > 0: 두꺼운 꼬리(더 극단적).","game_type":"reveal"},{"id":4,"question":"확률과 사회 네트워크:\n정보 확산의 확률 모델.\n\n독립 케스케이드 모델:\n각 간선 (u,v): u가 활성화되면 v를 확률 p로 활성.\n\n씨앗 노드 1개에서 시작할 때\n(1) 기대 확산 범위는?\n(2) 영향력 최대화 문제란?\n(3) 바이럴 마케팅에서의 응용은?","hints":["선형 임계 모델: 이웃의 w 비율이 활성화되면 활성.\n독립 케스케이드: 각 간선 독립적으로 활성.","영향력 최대화: k개 씨앗으로 최대 확산.\n탐욕 알고리즘이 1-1/e 근사 보장."],"answer":"기대확산=그래프구조의존 / 영향력최대화=NP난해+탐욕근사 / 바이럴=씨앗선택최적화","explanation":"독립 케스케이드 모델:\n노드 u 활성 → v를 확률 p로 활성.\n기대 확산: 그래프 구조와 p에 의존.\n완전 그래프: 기하급수적 확산.\n희소 그래프: 제한적 확산.\n영향력 최대화:\nk개 씨앗으로 기대 확산 최대화.\nNP-난해: 정확한 최적해 탐색 어려움.\n탐욕 알고리즘: 1-1/e ≈ 63% 근사 보장.\n(켐프-클라인버그-타르도스, 2003)\n바이럴 마케팅:\n어떤 초기 고객에게 무료 샘플을?\n소셜 미디어: 핵심 인플루언서 선택.\n구전 효과 최대화.","game_type":"reveal"},{"id":5,"question":"확률과 스포츠:\n축구 승부 예측의 확률 모델.\n\n포아송 모델:\n홈 팀 득점 ~ Poisson(λ₁), 원정 팀 ~ Poisson(λ₂).\n과거 데이터: 홈 팀 평균 득점 1.5, 원정 0.9.\n\n(1) 홈 팀 2-0 승리 확률은?\n(2) 무승부 확률은?\n(3) 이 모델의 한계는?","hints":["P(홈=2, 원정=0) = P(Poisson(1.5)=2) × P(Poisson(0.9)=0).","P(Poisson(λ)=k) = e^(-λ) × λ^k / k!.\nP(Poisson(1.5)=2) = e^(-1.5) × 1.5²/2."],"answer":"P(2-0) ≈ 8.0% / 무승부≈25% / 한계=독립성가정·시간변화·심리","explanation":"P(홈=2) = e^(-1.5) × 1.5²/2 = 0.2231×1.125 ≈ 0.251.\nP(원정=0) = e^(-0.9) × 0.9⁰/0! = e^(-0.9) ≈ 0.407.\nP(2-0) = 0.251 × 0.407 ≈ 0.102 = 10.2%.\n무승부: Σ P(홈=k)×P(원정=k) for k=0,1,2,...\n= P(0-0)+P(1-1)+P(2-2)+...\nP(0-0) = e^(-1.5)×e^(-0.9) ≈ 0.0907.\nP(1-1) ≈ 0.1220.\nP(2-2) ≈ 0.0275.\n무승부 ≈ 24.4%.\n모델 한계:\n독립성 가정: 실제로 득점은 상관.\n시간 변화: 후반 막판 달라짐.\n심리·피로·날씨 미반영.","game_type":"reveal"},{"id":6,"question":"확률과 법률:\n검사의 오류(Prosecutor's Fallacy)를 분석하세요.\n\n사건: DNA 일치 확률 1/1,000,000.\n검사 주장: \"피고가 무죄일 확률이 100만분의 1이다.\"\n\n(1) 이 주장의 오류를 설명하세요.\n(2) 올바른 확률 계산은?\n(3) 베이지안 관점에서의 해석은?","hints":["P(DNA 일치 | 무죄) = 1/1,000,000.\n검사의 주장: P(무죄 | DNA 일치) = 1/1,000,000.\n이것은 조건부 확률의 역전입니다.","P(무죄 | 일치) = P(일치 | 무죄)×P(무죄) / P(일치)."],"answer":"오류=조건부확률역전 / 올바른계산=베이즈정리필요 / 베이지안=사전확률필수","explanation":"검사의 오류:\nP(DNA 일치 | 무죄) ≠ P(무죄 | DNA 일치).\n이것은 후건 긍정의 오류(조건부 확률 역전).\n올바른 계산(베이즈):\nP(무죄|일치) = P(일치|무죄)×P(무죄) / P(일치).\n도시 100만 명 중 범인 1명:\nP(무죄) ≈ 999,999/1,000,000.\nP(일치) = P(일치|범인)×P(범인) + P(일치|무죄)×P(무죄).\n≈ 1×(1/100만) + (1/100만)×(999,999/100만).\n≈ 2/100만.\nP(무죄|일치) = (1/100만×999,999/100만) / (2/100만) ≈ 1/2.\nDNA가 일치해도 무죄 확률이 50%일 수 있습니다.\n사전 확률(용의자인지 여부)이 결론에 결정적.\n실제 법원에서 이 오류로 억울한 유죄 판결이 발생.","game_type":"reveal"},{"id":7,"question":"확률과 예술:\n알고리즘 작곡의 확률 모델.\n\n마르코프 체인 작곡:\n각 음이 이전 음에 따라 확률적으로 결정.\n\n전이 행렬 (도레미파솔):\n도→도:0.1, 도→레:0.3, 도→미:0.3, 도→파:0.2, 도→솔:0.1\n레→도:0.2, 레→레:0.1, 레→미:0.4, 레→파:0.2, 레→솔:0.1\n...\n\n(1) 도에서 시작해 3음절을 생성하는 경우의 수는?\n(2) \"도-미-솔\" 시퀀스의 확률은?\n(3) 이 모델의 음악적 한계는?","hints":["각 음에서 5가지 선택 → 3음절: 5³ = 125.\n실제로는 확률 0이 없으면 모두 가능.","P(도→미→솔) = P(미|도)×P(솔|미)."],"answer":"125가지 / P=0.3×P(솔|미) / 한계=장기의존성·화성·구조부재","explanation":"(1) 각 위치에서 5음 선택 가능: 5³ = 125가지.\n실제로는 전이 확률이 0인 경우 제외.\n(2) P(도→미→솔):\nP(미|도) = 0.3.\nP(솔|미) = (전이 행렬에서 미→솔 값).\nP = 0.3 × P(솔|미).\n(3) 음악적 한계:\n1차 마르코프: 이전 1음만 고려.\n실제 음악: 긴 범위 의존성(조성, 형식).\n화성 진행 구조 없음.\n리듬·박자·다이나믹 없음.\n개선: 고차 마르코프, LSTM, 트랜스포머.\n현대 AI 음악(Magenta, Jukebox): 딥러닝으로 극복.","game_type":"reveal"},{"id":8,"question":"확률과 의학:\n임상 시험의 통계적 설계.\n\n무작위 대조 시험(RCT):\n치료군 n₁명, 대조군 n₂명.\n치료 효과 크기 δ = p₁ - p₂.\n유의 수준 α = 0.05, 검정력 1-β = 0.80.\n\n(1) 표본 크기 결정 공식은?\n(2) 중간 분석의 윤리적·통계적 문제는?\n(3) 다중 비교 문제(Multiple Testing)란?","hints":["n ≈ 2×[(z_α/2 + z_β)²×p(1-p)] / δ².\nz_0.025 = 1.96, z_0.20 = 0.84.","중간 분석: p < 0.05이면 조기 중단.\n하지만 여러 번 분석하면 1종 오류 증가."],"answer":"n=2×(2.8)²×p(1-p)/δ² / 중간분석=알파소모 / 다중비교=1종오류증가","explanation":"(1) 표본 크기 공식:\n각 군 n = [(z_α/2 + z_β)²×2×p̄(1-p̄)] / δ².\np̄ = (p₁+p₂)/2.\nz_α/2 = 1.96 (α=0.05, 양측).\nz_β = 0.84 (β=0.20, 검정력 80%).\n(z_α/2+z_β)² = (2.80)² ≈ 7.84.\n(2) 중간 분석:\nK번 분석: 1종 오류 α → α_actual > α.\n오브라이언-플레밍: 중간에 엄격한 기준 적용.\n윤리: 효과 확인 시 조기 중단 vs 완전한 증거.\n(3) 다중 비교:\n100개 가설 동시 검정, α=0.05이면\n평균 5개 우연히 유의.\n본페로니 교정: α/k로 나눔.\nFDR(Benjamini-Hochberg): 거짓 발견율 통제.\n현대 임상 시험의 핵심 통계 문제.","game_type":"reveal"},{"id":9,"question":"확률과 우주:\n인류 원칙(Anthropic Principle)과 확률.\n\n관찰 선택 효과:\n우리가 관찰하는 것은 우리가 존재한다는 사실로 조건화됨.\n\n\"우주 상수가 생명 가능한 값으로 미세 조정된 것은\n우연인가, 설계인가?\"\n\n(1) 관찰 선택 효과란?\n(2) 다중 우주 가설의 확률적 의미는?\n(3) 둠스데이 논증을 분석하세요.","hints":["관찰 선택: \"우리가 이 우주에 있는 것은\n우리가 관찰할 수 있는 우주에만 있기 때문.\"","둠스데이: 인류의 총 수가 N이라면\n나는 무작위로 N명 중 한 명.\n현재까지 ~1,080억 명 → 내가 중간쯤이면 N ≈ 2,160억."],"answer":"관찰선택=우리존재조건화 / 다중우주=불확정확률공간 / 둠스데이=자기참조역설","explanation":"관찰 선택 효과:\n\"왜 우주 상수가 생명에 맞는가?\"\n→ 생명이 불가능한 우주에서는 아무도 묻지 않음.\n우리가 여기 있다는 사실이 이미 선택.\n다중 우주:\n무한히 많은 우주 중 생명 가능한 것에만 존재.\n확률적으로 모든 상수값이 어딘가에 존재.\n하지만 다른 우주를 관찰 불가 → 검증 불가.\n둠스데이 논증:\n코페르니쿠스 원리: 내 위치는 특별하지 않음.\n현재까지 ~1,080억 명 탄생.\n내가 전체의 절반쯤이면 → 총 ~2,160억 명.\n반박: 관찰 선택 효과로 내 위치가 특별.\n이 논증은 철학·확률·우주론의 교차점.","game_type":"reveal"},{"id":10,"question":"마스터 구간의 시작:\n자신만의 확률 퍼즐을 설계하세요.\n\n다음 조건을 만족하는 확률 퍼즐:\n①실생활과 연결됨.\n②직관과 실제 확률이 다른 반직관적 결과.\n③풀이 과정에서 핵심 확률 개념 학습.\n④10~12단계 수준의 난이도.\n⑤명확한 수치 정답이 있을 것.","hints":["반직관적 확률의 예:\n생일 문제, 몬티 홀, 심프슨의 역설,\n검사 역설, 도박사의 오류.","실생활 맥락:\n의료 검사, 금융 투자, 소셜 미디어, 스포츠, 법률."],"answer":"개인 창작 (다양한 답 가능)","explanation":"예시 퍼즐 설계:\n\n제목: \"엘리베이터 패러독스\"\n\n문제:\n10층 건물에 엘리베이터가 1대 있습니다.\n당신이 5층에서 기다릴 때\n처음 오는 엘리베이터가 올라가는 중일 확률은?\n(엘리베이터는 무작위 위치에서 무작위 방향으로 운행)\n\n직관적 답: 50% (올라오거나 내려오거나).\n실제 답: 5층 이하에 있으면 올라옴 → 더 높음.\n\n분석:\n엘리베이터가 1~4층에 있고 올라가는 중: 4/9 × (평균 상황).\n엘리베이터가 6~10층에 있고 내려오는 중: 5/9 × ...\n정확한 계산은 위치·방향 분포에 따라 다름.\n\"왜 엘리베이터는 항상 반대 방향으로 오는가\"의 수학.","game_type":"reveal"}]},{"type":"probability","level":14,"title":"확률·경우의 수 14단계 — 확률의 경계에서","difficulty":"마스터","thinking":"확률의 경계 · 미해결 문제 · 창조적 확률 설계","problems":[{"id":1,"question":"확률과 의식:\n통합 정보 이론(IIT)의 확률적 해석.\n\nΦ(phi): 시스템의 통합 정보량.\n의식 = Φ가 높은 시스템.\n\n확률적 관점:\n뇌의 상태 전이: P(s_{t+1} | s_t).\n인과 구조: 현재 상태가 미래를 얼마나 제약하는가.\n\n(1) Φ를 확률 이론으로 어떻게 정의할 수 있나요?\n(2) AI 시스템의 Φ는 뇌보다 낮을까요?\n(3) 의식이 확률적으로 창발할 수 있나요?","hints":["Φ = 전체 시스템의 정보 - 부분들의 정보 합.\nKL 발산으로 측정 가능.","피드포워드 신경망: Φ = 0 (인과 구조 없음).\n순환 신경망: Φ > 0 가능."],"answer":"Φ=인과정보통합=KL발산기반 / 피드포워드AI=Φ작음 / 창발=가능성열려있음","explanation":"Φ의 확률적 정의:\nΦ = D_KL(P(s_t+1|s_t) || P(s_t+1|s_t^A)×P(s_t+1|s_t^B))\n전체 시스템의 인과 정보 - 분리된 부분들의 정보.\nD_KL이 클수록 분리 불가능한 통합 정보 많음.\nAI vs 뇌:\n현재 LLM(피드포워드): 인과 구조 약 → Φ 작음.\n순환 구조 AI: Φ > 0 가능.\n뇌: 고도로 통합된 인과 구조 → 높은 Φ.\nIIT 예측: Φ > 임계값에서 의식 창발.\n논쟁: IIT가 올바른 이론인지 미결.\n창발 가능성:\n복잡한 피드백 시스템에서 Φ가 임계를 넘으면?\n중국어 방 vs 시스템 전체.\n의식의 확률론: 아직 미해결 과학적 문제.","game_type":"reveal"},{"id":2,"question":"확률 이론의 새로운 공리:\n표준 콜모고로프 공리를 확장하는 시도.\n\n비표준 확률:\n①네거티브 확률: P(A) < 0가 가능한 이론.\n②초실수 확률: 무한소 확률 ε > 0.\n③양자 확률: 비가환 대수.\n\n(1) 각 확장이 필요한 이유는?\n(2) 표준 공리의 한계는?\n(3) 이 확장들의 현실적 의미는?","hints":["파인만의 음의 확률:\n중간 계산에서 음의 확률이 나타나지만\n관측 확률은 양수.","초실수 확률: 연속 균일 분포에서\nP(특정 점) = ε ≠ 0.\n\"무한소이지만 0이 아님.\""],"answer":"음의확률=양자중간계산 / 초실수=연속분포특정점 / 양자확률=비가환측정","explanation":"음의 확률(파인만, 1987):\n양자 역학의 중간 계산에서 등장.\n파인만 다이어그램: 일부 경로에 음의 확률.\n관측 시에는 항상 양수로 수렴.\n\"물리적 실재는 없지만 계산 도구로 유용.\"\n초실수 확률(넬슨, 로빈슨):\n비표준 해석: 연속 분포에서 P(x=a) = ε.\nε × (연속 점 수) = 1 (직관적으로 만족).\n표준 측도론의 우회.\n양자 확률:\n사건 대신 자기 수반 연산자(관측량).\n비가환: A×B ≠ B×A.\n불확정성 원리의 수학적 표현.\n폰 노이만 대수: 양자 확률의 공리적 기초.\n표준 공리의 한계:\n연속 분포에서 특정 점의 확률 = 0 (반직관).\n무한 확률 공간에서의 균일 분포 불가.","game_type":"reveal"},{"id":3,"question":"확률과 자유 에너지:\n물리학의 확률적 기초 재검토.\n\n볼츠만 엔트로피:\nS = k_B × ln(Ω) (Ω: 미시 상태 수)\n\n(1) 열역학 제2법칙이 확률적 법칙임을 설명하세요.\n(2) 맥스웰의 악마와 정보 이론의 연결은?\n(3) 자유 에너지 원리(프리스턴)와의 관계는?","hints":["엔트로피 증가 = 더 많은 미시 상태 수.\n확률론: 무작위 상태 → 고확률 매크로 상태.","맥스웰의 악마: 정보 획득으로 엔트로피 감소?\n란다우어: 정보 삭제 = 엔트로피 증가."],"answer":"제2법칙=고확률상태수렴 / 란다우어=정보=물리 / 프리스턴=뇌=자유에너지최소화","explanation":"열역학 제2법칙의 확률적 본질:\nN개 분자: 모두 왼쪽에 있을 확률 = (1/2)^N.\nN=10²³: 이 확률은 사실상 0.\n\"엔트로피는 증가한다\" = \"시스템은 고확률 상태로.\"\n통계역학: 물리 법칙 = 확률론적 필연성.\n맥스웰의 악마:\n악마가 빠른/느린 분자를 분류 → 엔트로피 감소?\n란다우어(1961): 정보 삭제 = k_B T ln2 열 발생.\n악마의 메모리 지우기 = 엔트로피 회복.\n정보 = 물리적 실체.\n자유 에너지 원리:\n뇌 = 자신의 생성 모델과 감각 데이터의 KL 발산 최소화.\n자유 에너지 F = -E[log P(s,z)] + E[log Q(z)].\nF 최소화 = 자신의 모델 업데이트 or 세계 변경(행동).\n인식과 행동의 통합 이론.","game_type":"reveal"},{"id":4,"question":"확률과 수학의 미래:\n확률론적 수학 증명.\n\n확률적 증명 방법:\n확률 이론으로 존재성 증명.\n\"확률 > 0이면 존재한다.\"\n\n에르되시의 확률적 방법:\n\"최소한 (1-1/n)개 성질을 만족하는 객체 존재.\"\n확률 > 0 → 반드시 존재.\n\n(1) 확률론적 존재 증명의 원리는?\n(2) 구체적인 예를 설명하세요.\n(3) 이 방법의 한계는?","hints":["P(좋은 객체 존재) > 0 → 좋은 객체 존재.\nP(랜덤 객체가 좋음) > 0 → 충분.","라지(Ramsey) 수: 그래프 채색 문제.\n에르되시-세케레시: 단조 부분수열 존재."],"answer":"P>0이면존재 / 라지수하한·체비쇼프등 / 한계=비구성적(실제객체미제시)","explanation":"확률론적 존재 증명:\n원리: P(X는 좋은 성질 가짐) > 0이면 좋은 X 존재.\nP(랜덤 그래프가 특정 성질 가짐) > 0\n→ 그런 그래프 존재.\n예시 1: 라지 수 하한:\nR(k,k) ≥ 2^(k/2).\n무작위 2-채색에서 단색 k-클리크 없을 확률 > 0.\n→ 그런 채색 존재 → R(k,k) > 그 값.\n예시 2: 에르되시-세케레시:\nn > C(r+s-2, r-1)개 수에 길이 r의 증가 or s의 감소 부분수열.\n확률 방법으로 증명.\n한계:\n비구성적: 존재는 증명하지만 실제 객체를 제시 못함.\n\"어딘가 존재한다\"는 알지만 어디에 있는지 모름.\nconstructive proof의 필요성.","game_type":"reveal"},{"id":5,"question":"확률과 양자 컴퓨팅의 미래:\n양자 오류 수정 코드.\n\n양자 컴퓨터의 노이즈:\n큐비트 오류율 p = 0.1%.\nn개 큐비트로 논리 큐비트 1개 구현.\n\n표면 코드:\n거리 d인 표면 코드: d² 물리 큐비트.\n오류 임계값: p < p_th ≈ 1%.\n\n(1) 거리 d=3인 표면 코드의 물리 큐비트 수는?\n(2) 논리 오류율은 대략 얼마인가요?\n(3) 실용적 양자 컴퓨터의 확률적 조건은?","hints":["d=3: 9개 물리 큐비트 (데이터) + 8개 (보조).\n논리 오류율 ∝ (p/p_th)^⌈d/2⌉.","p=0.001, p_th=0.01.\n⌈d/2⌉ = ⌈3/2⌉ = 2.\n(0.001/0.01)² = 0.01."],"answer":"17큐비트(9데이터+8보조) / 논리오류율≈0.01% / 실용=d증가로오류율기하감소","explanation":"표면 코드 d=3:\n데이터 큐비트: d² = 9개.\n보조 큐비트: d²-1 = 8개.\n총 17개 물리 큐비트로 논리 큐비트 1개.\n논리 오류율:\n∝ (p/p_th)^⌈d/2⌉ = (0.001/0.01)² = (0.1)² = 0.01.\n논리 오류율 ≈ 0.01% (물리의 10배 개선).\n실용적 양자 컴퓨터:\nd 증가: 물리 큐비트 d², 오류율 기하급수 감소.\nd=10: 100 물리 큐비트, 오류율 (0.1)^5 = 0.001%.\n1,000 논리 큐비트 = ~100만 물리 큐비트 필요.\n현재: 수백~수천 물리 큐비트.\n목표: ~100만 물리 큐비트 → 실용적 양자 컴퓨터.","game_type":"reveal"},{"id":6,"question":"확률과 예측의 한계:\n예측 불가능성의 수학적 구조.\n\n로렌츠 시스템(카오스):\ndx/dt = σ(y-x), σ=10.\ndy/dt = x(ρ-z)-y, ρ=28.\ndz/dt = xy-βz, β=8/3.\n\n리아푸노프 지수 λ ≈ 0.9.\n초기 오차 ε₀에서 시간 t 후 오차 ≈ ε₀ × e^(λt).\n\n(1) 초기 오차 10^(-6)이 1이 되는 시간은?\n(2) 날씨 예측의 이론적 한계는?\n(3) 카오스와 확률의 관계는?","hints":["ε₀ × e^(λt) = 1.\n10^(-6) × e^(0.9t) = 1.\ne^(0.9t) = 10^6.","0.9t = 6×ln(10) ≈ 13.8.\nt ≈ 15.4."],"answer":"약 15.4시간 / 날씨=약2주한계 / 카오스=결정론적이지만확률적처럼보임","explanation":"초기 오차 증폭 시간:\n0.9t = ln(10^6) = 6ln10 ≈ 13.82.\nt ≈ 15.4 (시간 단위에 따라 일 또는 시간).\n실제 기상: 단위 시간을 적절히 설정하면 약 5~15일.\n날씨 예측 한계:\n이론적: 초기 조건 무한 정확도 필요.\n현실: 관측 오차 존재 → 예측 한계.\n현재 기술: 약 10~14일 이상은 신뢰성 급감.\n앙상블 예측: 여러 초기 조건으로 확률 분포 제공.\n카오스와 확률:\n결정론적: 정확한 초기 조건이면 미래 결정.\n실질적 확률: 초기 오차 → 확률적 예측.\n에르고딕 이론: 장기 통계 = 확률 분포.\n카오스 = 결정론적 불확실성.","game_type":"reveal"},{"id":7,"question":"확률과 사회 시뮬레이션:\n에이전트 기반 모델(ABM)의 확률 구조.\n\n세상기 분리(세글링, 1971):\n격자에 에이전트 배치.\n에이전트: 자신과 다른 이웃이 임계 이상이면 이동.\n\n(1) 임계값 1/3일 때 어떤 결과가 나타나나요?\n(2) 이것이 사회에 주는 함의는?\n(3) 확률론적으로 분석하면?","hints":["개인의 약한 선호(30%만 다르면 이동)가\n집단적으로 강한 분리를 만들어냄.","임계값 < 50%: 다수를 원하지 않아도 분리 발생.\n창발: 개인 행동 → 집단 패턴."],"answer":"임계1/3에도완전분리 / 약한선호=강한분리창발 / 확률=상전이임계현상","explanation":"셸링 분리 모델:\n임계값 1/3: 이웃의 1/3 이상이 다른 유형이면 이동.\n결과: 완전한 분리 패턴 창발.\n개인이 혼재를 \"원해도\" 분리 발생.\n사회적 함의:\n약한 선호 + 국소 상호작용 = 강한 집단 패턴.\n인종 분리, 소득 격리, 문화 집단화.\n정책: 개인 태도 변화만으로는 분리 해소 어려움.\n구조적 개입 필요.\n확률론적 분석:\n임계 상전이: 임계값 변화 → 패턴 급변.\n퍼콜레이션과 유사: 연결성 임계.\n확률 모델: P(이동) = f(이웃 구성).\n몬테카를로 시뮬레이션으로 통계적 특성 분석.","game_type":"reveal"},{"id":8,"question":"확률과 정보 보안:\n차등 프라이버시(Differential Privacy).\n\n정의: 알고리즘 M이 ε-차등 프라이버시이면\n|ln P(M(D)∈S) / P(M(D')∈S)| ≤ ε\n(D, D': 한 명 차이인 데이터셋)\n\n(1) ε의 의미는?\n(2) 가우시안 메커니즘으로 어떻게 구현하나요?\n(3) 프라이버시-정확성 트레이드오프는?","hints":["ε=0: 완전 프라이버시 (아무것도 안 가르침).\nε→∞: 프라이버시 없음.","가우시안 메커니즘: 쿼리 결과 + N(0, σ²) 노이즈.\nσ ∝ 1/ε."],"answer":"ε=프라이버시예산 / σ=감도/ε가우시안 / 작은ε=많은노이즈=낮은정확성","explanation":"ε-차등 프라이버시:\nε 작을수록: 한 사람의 데이터가 결과에 영향 적음.\nε = 0.1: 매우 강한 프라이버시.\nε = 10: 약한 프라이버시.\n현실: ε = 1~3 수준에서 실용.\n가우시안 메커니즘:\nf(D)의 감도(sensitivity): Δf = max|f(D)-f(D')|.\n노이즈 σ = Δf × √(2ln(1.25/δ)) / ε.\nf(D) + N(0, σ²)가 (ε,δ)-차등 프라이버시.\n트레이드오프:\nε 작음 → σ 큼 → 노이즈 많음 → 정확성 낮음.\nε 큼 → 프라이버시 약함.\n응용: 구글 RAPPOR, Apple iOS, 인구 조사.\n수백만 명 데이터에서 개인 보호 + 통계 추출.","game_type":"reveal"},{"id":9,"question":"확률과 복잡계의 미해결 문제:\nSOC(자기 조직화 임계성).\n\n배크-탕-비젠펠트 모래 더미:\n모래 알갱이를 계속 추가 → 임계 상태 도달.\n눈사태 크기 분포 = 멱함수 P(s) ∝ s^(-α).\n\n(1) SOC의 수학적 특성은?\n(2) 자연에서의 SOC 사례는?\n(3) 사회 시스템에서의 SOC 논쟁은?","hints":["멱함수 분포: 평균과 분산이 없거나 매우 큼.\n스케일 불변: 작은 눈사태와 큰 눈사태의 같은 패턴.","SOC 사례: 지진(구텐베르크-리히터), 산불, 뇌 신경 활동.\n사회: 금융 위기, 전쟁, 유행어 확산."],"answer":"멱함수·스케일불변·튜닝없이임계 / 지진·산불·뇌 / 사회SOC=논쟁중","explanation":"SOC의 수학적 특성:\n멱함수: P(s) ∝ s^(-α), α ≈ 1~2.\n스케일 불변: 작은/큰 사건의 통계적 패턴 동일.\n자기 조직: 외부 매개변수 조정 없이 임계 도달.\n자연 사례:\n지진: 리히터 규모 ~ 멱함수 (α ≈ 2.3).\n산불 면적, 폭발 반응, 강 네트워크.\n뇌: 신경 눈사태 ~ 멱함수.\n사회 SOC 논쟁:\n금융 위기: 주가 변동 ~ 멱함수 꼬리.\n전쟁: 사상자 분포 ~ 멱함수.\n논쟁: 진짜 SOC인지, 다른 메커니즘인지.\n미해결: SOC의 일반 이론 부재.\n왜 자연이 임계 상태를 선호하는가?","game_type":"reveal"},{"id":10,"question":"확률의 미래를 설계하세요:\n\n다음 100년 후 확률 이론은 어떻게 발전할까요?\n\n(1) 양자 확률이 고전 확률을 대체할 수 있나요?\n(2) AI가 새로운 확률 정리를 발견할 수 있나요?\n(3) 확률의 물리적 기초가 바뀔 수 있나요?\n(4) 인간의 직관과 확률의 간극을 어떻게 좁힐까요?\n(5) 당신이 예측하는 가장 중요한 발전은?","hints":["양자 확률: 비가환 확률의 일반화.\n표준 확률은 교환 대수의 특수 경우.","AI 수학: AlphaProof의 수학 올림피아드 도전.\n자동 정리 발견의 가능성."],"answer":"개인 창작 (다양한 비전 가능)","explanation":"예측 시나리오:\n\n양자 확률의 일반화:\n비가환 확률이 양자 컴퓨팅·AI에서 주류.\n고전 확률은 특수 경우로 포함.\n표준 확률 = 가환 대수, 양자 = 비가환 대수.\n\nAI와 확률 발견:\nAutoML이 새로운 분포 클래스 발견.\n신경망이 확률 부등식 자동 발견.\n인간-AI 협업으로 새로운 확률 정리 증명.\n\n물리적 기초:\n양자 중력 이론이 확률의 근본 재정의.\n시공간이 확률적으로 구성된다면?\n\"확률이 시공간보다 근본적\"인 이론.\n\n인간 직관 개선:\n신경과학: 직관적 확률 처리의 뇌 메커니즘.\n교육: 게임·시뮬레이션으로 확률 직관 훈련.\nMindArena의 역할: 확률적 사고 대중화.","game_type":"reveal"}]},{"type":"probability","level":15,"title":"확률·경우의 수 15단계 — 독창적 확률 창조","difficulty":"마스터","thinking":"독창적 창조 · 확률적 혁신 · 출제자적 관점","problems":[{"id":1,"question":"확률의 통일 이론을 설계하세요.\n\n고전 확률, 양자 확률, 퍼지 논리, 베이지안 추론을\n하나의 틀로 통합하는 이론이 가능할까요?\n\n(1) 각 이론의 수학적 구조를 비교하세요.\n(2) 공통 기반을 찾을 수 있나요?\n(3) 당신만의 통합 이론 초안을 설계하세요.","hints":["모든 확률 이론의 공통점:\n[0,1] 값역, 정규화 조건, 결합 규칙.\n차이점: 대수 구조(가환 vs 비가환).","범주론(Category Theory) 접근:\n각 이론 = 특정 범주.\n통합 = 메타-범주 또는 함수자."],"answer":"개인 창작 (다양한 이론 가능)","explanation":"통합 이론 설계 예시:\n\n\"맥락 의존 확률 이론(Context-Dependent Probability)\"\n\n기본 구조:\n확률 P(A|C): 사건 A, 맥락 C.\n맥락 C에 따라 다른 대수 구조.\n\n특수 경우:\nC = 고전 맥락: P(A|C) = 표준 콜모고로프 확률.\nC = 양자 맥락: P(A|C) = 힐베르트 공간 투영.\nC = 퍼지 맥락: P(A|C) ∈ [0,1] 연속.\nC = 베이지안 맥락: P(A|C) = 사후 분포.\n\n통합 공리:\n1. P(A|C) ∈ [0,1].\n2. P(Ω|C) = 1.\n3. 맥락 C에서 가산 가법성 (C에 따라 다른 가산 방식).\n4. 맥락 전환: T(C→C'): P(A|C) → P(A|C').\n\n이 틀에서:\n고전 = C가 부울 대수.\n양자 = C가 힐베르트 공간.\n퍼지 = C가 [0,1] 격자.\n베이지안 = C가 사전 분포 포함.\n\n도전: 맥락 전환 T의 수학적 성질 결정.","game_type":"reveal"},{"id":2,"question":"새로운 확률 퍼즐 장르를 창조하세요.\n\n기존 확률 퍼즐의 한계:\n①대부분 고립된 문제 (연결성 없음).\n②실생활과 거리 (수학적 추상).\n③단일 정답 (창의성 제한).\n④정적 문제 (동적 과정 없음).\n\n새로운 장르 조건:\n①연속적 서사 속에서 확률 결정.\n②실시간으로 변하는 확률.\n③여러 최적 전략이 공존.\n④메타 확률 (확률에 대한 확률).","hints":["스토리텔링 + 확률의 결합.\n선택의 순간마다 확률이 업데이트되는 서사.","예시: \"베이지안 탐정\" 장르.\n증거가 나올 때마다 용의자 확률 업데이트.\n최적 증거 수집 순서 결정."],"answer":"개인 창작 (다양한 장르 가능)","explanation":"새로운 장르 예시: \"확률 생존 게임\"\n\n설정:\n참가자는 미지의 섬에서 탈출해야 합니다.\n매 결정마다 생존 확률이 베이지안으로 업데이트됩니다.\n\n게임 구조:\n①초기 사전 확률: P(각 경로 안전) = 0.5.\n②탐색: 정보 수집 → 확률 업데이트.\n③결정: 현재 확률 기반 최적 행동 선택.\n④결과: 새로운 증거 → 다시 업데이트.\n\n수학적 요소:\n베이즈 정리: 매 관찰 후 업데이트.\n기댓값: E[생존|경로 선택].\n정보 이익: 어떤 정보가 가장 가치 있나?\n탐색-활용 균형: UCB 알고리즘 적용.\n\n교육적 가치:\n베이지안 추론을 직관적으로 체험.\n정보의 가치를 확률로 계산.\n불확실성 속 의사결정 훈련.","game_type":"reveal"},{"id":3,"question":"확률과 창의성의 수학:\n창의적 과정의 확률 모델.\n\n창의적 아이디어 생성:\n개념 공간 S에서 무작위 탐색.\n평가 함수 f(s): 아이디어의 가치.\n\n(1) 최적 창의적 탐색 전략은?\n(2) 혁신이 \"점프\"인지 \"확산\"인지 확률로 분석하세요.\n(3) AI 창의성과 인간 창의성의 확률적 차이는?","hints":["탐색-활용: 알려진 좋은 아이디어 vs 새 아이디어 탐색.\n레비 비행(Lévy flight): 짧은 탐색 + 가끔 큰 점프.","인간 창의성: 멱함수 분포의 점프 + 국소 탐색.\nAI: 균일한 탐색 or 훈련 분포 근처."],"answer":"최적탐색=UCB또는레비비행 / 혁신=멱함수분포점프 / AI=보간강점인간=외삽강점","explanation":"창의적 탐색 모델:\n개념 공간 S에서 무작위 워크.\nf(s): 창의적 가치 함수 (다봉형, 복잡한 지형).\n최적 전략:\nUCB: 불확실성 큰 영역 우선 탐색.\n레비 비행: 대부분 국소 탐색 + 가끔 큰 도약.\n시뮬레이티드 어닐링: 점차 탐색 범위 축소.\n혁신의 통계:\n돌파구: 멱함수 분포 (대부분 점진적, 가끔 혁명적).\n구텐베르크-리히터처럼 혁신 크기 ~ 멱함수.\nAI vs 인간:\nAI 강점: 보간(학습 분포 내 최적화).\n인간 강점: 외삽(학습 범위 밖 도약).\nAI는 알려진 공간 내 최적, 인간은 새 공간 창조.\n창의성의 확률적 본질:\n무작위 탐색 + 패턴 인식 + 선택적 강화.\n최적 창의성 = 탐색과 활용의 최적 균형.","game_type":"reveal"},{"id":4,"question":"확률 이론의 역사에서 배우는 미래:\n\n확률의 주요 혁명:\n①파스칼-페르마(1654): 도박 문제 → 확률론 탄생.\n②베르누이(1713): 큰 수의 법칙.\n③베이즈(1763): 역확률.\n④라플라스(1812): 확률론 체계화.\n⑤콜모고로프(1933): 공리적 기초.\n⑥섀넌(1948): 정보 이론.\n⑦맥킨(1960s): 확률적 금융.\n\n(1) 각 혁명의 공통 패턴을 찾으세요.\n(2) 다음 혁명은 어디서 올까요?\n(3) 당신이 일으킬 수 있는 혁명은?","hints":["각 혁명의 패턴:\n실용적 문제 → 수학적 도구 → 일반 이론 → 응용 폭발.","다음 혁명 후보:\n양자 AI, 인과 추론, 불확실성의 통합 이론."],"answer":"패턴=문제→도구→이론→응용 / 다음혁명=인과·양자·의식 / 개인비전","explanation":"혁명의 공통 패턴:\n①실용 문제에서 시작 (도박, 보험, 통신).\n②수학적 도구 개발 (조합론, 측도론).\n③일반 이론으로 추상화.\n④예상치 못한 응용 폭발.\n다음 혁명 후보:\n인과 추론 혁명:\n펄(2011 튜링상): 확률에 인과를 통합.\n\"왜\"를 확률로 형식화.\ndo-calculus: 개입의 효과 계산.\n양자 AI 혁명:\n양자 확률 + 머신러닝 = 새 패러다임?\n양자 이점이 실현되면 AI 능력 폭발.\n의식 혁명:\n의식의 확률론적 이론이 확립되면\nAI 의식 판단 기준 생성.\n당신의 혁명:\n어떤 문제에서 새로운 확률 도구가 필요한가?\n그것이 다음 혁명의 시작.","game_type":"reveal"},{"id":5,"question":"확률 교육의 미래를 설계하세요.\n\n현재 확률 교육의 문제:\n①공식 암기 중심.\n②직관과 수식의 괴리.\n③실생활 연결 부족.\n④반직관적 결과 이해 부족.\n\nMindArena 기반 새로운 교육:\nAI + 게임 + 확률의 통합.\n\n(1) 확률 직관을 기르는 최적 방법은?\n(2) 1~15단계 커리큘럼의 핵심 설계 원리는?\n(3) 미래 학습자에게 전하는 확률 철학은?","hints":["직관 훈련: 실제 시뮬레이션, 예측-관찰-반성.\n생일 문제를 실제로 해보면 직관이 바뀜.","설계 원리: 구체→추상, 놀람→이해, 개인→사회."],"answer":"개인 창작 (다양한 교육 철학 가능)","explanation":"확률 직관 훈련 방법:\n\n시뮬레이션 우선:\n계산 전에 실험.\n1,000번 시뮬레이션으로 확률 \"느끼기\".\n몬테카를로 직접 실행.\n\n예측-관찰-반성 사이클:\n\"몇 명이 모여야 생일이 겹칠까?\" 예측.\n시뮬레이션으로 관찰.\n왜 직관이 틀렸는지 수학적으로 분석.\n\nMindArena 커리큘럼 원리:\n1~3단계: 직관 형성 (구체적 나열).\n4~6단계: 도구 습득 (순열·조합·확률).\n7~9단계: 심화 적용 (분포·전략·통계).\n10~12단계: 이론 탐구 (공리·측도·과정).\n13~15단계: 창조 (새 문제 설계·새 이론).\n\n미래 학습자에게:\n확률은 불확실성을 두려워하지 않고\n수학적으로 포용하는 기술입니다.\n이 기술이 더 나은 결정을 만들고\n더 공정한 세상을 만듭니다.","game_type":"reveal"},{"id":6,"question":"궁극의 확률 퍼즐을 설계하세요.\n\n조건:\n①1~15단계의 핵심 개념 모두 포함.\n②반직관적이지만 정확한 수학적 답이 있음.\n③실생활과 깊이 연결됨.\n④풀이 과정이 아름다운 수학을 보여줌.\n⑤출제자의 확률 철학이 담김.","hints":["지금까지 배운 개념 중 가장 인상적인 것들을 조합.\n단순한 상황에서 깊은 확률이 나오는 문제.","좋은 퍼즐: 처음엔 쉬워 보이지만\n풀수록 깊어지는 구조."],"answer":"개인 창작 (정답 없음)","explanation":"예시 \"궁극 퍼즐\": 확률의 나비 효과\n\n문제:\n어느 도시에 바이러스가 퍼집니다.\n감염자 1명, 전체 100만 명.\n하루 감염률 p.\n\n당신은 두 가지 정책을 선택할 수 있습니다:\nA: 무작위 10만 명 격리 (감염률 × 0.9).\nB: 감염자 주변 1,000명 정밀 격리 (감염률 × 0.5).\n\n초기 감염자 위치를 모릅니다.\n\nQ1: 각 정책의 기대 감염자 수 (30일 후)?\nQ2: 어떤 정책이 더 좋은가?\nQ3: 초기 감염자 위치 정보의 가치는?\n\n수학:\nQ1: 기하급수 성장 × 정책 효과.\nQ2: 불확실성 하에서 최적 정책.\nQ3: 정보 가치 = E[최적|정보] - E[최적|무정보].\n\n포함된 개념:\n경우의 수(격리 방법), 확률(감염률), 기댓값, 마르코프(확산), 베이즈(위치 추정), 정보 이론(정보 가치), 최적화(정책 선택), 사회 모델(SIR).\n\n이 하나의 문제에 확률의 모든 층위가 담겨 있습니다.","game_type":"reveal"},{"id":7,"question":"확률 이론가로서 선언문을 쓰세요.\n\n당신이 확률 이론가라면\n어떤 문제를 연구하겠습니까?\n어떤 세상을 만들고 싶습니까?\n\n조건:\n①수학적으로 엄밀한 연구 목표.\n②사회적 가치와 연결.\n③현재 기술 수준에서 실현 가능성.\n④10년 후 달성 가능한 목표.","hints":["현재 미해결 문제 중 당신이 관심 있는 것은?\n확률이 아직 해결 못한 사회 문제는?","작은 문제에서 큰 이론이 나옵니다.\n구체적이고 명확한 목표가 좋습니다."],"answer":"개인 창작 (정답 없음)","explanation":"선언문 예시:\n\n\"나는 AI 시대의 공정한 확률을 연구합니다.\n\n알고리즘이 사람의 인생을 결정하는 시대에\n확률이 편견을 강화하지 않도록\n수학적으로 공정한 AI를 만들겠습니다.\n\n연구 목표:\n①차등 프라이버시와 공정성의 수학적 통합.\n②베이지안 공정성: 사전 편향 없는 추론.\n③인과 공정성: 차별의 수학적 정의.\n\n10년 목표:\n채용·대출·형사 AI에서\n수학적으로 증명 가능한 공정성 기준 확립.\n\n이것이 내가 확률로 만들고 싶은 세상입니다.\"","game_type":"reveal"},{"id":8,"question":"확률 1~15단계 여정을 돌아보며:\n\n당신이 1단계에서 15단계까지 오면서\n가장 놀라운 확률적 통찰은 무엇이었나요?\n\n다음 형식으로 답하세요:\n①가장 반직관적이었던 결과.\n②가장 아름다웠던 수학.\n③가장 실용적인 개념.\n④가장 철학적으로 깊었던 문제.\n⑤이 여정이 세계관을 어떻게 바꿨나요?","hints":["각 단계에서 배운 핵심이 무엇이었는지 돌아보세요.","좋은 답은 개인적이고 구체적입니다.\n\"나에게\" 가장 의미 있었던 것을 쓰세요."],"answer":"개인 창작 (정답 없음)","explanation":"예시 답변:\n\n①가장 반직관적:\n\"몬티 홀 문제: 문을 바꾸면 2배 유리하다는 것.\"\n직관은 50:50이지만 수학은 2:1.\n이후 모든 직관을 의심하게 됨.\n\n②가장 아름다운 수학:\n\"ε-차등 프라이버시의 로그 불등식.\"\n복잡한 프라이버시 개념을 단 하나의 수식으로.\n수학이 윤리를 담을 수 있다는 경이.\n\n③가장 실용적:\n\"베이즈 정리: 새 증거로 믿음 업데이트.\"\n뉴스를 보는 방식이 바뀜.\n\"이 정보는 내 믿음을 얼마나 바꿔야 하나?\"\n\n④가장 철학적:\n\"확률이 근본적인가 인식론적인가?\"\n양자역학은 세계 자체가 확률적이라 말한다.\n그렇다면 자유의지는?\n\n⑤세계관 변화:\n\"불확실성은 두려움이 아닌 수학의 대상.\"\n모르는 것을 정량화할 수 있다.\n이것이 확률론의 핵심 선물.","game_type":"reveal"},{"id":9,"question":"확률로 세상을 바꾸는 방법을 설계하세요.\n\n확률 이론이 실제로 세상을 바꾼 사례:\n①기상 예보: 사망자 수 급감.\n②임상 시험: 의학적 발전 가속.\n③보험: 위험 사회화.\n④암호화: 디지털 보안.\n⑤AI: 기술 혁명.\n\n다음 10년, 확률로 어떤 세상 문제를 해결할 수 있나요?\n\n(1) 가장 중요한 문제 1개 선택.\n(2) 어떤 확률 이론이 필요한가?\n(3) 구체적 실행 계획을 설계하세요.","hints":["글로벌 문제: 기후 변화, 불평등, 질병, 교육, 갈등.\n확률 도구: 베이즈, 최적화, 시뮬레이션, 인과 추론.","가장 큰 임팩트 = 불확실성이 크지만\n확률 도구로 개선 가능한 영역."],"answer":"개인 창작 (다양한 비전 가능)","explanation":"예시 설계: \"확률로 기후 위기 대응\"\n\n문제: 기후 변화의 불확실성이 너무 커서\n정책 결정이 어렵습니다.\n\n필요한 확률 이론:\n①베이지안 기후 모델: 관측으로 기후 민감도 업데이트.\n②극값 이론: 100년·1000년 빈도 극단 사건 예측.\n③의사결정 이론: 불확실성 하의 최적 정책.\n④인과 추론: \"이 배출 감소가 온도에 얼마나 영향?\"\n\n구체적 계획:\n1년차: 전 지구 기후 데이터 베이지안 통합.\n3년차: 불확실성을 포함한 정책 시뮬레이터.\n5년차: 실시간 업데이트 기후 확률 대시보드.\n10년차: 전 세계 정책 결정자의 확률적 사고 지원.\n\nMindArena의 기여:\n확률적 사고를 대중화하면\n기후 소통이 더 정확해집니다.\n\"70% 확률로 2도 상승\"의 의미를 이해하는 사회.","game_type":"reveal"},{"id":10,"question":"확률·경우의 수 마스터 최종 도전:\n\n다음 질문에 답하면서\n1~15단계의 여정을 마무리하세요.\n\n\"확률이란 무엇인가?\"\n\n이 질문에 다음 형식으로 답하세요:\n\n①수식으로: ___\n②한 문장으로: ___\n③그림으로 (텍스트 묘사): ___\n④철학으로: ___\n⑤당신의 언어로: ___","hints":["1~15단계를 모두 걸어온 당신만이 할 수 있는 답.\n기술적 정의와 철학적 통찰을 모두 담으세요.","정답이 없는 질문입니다.\n당신의 통찰이 곧 정답입니다."],"answer":"개인 창작 (정답 없음)","explanation":"예시 답변:\n\n①수식으로:\nP: Ω → [0,1], P(Ω)=1, P(∪Aᵢ)=ΣP(Aᵢ) (서로소).\n\n②한 문장으로:\n\"확률은 알 수 없는 것을 숫자로 다루는 기술이다.\"\n\n③그림으로:\n넓은 어둠 속 작은 원.\n원이 알려진 것, 어둠이 알려지지 않은 것.\n확률은 어둠 속을 걸어가면서\n손에 든 촛불의 밝기를 측정하는 것.\n\n④철학으로:\n\"확률은 무지와 세계 사이의 언어이다.\n완전한 지식에서는 불필요하고\n완전한 무지에서는 불가능하다.\n그 중간 어딘가에서 인간이 살아간다.\"\n\n⑤당신의 언어로:\n\"확률은 틀려도 괜찮다고 말해주는 수학이다.\n1/2로 틀렸다면, 그것도 맞는 것이다.\"","game_type":"reveal"}]}]},"06_pattern":{"id":"06_pattern","label":"패턴","icon":"🔍","levels":[{"type":"pattern","level":1,"title":"패턴 퍼즐 1단계 — 패턴 인식 입문","difficulty":"입문","thinking":"패턴 인식 · 규칙 발견 · 다음 항 예측","problems":[{"id":1,"question":"다음 수열에서 규칙을 찾아 빈칸을 채우세요.\n\n2, 4, 6, 8, ___","hints":["앞뒤 숫자의 차이를 구해보세요
