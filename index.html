      <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:.9rem 1rem;margin-bottom:.75rem;font-size:13px;color:#92400e;line-height:1.6">
        💭 <strong>서술형 문제입니다.</strong> 먼저 내 답을 적어보고, 정답과 비교해 자기평가 하세요.
      </div>
      <textarea id="memo-inp"
        placeholder="내 생각을 자유롭게 적어보세요 (채점하지 않습니다)"
        style="width:100%;min-height:80px;padding:.75rem 1rem;border-radius:10px;
               border:2px solid var(--bd);font-family:inherit;font-size:14px;
               line-height:1.6;resize:vertical;outline:none;background:white;
               margin-bottom:.75rem;transition:border-color .15s"
        onfocus="this.style.borderColor='${col}'"
        onblur="this.style.borderColor='var(--bd)'"></textarea>
      <div class="reveal-ans" id="rev-ans" style="display:none">${p.answer}</div>
      <div class="exp-box" id="exp-box" style="display:none">${p.explanation||''}</div>
      <div class="gbtns" id="reveal-btns">
        <button class="gbp" style="background:${col}" onclick="showReveal()">💡 정답 보기</button>
        <button class="gbs" onclick="closeGame()">나가기</button>
      </div>
      <div id="self-eval" style="display:none;margin-top:.75rem">
        <div style="font-size:12px;color:var(--t3);margin-bottom:.5rem;text-align:center">내 답과 비교해보셨나요?</div>
        <div style="display:flex;gap:8px">
          <button class="gbp" style="flex:1;background:#16a34a" onclick="selfEval(true)">✅ 맞혔어요</button>
          <button class="gbp" style="flex:1;background:#dc2626" onclick="selfEval(false)">❌ 몰랐어요</button>
        </div>
      </div>
    `:`
      <input class="ans-input" id="ans-inp" type="text"
        placeholder="답을 입력하세요"
        onkeydown="if(event.key==='Enter')submitAns()"
        autocomplete="off" inputmode="${p.game_type==='number_input'?'decimal':'text'}">
      <button class="submit-btn" id="sub-btn" onclick="submitAns()" style="background:${col}">확인</button>
      <div class="fb-box" id="fb-box"></div>
      <div class="exp-box" id="exp-box"></div>
      <div class="gbtns" id="nav-btns" style="display:none">
        <button class="gbp" id="next-btn" style="background:${col}" onclick="nextPuzzle()">다음 문제 →</button>
        <button class="gbs" onclick="closeGame()">나가기</button>
      </div>
    `}`;
  const inp=document.getElementById('ans-inp');
  if(inp)setTimeout(()=>inp.focus(),80);
}

function showHint(){
  const p=GS.problems[GS.idx];
  GS.hintShown=Math.min(GS.hintShown+1,p.hints.length);
  const box=document.getElementById('hint-box');
  if(box)box.innerHTML=p.hints.slice(0,GS.hintShown).map((h,i)=>
    `<div class="hint-box">💡 힌트 ${i+1}: ${h}</div>`).join('');
  const btn=document.getElementById('hint-btn');
  if(btn)btn.textContent=GS.hintShown>=p.hints.length
    ?'힌트 모두 확인 ✓':`💡 힌트 더 보기 (${GS.hintShown}/${p.hints.length})`;
}

function norm(s){
  return s.trim().replace(/\s+/g,' ').replace(/[가지경우]/g,'').replace(/\.0$/,'').toLowerCase();
}
function submitAns(){
  if(GS.answered)return;
  const inp=document.getElementById('ans-inp');
  if(!inp||!inp.value.trim())return;
  const p=GS.problems[GS.idx];
  const u=norm(inp.value), c=norm(p.answer);
  let ok=u===c;
  if(!ok){
    const uN=(u.match(/-?\d+(\.\d+)?/g)||[]).sort();
    const cN=(c.match(/-?\d+(\.\d+)?/g)||[]).sort();
    if(uN.length&&cN.length&&JSON.stringify(uN)===JSON.stringify(cN))ok=true;
  }
  if(!ok&&c.length<=12&&u.length>=2&&c.includes(u))ok=true;
  if(!ok&&u.length<=12&&c.length>=2&&u.includes(c))ok=true;
  GS.answered=true;
  if(ok)GS.correct++;
  inp.classList.add(ok?'ok':'ng'); inp.disabled=true;
  const sub=document.getElementById('sub-btn'); if(sub)sub.disabled=true;
  const fb=document.getElementById('fb-box');
  if(fb){fb.className=`fb-box ${ok?'ok':'ng'}`;fb.textContent=ok?'✅ 정답입니다!':`❌ 정답: ${p.answer}`;}
  const exp=document.getElementById('exp-box');
  if(exp&&p.explanation){exp.style.display='block';exp.textContent=p.explanation;}
  const nav=document.getElementById('nav-btns');
  if(nav){
    nav.style.display='flex';
    const nb=document.getElementById('next-btn');
    if(nb)nb.textContent=GS.idx>=GS.problems.length-1?'결과 보기 →':'다음 문제 →';
  }
}

function showReveal(){
  const rev=document.getElementById('rev-ans');
  const exp=document.getElementById('exp-box');
  const rb=document.getElementById('reveal-btns');
  const se=document.getElementById('self-eval');
  if(rev)rev.style.display='block';
  if(exp)exp.style.display='block';
  if(rb)rb.style.display='none';
  if(se)se.style.display='block';
  GS.answered=true;
}
function selfEval(knew){
  if(knew)GS.correct++;
  // 마지막 문제였으면 저장
  if(GS.idx>=GS.problems.length-1){
    saveDone(GS.meta.id, GS.levelNum, GS.correct, GS.problems.length);
    renderCats();
  }
  nextPuzzle();
}
function nextPuzzle(){GS.idx++;renderPuzzle();}

function endPuzzle(){
  saveDone(GS.meta.id, GS.levelNum, GS.correct, GS.problems.length);
  renderCats();
  const {correct,problems,meta,levelNum}=GS;
  const total=problems.length;
  const pct=Math.round(correct/total*100);
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':'⭐';
  const msg=pct>=90?'완벽합니다! 🎉':pct>=70?'잘 했습니다! 👍':'다시 도전해보세요! 💪';
  const secs=Math.round((Date.now()-GS.start)/1000);
  document.getElementById('gov-body').innerHTML=`
    <div class="result-box">
      <div class="result-stars">${stars}</div>
      <div class="result-score" style="color:${meta.color}">${correct}<span style="font-size:24px;font-weight:400;color:var(--t3)"> / ${total}</span></div>
      <div style="font-size:13px;color:var(--t3);margin-bottom:.25rem">정답률 ${pct}% · ${secs}초</div>
      <div style="font-size:15px;color:var(--t2);margin-bottom:1.5rem">${msg}</div>
      <div class="gbtns" style="justify-content:center">
        <button class="gbp" style="background:${meta.color}" onclick="startLevel('${meta.id}',${levelNum})">🔄 다시 풀기</button>
        <button class="gbp" style="background:${meta.color}" onclick="closeGame();openLov('${meta.id}')">다른 레벨</button>
        <button class="gbs" onclick="closeGame()">나가기</button>
      </div>
    </div>`;
}
function closeGame(){
  if(calcTimer){clearInterval(calcTimer);calcTimer=null;}
  document.getElementById('gov').classList.remove('open');
  document.body.style.overflow='';
  GS={};
}

// ── 로그인 (Firebase 설정 후 교체) ──
function handleLogin(){
  alert('로그인 기능은 준비 중입니다.\nFirebase 설정 완료 후 활성화됩니다.');
}

window.addEventListener('DOMContentLoaded',()=>renderCats());

</script>
